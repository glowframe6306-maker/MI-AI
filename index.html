    ];

    function firebaseUser() {
        try {
            return (
                window.miFirebaseAuth?.currentUser ||
                window.firebaseAuth?.currentUser ||
                (
                    window.firebase &&
                    typeof window.firebase.auth === "function"
                        ? window.firebase.auth().currentUser
                        : null
                ) ||
                null
            );
        }
        catch (error) {
            return null;
        }
    }

    function authenticated() {
        try {
            if (typeof window.isAuthenticated === "function") {
                return Boolean(window.isAuthenticated());
            }

            if (typeof isAuthenticated === "function") {
                return Boolean(isAuthenticated());
            }
        }
        catch (error) {
            console.warn(
                "[MI AI Smart Login]",
                error
            );
        }

        return Boolean(
            firebaseUser() ||
            window.user?.email ||
            localStorage.getItem("mi_supabase_token")
        );
    }

    function selectedLanguage() {
        return String(
            document.getElementById("languageSelect")?.value ||
            localStorage.getItem("mi_ui_language") ||
            "en"
        )
            .trim()
            .toLowerCase();
    }

    function messageFor(reason) {
        const language = selectedLanguage();

        const messages = {
            en: {
                share:
                    "Please log in to share this chat.",

                settings:
                    "Please log in to change this setting.",

                protected:
                    "Please log in to use this feature."
            },

            si: {
                share:
                    "මෙම chat එක Share කිරීමට Login වෙන්න.",

                settings:
                    "මෙම setting එක වෙනස් කිරීමට Login වෙන්න.",

                protected:
                    "මෙම feature එක භාවිත කිරීමට Login වෙන්න."
            },

            ta: {
                share:
                    "இந்த chat-ஐ Share செய்ய Login செய்யவும்.",

                settings:
                    "இந்த setting-ஐ மாற்ற Login செய்யவும்.",

                protected:
                    "இந்த feature-ஐ பயன்படுத்த Login செய்யவும்."
            }
        };

        const set =
            language.startsWith("si")
                ? messages.si
                : language.startsWith("ta")
                    ? messages.ta
                    : messages.en;

        return set[reason] || set.protected;
    }

    function createNotice() {
        let notice =
            document.getElementById(
                "miSmartLoginNotice"
            );

        if (notice) {
            return notice;
        }

        notice =
            document.createElement("div");

        notice.id =
            "miSmartLoginNotice";

        notice.setAttribute(
            "role",
            "status"
        );

        notice.setAttribute(
            "aria-live",
            "polite"
        );

        document.body.appendChild(
            notice
        );

        return notice;
    }

    function showSuggestion(reason) {
        const text =
            messageFor(reason);

        if (typeof window.showToast === "function") {
            window.showToast(text);
            return;
        }

        const notice =
            createNotice();

        clearTimeout(noticeTimer);

        notice.textContent = text;
        notice.classList.add("visible");

        noticeTimer =
            setTimeout(function () {
                notice.classList.remove(
                    "visible"
                );
            }, 2300);
    }

    function findLoginModal() {
        for (const selector of modalSelectors) {
            const modal =
                document.querySelector(
                    selector
                );

            if (modal) {
                return modal;
            }
        }

        const emailInput =
            document.querySelector(
                [
                    "#loginEmail",
                    "input[type='email']",
                    "input[name='email']"
                ].join(",")
            );

        if (!emailInput) {
            return null;
        }

        let parent =
            emailInput.parentElement;

        while (
            parent &&
            parent !== document.body
        ) {
            const text =
                String(
                    parent.textContent || ""
                ).toLowerCase();

            if (
                text.includes("password") &&
                (
                    text.includes("sign in") ||
                    text.includes("login")
                )
            ) {
                return parent;
            }

            parent =
                parent.parentElement;
        }

        return null;
    }

    function showLoginModal(modal) {
        if (!modal) {
            return false;
        }

        loginRequested = true;

        modal.hidden = false;
        modal.removeAttribute("hidden");

        modal.classList.add(
            "active",
            "open",
            "show",
            "visible"
        );

        modal.style.display = "flex";
        modal.style.visibility = "visible";
        modal.style.opacity = "1";
        modal.style.pointerEvents = "auto";

        document.body.classList.add(
            "modal-open"
        );

        setTimeout(function () {
            modal.querySelector(
                [
                    "#loginEmail",
                    "input[type='email']",
                    "input[name='email']"
                ].join(",")
            )?.focus();
        }, 100);

        return true;
    }

    function hideLoginModal() {
        const modal =
            findLoginModal();

        loginRequested = false;

        if (!modal) {
            return;
        }

        modal.classList.remove(
            "active",
            "open",
            "show",
            "visible"
        );

        modal.hidden = true;
        modal.style.display = "none";
        modal.style.visibility = "hidden";
        modal.style.opacity = "0";
        modal.style.pointerEvents = "none";

        document.body.classList.remove(
            "modal-open"
        );
    }

    function openLogin() {
        if (
            authenticated() ||
            loginOpening
        ) {
            return;
        }

        loginOpening = true;
        loginRequested = true;

        try {
            if (typeof window.openLogin === "function") {
                window.openLogin();
            }
            else if (typeof openLogin === "function") {
                openLogin();
            }
            else if (typeof window.showLogin === "function") {
                window.showLogin();
            }
            else if (typeof showLogin === "function") {
                showLogin();
            }
            else if (
                typeof window.openAuthModal === "function"
            ) {
                window.openAuthModal("login");
            }
            else if (
                typeof openAuthModal === "function"
            ) {
                openAuthModal("login");
            }

            setTimeout(function () {
                showLoginModal(
                    findLoginModal()
                );
            }, 50);
        }
        finally {
            setTimeout(function () {
                loginOpening = false;
            }, 450);
        }
    }

    function details(element) {
        if (!(element instanceof Element)) {
            return "";
        }

        return [
            element.id,
            element.className,
            element.getAttribute("name"),
            element.getAttribute("data-setting"),
            element.getAttribute("data-settings-type"),
            element.getAttribute("data-action"),
            element.getAttribute("aria-label"),
            element.getAttribute("title"),
            element.textContent,
            element.closest("button")?.textContent,
            element.closest("label")?.textContent,
            element.closest(".mi-settings-section")
                ?.textContent
        ]
            .filter(Boolean)
            .join(" ")
            .replace(/\s+/g, " ")
            .trim()
            .toLowerCase();
    }

    function matchesSelector(
        element,
        selectors
    ) {
        return Boolean(
            element instanceof Element &&
            element.closest(
                selectors.join(",")
            )
        );
    }

    function isLoginButton(element) {
        if (
            matchesSelector(
                element,
                loginButtonSelectors
            )
        ) {
            return true;
        }

        const text =
            details(element);

        return (
            text === "login" ||
            text === "log in"
        );
    }

    function isShareButton(element) {
        if (
            matchesSelector(
                element,
                shareSelectors
            )
        ) {
            return true;
        }

        return details(element)
            .includes("share");
    }

    function isSettingsFeature(element) {
        if (!(element instanceof Element)) {
            return false;
        }

        if (
            !element.closest(
                [
                    "#settingsPanel",
                    "#settingsModal",
                    ".settings-panel",
                    ".settings-modal",
                    ".mi-settings-section"
                ].join(",")
            )
        ) {
            return false;
        }

        const text =
            details(element);

        return protectedWords.some(
            function (word) {
                return text.includes(word);
            }
        );
    }

    function isProtectedFeature(element) {
        if (!(element instanceof Element)) {
            return false;
        }

        if (
            element.closest(
                [
                    "[data-login-required='true']",
                    "[data-auth-required='true']",
                    ".login-required",
                    ".auth-required"
                ].join(",")
            )
        ) {
            return true;
        }

        const text =
            details(element);

        return protectedWords.some(
            function (word) {
                return text.includes(word);
            }
        );
    }

    document.addEventListener(
        "click",
        function (event) {
            const target =
                event.target;

            if (
                matchesSelector(
                    target,
                    closeSelectors
                )
            ) {
                event.preventDefault();
                hideLoginModal();
                return;
            }

            if (isLoginButton(target)) {
                event.preventDefault();
                openLogin();
                return;
            }

            if (
                authenticated()
            ) {
                return;
            }

            if (isShareButton(target)) {
                event.preventDefault();
                event.stopPropagation();
                event.stopImmediatePropagation();

                showSuggestion("share");
                openLogin();
                return;
            }

            if (isSettingsFeature(target)) {
                event.preventDefault();
                event.stopPropagation();
                event.stopImmediatePropagation();

                showSuggestion("settings");
                openLogin();
                return;
            }

            if (isProtectedFeature(target)) {
                event.preventDefault();
                event.stopPropagation();
                event.stopImmediatePropagation();

                showSuggestion("protected");
                openLogin();
            }
        },
        true
    );

    document.addEventListener(
        "keydown",
        function (event) {
            if (event.key === "Escape") {
                hideLoginModal();
            }
        },
        true
    );

    function removePermanentMessages() {
        document
            .querySelectorAll(
                [
                    "#authReminder",
                    ".auth-reminder",
                    ".login-required-message",
                    ".settings-login-message",
                    "[data-login-reminder]",
                    "[data-auth-reminder]"
                ].join(",")
            )
            .forEach(function (element) {
                element.textContent = "";
                element.hidden = true;
                element.style.setProperty(
                    "display",
                    "none",
                    "important"
                );
            });
    }

    function keepClosedUnlessRequested() {
        removePermanentMessages();

        if (
            !loginRequested &&
            !authenticated()
        ) {
            hideLoginModal();
        }
    }

    function start() {
        /*
          Never auto-open login on page load,
          refresh, Back or chat typing.
        */
        loginRequested = false;

        setTimeout(
            keepClosedUnlessRequested,
            50
        );

        setTimeout(
            keepClosedUnlessRequested,
            350
        );

        setTimeout(
            keepClosedUnlessRequested,
            1000
        );

        const observer =
            new MutationObserver(
                function () {
                    removePermanentMessages();

                    if (!loginRequested) {
                        requestAnimationFrame(
                            keepClosedUnlessRequested
                        );
                    }
                }
            );

        observer.observe(
            document.body,
            {
                childList: true,
                subtree: true
            }
        );

        window.addEventListener(
            "pageshow",
            function () {
                loginRequested = false;
                keepClosedUnlessRequested();
            }
        );

        window.addEventListener(
            "mi-chat-user-changed",
            function () {
                if (authenticated()) {
                    hideLoginModal();
                }
                else {
                    loginRequested = false;
                    keepClosedUnlessRequested();
                }
            }
        );
    }

    window.MISmartLogin = {
        open: openLogin,
        close: hideLoginModal,
        suggest:
            function (reason) {
                showSuggestion(
                    reason || "protected"
                );

                openLogin();
            },

        isAuthenticated:
            authenticated
    };

    if (
        document.readyState === "loading"
    ) {
        document.addEventListener(
            "DOMContentLoaded",
            start,
            {
                once: true
            }
        );
    }
    else {
        start();
    }
})();

/* MI AI SMART LOGIN FLOW V5 - END */
</script>

<script>
/* MI AI FULL UI TRANSLATION V2 - START */

(function () {
    "use strict";

    const CACHE_PREFIX =
        "mi_full_ui_translation_v2_";

    const NO_TRANSLATE_SELECTOR = [
        "#header",
        "header",
        ".header",
        ".app-header",
        ".top-header",

        "#chat",
        "#messages",
        "#chatMessages",
        "#messageList",
        ".chat-area",
        ".chat-content",
        ".chat-messages",
        ".message-list",
        ".chat-message",
        ".user-message",
        ".ai-message",
        ".message-content",
        "[data-chat-message]",

        "script",
        "style",
        "code",
        "pre",
        "svg",
        "path",
        "noscript",

        "[data-mi-no-translate='true']",
        ".mi-no-translate"
    ].join(",");

    const ATTRIBUTE_NAMES = [
        "placeholder",
        "title",
        "aria-label"
    ];

    const pendingRequests =
        new Map();

    let translationRunning =
        false;

    let observerPaused =
        false;

    let refreshTimer =
        null;

    function normalize(value) {
        return String(value || "")
            .replace(/\s+/g, " ")
            .trim();
    }

    function selectedLanguageCode() {
        const selector =
            document.getElementById(
                "languageSelect"
            );

        const selectorValue =
            selector?.value;

        let accountLanguage = "";

        try {
            if (
                typeof getStoredLanguageCode ===
                    "function"
            ) {
                accountLanguage =
                    getStoredLanguageCode() ||
                    "";
            }
        }
        catch (error) {
            accountLanguage = "";
        }

        return normalize(
            selectorValue ||
            accountLanguage ||
            localStorage.getItem(
                "mi_ui_language"
            ) ||
            localStorage.getItem(
                "language"
            ) ||
            "en"
        ).toLowerCase();
    }

    function selectedLanguageName(code) {
        const sources = [];

        if (
            Array.isArray(
                window.SUPPORTED_LANGUAGES
            )
        ) {
            sources.push(
                window.SUPPORTED_LANGUAGES
            );
        }

        try {
            if (
                typeof SUPPORTED_LANGUAGES !==
                    "undefined" &&
                Array.isArray(
                    SUPPORTED_LANGUAGES
                )
            ) {
                sources.push(
                    SUPPORTED_LANGUAGES
                );
            }
        }
        catch (error) {
            // Ignore unavailable global.
        }

        for (const source of sources) {
            const found =
                source.find(
                    function (item) {
                        return (
                            normalize(
                                item?.code
                            ).toLowerCase() ===
                            code
                        );
                    }
                );

            if (found) {
                return (
                    found.label ||
                    found.name ||
                    found.nativeName ||
                    code
                );
            }
        }

        const selector =
            document.getElementById(
                "languageSelect"
            );

        const option =
            selector?.options[
                selector.selectedIndex
            ];

        return (
            normalize(
                option?.textContent
            ) ||
            code
        );
    }

    function isEnglish(code) {
        return (
            code === "en" ||
            code.startsWith("en-")
        );
    }

    function shouldSkip(element) {
        if (!element) {
            return true;
        }

        return Boolean(
            element.closest(
                NO_TRANSLATE_SELECTOR
            )
        );
    }

    function isUsefulText(value) {
        const text =
            normalize(value);

        if (!text) {
            return false;
        }

        if (
            /^[\d\s.,:;!?%+\-=/\\|()[\]{}<>#_*'"`~]+$/.test(
                text
            )
        ) {
            return false;
        }

        if (
            /^https?:\/\//i.test(
                text
            )
        ) {
            return false;
        }

        if (
            /^[\w.+-]+@[\w.-]+\.[a-z]{2,}$/i.test(
                text
            )
        ) {
            return false;
        }

        if (
            text.length > 500
        ) {
            return false;
        }

        return true;
    }

    function cacheKey(languageCode) {
        return (
            CACHE_PREFIX +
            languageCode
        );
    }

    function readDictionary(languageCode) {
        try {
            const raw =
                localStorage.getItem(
                    cacheKey(languageCode)
                );

            if (!raw) {
                return {};
            }

            const parsed =
                JSON.parse(raw);

            return (
                parsed &&
                typeof parsed ===
                    "object"
            )
                ? parsed
                : {};
        }
        catch (error) {
            return {};
        }
    }

    function saveDictionary(
        languageCode,
        dictionary
    ) {
        try {
            localStorage.setItem(
                cacheKey(languageCode),
                JSON.stringify(
                    dictionary
                )
            );
        }
        catch (error) {
            console.warn(
                "[MI AI Translation] Cache save failed.",
                error
            );
        }
    }

    function rememberTextNode(node) {
        if (
            node.__miOriginalText ===
                undefined
        ) {
            node.__miOriginalText =
                node.nodeValue;
        }

        return normalize(
            node.__miOriginalText
        );
    }

    function attributeStorageName(
        attribute
    ) {
        return (
            "miOriginal" +
            attribute
                .replace(
                    /(^|-)([a-z])/g,
                    function (
                        match,
                        prefix,
                        letter
                    ) {
                        return letter
                            .toUpperCase();
                    }
                )
        );
    }

    function rememberAttribute(
        element,
        attribute
    ) {
        const storageName =
            attributeStorageName(
                attribute
            );

        if (
            element.dataset[
                storageName
            ] === undefined
        ) {
            element.dataset[
                storageName
            ] =
                element.getAttribute(
                    attribute
                ) || "";
        }

        return normalize(
            element.dataset[
                storageName
            ]
        );
    }

    function collectTargets(root) {
        const container =
            root || document.body;

        const texts =
            new Set();

        const textNodes = [];
        const attributes = [];

        if (!container) {
            return {
                texts,
                textNodes,
                attributes
            };
        }

        const walker =
            document.createTreeWalker(
                container,
                NodeFilter.SHOW_TEXT
            );

        while (walker.nextNode()) {
            const node =
                walker.currentNode;

            const parent =
                node.parentElement;

            if (
                !parent ||
                shouldSkip(parent)
            ) {
                continue;
            }

            const original =
                rememberTextNode(node);

            if (
                !isUsefulText(
                    original
                )
            ) {
                continue;
            }

            texts.add(original);

            textNodes.push({
                node,
                original
            });
        }

        const elements =
            container.querySelectorAll(
                [
                    "[placeholder]",
                    "[title]",
                    "[aria-label]",
                    "input[type='button'][value]",
                    "input[type='submit'][value]",
                    "input[type='reset'][value]"
                ].join(",")
            );

        elements.forEach(
            function (element) {
                if (shouldSkip(element)) {
                    return;
                }

                ATTRIBUTE_NAMES.forEach(
                    function (attribute) {
                        if (
                            !element.hasAttribute(
                                attribute
                            )
                        ) {
                            return;
                        }

                        const original =
                            rememberAttribute(
                                element,
                                attribute
                            );

                        if (
                            !isUsefulText(
                                original
                            )
                        ) {
                            return;
                        }

                        texts.add(original);

                        attributes.push({
                            element,
                            attribute,
                            original
                        });
                    }
                );

                if (
                    element instanceof
                        HTMLInputElement &&
                    [
                        "button",
                        "submit",
                        "reset"
                    ].includes(
                        element.type
                    )
                ) {
                    const original =
                        rememberAttribute(
                            element,
                            "value"
                        );

                    if (
                        isUsefulText(
                            original
                        )
                    ) {
                        texts.add(original);

                        attributes.push({
                            element,
                            attribute:
                                "value",
                            original
                        });
                    }
                }
            }
        );

        return {
            texts,
            textNodes,
            attributes
        };
    }

    function restoreEnglish(targets) {
        observerPaused = true;

        try {
            targets.textNodes.forEach(
                function (item) {
                    item.node.nodeValue =
                        item.node
                            .__miOriginalText;
                }
            );

            targets.attributes.forEach(
                function (item) {
                    item.element.setAttribute(
                        item.attribute,
                        item.original
                    );
                }
            );
        }
        finally {
            observerPaused = false;
        }
    }

    function applyDictionary(
        targets,
        dictionary
    ) {
        observerPaused = true;

        try {
            targets.textNodes.forEach(
                function (item) {
                    const translated =
                        normalize(
                            dictionary[
                                item.original
                            ]
                        );

                    if (!translated) {
                        return;
                    }

                    const originalValue =
                        String(
                            item.node
                                .__miOriginalText ||
                            ""
                        );

                    const leading =
                        originalValue.match(
                            /^\s*/
                        )?.[0] || "";

                    const trailing =
                        originalValue.match(
                            /\s*$/
                        )?.[0] || "";

                    item.node.nodeValue =
                        leading +
                        translated +
                        trailing;
                }
            );

            targets.attributes.forEach(
                function (item) {
                    const translated =
                        normalize(
                            dictionary[
                                item.original
                            ]
                        );

                    if (translated) {
                        item.element.setAttribute(
                            item.attribute,
                            translated
                        );
                    }
                }
            );
        }
        finally {
            observerPaused = false;
        }
    }

    function extractJson(value) {
        const raw =
            String(value || "")
                .trim()
                .replace(
                    /^```(?:json)?\s*/i,
                    ""
                )
                .replace(
                    /\s*```$/i,
                    ""
                )
                .trim();

        if (!raw) {
            return null;
        }

        try {
            return JSON.parse(raw);
        }
        catch (error) {
            const start =
                raw.indexOf("{");

            const end =
                raw.lastIndexOf("}");

            if (
                start < 0 ||
                end <= start
            ) {
                return null;
            }

            try {
                return JSON.parse(
                    raw.slice(
                        start,
                        end + 1
                    )
                );
            }
            catch (nestedError) {
                return null;
            }
        }
    }

    async function postTranslation(
        languageCode,
        languageName,
        sourceTexts
    ) {
        const requestKey =
            languageCode +
            "::" +
            JSON.stringify(
                sourceTexts
            );

        if (
            pendingRequests.has(
                requestKey
            )
        ) {
            return pendingRequests.get(
                requestKey
            );
        }

        const task =
            (async function () {
                const numbered = {};

                sourceTexts.forEach(
                    function (text, index) {
                        numbered[
                            String(index)
                        ] = text;
                    }
                );

                const prompt = [
                    "Translate this website user-interface text from English to " +
                        languageName +
                        " (" +
                        languageCode +
                        ").",

                    "",
                    "Mandatory rules:",
                    "1. Return ONLY a valid JSON object.",
                    "2. Preserve every numeric JSON key exactly.",
                    "3. Translate every value naturally and clearly.",
                    "4. Keep the translation concise enough for buttons and menus.",
                    "5. Never translate MI AI, ChatBOT, URLs, email addresses, code, IDs or variable names.",
                    "6. Do not return Markdown, explanations or code fences.",
                    "",
                    "Input:",
                    JSON.stringify(numbered)
                ].join("\n");

                const response =
                    await fetch(
                        "/api/chat",
                        {
                            method:
                                "POST",

                            headers: {
                                "Content-Type":
                                    "application/json"
                            },

                            body:
                                JSON.stringify({
                                    message:
                                        prompt,

                                    prompt:
                                        prompt,

                                    history:
                                        [],

                                    translation:
                                        true
                                })
                        }
                    );

                if (!response.ok) {
                    throw new Error(
                        "Translation API failed with status " +
                        response.status
                    );
                }

                const data =
                    await response.json();

                const reply =
                    data.reply ||
                    data.response ||
                    data.message ||
                    data.text ||
                    data.content ||
                    "";

                const parsed =
                    extractJson(reply);

                if (
                    !parsed ||
                    typeof parsed !==
                        "object"
                ) {
                    throw new Error(
                        "Translation API returned invalid JSON."
                    );
                }

                const result = {};

                sourceTexts.forEach(
                    function (source, index) {
                        const translated =
                            normalize(
                                parsed[
                                    String(index)
                                ]
                            );

                        if (translated) {
                            result[source] =
                                translated;
                        }
                    }
                );

                return result;
            })();

        pendingRequests.set(
            requestKey,
            task
        );

        try {
            return await task;
        }
        finally {
            pendingRequests.delete(
                requestKey
            );
        }
    }

    function batches(
        values,
        maxItems,
        maxCharacters
    ) {
        const output = [];
        let current = [];
        let characters = 0;

        values.forEach(
            function (value) {
                if (
                    current.length &&
                    (
                        current.length >=
                            maxItems ||
                        characters +
                            value.length >
                            maxCharacters
                    )
                ) {
                    output.push(current);
                    current = [];
                    characters = 0;
                }

                current.push(value);
                characters += value.length;
            }
        );

        if (current.length) {
            output.push(current);
        }

        return output;
    }

    async function translateUi() {
        if (translationRunning) {
            return;
        }

        const languageCode =
            selectedLanguageCode();

        const targets =
            collectTargets(
                document.body
            );

        if (isEnglish(languageCode)) {
            restoreEnglish(targets);

            document.documentElement.lang =
                "en";

            document.documentElement.dir =
                "ltr";

            return;
        }

        translationRunning = true;

        try {
            const languageName =
                selectedLanguageName(
                    languageCode
                );

            const dictionary =
                readDictionary(
                    languageCode
                );

            applyDictionary(
                targets,
                dictionary
            );

            const missing =
                Array.from(
                    targets.texts
                ).filter(
                    function (text) {
                        return (
                            !normalize(
                                dictionary[text]
                            )
                        );
                    }
                );

            const translationBatches =
                batches(
                    missing,
                    30,
                    3000
                );

            for (
                const currentBatch
                of translationBatches
            ) {
                if (
                    selectedLanguageCode() !==
                    languageCode
                ) {
                    return;
                }

                let translated = null;
                let lastError = null;

                for (
                    let attempt = 1;
                    attempt <= 3;
                    attempt += 1
                ) {
                    try {
                        translated =
                            await postTranslation(
                                languageCode,
                                languageName,
                                currentBatch
                            );

                        break;
                    }
                    catch (error) {
                        lastError = error;

                        await new Promise(
                            function (resolve) {
                                setTimeout(
                                    resolve,
                                    attempt * 700
                                );
                            }
                        );
                    }
                }

                if (!translated) {
                    console.error(
                        "[MI AI Translation]",
                        lastError
                    );

                    continue;
                }

                Object.assign(
                    dictionary,
                    translated
                );

                saveDictionary(
                    languageCode,
                    dictionary
                );

                applyDictionary(
                    collectTargets(
                        document.body
                    ),
                    dictionary
                );
            }

            document.documentElement.lang =
                languageCode;

            const rtlLanguages =
                new Set([
                    "ar",
                    "fa",
                    "he",
                    "ur",
                    "ps"
                ]);

            document.documentElement.dir =
                rtlLanguages.has(
                    languageCode
                        .split("-")[0]
                )
                    ? "rtl"
                    : "ltr";

            localStorage.setItem(
                "mi_ui_language",
                languageCode
            );

            window.dispatchEvent(
                new CustomEvent(
                    "mi-language-changed",
                    {
                        detail: {
                            language:
                                languageCode
                        }
                    }
                )
            );

            window.dispatchEvent(
                new CustomEvent(
                    "mi-full-ui-translated",
                    {
                        detail: {
                            language:
                                languageCode
                        }
                    }
                )
            );
        }
        finally {
            translationRunning = false;
        }
    }

    function scheduleTranslation(
        delay
    ) {
        clearTimeout(
            refreshTimer
        );

        refreshTimer =
            setTimeout(
                function () {
                    translateUi().catch(
                        function (error) {
                            console.error(
                                "[MI AI Translation]",
                                error
                            );
                        }
                    );
                },
                typeof delay ===
                    "number"
                    ? delay
                    : 100
            );
    }

    function attachLanguageSelect() {
        const selector =
            document.getElementById(
                "languageSelect"
            );

        if (
            !selector ||
            selector.dataset
                .miFullTranslationAttached ===
                "true"
        ) {
            return;
        }

        selector.dataset
            .miFullTranslationAttached =
            "true";

        selector.addEventListener(
            "change",
            function () {
                const languageCode =
                    normalize(
                        selector.value
                    ).toLowerCase();

                localStorage.setItem(
                    "mi_ui_language",
                    languageCode
                );

                scheduleTranslation(20);
            }
        );
    }

    function startObserver() {
        const observer =
            new MutationObserver(
                function (mutations) {
                    attachLanguageSelect();

                    if (
                        observerPaused ||
                        translationRunning ||
                        isEnglish(
                            selectedLanguageCode()
                        )
                    ) {
                        return;
                    }

                    const changed =
                        mutations.some(
                            function (mutation) {
                                return (
                                    mutation.addedNodes
                                        .length >
                                        0 ||
                                    mutation.type ===
                                        "attributes"
                                );
                            }
                        );

                    if (changed) {
                        scheduleTranslation(
                            180
                        );
                    }
                }
            );

        observer.observe(
            document.body,
            {
                childList: true,
                subtree: true,
                attributes: true,
                attributeFilter: [
                    "placeholder",
                    "title",
                    "aria-label"
                ]
            }
        );
    }

    function start() {
        attachLanguageSelect();
        startObserver();

        window.addEventListener(
            "mi-firebase-ready",
            function () {
                scheduleTranslation(
                    120
                );
            }
        );

        window.addEventListener(
            "mi-chat-user-changed",
            function () {
                scheduleTranslation(
                    150
                );
            }
        );

        window.addEventListener(
            "pageshow",
            function () {
                scheduleTranslation(
                    100
                );
            }
        );

        scheduleTranslation(250);
    }

    window.MIFullUiTranslation = {
        translate:
            translateUi,

        refresh:
            function () {
                scheduleTranslation(0);
            },

        getLanguage:
            selectedLanguageCode,

        clearCurrentCache:
            function () {
                localStorage.removeItem(
                    cacheKey(
                        selectedLanguageCode()
                    )
                );

                scheduleTranslation(0);
            },

        clearAllCaches:
            function () {
                const keys = [];

                for (
                    let index = 0;
                    index < localStorage.length;
                    index += 1
                ) {
                    const key =
                        localStorage.key(index);

                    if (
                        key &&
                        key.startsWith(
                            CACHE_PREFIX
                        )
                    ) {
                        keys.push(key);
                    }
                }

                keys.forEach(
                    function (key) {
                        localStorage.removeItem(
                            key
                        );
                    }
                );
            }
    };

    if (
        document.readyState ===
        "loading"
    ) {
        document.addEventListener(
            "DOMContentLoaded",
            start,
            {
                once: true
            }
        );
    }
    else {
        start();
    }
})();

/* MI AI FULL UI TRANSLATION V2 - END */
</script>
