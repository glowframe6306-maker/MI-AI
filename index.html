async function generateSharedChatLink(chatId) {
  const permissionSelect = document.getElementById('sharePermissionSelect');
  const permission = permissionSelect && permissionSelect.value === 'view' ? 'view' : 'edit';
  const openLimitSelect = document.getElementById('shareOpenLimitSelect');
  const openLimitCustom = document.getElementById('shareOpenLimitCustom');
  const timeLimitValue = document.getElementById('shareTimeLimitValue');
  const timeLimitUnit = document.getElementById('shareTimeLimitUnit');
  const passwordEnabled = document.getElementById('sharePasswordEnabled');
  const passwordField = document.getElementById('sharePassword');
  const passwordConfirmField = document.getElementById('sharePasswordConfirm');

  const openLimitMode = openLimitSelect ? openLimitSelect.value : 'no-expiry';
  const customOpenCount = openLimitCustom && openLimitCustom.value ? Number(openLimitCustom.value) : '';
  const timeLimitUnitValue = timeLimitUnit ? timeLimitUnit.value : 'no-expiry';
  const timeLimitValueNumber = timeLimitValue && timeLimitValue.value ? Number(timeLimitValue.value) : '';
  const passwordEnabledValue = Boolean(passwordEnabled && passwordEnabled.checked);
  const password = passwordEnabledValue ? (passwordField ? passwordField.value : '') : '';
  const passwordConfirm = passwordEnabledValue ? (passwordConfirmField ? passwordConfirmField.value : '') : '';

  if (passwordEnabledValue && password !== passwordConfirm) {
    showShareFeedback('Passwords do not match.');
    return;
  }

  if (openLimitMode === 'custom' && (!customOpenCount || !Number.isInteger(customOpenCount) || customOpenCount < 1)) {
    showShareFeedback('Enter a valid open count.');
    return;
  }

  if (timeLimitUnitValue !== 'no-expiry' && (!timeLimitValueNumber || !Number.isInteger(timeLimitValueNumber) || timeLimitValueNumber < 1)) {
    showShareFeedback('Enter a valid time value.');
    return;
  }

  const messages = (chats[chatId] || []).map((message) => ({ role: message.role, text: message.text }));
  const payload = {
    id: generateShortShareId(),
    chatId,
    messages,
    permission,
    ownerEmail: (localStorage.getItem('mi_user_email') || '').trim().toLowerCase(),
    createdAt: Date.now(),
    security: {
      openLimitMode,
      openLimitCustom: openLimitMode === 'custom' ? customOpenCount : '',
      timeLimitUnit: timeLimitUnitValue,
      timeLimitValue: timeLimitUnitValue === 'no-expiry' ? '' : timeLimitValueNumber,
      password: passwordEnabledValue ? password : ''
    }
  };

  const store = getSharedLinkStore();
  store[payload.id] = payload;
  saveSharedLinkStore(store);

  const shareLink = `${window.location.origin}${window.location.pathname}?s=${payload.id}`;

  await copyTextToClipboard(shareLink);
  showShareFeedback('Copied to the clipboard.');
  closeShareOverlayAfterGenerate();
}

function getChatApiCandidates() {
  const candidates = [];
  const baseUrl = getBackendBaseUrl();

  if (baseUrl && baseUrl !== 'null') {
    candidates.push(`${baseUrl}/api/chat`);
  }

  candidates.push('/api/chat');

  return [...new Set(candidates)];
}

function getStreamingChatApiCandidates() {
  const candidates = [];
  const baseUrl = getBackendBaseUrl();

  if (baseUrl && baseUrl !== 'null') {
    candidates.push(`${baseUrl}/api/chat/stream`);
  }

  candidates.push('/api/chat/stream');

  return [...new Set(candidates)];
}

function getApiBaseCandidates() {
  const baseUrl = getBackendBaseUrl();
  const candidates = [];
  if (baseUrl) candidates.push(baseUrl);
  return candidates.filter((v, i, a) => a.indexOf(v) === i);
}

async function fetchJsonWithFallback(path, options = {}, signal) {
  const endpoints = getApiBaseCandidates().map((base) => `${base}${path}`);
  let lastError = null;

  for (let i = 0; i < endpoints.length; i++) {
    const endpoint = endpoints[i];
    try {
      const response = await fetch(endpoint, { ...options, signal });
      if (response.ok) return response;
      const text = await response.text().catch(() => '');
      lastError = new Error(text || `Server returned ${response.status}`);
    } catch (err) {
      lastError = err;
    }
  }

  throw lastError || new Error('Unable to contact the AI server.');
}

async function fetchChatReply(payload, signal, useStreaming = false) {
  const endpoints = useStreaming ? getStreamingChatApiCandidates() : getChatApiCandidates();
  let lastError = null;

  for (let i = 0; i < endpoints.length; i++) {
    const endpoint = endpoints[i];
    try {
      const response = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload),
        signal,
      });

      if (response.ok) return response;

      const text = await response.text().catch(() => '');
      lastError = new Error(text || `Server returned ${response.status}`);
    } catch (err) {
      lastError = err;
    }
  }

  throw lastError || new Error('Unable to contact the AI server.');
}

async function send() {
  if (replyInProgress) return;

  if (sharedChatData && sharedChatData.permission === 'view') {
    applySharedChatUi('view');
    return;
  }

  const msg = (input && input.value || '').trim();
  if (!msg) return;

  if (!currentChat) {
    const fallbackId = `chat_${Date.now()}`;
    chats[fallbackId] = [];
    currentChat = fallbackId;
    save();
    renderList();
  }

  const conversationId = currentChat;
  const token = localStorage.getItem('mi_supabase_token');
  const userId = localStorage.getItem('mi_user_id') || '';
  const storedEmail = (localStorage.getItem('mi_user_email') || '').trim().toLowerCase();

  input.value = '';
  replyInProgress = true;
  setReplyControlState(true);

  let uploadedAttachments = [];
  let uploadErrors = [];
  try {
    const uploadResult = pendingAttachments.length ? await uploadPendingAttachments() : { attachments: [], errors: [] };
    uploadedAttachments = uploadResult.attachments || [];
    uploadErrors = uploadResult.errors || [];
    if (pendingAttachments.length && !uploadedAttachments.length) {
      replyInProgress = false;
      setReplyControlState(false);
      setAttachmentUiState(true, '<div style="color:#fda4af;">Unable to upload the selected file.</div>', '');
      return;
    }
  } catch (err) {
    replyInProgress = false;
    setReplyControlState(false);
    setAttachmentUiState(true, '<div style="color:#fda4af;">Unable to upload the selected file.</div>', '');
    console.error(err);
    return;
  }

  if (uploadedAttachments.length) {
    if (!Array.isArray(chats[conversationId].attachments)) chats[conversationId].attachments = [];
    uploadedAttachments.forEach((a) => {
      chats[conversationId].attachments = chats[conversationId].attachments.filter((i) => i.id !== a.id);
      chats[conversationId].attachments.push(a);
    });
    chats[conversationId].updatedAt = Date.now();
    save();
    pendingAttachment = null;
    renderPendingAttachmentPreview();
  }

  if (uploadErrors.length) {
    const errorSummary = uploadErrors.slice(0, 3).map((e) => `${e.name}: ${e.message}`).join(' Ã¢â‚¬Â¢ ');
    setAttachmentUiState(true, `<div style="color:#fda4af;">${errorSummary}</div>`, '');
  }

  const history = (chats[conversationId] || []).map((message) => ({ role: message.role === 'me' ? 'user' : 'assistant', content: message.text || '' }));

  const userBubble = document.createElement('div');
  userBubble.className = 'me';
  userBubble.innerText = msg;
  chatBox.appendChild(userBubble);

  chats[conversationId].push({ role: 'me', text: msg });
  chats[conversationId].updatedAt = Date.now();
  chats[conversationId].messageCount = (chats[conversationId].messageCount || 0) + 1;
  chats[conversationId].lastPreview = msg;
  save();

  // Auto-save user message to Firestore if authenticated
  if (isAuthenticated() && window.firestorePersistence && window.miFirebaseUser) {
      const messageId = `user_msg_${Date.now()}_${Math.random()}`;
      window.firestorePersistence.saveMessage(conversationId, messageId, {
          role: 'me',
          text: msg
      }).catch(err => console.error('[Persistence] User message save error:', err));
  }

  scroll();

  try {
    if (token && conversationId) {
      const headers = { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token, 'X-Session-Id': accountId || userId || '', 'X-User-Id': userId || '', 'X-User-Email': storedEmail || '' };
      const messageRes = await fetchJsonWithFallback('/api/messages', { method: 'POST', headers, body: JSON.stringify({ conversation_id: conversationId, session_id: accountId || userId || '', role: 'me', content: msg, attachment_ids: uploadedAttachments.length ? uploadedAttachments.map((a) => a.id) : [], attachment_meta: uploadedAttachments.length ? uploadedAttachments.map((attachment) => ({ file_name: attachment.file_name, file_type: attachment.file_type, file_size: attachment.file_size, upload_time: attachment.upload_time, uploaded_file_url: attachment.uploaded_file_url || null })) : null }) }).catch(() => {});
      if (messageRes && messageRes.ok) {
        await fetchJsonWithFallback('/api/conversations/' + encodeURIComponent(conversationId), { method: 'PATCH', headers, body: JSON.stringify({ title: chats[conversationId].title || 'New chat', updated_at: new Date().toISOString(), last_preview: msg, message_count: chats[conversationId].messageCount || 0 }) }).catch(() => {});
      }
    }
  } catch (err) {
    console.error('Failed to save user message', err);
  }

  /* THINKING */
  const t = document.createElement('div');
  t.className = 'thinking';
  t.innerHTML = `<span class="label">MI AI</span><span class="dot"></span><span class="dot"></span><span class="dot"></span>`;
  chatBox.appendChild(t);
  scroll();

  try {
    replyAbortController = new AbortController();
    const firstTokenTimeoutId = setTimeout(() => {
      if (replyAbortController && replyInProgress) {
        replyAbortController.abort();
      }
    }, 10000);
    const overallTimeoutId = setTimeout(() => {
      if (replyAbortController && replyInProgress) {
        replyAbortController.abort();
      }
    }, 45000);

    const streamResponse = await fetchChatReply({ message: msg, history, conversation_id: conversationId, attachment_ids: uploadedAttachments.length ? uploadedAttachments.map((a) => a.id) : [] }, replyAbortController.signal, true);

    if (!streamResponse.ok) throw new Error('Server returned ' + streamResponse.status);

    const streamBubble = createStreamingReplyBubble('');
    const { contentBox } = streamBubble;
    let fullText = '';
    let buffer = '';
    const reader = streamResponse.body && streamResponse.body.getReader ? streamResponse.body.getReader() : null;

    if (!reader) {
      throw new Error('Streaming responses are not supported by this browser.');
    }

    const decoder = new TextDecoder();
    let streamCompleted = false;

    while (!streamCompleted) {
      const { value, done } = await reader.read();
      if (done) {
        streamCompleted = true;
        break;
      }
      buffer += decoder.decode(value, { stream: true });
      let boundary = buffer.indexOf('\n\n');
      while (boundary >= 0) {
        const chunk = buffer.slice(0, boundary);
        buffer = buffer.slice(boundary + 2);
        const lines = chunk.split('\n').map((line) => line.trim());
        const eventLine = lines.find((line) => line.startsWith('event:'));
        const dataLine = lines.find((line) => line.startsWith('data:'));
        if (!eventLine || !dataLine) {
          boundary = buffer.indexOf('\n\n');
          continue;
        }
        const eventType = eventLine.replace(/^event:\s*/, '');
        const payloadText = dataLine.replace(/^data:\s*/, '');
        try {
          const payload = JSON.parse(payloadText);
          if (eventType === 'delta' && payload.delta) {
            fullText += payload.delta;
            contentBox.textContent = fullText;
            scroll();
          }
          if (eventType === 'done' && payload.reply) {
            fullText = payload.reply || fullText;
            contentBox.textContent = fullText;
            scroll();
            streamCompleted = true;
          }
          if (eventType === 'error') {
            throw new Error(payload.error || 'Stream failed');
          }
        } catch (err) {
          console.error('Failed to parse stream payload', err);
        }
        boundary = buffer.indexOf('\n\n');
      }
      if (replyAbortController && replyAbortController.signal.aborted) {
        break;
      }
    }

    const trailingText = decoder.decode();
    if (trailingText) {
      buffer += trailingText;
    }
    if (buffer) {
      const lines = buffer.split('\n').map((line) => line.trim());
      const eventLine = lines.find((line) => line.startsWith('event:'));
      const dataLine = lines.find((line) => line.startsWith('data:'));
      if (eventLine && dataLine) {
        try {
          const payload = JSON.parse(dataLine.replace(/^data:\s*/, ''));
          if (payload.delta) {
            fullText += payload.delta;
            contentBox.textContent = fullText;
            scroll();
          }
          if (payload.reply) {
            fullText = payload.reply;
            contentBox.textContent = fullText;
            scroll();
          }
        } catch (err) {
          console.error('Failed to parse stream tail', err);
        }
      }
    }

    clearTimeout(firstTokenTimeoutId);
    clearTimeout(overallTimeoutId);
    t.remove();

    if (!fullText.trim()) {
      throw new Error('No response received');
    }

    contentBox.innerHTML = linkifyText(fullText);
    finalizeStreamingReplyBubble(contentBox, fullText, conversationId);
    replyInProgress = false; setReplyControlState(false);

    (async () => {
      try {
        if (token && conversationId) {
          const headers = { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token, 'X-Session-Id': accountId || userId || '', 'X-User-Id': userId || '', 'X-User-Email': storedEmail || '' };
          const aiMessageRes = await fetchJsonWithFallback('/api/messages', { method: 'POST', headers, body: JSON.stringify({ conversation_id: conversationId, session_id: accountId || userId || '', role: 'ai', content: fullText }) });
          if (aiMessageRes && aiMessageRes.ok) {
            await fetchJsonWithFallback('/api/conversations/' + encodeURIComponent(conversationId), { method: 'PATCH', headers, body: JSON.stringify({ title: chats[conversationId].title || 'New chat', updated_at: new Date().toISOString(), last_preview: fullText, message_count: chats[conversationId].messageCount || 0 }) }).catch(() => {});
          }
        }
      } catch (e) { console.error('Failed to save AI reply', e); }
    })();
  } catch (e) {
    if (e && e.name === 'AbortError') {
      replyInProgress = false;
      setReplyControlState(false);
      const thinking = document.querySelector('.thinking'); if (thinking) thinking.remove();
      const fallbackBubble = document.createElement('div');
      fallbackBubble.className = 'ai';
      fallbackBubble.innerText = 'The AI is taking longer than expected. Please try again in a moment.';
      chatBox.appendChild(fallbackBubble);
      chats[conversationId].push({ role: 'ai', text: 'The AI is taking longer than expected. Please try again in a moment.' });
      chats[conversationId].updatedAt = Date.now(); chats[conversationId].messageCount = (chats[conversationId].messageCount || 0) + 1; chats[conversationId].lastPreview = 'The AI is taking longer than expected. Please try again in a moment.'; save(); scroll();
      return;
    }
    console.error("[MI AI] Reply request failed:", e);

    const thinking =
      document.querySelector('.thinking');

    if (thinking) {
      thinking.remove();
    }

    replyInProgress = false;
    setReplyControlState(false);

    /*
      Do not save a fake AI reply when both requests fail.
      Show the real server reason instead of the old generic message.
    */
    let serverMessage =
      String(
        e?.message ||
        "Unable to get an AI response."
      ).trim();

    try {
      const parsedError =
        JSON.parse(serverMessage);

      serverMessage =
        String(
          parsedError.error ||
          parsedError.message ||
          serverMessage
        ).trim();
    }
    catch (parseError) {
      // The error was plain text.
    }

    const errorBubble =
      document.createElement('div');

    errorBubble.className = 'ai';
    errorBubble.innerText =
      "Unable to get an answer: " +
      serverMessage;

    chatBox.appendChild(errorBubble);
    scroll();
  }
}

function type(text){
    const d = document.createElement("div");
    d.className = "ai";

    const contentBox = document.createElement("div");
    contentBox.className = isLongWritingResponse(text)
        ? "aiWritingCard"
        : "aiMessageBody";

    d.appendChild(contentBox);
    d.appendChild(createCopyButton(text));
    chatBox.appendChild(d);

    const fullText = String(text || "");
    const chunkSize = Math.max(8, Math.min(40, Math.ceil(fullText.length / 90)));
    let index = 0;
    let lastScroll = 0;

    function finishTyping(){
        contentBox.innerHTML = linkifyText(fullText);
        replyTypingTimer = null;
        replyInProgress = false;
        setReplyControlState(false);

        if (!Array.isArray(chats[currentChat])) {
            chats[currentChat] = [];
        }

        chats[currentChat].push({role:"ai", text:fullText});
        save();
        maybeShowLoginPrompt(currentChat);
        scroll();
    }

    function renderChunk(now){
        if (!replyInProgress) {
            replyTypingTimer = null;
            return;
        }

        index = Math.min(fullText.length, index + chunkSize);
        contentBox.textContent = fullText.slice(0, index);

        if (!lastScroll || now - lastScroll >= 80) {
            scroll();
            lastScroll = now;
        }

        if (index >= fullText.length) {
            finishTyping();
            return;
        }

        replyTypingTimer = requestAnimationFrame(renderChunk);
    }

    replyTypingTimer = requestAnimationFrame(renderChunk);
}

/* SAVE */
async function save() {

    const storageKey = getActiveStorageKey();

    if (storageKey) {
        localStorage.setItem(storageKey, JSON.stringify(chats));
    }

    if (currentChat) {
        localStorage.setItem("last_chat", currentChat);
    }

    // Save to Firestore if authenticated
    if (isAuthenticated() && window.firestorePersistence && window.miFirebaseUser) {
        try {
            // Save all chats and messages to Firestore
            for (const chatId in chats) {
                const chatData = chats[chatId];
                if (Array.isArray(chatData) && chatData.length === 0) continue; // Skip empty chats

                // Save chat metadata
                await window.firestorePersistence.saveChat(chatId, {
                    title: chatData.title || chatId,
                    pin: chatData.pin || false,
                    messageCount: chatData.length || 0
                });

                // Save each message
                chatData.forEach((msg, index) => {
                    if (msg && msg.text) {
                        const messageId = `msg_${index}_${Date.now()}`;
                        window.firestorePersistence.saveMessage(chatId, messageId, {
                            role: msg.role === 'me' ? 'me' : 'ai',
                            text: msg.text
                        }).catch(err => console.error('[Persistence] Message save error:', err));
                    }
                });
            }
            console.log('[Persistence] All chats synced to Firestore');
        } catch (err) {
            console.error('[Persistence] Error syncing chats:', err.message);
        }
    }

    // Logged-in users only
    if (!isAuthenticated()) return;

    const token = localStorage.getItem("mi_supabase_token");

    if (!token || !currentChat) return;

    try {
      localStorage.setItem("mi_chats_" + accountId, JSON.stringify(chats));
    } catch (e) {}
  }

  function persistChats() {
    save();
  }

}

function shouldForceMobileLayout() {
  const ua = navigator.userAgent || '';
  const platform = navigator.platform || '';
  const maxTouchPoints = navigator.maxTouchPoints || 0;
  const isTouchDevice = 'ontouchstart' in window || maxTouchPoints > 0 || window.matchMedia('(pointer: coarse)').matches;
  const isMobilePhoneUA = /(android|iphone|ipod|windows phone|mobile|opera mini|blackberry)/i.test(ua);
  const isMobilePlatform = /(android|iphone|ipod)/i.test(platform);
  const isSmallViewport = window.innerWidth <= 900 || window.screen.width <= 900 || window.innerHeight <= 900;
  const isTabletLike = /(ipad|tablet)/i.test(ua) && maxTouchPoints > 1;

  if (isMobilePhoneUA || isMobilePlatform) {
    return true;
  }

  return Boolean(isTouchDevice && isSmallViewport && !isTabletLike);
}

function applyForcedLayout() {
  const shouldUseMobile = shouldForceMobileLayout();
  document.body.classList.toggle('force-mobile-layout', shouldUseMobile);
  document.documentElement.classList.toggle('force-mobile-layout', shouldUseMobile);
  if (!shouldUseMobile) {
    closeMobileMenu();
  }
}

function handleSignIn() {

async function handlePasswordReset() {
  const email = document.getElementById('loginEmail')?.value.trim().toLowerCase();
  if (!email) {
    setAuthMessage(t('auth.reset.enterEmail', 'Please enter your email address first.'), true);
    return;
  }

  try {
    const auth = await initFirebase();
    await auth.sendPasswordResetEmail(email, {
      url: window.location.origin || window.location.href,
    });
    document.getElementById('loginPassword').value = '';
    setAuthMessage(t('auth.reset.sent', 'A password reset email has been sent. Open it and choose a new password.'), false);
  } catch (error) {
    const message = error?.message || t('auth.reset.failed', 'Unable to send the reset email.');
    setAuthMessage(message, true);
  }
}

function setAuthMessage(text, isError = true) {
  const message = document.getElementById('authMessage');
  if (!message) return;
  message.textContent = text;
  message.style.color = isError ? '#fda4af' : '#86efac';
}

function validateRegisterForm() {
  const fullName = document.getElementById('fullName')?.value.trim() || '';
  const ageValue = document.getElementById('age')?.value.trim() || '';
  const email = document.getElementById('registerEmail')?.value.trim() || '';
  const password = document.getElementById('registerPassword')?.value || '';
  const confirmPassword = document.getElementById('confirmPassword')?.value || '';

  if (!fullName) return t('auth.validation.fullName', 'Full Name cannot be empty.');
  if (!ageValue) return t('auth.validation.ageRequired', 'Age is required.');
  const age = Number(ageValue);
  if (!Number.isInteger(age) || 100 < age || age < 1) return t('auth.validation.ageInvalid', 'Age must be a valid number.');
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return t('auth.validation.email', 'Please enter a valid email address.');
  if (!password) return t('auth.validation.password', 'Password cannot be empty.');
  if (!confirmPassword) return t('auth.validation.confirmPassword', 'Confirm Password cannot be empty.');
  if (password !== confirmPassword) return t('auth.validation.passwordMismatch', 'Passwords do not match.');
  return '';
}

async function registerEmail() {
  setAuthMessage('');
  const validation = validateRegisterForm();
  if (validation) {
    setAuthMessage(validation, true);
    return;
  }

  const fullName = document.getElementById('fullName')?.value.trim();
  const age = Number(document.getElementById('age')?.value.trim());
  const email = document.getElementById('registerEmail')?.value.trim().toLowerCase();
  const password = document.getElementById('registerPassword')?.value;

  try {
    const auth = await initFirebase();

    // Create Firebase user
    const result = await auth.createUserWithEmailAndPassword(email, password);
    const firebaseUser = result.user;

    // Send verification email
    await firebaseUser.sendEmailVerification();

    // Sign out the user immediately
    await auth.signOut();

    // Clear any stored auth data
    user = null;
    localStorage.removeItem('mi_supabase_token');
    localStorage.removeItem('mi_user_id');
    localStorage.removeItem('mi_user_email');

    // Show success message
    setAuthMessage(t('auth.registerSuccess', 'Registration successful! A verification email has been sent. Please check your spam folder or inbox and verify your email before signing in.'), false);

    // Switch to sign in mode after a brief delay
    setTimeout(() => {
      setAuthMode('signin');
    }, 2000);
  } catch (error) {
    const message = error?.message || 'Authentication failed.';
    const normalized = String(message || '').toLowerCase();
    const duplicateMessage = 'YOUR ACCOUNT WAS ALREADY REGISTERED BY GOOGLE.SO GO TO SIGN IN AND CREATE NEW PASSWORD AND CONFIRM ACCOUNT.';
    const invalidCredentialMessage = 'INVALID EMAIL OR PASSWORD. TRY AGAIN.';

    if (normalized.includes('email-already-in-use') || normalized.includes('already in use')) {
      setAuthMessage(t('auth.errors.alreadyRegistered', duplicateMessage), true);
    } else if (normalized.includes('invalid-credential') || normalized.includes('invalid email') || normalized.includes('wrong-password')) {
      setAuthMessage(t('auth.errors.invalidCredentials', invalidCredentialMessage), true);
    } else {
      setAuthMessage(message, true);
    }
  }
}

async function loginEmail() {
  setAuthMessage('');

  const email = document.getElementById('loginEmail').value.trim().toLowerCase();
  const password = document.getElementById('loginPassword').value;

  if (!email || !password) {
    setAuthMessage(t('auth.validation.signInRequired', 'Please enter your email and password.'));
    return;
  }

  try {
    const auth = await initFirebase();

    // Sign in with Firebase
    const result = await auth.signInWithEmailAndPassword(email, password);
    const firebaseUser = result.user;

    // Check if email is verified
    if (!firebaseUser.emailVerified) {
      // Email not verified - send verification email and sign out
      await firebaseUser.sendEmailVerification();
      await auth.signOut();

      // Clear any stored auth data
      user = null;
      localStorage.removeItem('mi_supabase_token');
      localStorage.removeItem('mi_user_id');
      localStorage.removeItem('mi_user_email');

      setAuthMessage(t('auth.unverifiedEmail', 'Your email is not verified. A new verification email has been sent. Please verify your email first. Please check your spam folder or inbox.'), true);
      return;
    }

    // Email is verified - continue with login
    user = {
      id: firebaseUser.uid,
      email: firebaseUser.email
    };

    const idToken = await firebaseUser.getIdToken();
    localStorage.setItem('mi_supabase_token', idToken);
    localStorage.setItem('mi_user_id', firebaseUser.uid);
    localStorage.setItem('mi_user_email', firebaseUser.email || '');
    window.dispatchEvent(new Event('mi-chat-user-changed'));

    await applyLanguage(getStoredLanguageCode(), false);
    updateAuthControls();
    const loginBox = document.getElementById('loginBox');
    if (loginBox) loginBox.style.display = 'none';
    setAuthMessage(t('auth.signInSuccess', 'Signed in successfully.'), false);

    window.dispatchEvent(
      new CustomEvent(
        'mi-login-success',
        {
          detail: {
            email: firebaseUser.email || '',
            user: firebaseUser
          }
        }
      )
    );
await loadUserChats();
  } catch (err) {
    const message = err?.message || 'Authentication failed.';
    const normalized = String(message || '').toLowerCase();
    const invalidCredentialMessage = 'INVALID EMAIL OR PASSWORD. TRY AGAIN.';

    if (normalized.includes('invalid-credential') || normalized.includes('invalid email') || normalized.includes('wrong-password')) {
      setAuthMessage(t('auth.errors.invalidCredentials', invalidCredentialMessage), true);
    } else {
      setAuthMessage(message, true);
    }
  }
}

window.closeSettings = function () {
    const panel =
        document.getElementById("settingsPanel");

    const backdrop =
        document.getElementById("settingsBackdrop");

    if (panel) {
        panel.classList.remove(
            "settings-open"
        );

        panel.style.display = "";

        panel.setAttribute(
            "aria-hidden",
            "true"
        );
    }

    if (backdrop) {
        backdrop.classList.remove(
            "settings-open"
        );

        backdrop.setAttribute(
            "aria-hidden",
            "true"
        );
    }

    document.body.classList.remove(
        "settings-modal-open"
    );
};

window.toggleSettings = function () {
    if (
        typeof window.closeMobileMenu
        === "function"
    ) {
        window.closeMobileMenu();
    }

    const panel =
        document.getElementById("settingsPanel");

    const backdrop =
        document.getElementById("settingsBackdrop");

    if (!panel) {
        return;
    }

    const isOpen =
        panel.classList.contains(
            "settings-open"
        );

    if (isOpen) {
        window.closeSettings();
        return;
    }

    panel.style.display = "";

    panel.classList.add(
        "settings-open"
    );

    panel.setAttribute(
        "aria-hidden",
        "false"
    );

    if (backdrop) {
        backdrop.classList.add(
            "settings-open"
        );

        backdrop.setAttribute(
            "aria-hidden",
            "false"
        );
    }

    document.body.classList.add(
        "settings-modal-open"
    );

    const firstControl =
        panel.querySelector(
            "select, input, button:not(#settingsCloseBtn)"
        );

    setTimeout(function () {
        if (firstControl) {
            firstControl.focus();
        }
    }, 100);
};

);

    const aliasMap = new Map();
    let translationScheduled = false;

    function normalize(value) {
        return String(value || "")
            .replace(/\s+/g, " ")
            .trim()
            .toLocaleLowerCase();
    }

    Object.keys(translations).forEach(function (language) {
        Object.entries(translations[language]).forEach(
            function ([key, value]) {
                aliasMap.set(normalize(value), key);
            }
        );
    });

    function removeLeadingIcon(value) {
        return String(value || "")
            .replace(/^[^\p{L}\p{N}]+/u, "")
            .trim();
    }

    function findTranslationKey(value) {
        const normal = normalize(value);

        if (!normal) {
            return null;
        }

        if (aliasMap.has(normal)) {
            return aliasMap.get(normal);
        }

        const withoutIcon = normalize(
            removeLeadingIcon(value)
        );

        return aliasMap.get(withoutIcon) || null;
    }

    function preserveIconPrefix(original, translated) {
        const text = String(original || "").trim();

        const match = text.match(
            /^([^\p{L}\p{N}]*)(.*)$/u
        );

        const prefix = match ? match[1] : "";

        return prefix + translated;
    }

    function isExcluded(node) {
        const element =
            node.nodeType === Node.ELEMENT_NODE
                ? node
                : node.parentElement;

        if (!element) {
            return true;
        }

        /*
          Do not translate:
          - Chat messages
          - Header
          - Scripts/styles/code
          - Language options
        */
        return Boolean(
            element.closest(
                "#chat, #header, script, style, code, pre, " +
                "textarea, [data-mi-i18n-ignore='true']"
            )
        );
    }

    function translateTextNode(node, language) {
        if (
            !node ||
            node.nodeType !== Node.TEXT_NODE ||
            isExcluded(node)
        ) {
            return;
        }

        const original = node.nodeValue || "";

        if (!original.trim()) {
            return;
        }

        const key = findTranslationKey(original);

        if (
            !key ||
            !translations[language] ||
            !translations[language][key]
        ) {
            return;
        }

        const leading =
            original.match(/^\s*/)?.[0] || "";

        const trailing =
            original.match(/\s*$/)?.[0] || "";

        const translated = preserveIconPrefix(
            original,
            translations[language][key]
        );

        const finalValue =
            leading +
            translated.trim() +
            trailing;

        if (node.nodeValue !== finalValue) {
            node.nodeValue = finalValue;
        }
    }

    function translateAttribute(
        element,
        attribute,
        language
    ) {
        const value = element.getAttribute(attribute);

        if (!value) {
            return;
        }

        const key = findTranslationKey(value);

        if (
            key &&
            translations[language] &&
            translations[language][key]
        ) {
            element.setAttribute(
                attribute,
                translations[language][key]
            );
        }
    }

    function translateElement(element, language) {
        if (
            !element ||
            element.nodeType !== Node.ELEMENT_NODE ||
            isExcluded(element)
        ) {
            return;
        }

        [
            "placeholder",
            "title",
            "aria-label"
        ].forEach(function (attribute) {
            translateAttribute(
                element,
                attribute,
                language
            );
        });

        if (
            element instanceof HTMLInputElement &&
            ["button", "submit", "reset"].includes(
                element.type
            )
        ) {
            const key = findTranslationKey(
                element.value
            );

            if (
                key &&
                translations[language][key]
            ) {
                element.value =
                    translations[language][key];
            }
        }
    }

    function translateTree(root, language) {
        if (!root) {
            return;
        }

        if (root.nodeType === Node.TEXT_NODE) {
            translateTextNode(root, language);
            return;
        }

        if (root.nodeType !== Node.ELEMENT_NODE) {
            return;
        }

        translateElement(root, language);

        const elementWalker =
            document.createTreeWalker(
                root,
                NodeFilter.SHOW_ELEMENT
            );

        while (elementWalker.nextNode()) {
            translateElement(
                elementWalker.currentNode,
                language
            );
        }

        const textWalker =
            document.createTreeWalker(
                root,
                NodeFilter.SHOW_TEXT
            );

        while (textWalker.nextNode()) {
            translateTextNode(
                textWalker.currentNode,
                language
            );
        }
    }

        if (

            );

        if (languageLabel) {
            languageLabel.textContent =

        if (messageInput) {

                ) {

                        translations[language][key];
                }
            });
    }

    function normalizeLanguage(language) {
        return language === "si" || language === "ta"
            ? "en"
            : language;
    }

    function getLanguage() {
        const saved =
            localStorage.getItem(
                "mi_ui_language"
            );

        if (
            saved &&
            Object.prototype.hasOwnProperty.call(
                translations,
                saved
            )
        ) {
            return normalizeLanguage(saved);
        }

        return "en";
    }

    function applyLanguage(
        language,
        savePreference
    ) {
        language = normalizeLanguage(language);

        if (!translations[language]) {
            language = "en";
        }

        if (savePreference !== false) {
            localStorage.setItem(
                "mi_ui_language",
                language
            );
        }

        document.documentElement.lang =
            languageCodes[language] || "en";

        const selector =
            document.getElementById(
                "languageSelect"
            );

        if (
            selector &&
            selector.value !== language
        ) {
            selector.value = language;
        }

        applyStaticTranslations(language);
        translateTree(
            document.body,
            language
        );

        document.body.dataset.uiLanguage =
            language;
    }

    function scheduleTranslation() {
        if (translationScheduled) {
            return;
        }

        translationScheduled = true;

        setTimeout(function () {
            translationScheduled = false;

            applyLanguage(
                getLanguage(),
                false
            );
        }, 0);
    }

    function hexToRgb(hex) {
        const normalized =
            String(hex || "")
                .trim()
                .replace("#", "");

        if (
            !/^[0-9a-fA-F]{6}$/.test(
                normalized
            )
        ) {
            return null;
        }

        return {
            r: parseInt(
                normalized.slice(0, 2),
                16
            ),
            g: parseInt(
                normalized.slice(2, 4),
                16
            ),
            b: parseInt(
                normalized.slice(4, 6),
                16
            )
        };
    }

    function applyThemeColour(colour) {
        const rgb = hexToRgb(colour);

        if (!rgb) {
            return false;
        }

        const safeColour =
            colour.startsWith("#")
                ? colour
                : "#" + colour;

        document.documentElement.style
            .setProperty(
                "--mi-theme-color",
                safeColour
            );

        document.documentElement.style
            .setProperty(
                "--mi-theme-rgb",
                rgb.r +
                    ", " +
                    rgb.g +
                    ", " +
                    rgb.b
            );

        localStorage.setItem(
            "mi_button_theme_colour",
            safeColour
        );

        const input =
            document.getElementById(
                "themeColor"
            );

        if (
            input &&
            input.value.toLowerCase() !==
                safeColour.toLowerCase()
        ) {
            input.value = safeColour;
        }

        return true;
    }

    /*
      Replace the old applyTheme behaviour.
      It changes only the button/message tint,
      not the whole page background.
    */
    window.applyTheme = function () {
        const input =
            document.getElementById(
                "themeColor"
            );

        const colour =
            input?.value ||
            localStorage.getItem(
                "mi_button_theme_colour"
            ) ||

        const width =
            viewport?.width
            || window.innerWidth;

        const height =
            viewport?.height
            || window.innerHeight;

        document.documentElement.style
            .setProperty(
                "--mi-viewport-width",
                width + "px"
            );

        document.documentElement.style
            .setProperty(

        const keyboardVisible =
            keyboardDifference > 140;

        document.body.classList.toggle(
            "mi-keyboard-visible",
            keyboardVisible
        );

        if (
            !keyboardVisible
            && height > initialViewportHeight
        ) {
            initialViewportHeight =
                height;
        }
    }

    function keepFocusedFieldVisible() {
        const active =
            document.activeElement;

        if (
            !active
            || !active.matches(
                "input, textarea, select, " +
                "[contenteditable='true']"
            )
        ) {
            return;
        }

        setTimeout(
            function () {
                active.scrollIntoView({
                    behavior:
                        "smooth",

                    block:
                        "center",

                    inline:
                        "nearest"
                });
            },
            180
        );
    }

    function autoGrowMessageInput() {
        const input =
            document.querySelector(
                "#msg, #messageInput, " +
                "#chatInput, " +
                "textarea[name='message'], " +
                ".chat-input, .message-input"
            );

        if (
            !input
            || !(input instanceof
                HTMLTextAreaElement)
        ) {
            return;
        }

        input.style.height =
            "auto";

        const viewportHeight =
            window.visualViewport?.height
            || window.innerHeight;

        const maximum =
            Math.min(
                viewportHeight * 0.38,
                190
            );

        input.style.height =
            Math.min(
                input.scrollHeight,
                maximum
            ) + "px";

        input.style.overflowY =
            input.scrollHeight > maximum
                ? "auto"
                : "hidden";
    }

    function scrollChatToBottom() {
        const chat =
            document.getElementById(
                "chat"
            );

        if (!chat) {
            return;
        }

        const nearBottom =
            chat.scrollHeight
            - chat.scrollTop
            - chat.clientHeight
            < 180;

        if (nearBottom) {
            requestAnimationFrame(
                function () {
                    chat.scrollTop =
                        chat.scrollHeight;
                }
            );
        }
    }

    function initialize() {
        setViewportVariables();
        autoGrowMessageInput();

        window.addEventListener(
            "resize",
            setViewportVariables,
            {
                passive: true
            }
        );

        window.addEventListener(
            "orientationchange",
            function () {
                setTimeout(
                    setViewportVariables,
                    180
                );
            },
            {
                passive: true
            }
        );

        if (window.visualViewport) {
            window.visualViewport
                .addEventListener(
                    "resize",
                    function () {
                        setViewportVariables();
                        keepFocusedFieldVisible();
                    },
                    {
                        passive: true
                    }
                );

            window.visualViewport
                .addEventListener(
                    "scroll",
                    setViewportVariables,
                    {
                        passive: true
                    }
                );
        }

        document.addEventListener(
            "focusin",
            function (event) {
                if (
                    event.target.matches(
                        "input, textarea, select, " +
                        "[contenteditable='true']"
                    )
                ) {
                    keepFocusedFieldVisible();
                }
            }
        );

        document.addEventListener(
            "input",
            function (event) {
                if (
                    event.target.matches(
                        "#msg, #messageInput, " +
                        "#chatInput, " +
                        "textarea[name='message'], " +
                        ".chat-input, .message-input"
                    )
                ) {
                    autoGrowMessageInput();
                }
            }
        );

        const chat =
            document.getElementById(
                "chat"
            );

        if (chat) {
            const observer =
                new MutationObserver(
                    scrollChatToBottom
                );

            observer.observe(
                chat,
                {
                    childList: true,
                    subtree: true,
                    characterData: true
                }
            );
        }
    }

    window.MIMobileComfort = {
        refresh:
            function () {
                setViewportVariables();
                autoGrowMessageInput();
            },

        growInput:
            autoGrowMessageInput
    };

    if (
        document.readyState ===
        "loading"
    ) {
        document.addEventListener(
            "DOMContentLoaded",
            initialize,
            {
                once: true
            }
        );
    }
    else {
        initialize();
    }
})();

/* MI AI MOBILE COMFORT JS - END */
</script>

        if (!value) {
            return false;

        try {

                .clipboard
                .writeText(value);

        catch (error) {

                document.createElement(
                    "textarea"

            textarea.value =
                value;

            textarea.style.position =
                "fixed";

            textarea.style.left =
                "-9999px";

            textarea.style.opacity =
                "0";

            document.body.appendChild(
                textarea

                    "Ã°Å¸â€œâ€¹";

                aiBubble.appendChild(

                );
            }

            copyButton.classList.add(
                "mi-ai-functional-copy"
            );

            copyButton.dataset.action =
                "copy-ai-reply";

            copyButton.title =
                word("copy");

            copyButton.setAttribute(
                "aria-label",
                word("copy")
            );
        });
    }

    document.addEventListener(
        "click",
        function (event) {
            const copyButton =
                event.target.closest(
                    ".mi-ai-functional-copy, " +
                    "[data-action='copy-ai-reply']"
                );

            if (!copyButton) {
                return;
            }

            const aiBubble =
                copyButton.closest(
                    "#chat > .ai, " +
                    ".ai-message, " +
                    ".assistant-message"
                );

            if (!aiBubble) {
                return;
            }

            event.preventDefault();
            event.stopPropagation();
            event.stopImmediatePropagation();

            const replyText =
                cleanReplyText(
                    aiBubble
                );

            copyText(replyText)
                .then(function (success) {
                    if (success) {
                        showCopiedMessage();

                        const oldText =
                            copyButton.textContent;

                        copyButton.textContent =
                            "Ã¢Å“â€œ";

                        setTimeout(
                            function () {
                                copyButton.textContent =
                                    oldText || "Ã°Å¸â€œâ€¹";
                            },
                            1000
                        );
                    }
                });
        },
        true
    );

    function refresh() {
        setupSettingsAccordion();
        updateSettingsTitles();
        markCopyButtons(document);
    }

    function start() {
        refresh();

        const observer =
            new MutationObserver(
                function (mutations) {
                    let shouldRefresh =
                        false;

                    for (
                        const mutation
                        of mutations
                    ) {
                        if (
                            mutation.addedNodes
                                .length
                        ) {
                            shouldRefresh =
                                true;

                            break;
                        }
                    }

                    if (shouldRefresh) {
                        requestAnimationFrame(
                            refresh
                        );
                    }
                }
            );

        observer.observe(
            document.body,
            {
                childList: true,
                subtree: true
            }
        );

        document.addEventListener(
            "change",
            function (event) {
                if (
                    event.target.id ===

                        updateSettingsTitles,

                        '[data-settings-type="' +
                        type +

    if (
        document.readyState ===
        "loading"
    ) {
        document.addEventListener(
            "DOMContentLoaded",
            start,
            {
                once: true
            }
        );
    }
    else {
        start();
    }
})();

/* MI AI SETTINGS ACCORDION COPY MOBILE JS - END */

        activeTrigger = null;
    }

    function positionPopup(trigger) {
        const menu = ensurePopup();
        const rect =
            trigger.getBoundingClientRect();

        const margin = 8;

        const width =
            Math.min(
                Math.max(
                    rect.width,
                    200
                ),
                window.innerWidth
                    - margin * 2
            );

        menu.style.width =
            width + "px";

        menu.style.left =
            Math.max(
                margin,
                Math.min(
                    rect.left,
                    window.innerWidth
                        - width
                        - margin
                )
            ) + "px";

        menu.style.top =
            rect.bottom + 8 + "px";

        requestAnimationFrame(
            function () {
                const menuRect =
                    menu.getBoundingClientRect();

                if (
                    menuRect.bottom >
                    window.innerHeight - margin
                ) {
                    const above =
                        rect.top
                        - menuRect.height
                        - 8;

                    menu.style.top =
                        Math.max(
                            margin,
                            above
                        ) + "px";
                }
            }
        );
    }

    function rebuildPopup(
        select,
        trigger
    ) {
        const menu = ensurePopup();

        menu.replaceChildren();

        Array.from(
            select.options
        ).forEach(function (
            option,
            index
        ) {
            const button =
                document.createElement(
                    "button"
                );

            button.type =
                "button";

            button.className =
                "mi-ios-popup-option";

            button.setAttribute(
                "role",
                "option"
            );

            const isSelected =
                index ===
                select.selectedIndex;

            button.classList.toggle(
                "mi-selected",
                isSelected
            );

            button.setAttribute(
                "aria-selected",
                String(isSelected)
            );

            const label =
                document.createElement(
                    "span"
                );

            label.className =
                "mi-ios-option-label";

            label.textContent =
                option.textContent;

            const check =
                document.createElement(
                    "span"
                );

            check.className =
                "mi-ios-option-check";

            check.textContent = "Ã¢Å“â€œ";

            check.setAttribute(
                "aria-hidden",
                "true"
            );

            button.append(
                label,
                check
            );

            button.addEventListener(
                "click",
                function (event) {
                    event.preventDefault();
                    event.stopPropagation();

                    select.selectedIndex =
                        index;

                    select.dispatchEvent(
                        new Event(
                            "input",
                            {
                                bubbles: true
                            }
                        )
                    );

                    select.dispatchEvent(
                        new Event(
                            "change",
                            {
                                bubbles: true
                            }
                        )
                    );

                    updateTrigger(
                        select,
                        trigger
                    );

                    closePopup();

                    trigger.focus();
                }
            );

            menu.appendChild(
                button
            );
        });
    }

    function updateTrigger(
        select,
        trigger
    ) {
        const selected =
            select.options[
                select.selectedIndex
            ] || select.options[0];

        const text =
            trigger.querySelector(
                ".mi-ios-select-trigger-text"
            );

        if (text) {
            text.textContent =
                selected?.textContent
                || "";
        }

        trigger.disabled =
            select.disabled;
    }

    function openPopup(
        select,
        trigger
    ) {
        closePopup();

        activeSelect = select;
        activeTrigger = trigger;

        rebuildPopup(
            select,
            trigger
        );

        positionPopup(trigger);

        const menu = ensurePopup();

        menu.classList.add(
            "mi-open"
        );

        trigger.setAttribute(
            "aria-expanded",
            "true"
        );

        requestAnimationFrame(
            function () {
                menu.querySelector(
                    ".mi-selected"
                )?.focus();
            }
        );
    }

    function enhanceSelect(select) {
        if (
            !(select instanceof
                HTMLSelectElement)
            || enhancedSelects.has(select)
        ) {
            return;
        }

        enhancedSelects.add(select);

        select.dataset.miIosReady =
            "true";

        const shell =
            document.createElement(
                "div"
            );

        shell.className =
            "mi-ios-select-shell";

        select.parentNode.insertBefore(
            shell,
            select
        );

        shell.appendChild(select);

        const trigger =
            document.createElement(
                "button"
            );

        trigger.type = "button";

        trigger.className =
            "mi-ios-select-trigger";

        trigger.setAttribute(
            "aria-haspopup",
            "listbox"
        );

        trigger.setAttribute(
            "aria-expanded",
            "false"
        );

        const text =
            document.createElement(
                "span"
            );

        text.className =
            "mi-ios-select-trigger-text";

        const icon =
            document.createElement(
                "span"
            );

        icon.className =
            "mi-ios-icon-wrap";

        icon.innerHTML =
            icons.chevron;

        trigger.append(
            text,
            icon
        );

        shell.appendChild(trigger);

        updateTrigger(
            select,
            trigger
        );

        trigger.addEventListener(
            "click",
            function (event) {
                event.preventDefault();
                event.stopPropagation();

                if (
                    activeSelect === select
                ) {
                    closePopup();
                }
                else {
                    openPopup(
                        select,
                        trigger
                    );
                }
            }
        );

        select.addEventListener(
            "change",
            function () {
                updateTrigger(
                    select,
                    trigger
                );
            }
        );

        const observer =
            new MutationObserver(
                function () {
                    updateTrigger(
                        select,
                        trigger
                    );

                    if (
                        activeSelect ===
                        select
                    ) {
                        rebuildPopup(
                            select,
                            trigger
                        );

                        positionPopup(
                            trigger
                        );
                    }
                }
            );

        observer.observe(
            select,
            {
                childList: true,
                subtree: true,
                characterData: true,
                attributes: true
            }
        );
    }

    function scanSelects(root) {
        const scope =
            root instanceof Element
                ? root
                : document;

        if (
            scope instanceof
            HTMLSelectElement
        ) {
            enhanceSelect(scope);
        }

        scope.querySelectorAll(
            "select"
        ).forEach(
            enhanceSelect
        );
    }

    function replaceLeadingIcon(
        element,
        svg
    ) {
        if (
            !element
            || element.dataset
                .miIosIconApplied ===
                "true"
        ) {
            return;
        }

        const originalText =
            element.textContent
                .replace(
                    /^[^\p{L}\p{N}]+/u,
                    ""
                )
                .trim();

        element.replaceChildren();

        const label =
            document.createElement(
                "span"
            );

        label.className =
            "mi-ios-icon-label";

        const iconWrap =
            document.createElement(
                "span"
            );

        iconWrap.className =
            "mi-ios-icon-wrap";

        iconWrap.innerHTML = svg;

        const text =
            document.createElement(
                "span"
            );

        text.textContent =
            originalText;

        label.append(
            iconWrap,
            text
        );

        element.appendChild(label);

        element.dataset
            .miIosIconApplied =
            "true";
    }

    function applyIcons() {
        replaceLeadingIcon(
            document.querySelector(
                "#newChatBtn, " +
                "#sidebar button[onclick*='newChat']"
            ),
            icons.plus
        );

        replaceLeadingIcon(
            document.querySelector(
                "#supportBtn"
            ),
            icons.support
        );

        replaceLeadingIcon(
            document.querySelector(
                "#settingsBtn"
            ),
            icons.settings
        );

        replaceLeadingIcon(
            document.querySelector(
                "#logoutBtn, " +
                "button[onclick*='logout'], " +
                "button[onclick*='Logout']"
            ),
            icons.logout
        );

        document
            .querySelectorAll(
                "#settingsCloseBtn, " +
                ".close-btn, " +
                ".modal-close"
            )
            .forEach(function (button) {
                if (
                    button.dataset
                        .miIosIconApplied ===
                    "true"
                ) {
                    return;
                }

                button.innerHTML =
                    icons.close;

                button.dataset
                    .miIosIconApplied =
                    "true";
            });

        document
            .querySelectorAll(
                "#sendBtn, " +
                "#sendButton, " +
                ".send-btn"
            )
            .forEach(function (button) {
                if (
                    button.dataset
                        .miIosIconApplied ===
                    "true"
                ) {
                    return;
                }

                button.innerHTML =
                    icons.send;

                button.dataset
                    .miIosIconApplied =
                    "true";
            });

        document
            .querySelectorAll(
                ".mi-ai-functional-copy, " +
                ".mi-ai-copy-below, " +
                ".aiCopyButton, " +
                ".copy-btn, " +
                ".copy-button"
            )
            .forEach(function (button) {
                if (
                    button.dataset
                        .miIosIconApplied ===
                    "true"
                ) {
                    return;
                }

                button.innerHTML =
                    icons.copy;

                button.dataset
                    .miIosIconApplied =
                    "true";
            });
    }

    document.addEventListener(
        "click",
        function (event) {
            if (
                !event.target.closest(
                    ".mi-ios-select-trigger"
                )
                && !event.target.closest(
                    "#miIosSelectPopup"
                )
            ) {
                closePopup();
            }
        }
    );

    document.addEventListener(
        "keydown",
        function (event) {
            if (event.key === "Escape") {
                closePopup();
            }
        }
    );

    window.addEventListener(
        "resize",
        function () {
            if (
                activeTrigger
                && popup?.classList
                    .contains("mi-open")
            ) {
                positionPopup(
                    activeTrigger
                );
            }
        }
    );

    window.addEventListener(
        "scroll",
        function () {
            if (
                activeTrigger
                && popup?.classList
                    .contains("mi-open")
            ) {
                positionPopup(
                    activeTrigger
                );
            }
        },
        true
    );

    function refresh() {
        scanSelects(document);
        applyIcons();
    }

    function start() {
        ensurePopup();
        refresh();

        let observerRefreshPending =
            false;

        const observer =
            new MutationObserver(
                function (mutations) {
                    mutations.forEach(
                        function (mutation) {
                            mutation.addedNodes
                                .forEach(
                                    function (node) {
                                        if (
                                            node.nodeType ===
                                            Node.ELEMENT_NODE
                                        ) {
                                            scanSelects(
                                                node
                                            );
                                        }
                                    }
                                );
                        }
                    );

                    if (observerRefreshPending) {
                        return;
                    }

                    observerRefreshPending =
                        true;

                    requestAnimationFrame(
                        function () {
                            observerRefreshPending =
                                false;

                            applyIcons();
                        }
                    );
                }
            );

        observer.observe(
            document.body,
            {
                childList: true,
                subtree: true
            }
        );
    }

    window.MIIosControls = {
        refresh: refresh,
        closeDropdown: closePopup
    };

    if (
        document.readyState ===
        "loading"
    ) {
        document.addEventListener(
            "DOMContentLoaded",
            start,
            {
                once: true
            }
        );
    }
    else {
        start();
    }
})();

/* MI AI IOS SELECT AND ICON SYSTEM JS - END */
</script>







<script>
/* MI AI ACCOUNT SETTINGS PERSISTENCE - START */

(function () {
    "use strict";

    const SETTINGS_PREFIX = "mi_account_settings_v1_";
    const GLOBAL_BACKUP_KEY = "mi_guest_settings_v1";

    const SETTINGS_SELECTORS = [
        "#settingsPanel input",
        "#settingsPanel select",
        "#settingsPanel textarea"
    ].join(",");

    function normalizeIdentity(value) {
        return String(value || "")
            .trim()
            .toLowerCase();
    }

    function getLoggedInIdentity() {
        const email = normalizeIdentity(
            localStorage.getItem("mi_user_email")
        );

        const userId = normalizeIdentity(
            localStorage.getItem("mi_user_id")
        );

        return email || userId || "";
    }

    function isLoggedInForSettings() {
        return Boolean(
            getLoggedInIdentity() &&
            (
                localStorage.getItem("mi_supabase_token") ||
                localStorage.getItem("mi_user_id")
            )
        );
    }

    function getSettingsStorageKey(identity) {
        const normalized = normalizeIdentity(identity);

        return normalized
            ? SETTINGS_PREFIX + encodeURIComponent(normalized)
            : GLOBAL_BACKUP_KEY;
    }

    function getSettingControlKey(control, index) {
        return (
            control.id ||
            control.name ||
            control.getAttribute("data-setting-key") ||
            ("setting_" + index)
        );
    }

    function readSettingsControls() {
        const controls = Array.from(
            document.querySelectorAll(SETTINGS_SELECTORS)
        );

        const result = {};

        controls.forEach(function (control, index) {
            if (
                !control ||
                control.type === "button" ||
                control.type === "submit" ||
                control.type === "reset" ||
                control.type === "password" ||
                control.type === "email"
            ) {
                return;
            }

            const key = getSettingControlKey(control, index);

            if (
                control.type === "checkbox" ||
                control.type === "radio"
            ) {
                result[key] = {
                    type: control.type,
                    checked: Boolean(control.checked)
                };
            } else {
                result[key] = {
                    type: control.type || control.tagName.toLowerCase(),
                    value: control.value
                };
            }
        });

        result.__documentTheme = {
            main:
                getComputedStyle(document.documentElement)
                    .getPropertyValue("--main")
                    .trim(),
            bodyClasses: Array.from(document.body.classList)
                .filter(function (name) {
                    return (
                        name === "light" ||
                        name === "dark" ||
                        name.startsWith("theme-")
                    );
                })
        };

        result.__savedAt = Date.now();

        return result;
    }

    function saveAccountSettings() {
        if (!isLoggedInForSettings()) {
            return;
        }

        const identity = getLoggedInIdentity();

        if (!identity) {
            return;
        }

        try {
            localStorage.setItem(
                getSettingsStorageKey(identity),
                JSON.stringify(readSettingsControls())
            );
        } catch (error) {
            console.error(
                "Unable to save account settings:",
                error
            );
        }
    }

    function dispatchControlEvents(control) {
        try {
            control.dispatchEvent(
                new Event("input", {
                    bubbles: true
                })
            );

            control.dispatchEvent(
                new Event("change", {
                    bubbles: true
                })
            );
        } catch (error) {
            console.warn(
                "Unable to dispatch setting event:",
                error
            );
        }
    }

    function restoreAccountSettings() {
        if (!isLoggedInForSettings()) {
            return false;
        }

        const identity = getLoggedInIdentity();

        if (!identity) {
            return false;
        }

        let saved;

        try {
            const raw = localStorage.getItem(
                getSettingsStorageKey(identity)
            );

            if (!raw) {
                return false;
            }

            saved = JSON.parse(raw);
        } catch (error) {
            console.error(
                "Unable to read account settings:",
                error
            );

            return false;
        }

        const controls = Array.from(
            document.querySelectorAll(SETTINGS_SELECTORS)
        );

        controls.forEach(function (control, index) {
            if (
                !control ||
                control.type === "button" ||
                control.type === "submit" ||
                control.type === "reset" ||
                control.type === "password" ||
                control.type === "email"
            ) {
                return;
            }

            const key = getSettingControlKey(control, index);
            const item = saved[key];

            if (!item) {
                return;
            }

            if (
                control.type === "checkbox" ||
                control.type === "radio"
            ) {
                control.checked = Boolean(item.checked);
            } else if (
                Object.prototype.hasOwnProperty.call(
                    item,
                    "value"
                )
            ) {
                control.value = item.value;
            }

            dispatchControlEvents(control);
        });

        if (
            saved.__documentTheme &&
            saved.__documentTheme.main
        ) {
            document.documentElement.style.setProperty(
                "--main",
                saved.__documentTheme.main
            );

            localStorage.setItem(
                "theme",
                saved.__documentTheme.main
            );
        }

        const languageSelect =
            document.getElementById("languageSelect");

        if (
            languageSelect &&
            typeof window.applyLanguage === "function"
        ) {
            Promise.resolve(
                window.applyLanguage(
                    languageSelect.value,
                    false
                )
            ).catch(function () {});
        }

        return true;
    }

    function resetVisibleSettingsForGuest() {
        const controls = Array.from(
            document.querySelectorAll(SETTINGS_SELECTORS)
        );

        controls.forEach(function (control) {
            if (
                !control ||
                control.type === "button" ||
                control.type === "submit" ||
                control.type === "reset" ||
                control.type === "password" ||
                control.type === "email"
            ) {
                return;
            }

            if (
                control.type === "checkbox" ||
                control.type === "radio"
            ) {
                control.checked =
                    Boolean(control.defaultChecked);
            } else if (
                control.tagName === "SELECT"
            ) {
                control.selectedIndex = 0;
            } else if (
                control.defaultValue !== undefined
            ) {
                control.value = control.defaultValue;
            }

            dispatchControlEvents(control);
        });

        document.documentElement.style.removeProperty(
            "--main"
        );

        localStorage.removeItem("theme");

        document.body.classList.remove(
            "light",
            "dark"
        );
    }

    function handleUserChange() {
        window.setTimeout(function () {
            if (isLoggedInForSettings()) {
                restoreAccountSettings();
            } else {
                resetVisibleSettingsForGuest();
            }
        }, 150);
    }

    document.addEventListener(
        "input",
        function (event) {
            if (
                event.target &&
                event.target.closest("#settingsPanel")
            ) {
                saveAccountSettings();
            }
        },
        true
    );

    document.addEventListener(
        "change",
        function (event) {
            if (
                event.target &&
                event.target.closest("#settingsPanel")
            ) {
                saveAccountSettings();
            }
        },
        true
    );

    document.addEventListener(
        "click",
        function (event) {
            const button = event.target.closest(
                "#settingsPanel button"
            );

            if (!button) {
                return;
            }

            window.setTimeout(
                saveAccountSettings,
                100
            );
        },
        true
    );

    window.addEventListener(
        "mi-chat-user-changed",
        handleUserChange
    );

    window.addEventListener(
        "pagehide",
        saveAccountSettings
    );

    window.addEventListener(
        "beforeunload",
        saveAccountSettings
    );

    window.addEventListener(
        "pageshow",
        function () {
            window.setTimeout(
                handleUserChange,
                100
            );
        }
    );

    document.addEventListener(
        "visibilitychange",
        function () {
            if (document.visibilityState === "hidden") {
                saveAccountSettings();
            } else {
                handleUserChange();
            }
        }
    );

    document.addEventListener(
        "DOMContentLoaded",
        function () {
            window.setTimeout(
                handleUserChange,
                250
            );
        },
        {
            once: true
        }
    );

    window.MIAccountSettings = {
        save: saveAccountSettings,
        restore: restoreAccountSettings,
        resetGuestView: resetVisibleSettingsForGuest,
        getKey: function () {
            return getSettingsStorageKey(
                getLoggedInIdentity()
            );
        }
    };
})();

/* MI AI ACCOUNT SETTINGS PERSISTENCE - END */
</script>

            }
        );
    }
    else {
