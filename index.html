    }
})();
/* MI AI SAFE UI UNBLOCK - END */
</script>



<script>
/* MI AI SAFE ACCOUNT CHAT RESTORE V4 - START */

(function () {
    "use strict";

    const ARCHIVE_PREFIX =
        "mi_safe_account_chat_v4_";

    const LAST_CHAT_PREFIX =
        "mi_safe_last_chat_v4_";

    let saveTimer = null;
    let restoreRunning = false;
    let authListenerInstalled = false;
    let lastIdentity = "";

    function normalize(value) {
        return String(value || "")
            .trim()
            .toLowerCase();
    }

    function firebaseUser() {
        try {
            return (
                window.miFirebaseAuth?.currentUser ||
                window.firebaseAuth?.currentUser ||
                (
                    window.firebase &&
                    typeof window.firebase.auth === "function"
                        ? window.firebase.auth().currentUser
                        : null
                ) ||
                null
            );
        }
        catch (error) {
            return null;
        }
    }

    function accountIdentity() {
        const firebaseAccount =
            firebaseUser();

        return normalize(
            firebaseAccount?.email ||
            localStorage.getItem(
                "mi_user_email"
            ) ||
            firebaseAccount?.uid ||
            localStorage.getItem(
                "mi_user_id"
            ) ||
            ""
        );
    }

    function authenticated() {
        return Boolean(
            accountIdentity() &&
            (
                firebaseUser() ||
                localStorage.getItem(
                    "mi_supabase_token"
                ) ||
                localStorage.getItem(
                    "mi_user_id"
                )
            )
        );
    }

    function archiveKey(identity) {
        return (
            ARCHIVE_PREFIX +
            encodeURIComponent(
                normalize(identity)
            )
        );
    }

    function lastChatKey(identity) {
        return (
            LAST_CHAT_PREFIX +
            encodeURIComponent(
                normalize(identity)
            )
        );
    }

    function safeParse(value, fallback) {
        try {
            const parsed =
                JSON.parse(value);

            return (
                parsed === null
                    ? fallback
                    : parsed
            );
        }
        catch (error) {
            return fallback;
        }
    }

    function clone(value, fallback) {
        try {
            return JSON.parse(
                JSON.stringify(value)
            );
        }
        catch (error) {
            return fallback;
        }
    }

    function currentChats() {
        try {
            if (
                typeof chats !== "undefined" &&
                chats &&
                typeof chats === "object" &&
                !Array.isArray(chats)
            ) {
                return clone(chats, {});
            }
        }
        catch (error) {
            // Ignore inaccessible binding.
        }

        if (
            window.chats &&
            typeof window.chats === "object" &&
            !Array.isArray(window.chats)
        ) {
            return clone(
                window.chats,
                {}
            );
        }

        return {};
    }

    function currentChatId() {
        try {
            if (
                typeof currentChat !==
                    "undefined" &&
                currentChat
            ) {
                return currentChat;
            }
        }
        catch (error) {
            // Ignore inaccessible binding.
        }

        return (
            window.currentChat ||
            localStorage.getItem(
                "last_chat"
            ) ||
            null
        );
    }

    function accountStorageKey() {
        try {
            if (
                typeof getUserChatStorageKey ===
                    "function"
            ) {
                return (
                    getUserChatStorageKey() ||
                    ""
                );
            }
        }
        catch (error) {
            // Fall back below.
        }

        const identity =
            accountIdentity();

        return identity
            ? "mi_chats_" + identity
            : "";
    }

    function validChats(value) {
        return Boolean(
            value &&
            typeof value === "object" &&
            !Array.isArray(value)
        );
    }

    function chatCount(value) {
        return validChats(value)
            ? Object.keys(value).length
            : 0;
    }

    function messageCount(chatMap) {
        if (!validChats(chatMap)) {
            return 0;
        }

        return Object.values(chatMap)
            .reduce(
                function (total, messages) {
                    return (
                        total +
                        (
                            Array.isArray(messages)
                                ? messages.length
                                : 0
                        )
                    );
                },
                0
            );
    }

    function mergeChats(
        first,
        second
    ) {
        const left =
            validChats(first)
                ? clone(first, {})
                : {};

        const right =
            validChats(second)
                ? clone(second, {})
                : {};

        const merged = {
            ...left
        };

        Object.entries(right)
            .forEach(
                function (entry) {
                    const chatId =
                        entry[0];

                    const incoming =
                        entry[1];

                    const existing =
                        merged[chatId];

                    if (
                        !Array.isArray(existing)
                    ) {
                        merged[chatId] =
                            incoming;

                        return;
                    }

                    if (
                        !Array.isArray(incoming)
                    ) {
                        return;
                    }

                    /*
                      Prefer the version containing more
                      messages to prevent data loss.
                    */
                    if (
                        incoming.length >
                        existing.length
                    ) {
                        merged[chatId] =
                            incoming;
                    }
                }
            );

        return merged;
    }

    function readArchive(identity) {
        const normalized =
            normalize(identity);

        if (!normalized) {
            return null;
        }

        const state =
            safeParse(
                localStorage.getItem(
                    archiveKey(normalized)
                ),
                null
            );

        if (
            !state ||
            state.version !== 4 ||
            !validChats(state.chats)
        ) {
            return null;
        }

        return state;
    }

    function readNativeCache() {
        const key =
            accountStorageKey();

        if (!key) {
            return {};
        }

        return safeParse(
            localStorage.getItem(key),
            {}
        );
    }

    function buildBestSnapshot() {
        const identity =
            accountIdentity();

        const memoryChats =
            currentChats();

        const nativeChats =
            readNativeCache();

        const archive =
            readArchive(identity);

        let best =
            mergeChats(
                nativeChats,
                archive?.chats || {}
            );

        best =
            mergeChats(
                best,
                memoryChats
            );

        return best;
    }

    function saveNow(reason) {
        if (!authenticated()) {
            return false;
        }

        const identity =
            accountIdentity();

        if (!identity) {
            return false;
        }

        const bestChats =
            buildBestSnapshot();

        /*
          Never replace a non-empty backup with an
          empty state during initial page loading.
        */
        const previous =
            readArchive(identity);

        if (
            chatCount(bestChats) === 0 &&
            chatCount(
                previous?.chats
            ) > 0
        ) {
            console.warn(
                "[MI AI Restore] Empty save ignored:",
                reason
            );

            return false;
        }

        const selectedChat =
            currentChatId() ||
            previous?.currentChat ||
            Object.keys(bestChats)[0] ||
            null;

        const state = {
            version: 4,
            identity: identity,
            savedAt: Date.now(),
            reason:
                reason || "update",
            currentChat:
                selectedChat,
            chats:
                bestChats
        };

        localStorage.setItem(
            archiveKey(identity),
            JSON.stringify(state)
        );

        if (selectedChat) {
            localStorage.setItem(
                lastChatKey(identity),
                selectedChat
            );

            localStorage.setItem(
                "last_chat",
                selectedChat
            );
        }

        const nativeKey =
            accountStorageKey();

        if (nativeKey) {
            localStorage.setItem(
                nativeKey,
                JSON.stringify(
                    bestChats
                )
            );
        }

        lastIdentity =
            identity;

        console.log(
            "[MI AI Restore] Saved:",
            reason,
            identity,
            chatCount(bestChats),
            messageCount(bestChats)
        );

        return true;
    }

    function scheduleSave(
        reason,
        delay
    ) {
        clearTimeout(saveTimer);

        saveTimer =
            setTimeout(
                function () {
                    saveNow(reason);
                },
                typeof delay ===
                    "number"
                    ? delay
                    : 180
            );
    }

    function applyChats(
        restoredChats,
        requestedChat
    ) {
        if (
            !validChats(restoredChats) ||
            chatCount(restoredChats) === 0
        ) {
            return false;
        }

        const safeChats =
            clone(
                restoredChats,
                {}
            );

        try {
            if (
                typeof chats !==
                    "undefined"
            ) {
                chats =
                    safeChats;
            }
        }
        catch (error) {
            // Ignore inaccessible binding.
        }

        window.chats =
            safeChats;

        const ids =
            Object.keys(safeChats);

        const selected =
            requestedChat &&
            safeChats[requestedChat]
                ? requestedChat
                : ids[0];

        try {
            if (
                typeof currentChat !==
                    "undefined"
            ) {
                currentChat =
                    selected;
            }
        }
        catch (error) {
            // Ignore inaccessible binding.
        }

        window.currentChat =
            selected;

        localStorage.setItem(
            "last_chat",
            selected
        );

        const nativeKey =
            accountStorageKey();

        if (nativeKey) {
            localStorage.setItem(
                nativeKey,
                JSON.stringify(
                    safeChats
                )
            );
        }

        try {
            if (
                typeof renderList ===
                    "function"
            ) {
                renderList();
            }
        }
        catch (error) {
            console.warn(
                "[MI AI Restore] List render failed:",
                error
            );
        }

        try {
            if (
                typeof openChat ===
                    "function"
            ) {
                openChat(selected);
            }
        }
        catch (error) {
            console.warn(
                "[MI AI Restore] Chat open failed:",
                error
            );
        }

        return true;
    }

    async function restoreNow(reason) {
        if (
            restoreRunning ||
            !authenticated()
        ) {
            return false;
        }

        const identity =
            accountIdentity();

        if (!identity) {
            return false;
        }

        restoreRunning = true;

        try {
            const archive =
                readArchive(identity);

            const nativeChats =
                readNativeCache();

            let restored =
                mergeChats(
                    archive?.chats || {},
                    nativeChats
                );

            const requestedChat =
                localStorage.getItem(
                    lastChatKey(identity)
                ) ||
                archive?.currentChat ||
                localStorage.getItem(
                    "last_chat"
                );

            /*
              Restore local data immediately before any
              network request. This protects hard refresh.
            */
            if (
                chatCount(restored) > 0
            ) {
                applyChats(
                    restored,
                    requestedChat
                );
            }

            /*
              Load server/Firebase data if the app has
              its normal loader. Never allow an empty
              server response to erase local data.
            */
            try {
                if (
                    typeof loadUserChats ===
                        "function"
                ) {
                    await loadUserChats();
                }
            }
            catch (error) {
                console.warn(
                    "[MI AI Restore] Server load failed; local chats retained.",
                    error
                );
            }

            const loadedChats =
                currentChats();

            restored =
                mergeChats(
                    restored,
                    loadedChats
                );

            if (
                chatCount(restored) > 0
            ) {
                applyChats(
                    restored,
                    requestedChat
                );
            }

            saveNow(
                "restore-" +
                (
                    reason ||
                    "session"
                )
            );

            console.log(
                "[MI AI Restore] Restored:",
                identity,
                chatCount(restored),
                messageCount(restored)
            );

            return true;
        }
        finally {
            restoreRunning = false;
        }
    }

    function installAuthListener() {
        if (authListenerInstalled) {
            return true;
        }

        let auth = null;

        try {
            auth =
                window.miFirebaseAuth ||
                window.firebaseAuth ||
                (
                    window.firebase &&
                    typeof window.firebase
                        .auth === "function"
                        ? window.firebase.auth()
                        : null
                );
        }
        catch (error) {
            auth = null;
        }

        if (
            !auth ||
            typeof auth
                .onAuthStateChanged !==
                "function"
        ) {
            return false;
        }

        authListenerInstalled =
            true;

        auth.onAuthStateChanged(
            async function (account) {
                if (account?.email) {
                    localStorage.setItem(
                        "mi_user_email",
                        account.email
                    );

                    localStorage.setItem(
                        "mi_user_id",
                        account.uid || ""
                    );

                    try {
                        const token =
                            await account
                                .getIdToken();

                        if (token) {
                            localStorage.setItem(
                                "mi_supabase_token",
                                token
                            );
                        }
                    }
                    catch (error) {
                        console.warn(
                            "[MI AI Restore] Token refresh failed.",
                            error
                        );
                    }

                    await restoreNow(
                        "auth"
                    );
                }
                else {
                    lastIdentity = "";
                }
            }
        );

        return true;
    }

    function installSaveHooks() {
        /*
          Capture normal actions without preventing
          or stopping their original click handlers.
        */
        document.addEventListener(
            "click",
            function (event) {
                if (!authenticated()) {
                    return;
                }

                const details =
                    [
                        event.target?.id,
                        event.target?.className,
                        event.target
                            ?.getAttribute?.(
                                "data-action"
                            ),
                        event.target
                            ?.textContent
                    ]
                        .filter(Boolean)
                        .join(" ")
                        .toLowerCase();

                if (
                    details.includes("send") ||
                    details.includes("new chat") ||
                    details.includes("rename") ||
                    details.includes("delete") ||
                    details.includes("pin")
                ) {
                    scheduleSave(
                        "action",
                        350
                    );
                }
            },
            false
        );

        document.addEventListener(
            "keydown",
            function (event) {
                if (
                    authenticated() &&
                    event.key === "Enter"
                ) {
                    scheduleSave(
                        "enter",
                        700
                    );
                }
            },
            false
        );

        window.addEventListener(
            "pagehide",
            function () {
                saveNow("pagehide");
            }
        );

        window.addEventListener(
            "beforeunload",
            function () {
                saveNow(
                    "beforeunload"
                );
            }
        );

        document.addEventListener(
            "visibilitychange",
            function () {
                if (
                    document.visibilityState ===
                        "hidden"
                ) {
                    saveNow(
                        "hidden"
                    );
                }
            }
        );

        window.addEventListener(
            "pageshow",
            function () {
                restoreNow(
                    "pageshow"
                );
            }
        );

        window.addEventListener(
            "popstate",
            function () {
                restoreNow(
                    "history"
                );
            }
        );

        window.addEventListener(
            "mi-chat-user-changed",
            function () {
                restoreNow(
                    "user-change"
                );
            }
        );
    }

    function start() {
        installSaveHooks();

        /*
          Restore immediately from existing auth storage.
        */
        if (authenticated()) {
            restoreNow(
                "startup"
            );
        }

        if (!installAuthListener()) {
            let attempts = 0;

            const timer =
                setInterval(
                    function () {
                        attempts += 1;

                        if (
                            installAuthListener() ||
                            attempts >= 40
                        ) {
                            clearInterval(
                                timer
                            );
                        }
                    },
                    250
                );
        }

        /*
          Low-frequency safety backup only.
          It does not touch click events or block UI.
        */
        let lifecycleSaveTimer = null;

        function scheduleLifecycleSave(reason) {
            if (!authenticated()) return;
            window.clearTimeout(lifecycleSaveTimer);
            lifecycleSaveTimer = window.setTimeout(function () {
                saveNow(reason);
            }, 180);
        }

        document.addEventListener("visibilitychange", function () {
            if (document.visibilityState === "hidden") {
                scheduleLifecycleSave("visibility");
            }
        });

        window.addEventListener("pagehide", function () {
            if (authenticated()) {
                saveNow("pagehide");
            }
        });
    }

    window.MISafeAccountChatRestore = {
        save:
            function () {
                return saveNow(
                    "manual"
                );
            },

        restore:
            function () {
                return restoreNow(
                    "manual"
                );
            },

        getState:
            function () {
                return readArchive(
                    accountIdentity()
                );
            }
    };

    if (
        document.readyState ===
        "loading"
    ) {
        document.addEventListener(
            "DOMContentLoaded",
            start,
            {
                once: true
            }
        );
    }
    else {
        start();
    }
})();

/* MI AI SAFE ACCOUNT CHAT RESTORE V4 - END */
</script>

<script>
/* MI AI LIVE SEARCH AND DEVICE TIME V1 - START */

(function () {
    "use strict";

    let originalFetchChatReply = null;
    let installed = false;

    const LIVE_SEARCH_PATTERN =
        /\b(latest|live|current|today|now|score|scores|result|results|match|game|news|weather|price|stock|election|president|prime minister|ceo|release|update|updated|breaking)\b/i;

    const TIME_PATTERN =
        /\b(what(?:'s| is)? the time|time now|current time|local time|Ã Â¶Å¡Ã Â·ÂÃ Â¶Â½Ã Â¶Âº|Ã Â¶Â¯Ã Â·ÂÃ Â¶Â±Ã Â·Å  Ã Â¶Å¡Ã Â·ÂÃ Â¶Â½Ã Â¶Âº|Ã Â®Â¨Ã Â¯â€¡Ã Â®Â°Ã Â®Â®Ã Â¯Â|Ã Â®Â¤Ã Â®Â±Ã Â¯ÂÃ Â®ÂªÃ Â¯â€¹Ã Â®Â¤Ã Â¯Ë†Ã Â®Â¯ Ã Â®Â¨Ã Â¯â€¡Ã Â®Â°Ã Â®Â®Ã Â¯Â)\b/i;

    function extractQuestion(payload) {
        if (!payload || typeof payload !== "object") {
            return "";
        }

        if (typeof payload.message === "string") {
            return payload.message.trim();
        }

        if (typeof payload.prompt === "string") {
            return payload.prompt.trim();
        }

        if (typeof payload.text === "string") {
            return payload.text.trim();
        }

        if (Array.isArray(payload.messages)) {
            const lastUser =
                [...payload.messages]
                    .reverse()
                    .find(function (item) {
                        return (
                            item &&
                            (
                                item.role === "user" ||
                                item.role === "me"
                            )
                        );
                    });

            return String(
                lastUser?.content ||
                lastUser?.text ||
                ""
            ).trim();
        }

        return "";
    }

    function setThinkingLabel(text) {
        const labels =
            document.querySelectorAll(
                ".thinking .label, .thinking-label"
            );

        labels.forEach(function (label) {
            if (
                label.dataset.miOriginalLabel ===
                    undefined
            ) {
                label.dataset.miOriginalLabel =
                    label.textContent || "MI AI";
            }

            label.textContent = text;
        });
    }

    function restoreThinkingLabel() {
        document
            .querySelectorAll(
                ".thinking .label, .thinking-label"
            )
            .forEach(function (label) {
                if (
                    label.dataset
                        .miOriginalLabel !==
                    undefined
                ) {
                    label.textContent =
                        label.dataset
                            .miOriginalLabel;
                }
            });
    }

    function replyObject(text, extra) {
        return {
            reply: text,
            response: text,
            message: text,
            text: text,
            content: text,
            ...(extra || {})
        };
    }

    function getBrowserPosition() {
        return new Promise(function (resolve) {
            if (!navigator.geolocation) {
                resolve(null);
                return;
            }

            navigator.geolocation.getCurrentPosition(
                function (position) {
                    resolve({
                        latitude:
                            position.coords.latitude,

                        longitude:
                            position.coords.longitude,

                        accuracy:
                            position.coords.accuracy
                    });
                },

                function () {
                    resolve(null);
                },

                {
                    enableHighAccuracy: false,
                    timeout: 7000,
                    maximumAge: 60000
                }
            );
        });
    }

    async function buildCurrentTimeReply() {
        setThinkingLabel(
            "Getting your local time..."
        );

        const position =
            await getBrowserPosition();

        const now =
            new Date();

        const timezone =
            Intl.DateTimeFormat()
                .resolvedOptions()
                .timeZone ||
            "Device local timezone";

        const locale =
            document.documentElement.lang ||
            navigator.language ||
            "en-US";

        const dateText =
            new Intl.DateTimeFormat(
                locale,
                {
                    year: "numeric",
                    month: "long",
                    day: "numeric",
                    weekday: "long",
                    timeZone: timezone
                }
            ).format(now);

        const timeText =
            new Intl.DateTimeFormat(
                locale,
                {
                    hour: "2-digit",
                    minute: "2-digit",
                    second: "2-digit",
                    hour12: true,
                    timeZone: timezone
                }
            ).format(now);

        const locationText =
            position
                ? (
                    " Location coordinates: " +
                    position.latitude.toFixed(4) +
                    ", " +
                    position.longitude.toFixed(4) +
                    "."
                )
                : (
                    " Location permission was not available, so the device timezone was used."
                );

        return replyObject(
            "Your current local time is " +
            timeText +
            " on " +
            dateText +
            ". Timezone: " +
            timezone +
            "." +
            locationText,
            {
                realtime: true,
                timezone: timezone,
                latitude:
                    position?.latitude ??
                    null,
                longitude:
                    position?.longitude ??
                    null,
                generated_at:
                    now.toISOString()
            }
        );
    }

    async function requestLiveSearch(
        payload,
        signal
    ) {
        setThinkingLabel(
            "Searching the live web..."
        );

        const position =
            await getBrowserPosition();

        const timezone =
            Intl.DateTimeFormat()
                .resolvedOptions()
                .timeZone ||
            "";

        const response =
            await fetch(
                "/api/live-assist",
                {
                    method: "POST",

                    headers: {
                        "Content-Type":
                            "application/json"
                    },

                    body: JSON.stringify({
                            query: String(
                                extractQuestion(payload) || ""
                            ).trim().slice(0, 4000),

                            client_context: {
                                timezone: timezone,

                                local_time:
                                    new Date().toISOString(),

                                latitude:
                                    position?.latitude ?? null,

                                longitude:
                                    position?.longitude ?? null
                            }
                        }),

                    signal:
                        signal
                }
            );

        const data =
            await response.json()
                .catch(function () {
                    return {};
                });

        if (!response.ok) {
            throw new Error(
                data.error ||
                "Live web search failed."
            );
        }

        const reply =
            data.reply ||
            data.response ||
            data.message ||
            data.text ||
            "";

        if (!reply) {
            throw new Error(
                "Live search returned no answer."
            );
        }

        return replyObject(
            reply,
            {
                live_search: true,
                sources:
                    data.sources || []
            }
        );
    }

    function shouldUseLiveSearch(question) {
        if (!question) {
            return false;
        }

        return LIVE_SEARCH_PATTERN.test(
            question
        );
    }

    function shouldUseDeviceTime(question) {
        if (!question) {
            return false;
        }

        return TIME_PATTERN.test(
            question
        );
    }

    function install() {
        if (installed) {
            return true;
        }

        const candidate =
            window.fetchChatReply ||
            (
                typeof fetchChatReply ===
                    "function"
                    ? fetchChatReply
                    : null
            );

        if (
            typeof candidate !==
                "function"
        ) {
            return false;
        }

        originalFetchChatReply =
            candidate;

        const wrapped =
            async function (
                payload,
                signal,
                useStreaming
            ) {
                const question =
                    extractQuestion(
                        payload
                    );

                try {
                    if (
                        shouldUseDeviceTime(
                            question
                        )
                    ) {
                        return await buildCurrentTimeReply();
                    }

                    if (
                        shouldUseLiveSearch(
                            question
                        )
                    ) {
                        try {
                            return await requestLiveSearch(
                                payload,
                                signal
                            );
                        }
                        catch (liveSearchError) {
                            console.warn(
                                "[MI AI] Live search failed. Using normal AI instead.",
                                liveSearchError
                            );

                            /*
                              Live search must never end the chat with
                              the generic unavailable message.

                              When Groq live search fails, retry the same
                              question through the already-working /api/chat.
                            */
                            return await originalFetchChatReply(
                                payload,
                                signal,
                                false
                            );
                        }
                    }

                    return await originalFetchChatReply(
                        payload,
                        signal,
                        useStreaming
                    );
                }
                finally {
                    restoreThinkingLabel();
                }
            };

        window.fetchChatReply =
            wrapped;

        try {
            fetchChatReply = wrapped;
        }
        catch (error) {
            // Global binding may already point to window.
        }

        installed = true;

        console.log(
            "[MI AI] Live search and device time enabled."
        );

        return true;
    }

    function start() {
        if (install()) {
            return;
        }

        let attempts = 0;

        const timer =
            setInterval(
                function () {
                    attempts += 1;

                    if (
                        install() ||
                        attempts >= 80
                    ) {
                        clearInterval(
                            timer
                        );
                    }
                },
                250
            );
    }

    window.MILiveSearchTime = {
        install: install,
        isLiveQuestion:
            shouldUseLiveSearch,
        isTimeQuestion:
            shouldUseDeviceTime
    };

    if (
        document.readyState ===
        "loading"
    ) {
        document.addEventListener(
            "DOMContentLoaded",
            start,
            {
                once: true
            }
        );
    }
    else {
        start();
    }
})();

/* MI AI LIVE SEARCH AND DEVICE TIME V1 - END */
</script>



<script>

(function () {

    function getShareOverlay() {

<script>

(function () {
    "use strict";

    let installed = false;
    let installAttempts = 0;

    function questionFromPayload(payload) {
        if (!payload || typeof payload !== "object") {
            return "";
        }

        if (typeof payload.message === "string") {
            return payload.message.trim();
        }

        if (typeof payload.prompt === "string") {
            return payload.prompt.trim();
        }

        if (typeof payload.text === "string") {
            return payload.text.trim();
        }

        if (Array.isArray(payload.messages)) {
            const lastUserMessage =
                [...payload.messages]
                    .reverse()
                    .find(function (item) {
                        return (
                            item &&
                            (
                                item.role === "user" ||
                                item.role === "me"
                            )
                        );
                    });

            return String(
                lastUserMessage?.content ||
                lastUserMessage?.text ||
                ""
            ).trim();
        }

        return "";
    }

    function objectToResponse(result) {
        if (result instanceof Response) {
            return result;
        }

        if (
            typeof result === "string" &&
            result.trim()
        ) {
            result = {
                reply: result.trim(),
                response: result.trim()
            };
        }

        if (
            result &&
            typeof result === "object"
        ) {
            const answer =
                String(
                    result.reply ||
                    result.response ||
                    result.answer ||
                    result.message ||
                    result.text ||
                    result.content ||
                    ""
                ).trim();

            if (answer) {
                return new Response(
                    JSON.stringify({
                        ...result,
                        reply: answer,
                        response: answer,
                        message: answer,
                        text: answer
                    }),
                    {
                        status: 200,
                        headers: {
                            "Content-Type":
                                "application/json; charset=utf-8"
                        }
                    }
                );
            }
        }

        return null;
    }

    async function normalChatFallback(
        payload,
        signal
    ) {
        const question =
            questionFromPayload(payload);

        const fallbackPayload = {
            ...(payload || {})
        };

        if (
            !fallbackPayload.message &&
            question
        ) {
            fallbackPayload.message =
                question;
        }

        if (
            !fallbackPayload.prompt &&
            question
        ) {
            fallbackPayload.prompt =
                question;
        }

        const candidates = [];

        const configuredBase =
            String(
                window.__MI_BACKEND_URL__ ||
                ""
            )
                .trim()
                .replace(/\/$/, "");

        if (configuredBase) {
            candidates.push(
                configuredBase + "/api/chat"
            );
        }

        candidates.push("/api/chat");

        const uniqueCandidates =
            [...new Set(candidates)];

        let lastError = null;

        for (
            const endpoint
            of uniqueCandidates
        ) {
            try {
                const response =
                    await fetch(
                        endpoint,
                        {
                            method: "POST",

                            headers: {
                                "Content-Type":
                                    "application/json"
                            },

                            body:
                                JSON.stringify(
                                    fallbackPayload
                                ),

                            signal: signal
                        }
                    );

                if (response.ok) {
                    return response;
                }

                const body =
                    await response
                        .text()
                        .catch(function () {
                            return "";
                        });

                lastError =
                    new Error(
                        body ||
                        (
                            "Server returned " +
                            response.status
                        )
                    );
            }
            catch (error) {
                lastError = error;
            }
        }

        throw (
            lastError ||
            new Error(
                "Unable to contact the AI server."
            )
        );
    }

    function installAdapter() {
        if (installed) {
            return true;
        }

        let currentFetchChatReply = null;

        try {
            currentFetchChatReply =
                window.fetchChatReply ||
                (
                    typeof fetchChatReply ===
                        "function"
                        ? fetchChatReply
                        : null
                );
        }
        catch (error) {
            currentFetchChatReply =
                window.fetchChatReply ||
                null;
        }

        if (
            typeof currentFetchChatReply !==
                "function"
        ) {
            return false;
        }

        if (
            currentFetchChatReply
                .__miResponseAdapterV1 ===
                true
        ) {
            installed = true;
            return true;
        }

        const previousFetchChatReply =
            currentFetchChatReply;

        const adaptedFetchChatReply =
            async function (
                payload,
                signal,
                useStreaming
            ) {
                try {
                    const result =
                        await previousFetchChatReply(
                            payload,
                            signal,
                            useStreaming
                        );

                    /* MI AI LIVE SSE ADAPTER V2 */
                    if (
                        useStreaming &&
                        !(result instanceof Response) &&
                        result &&
                        typeof result === "object"
                    ) {
                        const streamAnswer =
                            String(
                                result.reply ||
                                result.response ||
                                result.answer ||
                                result.message ||
                                result.text ||
                                result.content ||
                                ""
                            ).trim();

                        if (streamAnswer) {
                            const streamPayload =
                                JSON.stringify({
                                    ...result,
                                    reply: streamAnswer
                                });

                            return new Response(
                                "event: done\\n" +
                                "data: " +
                                streamPayload +
                                "\\n\\n",
                                {
                                    status: 200,
                                    headers: {
                                        "Content-Type":
                                            "text/event-stream; charset=utf-8",
                                        "Cache-Control":
                                            "no-cache",
                                        "X-Accel-Buffering":
                                            "no"
                                    }
                                }
                            );
                        }
                    }

                    const converted =
                        objectToResponse(result);

                    if (converted) {
                        return converted;
                    }

                    console.warn(
                        "[MI AI] Reply function returned no usable Response. Falling back to /api/chat.",
                        result
                    );

                    return await normalChatFallback(
                        payload,
                        signal
                    );
                }
                catch (error) {
                    console.warn(
                        "[MI AI] Live/time reply failed. Falling back to /api/chat.",
                        error
                    );

                    return await normalChatFallback(
                        payload,
                        signal
                    );
                }
            };

        adaptedFetchChatReply
            .__miResponseAdapterV1 =
            true;

        window.fetchChatReply =
            adaptedFetchChatReply;

        try {
            fetchChatReply =
                adaptedFetchChatReply;
        }
        catch (error) {
            /*
              A global lexical binding may not be writable.
              window.fetchChatReply remains available.
            */
        }

        installed = true;

        console.log(
            "[MI AI] Response format adapter installed."
        );

        return true;
    }

    function start() {
        if (installAdapter()) {
            return;
        }

        const timer =
            setInterval(
                function () {
                    installAttempts += 1;

                    if (
                        installAdapter() ||

                    }

            );
    }

        install:
            installAdapter,

            objectToResponse,

    if (

    ) {
        document.addEventListener(
            "DOMContentLoaded",
            start,
            {
                once: true
            }
        );
    }
    else {
        start();
    }
})();

                    text:
                        String(
                            message.text ??
                            message.content ??
                            ""
                        )
                };
            });
    }

    function isolateSharedChat() {
        if (!hasSharedUrl()) {
            return false;
        }

        const payload =
            window.MI_SHARED_VIEWER_PAYLOAD ||
            (
                typeof sharedChatData !==
                    "undefined"
                    ? sharedChatData
                    : null
            );

        if (
            !payload ||
            !Array.isArray(
                payload.messages
            )
        ) {
            return false;
        }

        document.body.classList.add(
            "mi-shared-chat-viewer"
        );

        window.MI_SHARED_VIEWER_MODE =
            true;

        const sharedId =
            String(
                payload.id ||
                payload.chatId ||
                "shared"
            );

        const sharedMessages =
            normalizeMessages(
                payload.messages
            );

        const isolatedChats = {
            [sharedId]:
                sharedMessages
        };

        /*
          Replace the active runtime map with exactly one chat.
          Do not load or merge account chat history.
        */
        try {
            chats = isolatedChats;
        }
        catch (error) {
            window.chats =
                isolatedChats;
        }

        window.chats =
            isolatedChats;

        try {
            currentChat =
                sharedId;
        }
        catch (error) {
            window.currentChat =
                sharedId;
        }

        window.currentChat =
            sharedId;

        /*
          Sidebar is intentionally empty even if an old render
          function attempts to display account conversations.
        */
        const list =
            document.getElementById(
                "chatList"
            );

        if (list) {
            list.innerHTML = "";
            list.style.display = "none";
        }

        const sidebar =
            document.getElementById(
                "sidebar"
            );

        if (sidebar) {
            sidebar.setAttribute(
                "aria-hidden",
                "true"
            );

            sidebar.inert = true;
        }

        /*
          Render all messages from only this shared chat.
        */
        try {
            if (
                typeof openChat ===
                    "function"
            ) {
                openChat(sharedId);
            }
        }
        catch (error) {
            console.error(
                "[MI AI Share] Unable to render shared chat.",
                error
            );
        }

        return true;
    }

    function blockAccountChatRendering(event) {
        if (
            !window.MI_SHARED_VIEWER_MODE ||
            !hasSharedUrl()
        ) {
            return;
        }

        /*
          Account/auth persistence events must not replace the
          isolated shared chat while the share URL is open.
        */
        event.stopImmediatePropagation();

        queueMicrotask(
            isolateSharedChat
        );
    }

    function start() {
        isolateSharedChat();

        window.addEventListener(
            "mi-chat-user-changed",
            blockAccountChatRendering,
            true
        );

        window.addEventListener(
            "mi-firebase-auth-changed",
            blockAccountChatRendering,
            true
        );

        window.addEventListener(
            "pageshow",
            function () {
                isolateSharedChat();
            }
        );

        window.addEventListener(
            "popstate",
            function () {
                isolateSharedChat();
            }
        );
    }

    window.MISharedChatIsolation = {
        apply:
            isolateSharedChat,

        isSharedViewer:
            function () {
                return Boolean(
                    window
                        .MI_SHARED_VIEWER_MODE &&
                    hasSharedUrl()
                );
            },

        getMessages:
            function () {
                const payload =
                    window
                        .MI_SHARED_VIEWER_PAYLOAD;

                return normalizeMessages(
                    payload?.messages
                );
            }
    };

    if (
        document.readyState ===
        "loading"
    ) {
        document.addEventListener(
            "DOMContentLoaded",
            start,
            {
                once: true
            }
        );
    }
    else {
        start();
    }
})();

/* MI AI SHARED CHAT ISOLATION JS V1 - END */

<script>
/* MI AI MANDATORY SHARE PASSWORD JS V1 - START */

(function () {
    "use strict";

    let unlocked = false;
    let activePayload = null;

    function getShareParameters() {
        return new URLSearchParams(
            window.location.search
        );
    }

    function isSharedLink() {
        const params =
            getShareParameters();

        return Boolean(
            params.get("s") ||
            params.get("share") ||
            window.MI_SHARED_VIEWER_MODE
        );
    }

    function getSharedPayload() {
        const candidates = [
            window.MI_SHARED_VIEWER_PAYLOAD,
            window.sharedChatData,
            window.sharedPayload
        ];

        try {
            if (
                typeof sharedChatData !==
                    "undefined"
            ) {
                candidates.push(
                    sharedChatData
                );
            }
        }
        catch (error) {
            // Ignore unavailable global binding.
        }

        try {
            if (
                typeof sharedPayload !==
                    "undefined"
            ) {
                candidates.push(
                    sharedPayload
                );
            }
        }
        catch (error) {
            // Ignore unavailable global binding.
        }

        return (
            candidates.find(
                function (item) {
                    return (
                        item &&
                        typeof item ===
                            "object"
                    );
                }
            ) ||
            null
        );
    }

    function firstValue(
        object,
        keys
    ) {
        if (
            !object ||
            typeof object !==
                "object"
        ) {
            return "";
        }

        for (const key of keys) {
            const value =
                object[key];

            if (
                value !== undefined &&
                value !== null &&
                String(value).trim()
            ) {
                return String(value).trim();
            }
        }

        return "";
    }

    function passwordMetadata(payload) {
        const security =
            payload?.security &&
            typeof payload.security ===
                "object"
                ? payload.security
                : {};

        const password =
            payload?.password &&
            typeof payload.password ===
                "object"
                ? payload.password
                : {};

        const enabledValue =
            payload?.passwordRequired ??
            payload?.password_required ??
            payload?.passwordEnabled ??
            payload?.password_enabled ??
            payload?.requiresPassword ??
            security.passwordRequired ??
            security.passwordEnabled ??
            password.required ??
            password.enabled;

        const plainPassword =
            firstValue(
                payload,
                [
                    "sharePassword",
                    "passwordValue",
                    "plainPassword"
                ]
            ) ||
            firstValue(
                security,
                [
                    "password",
                    "passwordValue"
                ]
            );

        const passwordHash =
            firstValue(
                payload,
                [
                    "passwordHash",
                    "password_hash",
                    "sharePasswordHash",
                    "share_password_hash"
                ]
            ) ||
            firstValue(
                security,
                [
                    "passwordHash",
                    "password_hash"
                ]
            ) ||
            firstValue(
                password,
                [
                    "hash",
                    "passwordHash"
                ]
            );

        const passwordSalt =
            firstValue(
                payload,
                [
                    "passwordSalt",
                    "password_salt"
                ]
            ) ||
            firstValue(
                security,
                [
                    "passwordSalt",
                    "password_salt"
                ]
            ) ||
            firstValue(
                password,
                [
                    "salt"
                ]
            );

        const enabled =
            enabledValue === true ||
            enabledValue === 1 ||
            String(
                enabledValue || ""
            ).toLowerCase() === "true" ||
            Boolean(
                plainPassword ||
                passwordHash
            );

        return {
            enabled:
                enabled,

            plainPassword:
                plainPassword,

            passwordHash:
                passwordHash,

            passwordSalt:
                passwordSalt
        };
    }

    async function sha256(value) {
        const bytes =
            new TextEncoder()
                .encode(
                    String(value)
                );

        const digest =
            await crypto.subtle.digest(
                "SHA-256",
                bytes
            );

        return Array.from(
            new Uint8Array(digest)
        )
            .map(
                function (byte) {
                    return byte
                        .toString(16)
                        .padStart(2, "0");
                }
            )
            .join("");
    }

    function constantTimeEqual(
        first,
        second
    ) {
        const left =
            String(first || "")
                .toLowerCase();

        const right =
            String(second || "")
                .toLowerCase();

        if (
            !left ||
            !right ||
            left.length !== right.length
        ) {
            return false;
        }

        let difference = 0;

        for (
            let index = 0;
            index < left.length;
            index += 1
        ) {
            difference |=
                left.charCodeAt(index) ^
                right.charCodeAt(index);
        }

        return difference === 0;
    }

    async function checkPassword(
        enteredPassword,
        metadata
    ) {
        if (!metadata.enabled) {
            return true;
        }

        /*
          Support an existing application validator when available.
        */
        const validators = [
            window.verifySharedChatPassword,
            window.validateSharedChatPassword,
            window.checkSharedChatPassword
        ];

        for (const validator of validators) {
            if (
                typeof validator !==
                    "function"
            ) {
                continue;
            }

            try {
                const result =
                    await validator(
                        enteredPassword,
                        activePayload
                    );

                if (result === true) {
                    return true;
                }

                if (result === false) {
                    return false;
                }
            }
            catch (error) {
                console.warn(
                    "[MI AI Share] Existing password validator failed.",
                    error
                );
            }
        }

        /*
          Plain-password fallback for existing old share links.
          New links should use a password hash instead.
        */
        if (metadata.plainPassword) {
            return (
                enteredPassword ===
                metadata.plainPassword
            );
        }

        if (metadata.passwordHash) {
            const salted =
                metadata.passwordSalt
                    ? (
                        metadata.passwordSalt +
                        enteredPassword
                    )
                    : enteredPassword;

            const enteredHash =
                await sha256(salted);

            return constantTimeEqual(
                enteredHash,
                metadata.passwordHash
            );
        }

        /*
          Password protection is marked as enabled but no
          validation information exists. Keep the chat locked.
        */
        return false;
    }

    function removeGate() {
        document
            .getElementById(
                "miSharePasswordGate"
            )
            ?.remove();

        document.body.classList.remove(
            "mi-share-password-locked"
        );

        document
            .documentElement
            .classList
            .remove(
                "mi-share-password-locked"
            );
    }

    function unlockSharedChat() {
        unlocked = true;

        sessionStorage.setItem(
            "mi_shared_password_unlocked_" +
            (
                activePayload?.id ||
                activePayload?.chatId ||
                window.location.search
            ),
            "true"
        );

        removeGate();

        window.dispatchEvent(
            new CustomEvent(
                "mi-shared-password-unlocked",
                {
                    detail: {
                        payload:
                            activePayload
                    }
                }
            )
        );

        try {
            if (
                window
                    .MISharedChatIsolation &&
                typeof window
                    .MISharedChatIsolation
                    .apply === "function"
            ) {
                window
                    .MISharedChatIsolation
                    .apply();
            }
        }
        catch (error) {
            console.warn(
                "[MI AI Share] Shared chat render refresh failed.",
                error
            );
        }
    }

    function createGate(metadata) {
        if (
            document.getElementById(
                "miSharePasswordGate"
            )
        ) {
            return;
        }

        document.body.classList.add(
            "mi-share-password-locked"
        );

        document
            .documentElement
            .classList
            .add(
                "mi-share-password-locked"
            );

        const gate =
            document.createElement(
                "div"
            );

        gate.id =
            "miSharePasswordGate";

        gate.innerHTML = `
            <form
                id="miSharePasswordForm"
                autocomplete="off"
            >
                <div id="miSharePasswordCard">
                    <h2>Password required</h2>

                    <p>
                        Enter the password to view this
                        shared chat.
                    </p>

                    <input
                        id="miSharePasswordInput"
                        type="password"
                        autocomplete="current-password"
                        placeholder="Enter password"
                        required
                        autofocus
                    >

                    <button
                        id="miSharePasswordSubmit"
                        type="submit"
                    >
                        Open shared chat
                    </button>

                    <div
                        id="miSharePasswordError"
                        role="alert"
                        aria-live="polite"
                    ></div>
                </div>
            </form>
        `;

        /*
          Clicking outside does nothing.
          There is deliberately no close button.
        */
        gate.addEventListener(
            "click",
            function (event) {
                event.stopPropagation();
            },
            true
        );

        document.body.appendChild(
            gate
        );

        const form =
            document.getElementById(
                "miSharePasswordForm"
            );

        const input =
            document.getElementById(
                "miSharePasswordInput"
            );

        const button =
            document.getElementById(
                "miSharePasswordSubmit"
            );

        const errorBox =
            document.getElementById(
                "miSharePasswordError"
            );

        form.addEventListener(
            "submit",
            async function (event) {
                event.preventDefault();
                event.stopPropagation();

                const enteredPassword =
                    String(
                        input.value || ""
                    );

                if (!enteredPassword) {
                    errorBox.textContent =
                        "Password is required.";

                    input.focus();
                    return;
                }

                button.disabled = true;
                button.textContent =
                    "Checking...";

                errorBox.textContent = "";

                try {
                    const correct =
                        await checkPassword(
                            enteredPassword,
                            metadata
                        );

                    if (!correct) {
                        errorBox.textContent =
                            "Incorrect password.";

                        input.value = "";
                        input.focus();
                        return;
                    }

                    unlockSharedChat();
                }
                catch (error) {
                    console.error(
                        "[MI AI Share] Password check failed.",
                        error
                    );

                    errorBox.textContent =
                        "Password verification failed.";
                }
                finally {
                    button.disabled = false;
                    button.textContent =
                        "Open shared chat";
                }
            }
        );

        requestAnimationFrame(
            function () {
                input.focus();
            }
        );
    }

    function lockSharedChat() {
        if (
            unlocked ||
            !isSharedLink()
        ) {
            return false;
        }

        activePayload =
            getSharedPayload();

        if (!activePayload) {
            return false;
        }

        const metadata =
            passwordMetadata(
                activePayload
            );

        if (!metadata.enabled) {
            unlocked = true;
            return false;
        }

        const sessionKey =
            "mi_shared_password_unlocked_" +
            (
                activePayload.id ||
                activePayload.chatId ||
                window.location.search
            );

        if (
            sessionStorage.getItem(
                sessionKey
            ) === "true"
        ) {
            unlocked = true;
            removeGate();
            return false;
        }

        createGate(metadata);
        return true;
    }

    /*
      Escape cannot close the required-password dialog.
    */
    document.addEventListener(
        "keydown",
        function (event) {
            if (
                event.key !== "Escape" ||
                !document.getElementById(
                    "miSharePasswordGate"
                )
            ) {
                return;
            }

            event.preventDefault();
            event.stopPropagation();
            event.stopImmediatePropagation();
        },
        true
    );

    /*
      Prevent older overlay-close functions from removing
      the password gate.
    */
    document.addEventListener(
        "pointerdown",
        function (event) {
            const gate =
                document.getElementById(
                    "miSharePasswordGate"
                );

            if (
                !gate ||
                gate.contains(
                    event.target
                )
            ) {
                return;
            }

            event.preventDefault();
            event.stopPropagation();
            event.stopImmediatePropagation();
        },
        true
    );

    function start() {
        if (lockSharedChat()) {
            return;
        }

        let attempts = 0;

        const timer =
            setInterval(
                function () {
                    attempts += 1;

                    if (
                        lockSharedChat() ||
                        unlocked ||
                        attempts >= 80
                    ) {
                        clearInterval(timer);
                    }
                },
                100
            );
    }

    window.MIMandatorySharePassword = {
        lock:
            lockSharedChat,

        isUnlocked:
            function () {
                return unlocked;
            }
    };

    if (
        document.readyState ===
        "loading"
    ) {
        document.addEventListener(
            "DOMContentLoaded",
            start,
            {
                once: true
            }
        );
    }
    else {
        start();
    }
})();

/* MI AI MANDATORY SHARE PASSWORD JS V1 - END */
</script>

    function showIsland(
        message,

        const ui = ensureUi();

        const settings = {

        clearTimeout(islandTimer);

        const icon =
            ui.island.querySelector(

            "mi-island-visible"

    function queueIsland(
        message,
        options
    ) {
        islandQueue.push({
            message,
            options
        });

        if (islandQueueTimer) {
            return;
        }

        function runNext() {
            const next =
                islandQueue.shift();

            if (!next) {
                islandQueueTimer = null;
                return;
            }

            showIsland(
                next.message,
                next.options
            );

            const duration =
                Number(
                    next.options
                        ?.duration ??
                    2200
                );

            islandQueueTimer =
                setTimeout(
                    runNext,
                    Math.max(
                        duration + 180,
                        500
                    )
                );
        }

        runNext();
    }

                    "mi-toast-leaving"

    function isPinned(target) {
        return Boolean(
            target?.classList
                .contains("pinned") ||
            target?.dataset
                ?.pinned === "true" ||
            target?.getAttribute(
                "aria-pinned"
            ) === "true" ||
            target?.querySelector(
                ".pin-icon, " +
                ".pinned-icon, " +
                "[data-pinned='true']"

    function identifyChatTarget(

        return target.closest(
            [

                ".history-item",
                ".conversation-item",
                "[data-chat-id]",
                "[data-conversation-id]",

            target?.id ||
            "";

        if (!id) {
            return;

        try {
            if (
                typeof selectedChat !==
                    "undefined"
            ) {
                selectedChat = id;

        catch (error) {
            // Ignore inaccessible global.
        }

        window.selectedChat = id;

    function callExistingFunction(
        name

        const direct =
            window[name];

        if (
            typeof direct ===
                "function"
        ) {
            return direct();
        }

        try {
            if (
                typeof eval(name) ===
                    "function"
            ) {
                return eval(name + "()");
            }
        }
        catch (error) {
            console.warn(
                "[MI AI iOS Bundle] Function unavailable:",
                name
            );
        }

        return false;
    }

    function addHapticFeedback() {
        document.addEventListener(
            "pointerdown",
            function (event) {
                const target =
                    event.target.closest(
                        [
                            "button",
                            "[role='button']",
                            ".btn",
                            ".button",
                            ".chat-item",
                            ".chatItem",
                            ".history-item",
                            ".conversation-item"
                        ].join(",")
                    );

                if (!target) {
                    return;
                }

                target.classList.remove(
                    "mi-haptic-release"
                );

                target.classList.add(
                    "mi-haptic-press"
                );
            },
            true
        );

        function release(event) {
            const target =
                event.target.closest?.(
                    [
                        "button",
                        "[role='button']",
                        ".btn",
                        ".button",
                        ".chat-item",
                        ".chatItem",
                        ".history-item",
                        ".conversation-item"
                    ].join(",")
                );

            if (!target) {
                return;

            target.classList.remove(
                "mi-haptic-press"

            target.classList.add(
                "mi-haptic-release"
            );

            setTimeout(
                function () {
                    target.classList.remove(
                        "mi-haptic-release"
                    );
                },
                360
            );
        }

        document.addEventListener(
            "pointerup",
            release,
            true
        );

        document.addEventListener(
            "pointercancel",
            release,
            true
        );
    }

    function addContextMenu() {
        document.addEventListener(
            "contextmenu",
            function (event) {
                const target =
                    identifyChatTarget(
                        event.target
                    );

                if (!target) {
                    return;
                }

                if (
                    document.body.classList
                        .contains(
                            "mi-view-only"
                        )
                ) {
                    return;
                }

                event.preventDefault();
                event.stopPropagation();

                showChatActions(
                    target

            },
            true
        );
    }

    function addLongPress() {
        document.addEventListener(
            "pointerdown",
            function (event) {
                const target =
                    identifyChatTarget(
                        event.target
                    );

                if (
                    !target ||
                    event.pointerType ===
                        "mouse"
                ) {
                    return;
                }

                longPressTarget =
                    target;

                clearTimeout(
                    longPressTimer
                );

                longPressTimer =
                    setTimeout(
                        function () {
                            if (
                                longPressTarget

            true
        );

            "pointermove"
