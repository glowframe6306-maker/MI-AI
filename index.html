                shareModalWasOpen = true;
            }

            if (isCancelButton(event.target)) {
                closeFromCancel(
                    event.target.closest(
                        "button, input, [role='button']"
                    )
                );

                return;
            }

            /*
              Generate Link must continue working,
              but it must not close the modal.
            */
            if (isGenerateButton(event.target)) {
                cancelCloseAllowed = false;
                shareModalWasOpen = true;

                setTimeout(
                    scheduleRepair,
                    0
                );

                setTimeout(
                    scheduleRepair,
                    100
                );

                setTimeout(
                    scheduleRepair,
                    400
                );

                return;
            }

            /*
              Clicking the backdrop/outside must not close it.
            */
            if (
                shareModalWasOpen
                && !modal.contains(event.target)
            ) {
                event.preventDefault();
                event.stopPropagation();
                event.stopImmediatePropagation();

                scheduleRepair();
            }
        },
        true
    );

    document.addEventListener(
        "pointerdown",
        function (event) {
            const modal =
                getShareModal();

            if (
                modal
                && modalLooksOpen(modal)
            ) {
                shareModalWasOpen = true;

                if (
                    !modal.contains(event.target)
                ) {
                    event.preventDefault();
                    event.stopPropagation();
                    event.stopImmediatePropagation();
                }
            }
        },
        true
    );

    document.addEventListener(
        "keydown",
        function (event) {
            if (
                event.key !== "Escape"
            ) {
                return;
            }

            const modal =
                getShareModal();

            if (
                modal
                && modalLooksOpen(modal)
            ) {
                shareModalWasOpen = true;

                event.preventDefault();
                event.stopPropagation();
                event.stopImmediatePropagation();

                scheduleRepair();
            }
        },
        true
    );

    function start() {
        wrapCloseFunctions();

        const observer =
            new MutationObserver(
                function () {
                    wrapCloseFunctions();

                    const modal =
                        getShareModal();

                    if (!modal) {
                        return;
                    }

                    if (modalLooksOpen(modal)) {
                        shareModalWasOpen =
                            true;

                        return;
                    }

                    if (
                        shareModalWasOpen
                        && !cancelCloseAllowed
                    ) {
                        scheduleRepair();
                    }
                }
            );

        observer.observe(
            document.documentElement,
            {
                childList: true,
                subtree: true,
                attributes: true,
                attributeFilter: [
                    "class",
                    "style",
                    "hidden",
                    "aria-hidden"
                ]
            }
        );

        setInterval(
            wrapCloseFunctions,
            1000
        );
    }

    window.MIShareModalLock = {
        isLocked:
            function () {
                return (
                    shareModalWasOpen
                    && !cancelCloseAllowed
                );
            },

        refresh:
            function () {
                wrapCloseFunctions();
                scheduleRepair();
            },

        allowCancelClose:
            function () {
                cancelCloseAllowed = true;
            }
    };

    if (
        document.readyState === "loading"
    ) {
        document.addEventListener(
            "DOMContentLoaded",
            start,
            {
                once: true
            }
        );
    }
    else {
        start();
    }
})();

/* MI AI SHARE MODAL CANCEL ONLY CLOSE - END */
</script>

<script>
/* MI AI SHARE MODAL STAY OPEN - START */

(function () {
    "use strict";

    const modalSelectors = [
        "#shareModal",
        "#shareDialog",
        "#sharePopup",
        ".share-modal",
        ".share-dialog",
        ".share-popup",
        "[data-share-modal]"
    ].join(",");

    let modalWasOpen = false;
    let allowCancelClose = false;
    let repairPending = false;

    function getModal() {
        return document.querySelector(
            modalSelectors
        );
    }

    function isVisible(element) {
        if (!element) {
            return false;
        }

        const style =
            window.getComputedStyle(element);

        return (
            !element.hidden &&
            style.display !== "none" &&
            style.visibility !== "hidden" &&
            style.opacity !== "0"
        );
    }

    function textOf(element) {
        return String(
            element?.textContent ||
            element?.value ||
            element?.getAttribute("aria-label") ||
            element?.getAttribute("title") ||
            ""
        )
            .replace(/\s+/g, " ")
            .trim()
            .toLowerCase();
    }

    function isCancelControl(element) {
        const control =
            element?.closest?.(
                "button, input, [role='button']"
            );

        if (!control) {
            return false;
        }

        const details = [
            textOf(control),
            control.id,
            control.className,
            control.dataset.action,
            control.getAttribute("onclick")
        ]
            .join(" ")
            .toLowerCase();

        return (
            details.includes("cancel") ||
            details.includes("අවලංගු") ||
            details.includes("ரத்து")
        );
    }

    function isShareControl(element) {
        if (!(element instanceof Element)) {
            return false;
        }

        return Boolean(
            element.closest(
                modalSelectors + ", " +
                "#miIosSelectPopup, " +
                ".mi-ios-popup-option, " +
                ".mi-ios-select-trigger"
            )
        );
    }

    function forceOpen() {
        const modal = getModal();

        if (
            !modal ||
            allowCancelClose ||
            !modalWasOpen
        ) {
            return;
        }

        modal.hidden = false;

        modal.removeAttribute(
            "aria-hidden"
        );

        modal.setAttribute(
            "aria-modal",
            "true"
        );

        modal.classList.add(
            "open",
            "show",
            "active"
        );

        modal.style.setProperty(
            "display",
            "flex",
            "important"
        );

        modal.style.setProperty(
            "visibility",
            "visible",
            "important"
        );

        modal.style.setProperty(
            "opacity",
            "1",
            "important"
        );
    }

    function scheduleRepair() {
        if (
            repairPending ||
            allowCancelClose ||
            !modalWasOpen
        ) {
            return;
        }

        repairPending = true;

        requestAnimationFrame(
            function () {
                repairPending = false;
                forceOpen();
            }
        );

        setTimeout(forceOpen, 50);
        setTimeout(forceOpen, 180);
        setTimeout(forceOpen, 450);
    }

    function rememberOpenModal() {
        const modal = getModal();

        if (modal && isVisible(modal)) {
            modalWasOpen = true;
            allowCancelClose = false;
        }
    }

    document.addEventListener(
        "pointerdown",
        function (event) {
            rememberOpenModal();

            if (isCancelControl(event.target)) {
                allowCancelClose = true;
                modalWasOpen = false;
                return;
            }

            if (
                modalWasOpen &&
                isShareControl(event.target)
            ) {
                allowCancelClose = false;
            }
        },
        true
    );

    document.addEventListener(
        "click",
        function (event) {
            rememberOpenModal();

            if (isCancelControl(event.target)) {
                allowCancelClose = true;
                modalWasOpen = false;
                return;
            }

            if (
                modalWasOpen &&
                isShareControl(event.target)
            ) {
                allowCancelClose = false;

                setTimeout(
                    scheduleRepair,
                    0
                );

                setTimeout(
                    scheduleRepair,
                    100
                );

                setTimeout(
                    scheduleRepair,
                    300
                );
            }
        },
        true
    );

    document.addEventListener(
        "change",
        function (event) {
            rememberOpenModal();

            if (
                modalWasOpen &&
                isShareControl(event.target)
            ) {
                allowCancelClose = false;
                scheduleRepair();
            }
        },
        true
    );

    document.addEventListener(
        "input",
        function (event) {
            rememberOpenModal();

            if (
                modalWasOpen &&
                isShareControl(event.target)
            ) {
                allowCancelClose = false;
                scheduleRepair();
            }
        },
        true
    );

    document.addEventListener(
        "keydown",
        function (event) {
            if (event.key !== "Escape") {
                return;
            }

            const modal = getModal();

            if (
                modal &&
                isVisible(modal)
            ) {
                event.preventDefault();
                event.stopPropagation();
                event.stopImmediatePropagation();

                modalWasOpen = true;
                allowCancelClose = false;

                scheduleRepair();
            }
        },
        true
    );

    const observer =
        new MutationObserver(
            function () {
                const modal = getModal();

                if (!modal) {
                    return;
                }

                if (isVisible(modal)) {
                    modalWasOpen = true;
                    return;
                }

                if (
                    modalWasOpen &&
                    !allowCancelClose
                ) {
                    scheduleRepair();
                }
            }
        );

    function start() {
        observer.observe(
            document.documentElement,
            {
                childList: true,
                subtree: true,
                attributes: true,
                attributeFilter: [
                    "class",
                    "style",
                    "hidden",
                    "aria-hidden"
                ]
            }
        );
    }

    window.MIShareModalStayOpen = {
        refresh: scheduleRepair,

        isLocked: function () {
            return (
                modalWasOpen &&
                !allowCancelClose
            );
        }
    };

    if (
        document.readyState === "loading"
    ) {
        document.addEventListener(
            "DOMContentLoaded",
            start,
            { once: true }
        );
    }
    else {
        start();
    }
})();

/* MI AI SHARE MODAL STAY OPEN - END */
</script>



<script>
/* MI AI ACCOUNT SETTINGS PERSISTENCE - START */

(function () {
    "use strict";

    const SETTINGS_PREFIX = "mi_account_settings_v1_";
    const GLOBAL_BACKUP_KEY = "mi_guest_settings_v1";

    const SETTINGS_SELECTORS = [
        "#settingsPanel input",
        "#settingsPanel select",
        "#settingsPanel textarea"
    ].join(",");

    function normalizeIdentity(value) {
        return String(value || "")
            .trim()
            .toLowerCase();
    }

    function getLoggedInIdentity() {
        const email = normalizeIdentity(
            localStorage.getItem("mi_user_email")
        );

        const userId = normalizeIdentity(
            localStorage.getItem("mi_user_id")
        );

        return email || userId || "";
    }

    function isLoggedInForSettings() {
        return Boolean(
            getLoggedInIdentity() &&
            (
                localStorage.getItem("mi_supabase_token") ||
                localStorage.getItem("mi_user_id")
            )
        );
    }

    function getSettingsStorageKey(identity) {
        const normalized = normalizeIdentity(identity);

        return normalized
            ? SETTINGS_PREFIX + encodeURIComponent(normalized)
            : GLOBAL_BACKUP_KEY;
    }

    function getSettingControlKey(control, index) {
        return (
            control.id ||
            control.name ||
            control.getAttribute("data-setting-key") ||
            ("setting_" + index)
        );
    }

    function readSettingsControls() {
        const controls = Array.from(
            document.querySelectorAll(SETTINGS_SELECTORS)
        );

        const result = {};

        controls.forEach(function (control, index) {
            if (
                !control ||
                control.type === "button" ||
                control.type === "submit" ||
                control.type === "reset" ||
                control.type === "password" ||
                control.type === "email"
            ) {
                return;
            }

            const key = getSettingControlKey(control, index);

            if (
                control.type === "checkbox" ||
                control.type === "radio"
            ) {
                result[key] = {
                    type: control.type,
                    checked: Boolean(control.checked)
                };
            } else {
                result[key] = {
                    type: control.type || control.tagName.toLowerCase(),
                    value: control.value
                };
            }
        });

        result.__documentTheme = {
            main:
                getComputedStyle(document.documentElement)
                    .getPropertyValue("--main")
                    .trim(),
            bodyClasses: Array.from(document.body.classList)
                .filter(function (name) {
                    return (
                        name === "light" ||
                        name === "dark" ||
                        name.startsWith("theme-")
                    );
                })
        };

        result.__savedAt = Date.now();

        return result;
    }

    function saveAccountSettings() {
        if (!isLoggedInForSettings()) {
            return;
        }

        const identity = getLoggedInIdentity();

        if (!identity) {
            return;
        }

        try {
            localStorage.setItem(
                getSettingsStorageKey(identity),
                JSON.stringify(readSettingsControls())
            );
        } catch (error) {
            console.error(
                "Unable to save account settings:",
                error
            );
        }
    }

    function dispatchControlEvents(control) {
        try {
            control.dispatchEvent(
                new Event("input", {
                    bubbles: true
                })
            );

            control.dispatchEvent(
                new Event("change", {
                    bubbles: true
                })
            );
        } catch (error) {
            console.warn(
                "Unable to dispatch setting event:",
                error
            );
        }
    }

    function restoreAccountSettings() {
        if (!isLoggedInForSettings()) {
            return false;
        }

        const identity = getLoggedInIdentity();

        if (!identity) {
            return false;
        }

        let saved;

        try {
            const raw = localStorage.getItem(
                getSettingsStorageKey(identity)
            );

            if (!raw) {
                return false;
            }

            saved = JSON.parse(raw);
        } catch (error) {
            console.error(
                "Unable to read account settings:",
                error
            );

            return false;
        }

        const controls = Array.from(
            document.querySelectorAll(SETTINGS_SELECTORS)
        );

        controls.forEach(function (control, index) {
            if (
                !control ||
                control.type === "button" ||
                control.type === "submit" ||
                control.type === "reset" ||
                control.type === "password" ||
                control.type === "email"
            ) {
                return;
            }

            const key = getSettingControlKey(control, index);
            const item = saved[key];

            if (!item) {
                return;
            }

            if (
                control.type === "checkbox" ||
                control.type === "radio"
            ) {
                control.checked = Boolean(item.checked);
            } else if (
                Object.prototype.hasOwnProperty.call(
                    item,
                    "value"
                )
            ) {
                control.value = item.value;
            }

            dispatchControlEvents(control);
        });

        if (
            saved.__documentTheme &&
            saved.__documentTheme.main
        ) {
            document.documentElement.style.setProperty(
                "--main",
                saved.__documentTheme.main
            );

            localStorage.setItem(
                "theme",
                saved.__documentTheme.main
            );
        }

        const languageSelect =
            document.getElementById("languageSelect");

        if (
            languageSelect &&
            typeof window.applyLanguage === "function"
        ) {
            Promise.resolve(
                window.applyLanguage(
                    languageSelect.value,
                    false
                )
            ).catch(function () {});
        }

        return true;
    }

    function resetVisibleSettingsForGuest() {
        const controls = Array.from(
            document.querySelectorAll(SETTINGS_SELECTORS)
        );

        controls.forEach(function (control) {
            if (
                !control ||
                control.type === "button" ||
                control.type === "submit" ||
                control.type === "reset" ||
                control.type === "password" ||
                control.type === "email"
            ) {
                return;
            }

            if (
                control.type === "checkbox" ||
                control.type === "radio"
            ) {
                control.checked =
                    Boolean(control.defaultChecked);
            } else if (
                control.tagName === "SELECT"
            ) {
                control.selectedIndex = 0;
            } else if (
                control.defaultValue !== undefined
            ) {
                control.value = control.defaultValue;
            }

            dispatchControlEvents(control);
        });

        document.documentElement.style.removeProperty(
            "--main"
        );

        localStorage.removeItem("theme");

        document.body.classList.remove(
            "light",
            "dark"
        );
    }

    function handleUserChange() {
        window.setTimeout(function () {
            if (isLoggedInForSettings()) {
                restoreAccountSettings();
            } else {
                resetVisibleSettingsForGuest();
            }
        }, 150);
    }

    document.addEventListener(
        "input",
        function (event) {
            if (
                event.target &&
                event.target.closest("#settingsPanel")
            ) {
                saveAccountSettings();
            }
        },
        true
    );

    document.addEventListener(
        "change",
        function (event) {
            if (
                event.target &&
                event.target.closest("#settingsPanel")
            ) {
                saveAccountSettings();
            }
        },
        true
    );

    document.addEventListener(
        "click",
        function (event) {
            const button = event.target.closest(
                "#settingsPanel button"
            );

            if (!button) {
                return;
            }

            window.setTimeout(
                saveAccountSettings,
                100
            );
        },
        true
    );

    window.addEventListener(
        "mi-chat-user-changed",
        handleUserChange
    );

    window.addEventListener(
        "pagehide",
        saveAccountSettings
    );

    window.addEventListener(
        "beforeunload",
        saveAccountSettings
    );

    window.addEventListener(
        "pageshow",
        function () {
            window.setTimeout(
                handleUserChange,
                100
            );
        }
    );

    document.addEventListener(
        "visibilitychange",
        function () {
            if (document.visibilityState === "hidden") {
                saveAccountSettings();
            } else {
                handleUserChange();
            }
        }
    );

    document.addEventListener(
        "DOMContentLoaded",
        function () {
            window.setTimeout(
                handleUserChange,
                250
            );
        },
        {
            once: true
        }
    );

    window.MIAccountSettings = {
        save: saveAccountSettings,
        restore: restoreAccountSettings,
        resetGuestView: resetVisibleSettingsForGuest,
        getKey: function () {
            return getSettingsStorageKey(
                getLoggedInIdentity()
            );
        }
    };
})();

/* MI AI ACCOUNT SETTINGS PERSISTENCE - END */
</script>








<script>
/* MI AI ACCOUNT AUTO SAVE V3 - START */

(function () {
    "use strict";

    const STATE_PREFIX =
        "mi_ai_account_state_v3_";

    const SESSION_KEYS = new Set([
        "mi_supabase_token",
        "mi_user_id",
        "mi_user_email",
        "mi_account"
    ]);

    let saveTimer = null;
    let restoreRunning = false;
    let logoutRunning = false;
    let lastAccountEmail = "";

    function normalizeEmail(value) {
        return String(value || "")
            .trim()
            .toLowerCase();
    }

    function firebaseUser() {
        try {
            return (
                window.miFirebaseAuth?.currentUser ||
                window.firebaseAuth?.currentUser ||
                (
                    window.firebase &&
                    typeof window.firebase.auth === "function"
                        ? window.firebase.auth().currentUser
                        : null
                ) ||
                null
            );
        }
        catch (error) {
            return null;
        }
    }

    function currentEmail() {
        const account = firebaseUser();

        return normalizeEmail(
            account?.email ||
            window.user?.email ||
            (
                typeof user !== "undefined"
                    ? user?.email
                    : ""
            ) ||
            localStorage.getItem("mi_user_email") ||
            ""
        );
    }

    function currentUserId() {
        const account = firebaseUser();

        return String(
            account?.uid ||
            window.user?.id ||
            (
                typeof user !== "undefined"
                    ? user?.id
                    : ""
            ) ||
            localStorage.getItem("mi_user_id") ||
            ""
        ).trim();
    }

    function loggedIn() {
        return Boolean(
            currentEmail() &&
            (
                firebaseUser() ||
                currentUserId() ||
                localStorage.getItem("mi_supabase_token")
            )
        );
    }

    function accountKey(email) {
        return (
            STATE_PREFIX +
            encodeURIComponent(
                normalizeEmail(email)
            )
        );
    }

    function safeClone(value, fallback) {
        try {
            return JSON.parse(
                JSON.stringify(value)
            );
        }
        catch (error) {
            return fallback;
        }
    }

    function safeParse(value, fallback) {
        try {
            const parsed = JSON.parse(value);

            return parsed === null
                ? fallback
                : parsed;
        }
        catch (error) {
            return fallback;
        }
    }

    function chatSnapshot() {
        try {
            if (
                typeof chats !== "undefined" &&
                chats &&
                typeof chats === "object"
            ) {
                return safeClone(chats, {});
            }

            if (
                window.chats &&
                typeof window.chats === "object"
            ) {
                return safeClone(window.chats, {});
            }
        }
        catch (error) {
            console.warn(
                "[MI AI Account Save] Chat collection failed.",
                error
            );
        }

        return {};
    }

    function currentChatId() {
        try {
            if (typeof currentChat !== "undefined") {
                return currentChat || null;
            }
        }
        catch (error) {
            // Ignore.
        }

        return (
            window.currentChat ||
            localStorage.getItem("last_chat") ||
            null
        );
    }

    function settingsControls() {
        const result = {};

        document
            .querySelectorAll(
                [
                    "#settingsPanel input",
                    "#settingsPanel select",
                    "#settingsPanel textarea",
                    "#settingsModal input",
                    "#settingsModal select",
                    "#settingsModal textarea",
                    ".settings-panel input",
                    ".settings-panel select",
                    ".settings-panel textarea"
                ].join(",")
            )
            .forEach(function (control, index) {
                const key =
                    control.id ||
                    control.name ||
                    (
                        control.getAttribute(
                            "data-setting"
                        )
                    ) ||
                    "setting_" + index;

                result[key] = {
                    value:
                        control.value,

                    checked:
                        Boolean(
                            control.checked
                        ),

                    type:
                        control.type ||
                        control.tagName
                            .toLowerCase()
                };
            });

        return result;
    }

    function settingsStorage() {
        const result = {};

        for (
            let index = 0;
            index < localStorage.length;
            index += 1
        ) {
            const key =
                localStorage.key(index);

            if (!key) {
                continue;
            }

            const lower =
                key.toLowerCase();

            if (
                SESSION_KEYS.has(key) ||
                key.startsWith(STATE_PREFIX)
            ) {
                continue;
            }

            if (
                lower.includes("theme") ||
                lower.includes("color") ||
                lower.includes("colour") ||
                lower.includes("font") ||
                lower.includes("language") ||
                lower.includes("locale") ||
                lower.includes("appearance") ||
                lower.includes("setting")
            ) {
                result[key] =
                    localStorage.getItem(key);
            }
        }

        return result;
    }

    function cssVariables() {
        const root =
            document.documentElement;

        const names = [
            "--main",
            "--bg",
            "--panel",
            "--ai",
            "--text",
            "--input",
            "--primary",
            "--accent",
            "--theme-color",
            "--mi-theme-color",
            "--mi-theme-rgb",
            "--font-size",
            "--mi-font-size"
        ];

        const result = {};

        names.forEach(function (name) {
            const inline =
                root.style.getPropertyValue(
                    name
                );

            const computed =
                getComputedStyle(root)
                    .getPropertyValue(name);

            const value =
                String(
                    inline ||
                    computed ||
                    ""
                ).trim();

            if (value) {
                result[name] = value;
            }
        });

        return result;
    }

    function buildState(email) {
        return {
            version: 3,
            email:
                normalizeEmail(email),

            userId:
                currentUserId(),

            savedAt:
                Date.now(),

            chats:
                chatSnapshot(),

            currentChat:
                currentChatId(),

            controls:
                settingsControls(),

            storage:
                settingsStorage(),

            css:
                cssVariables(),

            htmlClasses:
                Array.from(
                    document.documentElement
                        .classList
                ),

            bodyClasses:
                Array.from(
                    document.body?.classList ||
                    []
                ),

            htmlLang:
                document.documentElement.lang ||
                "",

            htmlDir:
                document.documentElement.dir ||
                ""
        };
    }

    function saveState(reason) {
        const email =
            currentEmail();

        if (
            !email ||
            !loggedIn() ||
            logoutRunning
        ) {
            return false;
        }

        try {
            localStorage.setItem(
                accountKey(email),
                JSON.stringify(
                    buildState(email)
                )
            );

            lastAccountEmail = email;

            console.log(
                "[MI AI Account Save] Saved:",
                reason || "update",
                email
            );

            return true;
        }
        catch (error) {
            console.error(
                "[MI AI Account Save] Save failed.",
                error
            );

            return false;
        }
    }

    function scheduleSave(reason, delay) {
        clearTimeout(saveTimer);

        saveTimer =
            setTimeout(
                function () {
                    saveState(reason);
                },
                typeof delay === "number"
                    ? delay
                    : 150
            );
    }

    function readState(email) {
        const normalized =
            normalizeEmail(email);

        if (!normalized) {
            return null;
        }

        const state =
            safeParse(
                localStorage.getItem(
                    accountKey(normalized)
                ),
                null
            );

        if (
            !state ||
            typeof state !== "object" ||
            state.version !== 3
        ) {
            return null;
        }

        return state;
    }

    function applySettings(state) {
        if (!state) {
            return;
        }

        Object.entries(
            state.storage || {}
        ).forEach(function (entry) {
            if (
                typeof entry[1] === "string"
            ) {
                localStorage.setItem(
                    entry[0],
                    entry[1]
                );
            }
        });

        Object.entries(
            state.css || {}
        ).forEach(function (entry) {
            document.documentElement
                .style
                .setProperty(
                    entry[0],
                    entry[1]
                );
        });

        if (state.htmlLang) {
            document.documentElement.lang =
                state.htmlLang;
        }

        if (state.htmlDir) {
            document.documentElement.dir =
                state.htmlDir;
        }

        const controls =
            state.controls || {};

        document
            .querySelectorAll(
                [
                    "#settingsPanel input",
                    "#settingsPanel select",
                    "#settingsPanel textarea",
                    "#settingsModal input",
                    "#settingsModal select",
                    "#settingsModal textarea",
                    ".settings-panel input",
                    ".settings-panel select",
                    ".settings-panel textarea"
                ].join(",")
            )
            .forEach(function (control, index) {
                const key =
                    control.id ||
                    control.name ||
                    control.getAttribute(
                        "data-setting"
                    ) ||
                    "setting_" + index;

                const saved =
                    controls[key];

                if (!saved) {
                    return;
                }

                if (
                    control.type === "checkbox" ||
                    control.type === "radio"
                ) {
                    control.checked =
                        Boolean(
                            saved.checked
                        );
                }

                if (
                    saved.value !== undefined
                ) {
                    control.value =
                        saved.value;
                }

                control.dispatchEvent(
                    new Event(
                        "input",
                        {
                            bubbles: true
                        }
                    )
                );

                control.dispatchEvent(
                    new Event(
                        "change",
                        {
                            bubbles: true
                        }
                    )
                );
            });

        const language =
            document.getElementById(
                "languageSelect"
            )?.value ||
            localStorage.getItem(
                "mi_ui_language"
            ) ||
            localStorage.getItem(
                "language"
            );

        if (
            language &&
            typeof window.applyLanguage ===
                "function"
        ) {
            Promise.resolve(
                window.applyLanguage(
                    language,
                    false
                )
            ).catch(function () {});
        }
        else if (
            language &&
            typeof applyLanguage ===
                "function"
        ) {
            Promise.resolve(
                applyLanguage(
                    language,
                    false
                )
            ).catch(function () {});
        }

        if (
            window.MIAnyLanguage &&
            typeof window
                .MIAnyLanguage
                .refresh === "function"
        ) {
            window.MIAnyLanguage.refresh();
        }

        if (
            window.MISettingsAccordion &&
            typeof window
                .MISettingsAccordion
                .refresh === "function"
        ) {
            window.MISettingsAccordion.refresh();
        }
    }

    function applyChats(state) {
        if (
            !state ||
            !state.chats ||
            typeof state.chats !== "object" ||
            Array.isArray(state.chats)
        ) {
            return false;
        }

        const ids =
            Object.keys(state.chats);

        if (!ids.length) {
            return false;
        }

        const restoredChats =
            safeClone(
                state.chats,
                {}
            );

        try {
            if (typeof chats !== "undefined") {
                chats = restoredChats;
            }
        }
        catch (error) {
            // Ignore inaccessible global.
        }

        window.chats =
            restoredChats;

        const selectedChat =
            state.currentChat &&
            restoredChats[state.currentChat]
                ? state.currentChat
                : ids[0];

        try {
            if (
                typeof currentChat !==
                "undefined"
            ) {
                currentChat =
                    selectedChat;
            }
        }
        catch (error) {
            // Ignore inaccessible global.
        }

        window.currentChat =
            selectedChat;

        localStorage.setItem(
            "last_chat",
            selectedChat
        );

        try {
            if (
                typeof getUserChatStorageKey ===
                    "function"
            ) {
                const storageKey =
                    getUserChatStorageKey();

                if (storageKey) {
                    localStorage.setItem(
                        storageKey,
                        JSON.stringify(
                            restoredChats
                        )
                    );
                }
            }
        }
        catch (error) {
            console.warn(
                "[MI AI Account Save] Chat key backup failed.",
                error
            );
        }

        if (
            typeof window.save ===
                "function"
        ) {
            try {
                window.save();
            }
            catch (error) {}
        }
        else if (
            typeof save ===
                "function"
        ) {
            try {
                save();
            }
            catch (error) {}
        }

        if (
            typeof window.renderList ===
                "function"
        ) {
            window.renderList();
        }
        else if (
            typeof renderList ===
                "function"
        ) {
            renderList();
        }

        if (
            typeof window.openChat ===
                "function"
        ) {
            window.openChat(
                selectedChat
            );
        }
        else if (
            typeof openChat ===
                "function"
        ) {
            openChat(
                selectedChat
            );
        }

        return true;
    }

    async function restoreState(email) {
        const normalized =
            normalizeEmail(email);

        if (
            !normalized ||
            restoreRunning
        ) {
            return false;
        }

        restoreRunning = true;

        try {
            const localState =
                readState(normalized);

            let localChatsRestored =
                false;

            if (localState) {
                applySettings(
                    localState
                );

                localChatsRestored =
                    applyChats(
                        localState
                    );
            }

            if (
                typeof window.loadUserChats ===
                    "function"
            ) {
                try {
                    await window.loadUserChats();
                }
                catch (error) {
                    console.warn(
                        "[MI AI Account Save] Server chat restore failed; local backup kept.",
                        error
                    );
                }
            }
            else if (
                typeof loadUserChats ===
                    "function"
            ) {
                try {
                    await loadUserChats();
                }
                catch (error) {
                    console.warn(
                        "[MI AI Account Save] Server chat restore failed; local backup kept.",
                        error
                    );
                }
            }

            let chatCount = 0;

            try {
                chatCount =
                    typeof chats !== "undefined" &&
                    chats &&
                    typeof chats === "object"
                        ? Object.keys(chats)
                            .length
                        : Object.keys(
                            window.chats || {}
                        ).length;
            }
            catch (error) {
                chatCount = 0;
            }

            if (
                chatCount === 0 &&
                localChatsRestored &&
                localState
            ) {
                applyChats(localState);
            }

            if (localState) {
                applySettings(localState);
            }

            lastAccountEmail =
                normalized;

            scheduleSave(
                "after-restore",
                500
            );

            console.log(
                "[MI AI Account Save] Restored:",
                normalized
            );

            return true;
        }
        finally {
            restoreRunning = false;
        }
    }

    function clearVisibleAccountData() {
        try {
            if (typeof chats !== "undefined") {
                chats = {};
            }
        }
        catch (error) {}

        window.chats = {};

        try {
            if (
                typeof currentChat !==
                "undefined"
            ) {
                currentChat = null;
            }
        }
        catch (error) {}

        window.currentChat = null;

        localStorage.removeItem(
            "last_chat"
        );

        if (
            typeof window.renderList ===
                "function"
        ) {
            window.renderList();
        }
        else if (
            typeof renderList ===
                "function"
        ) {
            renderList();
        }

        const chatArea =
            document.querySelector(
                [
                    "#chat",
                    "#messages",
                    "#chatMessages",
                    ".chat-messages"
                ].join(",")
            );

        if (chatArea) {
            chatArea.innerHTML = "";
        }
    }

    function installSaveWrappers() {
        const functions = [
            "save",
            "saveChat",
            "saveConversation",
            "addMessage",
            "sendMessage",
            "newChat",
            "deleteChat",
            "renameChat",
            "pinChat"
        ];

        functions.forEach(function (name) {
            const original =
                window[name];

            if (
                typeof original !== "function" ||
                original.__miAccountSaveWrapped
            ) {
                return;
            }

            const wrapped =
                function (...args) {
                    const result =
                        original.apply(
                            this,
                            args
                        );

                    Promise.resolve(result)
                        .finally(function () {
                            scheduleSave(
                                name,
                                200
                            );
                        });

                    return result;
                };

            wrapped.__miAccountSaveWrapped =
                true;

            window[name] = wrapped;

            try {
                eval(name + " = window[name]");
            }
            catch (error) {
                // Ignore read-only bindings.
            }
        });
    }

    function installLogoutWrapper() {
        const original =
            window.logout;

        if (
            typeof original !== "function" ||
            original.__miAccountLogoutWrapped
        ) {
            return;
        }

        const wrapped =
            async function (...args) {
                const email =
                    currentEmail();

                logoutRunning = true;

                try {
                    if (email) {
                        saveState(
                            "before-logout"
                        );
                    }

                    const result =
                        await original.apply(
                            this,
                            args
                        );

                    clearVisibleAccountData();

                    return result;
                }
                finally {
                    lastAccountEmail =
                        email ||
                        lastAccountEmail;

                    logoutRunning = false;
                }
            };

        wrapped.__miAccountLogoutWrapped =
            true;

        window.logout = wrapped;

        try {
            logout = wrapped;
        }
        catch (error) {
            // Ignore read-only binding.
        }
    }

    async function establishSession(account) {
        if (!account?.email) {
            return;
        }

        let token = "";

        try {
            token =
                await account.getIdToken();
        }
        catch (error) {
            console.warn(
                "[MI AI Account Save] Token refresh failed.",
                error
            );
        }

        const accountUser = {
            id: account.uid,
            email: account.email
        };

        window.user =
            accountUser;

        try {
            if (typeof user !== "undefined") {
                user = accountUser;
            }
        }
        catch (error) {}

        if (token) {
            localStorage.setItem(
                "mi_supabase_token",
                token
            );
        }

        localStorage.setItem(
            "mi_user_id",
            account.uid || ""
        );

        localStorage.setItem(
            "mi_user_email",
            account.email || ""
        );

        localStorage.setItem(
            "mi_account",
            account.uid || ""
        );

        await restoreState(
            account.email
        );

        window.dispatchEvent(
            new Event(
                "mi-chat-user-changed"
            )
        );
    }

    function attachFirebaseAuth() {
        let auth = null;

        try {
            auth =
                window.miFirebaseAuth ||
                window.firebaseAuth ||
                (
                    window.firebase &&
                    typeof window.firebase.auth ===
                        "function"
                        ? window.firebase.auth()
                        : null
                );
        }
        catch (error) {
            auth = null;
        }

        if (
            !auth ||
            auth.__miAccountSaveListener
        ) {
            return Boolean(auth);
        }

        auth.__miAccountSaveListener =
            true;

        auth.onAuthStateChanged(
            function (account) {
                if (account) {
                    establishSession(account)
                        .catch(function (error) {
                            console.error(
                                "[MI AI Account Save] Login restore failed.",
                                error
                            );
                        });
                }
                else {
                    clearVisibleAccountData();
                }
            }
        );

        return true;
    }

    function recoverSession() {
        const account =
            firebaseUser();

        if (account?.email) {
            establishSession(account)
                .catch(function (error) {
                    console.error(
                        "[MI AI Account Save] Session recovery failed.",
                        error
                    );
                });

            return;
        }

        const email =
            normalizeEmail(
                localStorage.getItem(
                    "mi_user_email"
                )
            );

        if (
            email &&
            localStorage.getItem(
                "mi_supabase_token"
            )
        ) {
            restoreState(email)
                .catch(function (error) {
                    console.error(
                        "[MI AI Account Save] Stored session restore failed.",
                        error
                    );
                });
        }
    }

    function attachGlobalListeners() {
        document.addEventListener(
            "input",
            function (event) {
                if (
                    loggedIn() &&
                    event.target.closest(
                        "#settingsPanel, #settingsModal, .settings-panel"
                    )
                ) {
                    scheduleSave(
                        "settings-input"
                    );
                }
            },
            true
        );

        document.addEventListener(
            "change",
            function (event) {
                if (
                    loggedIn() &&
                    event.target.closest(
                        "#settingsPanel, #settingsModal, .settings-panel"
                    )
                ) {
                    scheduleSave(
                        "settings-change"
                    );
                }
            },
            true
        );

        document.addEventListener(
            "click",
            function (event) {
                if (!loggedIn()) {
                    return;
                }

                const details =
                    [
                        event.target.id,
                        event.target.className,
                        event.target.textContent,
                        event.target.getAttribute?.(
                            "data-setting"
                        )
                    ]
                        .filter(Boolean)
                        .join(" ")
                        .toLowerCase();

                if (
                    details.includes("theme") ||
                    details.includes("colour") ||
                    details.includes("color") ||
                    details.includes("font") ||
                    details.includes("language")
                ) {
                    scheduleSave(
                        "settings-click",
                        250
                    );
                }
            },
            true
        );

        document.addEventListener(
            "mi-language-changed",
            function () {
                scheduleSave(
                    "language-change"
                );
            }
        );

        document.addEventListener(
            "mi-theme-changed",
            function () {
                scheduleSave(
                    "theme-change"
                );
            }
        );

        window.addEventListener(
            "pagehide",
            function () {
                saveState("pagehide");
            }
        );

        window.addEventListener(
            "beforeunload",
            function () {
                saveState(
                    "beforeunload"
                );
            }
        );

        document.addEventListener(
            "visibilitychange",
            function () {
                if (
                    document.visibilityState ===
                    "hidden"
                ) {
                    saveState(
                        "page-hidden"
                    );
                }
            }
        );

        window.addEventListener(
            "pageshow",
            recoverSession
        );

        window.addEventListener(
            "popstate",
            recoverSession
        );

        window.addEventListener(
            "mi-chat-user-changed",
            function () {
                if (loggedIn()) {
                    restoreState(
                        currentEmail()
                    );
                }
            }
        );
    }

    function start() {
        installSaveWrappers();
        installLogoutWrapper();
        attachGlobalListeners();
        recoverSession();

        if (!attachFirebaseAuth()) {
            let attempts = 0;

            const timer =
                setInterval(
                    function () {
                        attempts += 1;

                        if (
                            attachFirebaseAuth() ||
                            attempts >= 80
                        ) {
                            clearInterval(timer);
                        }
                    },
                    250
                );
        }

        const observer =
            new MutationObserver(
                function () {
                    installSaveWrappers();
                    installLogoutWrapper();
                }
            );

        observer.observe(
            document.body,
            {
                childList: true,
                subtree: true
            }
        );

        setInterval(
            function () {
                if (loggedIn()) {
                    saveState(
                        "automatic"
                    );
                }
            },
            5000
        );
    }

    window.MIAccountAutoSave = {
        save:
            function () {
                return saveState(
                    "manual"
                );
            },

        restore:
            function () {
                return restoreState(
                    currentEmail()
                );
            },

        getState:
            function () {
                return readState(
                    currentEmail()
                );
            },

        isLoggedIn:
            loggedIn
    };

    if (
        document.readyState ===
        "loading"
    ) {
        document.addEventListener(
            "DOMContentLoaded",
            start,
            {
                once: true
            }
        );
    }
    else {
        start();
    }
})();

/* MI AI ACCOUNT AUTO SAVE V3 - END */
</script>

<script>
/* MI AI SMART LOGIN FLOW V5 - START */

(function () {
    "use strict";

    let noticeTimer = null;
    let loginOpening = false;
    let loginRequested = false;

    const loginButtonSelectors = [
        "#loginBtn",
        "#openLoginBtn",
        "#headerLoginBtn",
        ".login-btn",
        ".open-login",

    ];

    const modalSelectors = [

        "#loginPanel",
        "#authPanel",
        ".login-modal",

        "[data-modal='login']",
        "[data-auth-modal]"
    ];

    const closeSelectors = [
        "#loginCloseBtn",
        "#authCloseBtn",
        ".login-close",
        ".auth-close",
        ".modal-close",
        ".close-btn",
        "[data-action='close-login']",

    ];

    const protectedWords = [

        "fontsize",
        "font-size",
        "appearance",
        "account",
        "profile",
        "history",

        "භාෂාව",

        "අකුරු ප්‍රමාණය",
