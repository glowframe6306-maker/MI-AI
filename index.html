<script>
window.FIREBASE_CONFIG = {
  apiKey: "AIzaSyAxrIAKDz0b9GdHp4K_-jBKZWIcWZTww5g",
  authDomain: "mi-ai-99e6a.firebaseapp.com",
  projectId: "mi-ai-99e6a",
  appId: "1:845086558623:web:8ff161f6a157cf87d395aa"
};

let firebaseAuth = null;
let authMode = 'signin';
let user = null;

function getFirebaseConfig() {
  if (window.FIREBASE_CONFIG && typeof window.FIREBASE_CONFIG === 'object') {
    return window.FIREBASE_CONFIG;
  }
  return FIREBASE_CONFIG;
}

async function initFirebase() {

    if (firebaseAuth) return firebaseAuth;

    const config = getFirebaseConfig();

    if (!config || !config.apiKey) {
        throw new Error("Firebase configuration is missing.");
    }

    if (!window.firebase || !window.firebase.apps) {
        throw new Error("Firebase SDK failed to load.");
    }

    if (!window.firebase.apps.length) {
        window.firebase.initializeApp(config);
    }

    firebaseAuth = window.firebase.auth();

    return firebaseAuth;
}

async function loadUserChats() {
  const token = localStorage.getItem('mi_supabase_token');
  const userId = localStorage.getItem('mi_user_id');
  if (!token || !userId) return;

  try {
    const res = await fetch('/conversations', {
      headers: { Authorization: 'Bearer ' + token },
    });
    const json = await res.json();
    if (!res.ok || !Array.isArray(json.conversations)) {
      return;
    }

    chats = {};
    for (const conversation of json.conversations) {
      chats[conversation.id] = [];
      try {
        const messagesRes = await fetch('/messages?conversation_id=' + encodeURIComponent(conversation.id), {
          headers: { Authorization: 'Bearer ' + token },
        });
        const messagesJson = await messagesRes.json();
        if (messagesRes.ok && Array.isArray(messagesJson.messages)) {
          chats[conversation.id] = messagesJson.messages.map((message) => ({
            role: message.role === 'me' ? 'me' : 'ai',
            text: message.content,
          }));
        }
      } catch (e) {
        // ignore individual fetch failures
      }
    }

    accountId = userId;
    localStorage.setItem('mi_account', accountId);
    currentChat = Object.keys(chats)[0] ?? null;
    save();
    renderList();
    if (currentChat) {
      openChat(currentChat);
    }
  } catch (e) {
    // fall back to local state if server sync fails
  }
}

let chatBox = document.getElementById("chat");
let chatList = document.getElementById("chatList");
let input = document.getElementById("msg");
let menu = document.getElementById("menu");
let authReminder = document.getElementById("authReminder");

let guestId = localStorage.getItem("mi_guest_id");
if (!guestId) {
    guestId = "guest_" + crypto.randomUUID();
    localStorage.setItem("mi_guest_id", guestId);
}

let accountId = localStorage.getItem("mi_account");

if (!accountId) {
    accountId = guestId;
    localStorage.setItem("mi_account", accountId);
}

let chats = {};
let currentChat = null;
let selectedChat = null;

function isAuthenticated() {
    return Boolean(user && localStorage.getItem('mi_supabase_token'));
}

function getGuestStorageKey() {
    return "mi_chats_" + guestId;
}

function getSessionId() {
    return isAuthenticated() ? user.id : guestId;
}

function loadGuestChats() {
    let saved = localStorage.getItem(getGuestStorageKey());
    if (saved) {
        try {
            chats = JSON.parse(saved) || {};
        } catch {
            chats = {};
        }
    } else {
        chats = {};
    }

    if (typeof chats !== 'object' || chats === null) {
        chats = {};
    }

    const lastChat = localStorage.getItem('last_chat');
    const ids = Object.keys(chats);
    if (ids.length === 0) {
        return;
    }

    let retainedChat = lastChat && chats[lastChat] ? lastChat : ids[ids.length - 1];
    chats = { [retainedChat]: chats[retainedChat] || [] };
    currentChat = retainedChat;
}

function logout() {
    localStorage.removeItem('mi_supabase_token');
    localStorage.removeItem('mi_user_id');
    localStorage.removeItem('mi_user_email');
    user = null;
    accountId = guestId;
    localStorage.setItem('mi_account', accountId);

    chats = {};
    currentChat = null;
    selectedChat = null;

    loadGuestChats();
    if (!currentChat) {
        const id = 'chat_' + Date.now();
        chats[id] = [];
        currentChat = id;
    }

    save();
    renderList();
    openChat(currentChat);
    updateAuthControls();
}

function updateAuthControls(){
    const loginBtn = document.getElementById('loginBtn');
    const logoutBtn = document.getElementById('logoutBtn');
    const hasSession = Boolean(user || localStorage.getItem('mi_supabase_token'));

    if (loginBtn) {
        loginBtn.style.display = hasSession ? 'none' : 'block';
    }

    if (logoutBtn) {
        logoutBtn.style.display = hasSession ? 'block' : 'none';
    }

    updateAuthReminder();
}

function updateAuthReminder(){
    if (authReminder) {
        authReminder.style.display = 'none';
        authReminder.innerHTML = '';
    }
}

window.addEventListener("load", initChat);

async function initChat(){

chatBox = document.getElementById("chat");
chatList = document.getElementById("chatList");
input = document.getElementById("msg");
menu = document.getElementById("menu");
authReminder = document.getElementById("authReminder");

let token = localStorage.getItem('mi_supabase_token');
let userId = localStorage.getItem('mi_user_id');
let storedEmail = localStorage.getItem('mi_user_email');

if (token && userId) {
    user = { id: userId, email: storedEmail || null };
    // authenticated — load conversations from server
    try {
        const res = await fetch('/conversations', { headers: { 'Authorization': 'Bearer ' + token } });
        const json = await res.json();
        if (res.ok && Array.isArray(json.conversations)) {
            chats = {};
            for (const c of json.conversations) {
                chats[c.id] = [];
                // fetch messages for each conversation (lightweight)
                try {
                    const mres = await fetch('/messages?conversation_id=' + encodeURIComponent(c.id), { headers: { 'Authorization': 'Bearer ' + token } });
                    const mjson = await mres.json();
                    if (mres.ok && Array.isArray(mjson.messages)) {
                        chats[c.id] = mjson.messages.map(m => ({ role: m.role === 'me' ? 'me' : 'ai', text: m.content }));
                    }
                } catch (e) {
                    // ignore per-conversation failures
                }
            }

            accountId = userId;
            localStorage.setItem('mi_account', accountId);
            currentChat = Object.keys(chats)[0] ?? null;
        }
        if (!currentChat) {
            const newConversation = await createServerConversation();
            if (newConversation) {
                const id = newConversation.id;
                chats[id] = [];
                currentChat = id;
            } else {
                const id = "chat_" + Date.now();
                chats[id] = [];
                currentChat = id;
            }
        }
    } catch (e) {
        // fallback to local storage
    }
}

// Guest users only
if (!user) {
    loadGuestChats();
}

let theme=localStorage.getItem("theme");

if(theme){
document.documentElement.style.setProperty("--main",theme);
}


// AUTO NEW CHAT OPEN

if(Object.keys(chats).length===0){
    let id="chat_"+Date.now();
    chats[id]=[];
    currentChat=id;
} else {
    currentChat = currentChat || Object.keys(chats)[0];
}

save();
renderList();
openChat(currentChat);
updateAuthControls();

if (input) {
    input.focus();
    input.addEventListener("keydown", e => {
        if (e.key === "Enter") {
            if (e.shiftKey) return;
            e.preventDefault();
            send();
        }
    });
} else {
    console.warn('Chat input element not found');
}

};

/* NEW CHAT */
async function newChat(){
    let token = localStorage.getItem('mi_supabase_token');
    if (token) {
        // create conversation on server
        try {
            const res = await fetch('/conversations', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }, body: JSON.stringify({ title: 'New chat', session_id: accountId }) });
            const json = await res.json();
            if (res.ok && json.conversation && json.conversation.id) {
                const id = json.conversation.id;
                chats[id] = [];
                currentChat = id;
                save();
                renderList();
                openChat(id);
                return;
            }
        } catch (e) {
            // fallback to local new chat for guest behavior only
        }
    }

    // Guest mode: only one temporary guest chat may exist at a time.
    if (!isAuthenticated()) {
        const existingGuestChatIds = Object.keys(chats);
        if (existingGuestChatIds.length > 0) {
            for (const chatId of existingGuestChatIds) {
                delete chats[chatId];
            }
        }
    }

    let id="chat_"+Date.now();
    chats[id]=[];
    currentChat=id;
    save();
    renderList();
    openChat(id);
}

/* OPEN */
function openChat(id){
currentChat=id;
if (!chatBox) {
    console.error('Chat container not found');
    return;
}
chatBox.innerHTML="";
(chats[id] || []).forEach(m => {
    let d = document.createElement("div");
    d.className = m.role;
    d.innerText = m.text;
    chatBox.appendChild(d);
});
localStorage.setItem("last_chat",id);
}

/* RENDER LIST */
function renderList(){
chatList.innerHTML="";

let ids = Object.keys(chats);

if(ids.length > 9){
    chatList.classList.add('scrollable');
    chatList.style.maxHeight='calc(100vh - 260px)';
} else {
    chatList.classList.remove('scrollable');
    chatList.style.maxHeight='none';
}


ids.sort((a,b)=>{

if(chats[a].pin && !chats[b].pin) return -1;

if(!chats[a].pin && chats[b].pin) return 1;

return 0;

});

ids.forEach(id=>{
let div=document.createElement("div");
div.className="chatItem";
div.dataset.id=id;
div.innerText=(chats[id].pin ? "📌 " : "")+"💬 "+id;

div.onclick=()=>openChat(id);

/* RIGHT CLICK */
div.oncontextmenu=(e)=>{

e.preventDefault();

selectedChat=id;


document.getElementById("pinOption").innerHTML =
chats[id].pin ? "📍 Unpin" : "📌 Pin";


menu.style.display="block";
menu.style.left=e.pageX+"px";
menu.style.top=e.pageY+"px";

};

chatList.appendChild(div);
});
}

function closeAllOverlays(target) {

  const loginBox = document.getElementById("loginBox");
  const supportOverlay = document.getElementById("supportOverlay");

  if (menu.style.display === "block" && !menu.contains(target)) {
    menu.style.display = "none";
  }

  if (settingsPanel && settingsPanel.style.display === "block" &&
      !settingsPanel.contains(target) && target.id !== "settingsBtn") {
    settingsPanel.style.display = "none";
  }

  if (loginBox && loginBox.style.display === "block" &&
      !loginBox.contains(target) && target.id !== "loginBtn") {
    loginBox.style.display = "none";
  }

  if (supportOverlay && !supportOverlay.contains(target) && target.id !== "supportBtn") {
    supportOverlay.remove();
  }
}

/* SEND */
async function send(){

let msg=input.value.trim();
if(!msg) return;

if(!currentChat){
    const fallbackId="chat_"+Date.now();
    chats[fallbackId]=[];
    currentChat=fallbackId;
    save();
    renderList();
}

input.value="";

add("me",msg);

/* THINKING */
let t=document.createElement("div");
t.className="thinking";
t.innerHTML=`
<span class="label">MI AI</span>
<span class="dot"></span>
<span class="dot"></span>
<span class="dot"></span>
`;

chatBox.appendChild(t);
scroll();

try{
    const API_URL="https://mi-ai-assistant-of-mi.vercel.app/api/chat";
    let res = await fetch(API_URL, {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            message: msg,
            conversation_id: currentChat,
            session_id: accountId,
            user_id: accountId,
            user_email: user ? user.email : null,
        }),
    });

    if (!res.ok) {
        throw new Error("Server returned " + res.status);
    }

    const text = await res.text();

    let data;

    try {
        data = JSON.parse(text);
    } catch {

    }

    t.remove();
    type(data.reply || "No response received.");
} catch (e) {

    console.error(e);

    t.remove();

    add("ai",
        "❌ Error : " + (e.message || "Unable to reach the assistant")
    );

}
}

/* TYPE */
function type(text){
let d=document.createElement("div");
d.className="ai";

let i=0;

d.innerText+=text[i];
i++;
scroll();

clearInterval(timer);
chats[currentChat].push({role:"ai",text});
save();
}
},20);
}

}

async function createServerConversation() {
    const token = localStorage.getItem('mi_supabase_token');
    if (!token) return null;
    try {
        const res = await fetch('/conversations', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'Authorization': 'Bearer ' + token,
            },
            body: JSON.stringify({ title: 'New chat', session_id: accountId }),
        });
        const json = await res.json();
        return res.ok && json.conversation ? json.conversation : null;
    } catch {
        return null;
    }
}

function toggleMobileMenu() {
  const sidebar = document.getElementById('sidebar');
  const backdrop = document.getElementById('mobileMenuBackdrop');
  const toggle = document.getElementById('mobileMenuToggle');
  if (!sidebar || !backdrop) return;

  const shouldOpen = !sidebar.classList.contains('mobile-open');
  sidebar.classList.toggle('mobile-open', shouldOpen);
  backdrop.classList.toggle('mobile-open', shouldOpen);
  document.body.style.overflow = shouldOpen ? 'hidden' : '';
  if (toggle) toggle.setAttribute('aria-expanded', shouldOpen ? 'true' : 'false');
}

function closeMobileMenu() {
  const sidebar = document.getElementById('sidebar');
  const backdrop = document.getElementById('mobileMenuBackdrop');
  const toggle = document.getElementById('mobileMenuToggle');
  if (!sidebar || !backdrop) return;
  sidebar.classList.remove('mobile-open');
  backdrop.classList.remove('mobile-open');
  document.body.style.overflow = '';
  if (toggle) toggle.setAttribute('aria-expanded', 'false');
}

function shouldForceMobileLayout() {
  const ua = navigator.userAgent || '';
  const platform = navigator.platform || '';
  const maxTouchPoints = navigator.maxTouchPoints || 0;
  const isTouchDevice = 'ontouchstart' in window || maxTouchPoints > 0 || window.matchMedia('(pointer: coarse)').matches;
  const isMobilePhoneUA = /(android|iphone|ipod|windows phone|mobile|opera mini|blackberry)/i.test(ua);
  const isMobilePlatform = /(android|iphone|ipod)/i.test(platform);
  const isSmallViewport = window.innerWidth <= 900 || window.screen.width <= 900 || window.innerHeight <= 900;
  const isTabletLike = /(ipad|tablet)/i.test(ua) && maxTouchPoints > 1;

  if (isMobilePhoneUA || isMobilePlatform) {
    return true;
  }

  return Boolean(isTouchDevice && isSmallViewport && !isTabletLike);
}

function applyForcedLayout() {
  const shouldUseMobile = shouldForceMobileLayout();
  document.body.classList.toggle('force-mobile-layout', shouldUseMobile);
  document.documentElement.classList.toggle('force-mobile-layout', shouldUseMobile);
  if (!shouldUseMobile) {
    closeMobileMenu();
  }
}

function setAuthMessage(text, isError = true) {
  const message = document.getElementById('authMessage');
  if (!message) return;
  message.textContent = text;
  message.style.color = isError ? '#fda4af' : '#86efac';
}

function validateRegisterForm() {
  const fullName = document.getElementById('fullName')?.value.trim() || '';
  const ageValue = document.getElementById('age')?.value.trim() || '';
  const email = document.getElementById('registerEmail')?.value.trim() || '';
  const password = document.getElementById('registerPassword')?.value || '';
  const confirmPassword = document.getElementById('confirmPassword')?.value || '';

  if (!fullName) return 'Full Name cannot be empty.';
  if (!ageValue) return 'Age is required.';
  const age = Number(ageValue);
  if (!Number.isInteger(age) || age < 1) return 'Age must be a valid number.';
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return 'Please enter a valid email address.';
  if (!password) return 'Password cannot be empty.';
  if (!confirmPassword) return 'Confirm Password cannot be empty.';
  if (password !== confirmPassword) return 'Passwords do not match.';
  return '';
}

    setAuthMessage(validation, true);

email,
password
);

localStorage.setItem("mi_supabase_token", idToken);

}
