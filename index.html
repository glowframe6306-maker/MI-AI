<script id="MI_AI_DYNAMIC_ISLAND_AUTO_HIDE_V1">
(function () {
    "use strict";

    if (window.__MI_DYNAMIC_ISLAND_AUTO_HIDE_V1__) {
        return;
    }

    window.__MI_DYNAMIC_ISLAND_AUTO_HIDE_V1__ = true;

    let lastActiveTime = 0;
    let lastMessageCount = 0;

    function island() {
        return document.getElementById("miDynamicIsland");
    }

    function hideIslandSafely() {
        const element = island();

        if (!element) {
            return;
        }

        element.classList.remove(
            "mi-island-visible",
            "mi-island-thinking",
            "mi-island-compact"
        );

        element.setAttribute("aria-hidden", "true");
    }

    function showStateExists() {
        const element = island();

        if (!element) {
            return false;
        }

        return element.classList.contains(
            "mi-island-visible"
        );
    }

    function replyFlagActive() {
        try {
            if (
                typeof replyInProgress !== "undefined" &&
                Boolean(replyInProgress)
            ) {
                return true;
            }
        } catch (error) {
            // Ignore inaccessible global.
        }

        return Boolean(window.replyInProgress);
    }

    function stopButtonActive() {
        const button = document.getElementById("sendBtn");

        if (!button) {
            return false;
        }

        if (button.dataset.miStopButton === "true") {
            return true;
        }

        const title = String(
            button.title || ""
        ).toLowerCase();

        const aria = String(
            button.getAttribute("aria-label") || ""
        ).toLowerCase();

        return (
            title.includes("stop") ||
            aria.includes("stop")
        );
    }

    function currentMessageCount() {
        return document.querySelectorAll(
            [
                ".message",
                ".message-row",
                ".user-message",
                ".assistant-message",
                ".ai-message",
                ".messageBubble",
                ".message-bubble"
            ].join(",")
        ).length;
    }

    function isActuallyReplying() {
        return replyFlagActive() && stopButtonActive();
    }

    function monitorIsland() {
        const element = island();

        if (!element) {
            return;
        }

        const replying = isActuallyReplying();
        const count = currentMessageCount();

        if (replying) {
            lastActiveTime = Date.now();
            lastMessageCount = count;
            element.setAttribute("aria-hidden", "false");
            return;
        }

        /*
          If an answer appeared but replyInProgress remained stuck,
          hide the island immediately.
        */
        if (
            showStateExists() &&
            count > lastMessageCount &&
            !stopButtonActive()
        ) {
            hideIslandSafely();
            lastMessageCount = count;
            return;
        }

        /*
          Safety timeout: Thinking must never stay forever.
        */
        if (
            element.classList.contains("mi-island-thinking") &&
            Date.now() - lastActiveTime > 2500 &&
            !stopButtonActive()
        ) {
            hideIslandSafely();
            return;
        }

        /*
          Idle state must always be hidden.
        */
        if (
            element.classList.contains("mi-island-thinking") &&
            !replying
        ) {
            hideIslandSafely();
        }
    }

    document.addEventListener(
        "DOMContentLoaded",
        function () {
            hideIslandSafely();
            lastMessageCount = currentMessageCount();
        },
        { once: true }
    );

    window.addEventListener(
        "load",
        function () {
            hideIslandSafely();
            lastMessageCount = currentMessageCount();
        },
        { once: true }
    );

    document.addEventListener(
        "click",
        function (event) {
            const sendButton = event.target.closest(
                "#sendBtn, #sendButton"
            );

            if (!sendButton) {
                return;
            }

            setTimeout(monitorIsland, 100);
        },
        true
    );

    setInterval(monitorIsland, 300);

    window.miHideDynamicIsland =
        hideIslandSafely;
})();
</script>

<script id="miExactOwnerSidebarScript">
(function () {
    "use strict";

    const CHIEF_OWNER_EMAIL =
        "teamofchatbot.miai@gmail.com";

    const OWNER_BUTTON_ID =
        "miChiefOwnerSidebarButton";

    let ownerVisible = false;
    let synchronizationTimer = null;

    function normalizedEmail(value) {
        return String(value || "")
            .trim()
            .toLowerCase();
    }

    function getFirebaseUser() {
        try {
            if (
                window.firebase &&
                typeof window.firebase.auth === "function"
            ) {
                return window.firebase.auth().currentUser;
            }
        }
        catch (error) {
        }

        try {
            if (
                window.miFirebaseAuth &&
                window.miFirebaseAuth.currentUser
            ) {
                return window.miFirebaseAuth.currentUser;
            }
        }
        catch (error) {
        }

        return null;
    }

    function emailFromStoredSession() {
        const keys = [
            "mi_user_email",
            "mi_current_user_email",
            "mi-auth-email",
            "userEmail",
            "email"
        ];

        for (const key of keys) {
            try {
                const value = localStorage.getItem(key);

                if (
                    normalizedEmail(value) ===
                    CHIEF_OWNER_EMAIL
                ) {
                    return CHIEF_OWNER_EMAIL;
                }
            }
            catch (error) {
            }
        }

        return "";
    }

    async function verifyOwner() {
        const firebaseUser = getFirebaseUser();
        const firebaseEmail = normalizedEmail(
            firebaseUser && firebaseUser.email
        );

        if (firebaseEmail === CHIEF_OWNER_EMAIL) {
            ownerVisible = true;
            return true;
        }

        /*
          Try the real backend authorization endpoint when a Firebase
          ID token is available. The backend remains authoritative for
          every actual management action.
        */
        if (
            firebaseUser &&
            typeof firebaseUser.getIdToken === "function"
        ) {
            try {
                const token =
                    await firebaseUser.getIdToken(false);

                const response = await fetch(
                    "/api/admin/me",
                    {
                        method: "GET",
                        headers: {
                            "Authorization":
                                "Bearer " + token,
                            "Accept":
                                "application/json"
                        },
                        cache: "no-store"
                    }
                );

                if (response.ok) {
                    const data = await response.json();

                    ownerVisible = Boolean(
                        data &&
                        (
                            data.isChiefOwner === true ||
                            data.is_chief_owner === true ||
                            normalizedEmail(data.email) ===
                                CHIEF_OWNER_EMAIL ||
                            normalizedEmail(
                                data.user && data.user.email
                            ) === CHIEF_OWNER_EMAIL
                        )
                    );

                    return ownerVisible;
                }
            }
            catch (error) {
                console.warn(
                    "[MI AI] Owner endpoint check failed:",
                    error
                );
            }
        }

        ownerVisible =
            emailFromStoredSession() ===
            CHIEF_OWNER_EMAIL;

        return ownerVisible;
    }

    function removeHeaderChatButton() {
        const directMessageButton =
            document.getElementById(
                "miAccountChatButton"
            );

        if (directMessageButton) {
            directMessageButton.remove();
        }

        const header =
            document.getElementById("header");

        if (!header) {
            return;
        }

        header.querySelectorAll(
            "button, a, [role='button']"
        ).forEach(function (element) {
            const text = String(
                element.innerText ||
                element.textContent ||
                element.getAttribute("aria-label") ||
                ""
            )
            .replace(/\s+/g, " ")
            .trim()
            .toLowerCase();

            if (text === "chat") {
                element.remove();
            }
        });
    }

    function openChiefOwnerPanel() {
        const originalButton =
            document.getElementById(
                "miChiefOwnerEntry"
            );

        if (
            originalButton &&
            originalButton !==
                document.getElementById(
                    OWNER_BUTTON_ID
                )
        ) {
            originalButton.click();
            return;
        }

        const overlay =
            document.getElementById(
                "miRbacOverlay"
            ) ||
            document.getElementById(
                "miFinalOwnerOverlay"
            ) ||
            document.getElementById(
                "chiefOwnerOverlay"
            );

        if (overlay) {
            overlay.hidden = false;
            overlay.style.display = "block";
            overlay.setAttribute(
                "aria-hidden",
                "false"
            );
            document.body.style.overflow =
                "hidden";
            return;
        }

        if (
            typeof window
                .miOpenChiefOwnerPermissions ===
                "function"
        ) {
            window
                .miOpenChiefOwnerPermissions();
            return;
        }

        alert(
            "Chief Owner Permissions panel is unavailable. " +
            "Please refresh the page and sign in again."
        );
    }

    function updateButton() {
        removeHeaderChatButton();

        const button =
            document.getElementById(
                OWNER_BUTTON_ID
            );

        const settings =
            document.getElementById(
                "settingsBtn"
            );

        if (!button || !settings) {
            return;
        }

        if (
            settings.nextElementSibling !==
            button
        ) {
            settings.insertAdjacentElement(
                "afterend",
                button
            );
        }

        button.style.setProperty(
            "display",
            ownerVisible ? "flex" : "none",
            "important"
        );

        button.style.setProperty(
            "visibility",
            ownerVisible ? "visible" : "hidden",
            "important"
        );

        button.style.setProperty(
            "opacity",
            ownerVisible ? "1" : "0",
            "important"
        );

        button.hidden = !ownerVisible;
    }

    async function synchronize() {
        await verifyOwner();
        updateButton();
    }

    function scheduleSynchronization() {
        window.clearTimeout(
            synchronizationTimer
        );

        synchronizationTimer =
            window.setTimeout(
                function () {
                    synchronize().catch(
                        function (error) {
                            console.error(
                                "[MI AI] Owner button error:",
                                error
                            );

                            updateButton();
                        }
                    );
                },
                100
            );
    }

    function start() {
        const button =
            document.getElementById(
                OWNER_BUTTON_ID
            );

        if (button) {
            button.addEventListener(
                "click",
                openChiefOwnerPanel
            );
        }

        removeHeaderChatButton();
        scheduleSynchronization();

        const observer =
            new MutationObserver(
                function () {
                    removeHeaderChatButton();
                    updateButton();
                }
            );

        observer.observe(
            document.documentElement,
            {
                childList: true,
                subtree: true
            }
        );

        window.setInterval(
            function () {
                removeHeaderChatButton();
                updateButton();
            },
            1000
        );

        window.setTimeout(
            scheduleSynchronization,
            500
        );

        window.setTimeout(
            scheduleSynchronization,
            1500
        );

        window.setTimeout(
            scheduleSynchronization,
            3000
        );
    }

    if (
        document.readyState ===
        "loading"
    ) {
        document.addEventListener(
            "DOMContentLoaded",
            start,
            { once: true }
        );
    }
    else {
        start();
    }

    window.addEventListener(
        "load",
        scheduleSynchronization
    );

    window.addEventListener(
        "focus",
        scheduleSynchronization
    );

    document.addEventListener(
        "visibilitychange",
        function () {
            if (!document.hidden) {
                scheduleSynchronization();
            }
        }
    );

    try {
        if (
            window.firebase &&
            typeof window.firebase.auth ===
                "function"
        ) {
            window.firebase
                .auth()
                .onAuthStateChanged(
                    scheduleSynchronization
                );
        }
    }
    catch (error) {
    }

    window.miRefreshChiefOwnerSidebar =
        scheduleSynchronization;
})();
</script>

<!-- MI_AI_EXACT_OWNER_SIDEBAR_FIX_END -->
</body>
</html>
