                share: "பகிர்",
                deleteText: "நீக்கு"
            }
        };

        return (
            values[language()]?.[key]
            || values.en[key]
            || key
        );
    }

    function isPinned(target) {
        return Boolean(
            target?.classList.contains("pinned")
            || target?.dataset.pinned === "true"
            || target?.getAttribute("aria-pinned") === "true"
            || target?.querySelector(
                ".pin-icon, .pinned-icon, [data-pinned='true']"
            )
        );
    }

    function makeButton(
        action,
        icon,
        text,
        danger
    ) {
        const button =
            document.createElement("button");

        button.type = "button";
        button.dataset.action = action;

        if (danger) {
            button.classList.add(
                "mi-menu-danger"
            );
        }

        const iconSpan =
            document.createElement("span");

        iconSpan.setAttribute(
            "aria-hidden",
            "true"
        );

        iconSpan.textContent = icon;

        const textSpan =
            document.createElement("span");

        textSpan.textContent = text;

        button.append(
            iconSpan,
            textSpan
        );

        return button;
    }

    function forceFourChatOptions() {
        const original =
            window.MIChatMoreMenu;

        if (!original) {
            return false;
        }

        const menu =
            document.getElementById(
                "miChatMoreMenu"
            );

        if (!menu) {
            return false;
        }

        const observer =
            new MutationObserver(
                function () {
                    const visible =
                        menu.classList.contains(
                            "mi-visible"
                        );

                    if (!visible) {
                        return;
                    }

                    /*
                      A message menu has only Copy.
                      Leave it unchanged.
                    */
                    const hasCopy =
                        Boolean(
                            menu.querySelector(
                                '[data-action="copy"]'
                            )
                        );

                    if (hasCopy) {
                        return;
                    }

                    const target =
                        document.querySelector(
                            ".mi-long-press-active"
                        );

                    const pinned =
                        isPinned(target);

                    menu.replaceChildren(
                        makeButton(
                            "rename",
                            "✎",
                            label("rename"),
                            false
                        ),

                        makeButton(
                            "pin",
                            pinned ? "⌫" : "⌖",
                            pinned
                                ? label("unpin")
                                : label("pin"),
                            false
                        ),

                        makeButton(
                            "share",
                            "↗",
                            label("share"),
                            false
                        ),

                        makeButton(
                            "delete",
                            "🗑",
                            label("deleteText"),
                            true
                        )
                    );
                }
            );

        observer.observe(
            menu,
            {
                childList: true,
                subtree: false,
                attributes: true,
                attributeFilter: [
                    "class"
                ]
            }
        );

        return true;
    }

    function start() {
        if (forceFourChatOptions()) {
            return;
        }

        let attempts = 0;

        const timer = setInterval(
            function () {
                attempts += 1;

                if (
                    forceFourChatOptions()
                    || attempts >= 40
                ) {
                    clearInterval(timer);
                }
            },
            250
        );
    }

    if (
        document.readyState ===
        "loading"
    ) {
        document.addEventListener(
            "DOMContentLoaded",
            start,
            {
                once: true
            }
        );
    }
    else {
        start();
    }
})();

/* MI AI FOUR CHAT OPTIONS FIX - END */
</script>

<script>
/* MI AI STRICT VIEW ONLY JS - START */

(function () {
    "use strict";

    let viewOnlyActive = false;
    let originalFetch = null;
    let originalXhrOpen = null;
    let originalXhrSend = null;

    const blockedFunctionNames = [
        "newChat",
        "createNewChat",
        "renameChat",
        "renameConversation",
        "editChatName",
        "pinChat",
        "togglePinChat",
        "toggleChatPin",
        "deleteChat",
        "deleteConversation",
        "removeChat",
        "shareChat",
        "shareConversation",
        "send",
        "sendMessage",
        "sendOrStop",
        "submitMessage",
        "uploadFile",
        "handleFileUpload",
        "applyTheme",
        "setFont",
        "toggleSettings",
        "openSettings",
        "customerSupport",
        "openProfilePanel",
        "saveChat",
        "saveConversation"
    ];

    const mutationMethods = new Set([
        "POST",
        "PUT",
        "PATCH",
        "DELETE"
    ]);

    function language() {
        return (
            window.MIAI18N?.getLanguage?.()
            || localStorage.getItem(
                "mi_ui_language"
            )
            || "en"
        );
    }

    function translations() {
        const values = {
            en: {
                banner:
                    "View only — this shared chat cannot be changed.",

                blocked:
                    "This is a view-only shared chat."
            },

            si: {
                banner:
                    "බැලීමට පමණයි — මෙම බෙදාගත් කතාබහ වෙනස් කළ නොහැක.",

                blocked:
                    "මෙය බැලීමට පමණක් ලබාදුන් කතාබහකි."
            },

            ta: {
                banner:
                    "பார்வைக்கு மட்டும் — இந்த பகிரப்பட்ட அரட்டையை மாற்ற முடியாது.",

                blocked:
                    "இது பார்வைக்கு மட்டும் பகிரப்பட்ட அரட்டை."
            }
        };

        return values[language()] || values.en;
    }

    function showBlockedMessage() {
        const message =
            translations().blocked;

        if (
            typeof window.showToast ===
            "function"
        ) {
            window.showToast(message);
            return;
        }

        console.warn(
            "[MI AI View Only]",
            message
        );
    }

    function parseBooleanValue(value) {
        const normalized =
            String(value || "")
                .trim()
                .toLowerCase();

        return [
            "view",
            "readonly",
            "read-only",
            "read_only",
            "viewer",
            "true",
            "1"
        ].includes(normalized);
    }

    function queryIndicatesViewOnly() {
        const params =
            new URLSearchParams(
                window.location.search
            );

        const possibleValues = [
            params.get("permission"),
            params.get("mode"),
            params.get("access"),
            params.get("readonly"),
            params.get("viewOnly"),
            params.get("view_only")
        ];

        return possibleValues.some(
            parseBooleanValue
        );
    }

    function hashIndicatesViewOnly() {
        const hash =
            String(
                window.location.hash || ""
            ).toLowerCase();

        return (
            hash.includes("permission=view")
            || hash.includes("mode=view")
            || hash.includes("readonly=true")
            || hash.includes("viewonly=true")
            || hash.includes("view_only=true")
        );
    }

    function objectIndicatesViewOnly(value) {
        if (
            !value ||
            typeof value !== "object"
        ) {
            return false;
        }

        const candidates = [
            value.permission,
            value.mode,
            value.access,
            value.role,
            value.readonly,
            value.readOnly,
            value.viewOnly,
            value.view_only
        ];

        return candidates.some(
            parseBooleanValue
        );
    }

    function detectViewOnly() {
        return Boolean(
            queryIndicatesViewOnly()
            || hashIndicatesViewOnly()
            || objectIndicatesViewOnly(
                window.sharedChatData
            )
            || objectIndicatesViewOnly(
                window.sharedConversation
            )
            || objectIndicatesViewOnly(
                window.shareData
            )
            || objectIndicatesViewOnly(
                window.currentSharedChat
            )
            || document.body?.dataset
                ?.permission === "view"
            || document.body?.dataset
                ?.mode === "view"
            || document.documentElement
                ?.dataset?.permission === "view"
        );
    }

    function createBanner() {
        let banner =
            document.getElementById(
                "miViewOnlyBanner"
            );

        if (!banner) {
            banner =
                document.createElement(
                    "div"
                );

            banner.id =
                "miViewOnlyBanner";

            banner.setAttribute(
                "role",
                "status"
            );

            banner.setAttribute(
                "aria-live",
                "polite"
            );

            const icon =
                document.createElement(
                    "span"
                );

            icon.setAttribute(
                "aria-hidden",
                "true"
            );

            icon.textContent = "👁";

            const text =
                document.createElement(
                    "span"
                );

            text.className =
                "mi-view-only-banner-text";

            banner.append(
                icon,
                text
            );

            const chat =
                document.getElementById(
                    "chat"
                );

            const main =
                document.getElementById(
                    "main"
                );

            if (chat?.parentElement) {
                chat.parentElement.insertBefore(
                    banner,
                    chat
                );
            }
            else if (main) {
                main.prepend(banner);
            }
            else {
                document.body.prepend(
                    banner
                );
            }
        }

        const bannerText =
            banner.querySelector(
                ".mi-view-only-banner-text"
            );

        if (bannerText) {
            bannerText.textContent =
                translations().banner;
        }
    }

    function isCopyControl(element) {
        if (!(element instanceof Element)) {
            return false;
        }

        return Boolean(
            element.closest(
                ".aiCopyButton, " +
                ".copy-btn, " +
                ".copy-button, " +
                ".mi-ai-copy-below, " +
                "[data-action='copy'], " +
                ".mi-view-copy-allowed"
            )
        );
    }

    function isBlockedControl(element) {
        if (!(element instanceof Element)) {
            return false;
        }

        if (isCopyControl(element)) {
            return false;
        }

        const selectors = [
            "button",
            "input",
            "textarea",
            "select",
            "[contenteditable='true']",
            "[role='button']",
            "[onclick]",
            "[data-action]",
            ".chatItem",
            ".chat-item",
            ".history-item",
            ".conversation-item",
            "[data-chat-id]",
            "[data-conversation-id]"
        ].join(",");

        return Boolean(
            element.closest(selectors)
        );
    }

    function blockInteractiveEvent(event) {
        if (!viewOnlyActive) {
            return;
        }

        if (isCopyControl(event.target)) {
            return;
        }

        if (isBlockedControl(event.target)) {
            event.preventDefault();
            event.stopPropagation();
            event.stopImmediatePropagation();

            showBlockedMessage();
        }
    }

    function blockContextMenu(event) {
        if (!viewOnlyActive) {
            return;
        }

        const interactive =
            event.target.closest(
                ".chatItem, " +
                ".chat-item, " +
                ".history-item, " +
                ".conversation-item, " +
                "[data-chat-id], " +
                "[data-conversation-id], " +
                "#chat > .me, " +
                "#chat > .ai, " +
                ".message-bubble"
            );

        if (!interactive) {
            return;
        }

        event.preventDefault();
        event.stopPropagation();
        event.stopImmediatePropagation();
    }

    function markCopyButtons() {
        document
            .querySelectorAll(
                ".aiCopyButton, " +
                ".copy-btn, " +
                ".copy-button, " +
                ".mi-ai-copy-below, " +
                "[data-action='copy']"
            )
            .forEach(function (button) {
                button.classList.add(
                    "mi-view-copy-allowed"
                );

                button.disabled = false;

                button.removeAttribute(
                    "aria-disabled"
                );
            });
    }

    function disableExistingControls() {
        const controls =
            document.querySelectorAll(
                "input, textarea, select, " +
                "button, [contenteditable='true']"
            );

        controls.forEach(
            function (control) {
                if (isCopyControl(control)) {
                    return;
                }

                if (
                    control instanceof
                        HTMLInputElement
                    || control instanceof
                        HTMLTextAreaElement
                    || control instanceof
                        HTMLSelectElement
                    || control instanceof
                        HTMLButtonElement
                ) {
                    control.disabled = true;
                }

                if (
                    control.hasAttribute(
                        "contenteditable"
                    )
                ) {
                    control.setAttribute(
                        "contenteditable",
                        "false"
                    );
                }

                control.setAttribute(
                    "aria-disabled",
                    "true"
                );
            }
        );

        markCopyButtons();
    }

    function wrapBlockedFunctions() {
        blockedFunctionNames.forEach(
            function (name) {
                const original =
                    window[name];

                if (
                    typeof original !==
                    "function"
                ) {
                    return;
                }

                if (
                    original.__miViewOnlyWrapped
                ) {
                    return;
                }

                const wrapper =
                    function (...args) {
                        if (
                            viewOnlyActive
                        ) {
                            showBlockedMessage();
                            return false;
                        }

                        return original.apply(
                            this,
                            args
                        );
                    };

                wrapper.__miViewOnlyWrapped =
                    true;

                wrapper.__miOriginal =
                    original;

                window[name] = wrapper;
            }
        );
    }

    function isMutationRequest(
        input,
        init
    ) {
        const method =
            String(
                init?.method
                || input?.method
                || "GET"
            ).toUpperCase();

        if (
            !mutationMethods.has(method)
        ) {
            return false;
        }

        let url = "";

        if (
            typeof input === "string"
        ) {
            url = input;
        }
        else if (input?.url) {
            url = input.url;
        }

        const normalized =
            String(url || "")
                .toLowerCase();

        /*
            Permit authentication requests.
            Block chat/conversation mutations.
        */
        if (
            normalized.includes(
                "identitytoolkit.googleapis.com"
            )
            || normalized.includes(
                "securetoken.googleapis.com"
            )
            || normalized.includes(
                "firebase"
            )
        ) {
            return false;
        }

        return (
            normalized.includes("/api/chat")
            || normalized.includes(
                "/api/messages"
            )
            || normalized.includes(
                "/api/conversations"
            )
            || normalized.includes(
                "/api/share"
            )
            || normalized.includes(
                "/api/upload"
            )
            || normalized.includes(
                "conversation"
            )
            || normalized.includes(
                "message"
            )
            || normalized.includes(
                "shared-chat"
            )
        );
    }

    function installFetchGuard() {
        if (
            originalFetch
            || typeof window.fetch !==
                "function"
        ) {
            return;
        }

        originalFetch =
            window.fetch.bind(window);

        window.fetch =
            function (input, init) {
                if (
                    viewOnlyActive
                    && isMutationRequest(
                        input,
                        init
                    )
                ) {
                    showBlockedMessage();

                    return Promise.reject(
                        new Error(
                            "View-only shared chat: mutation blocked."
                        )
                    );
                }

                return originalFetch(
                    input,
                    init
                );
            };
    }

    function installXhrGuard() {
        if (
            originalXhrOpen
            || !window.XMLHttpRequest
        ) {
            return;
        }

        originalXhrOpen =
            XMLHttpRequest
                .prototype.open;

        originalXhrSend =
            XMLHttpRequest
                .prototype.send;

        XMLHttpRequest.prototype.open =
            function (
                method,
                url,
                ...rest
            ) {
                this.__miMethod =
                    String(method || "GET")
                        .toUpperCase();

                this.__miUrl =
                    String(url || "");

                return originalXhrOpen.call(
                    this,
                    method,
                    url,
                    ...rest
                );
            };

        XMLHttpRequest.prototype.send =
            function (...args) {
                if (
                    viewOnlyActive
                    && isMutationRequest(
                        {
                            method:
                                this.__miMethod,
                            url:
                                this.__miUrl
                        },
                        {
                            method:
                                this.__miMethod
                        }
                    )
                ) {
                    showBlockedMessage();

                    throw new Error(
                        "View-only shared chat: mutation blocked."
                    );
                }

                return originalXhrSend.apply(
                    this,
                    args
                );
            };
    }

    function hideMoreMenus() {
        document
            .querySelectorAll(
                "#miChatMoreMenu, " +
                "#menu, " +
                ".context-menu, " +
                ".chat-context-menu"
            )
            .forEach(function (menu) {
                menu.style.display =
                    "none";

                menu.classList.remove(
                    "mi-visible",
                    "open",
                    "show"
                );
            });
    }

    function activateViewOnly() {
        if (viewOnlyActive) {
            createBanner();
            disableExistingControls();
            hideMoreMenus();
            return;
        }

        viewOnlyActive = true;

        document.body.classList.add(
            "mi-view-only"
        );

        document.body.dataset.permission =
            "view";

        window.MI_VIEW_ONLY = true;

        createBanner();
        markCopyButtons();
        disableExistingControls();
        wrapBlockedFunctions();
        installFetchGuard();
        installXhrGuard();
        hideMoreMenus();

        window.dispatchEvent(
            new CustomEvent(
                "mi-view-only-enabled"
            )
        );

        console.log(
            "[MI AI] Strict view-only mode enabled."
        );
    }

    function refreshDetection() {
        if (detectViewOnly()) {
            activateViewOnly();
        }
    }

    document.addEventListener(
        "click",
        blockInteractiveEvent,
        true
    );

    document.addEventListener(
        "submit",
        blockInteractiveEvent,
        true
    );

    document.addEventListener(
        "change",
        blockInteractiveEvent,
        true
    );

    document.addEventListener(
        "input",
        blockInteractiveEvent,
        true
    );

    document.addEventListener(
        "keydown",
        function (event) {
            if (!viewOnlyActive) {
                return;
            }

            const element =
                event.target;

            if (
                element?.matches?.(
                    "input, textarea, " +
                    "[contenteditable='true']"
                )
            ) {
                blockInteractiveEvent(
                    event
                );
            }
        },
        true
    );

    document.addEventListener(
        "contextmenu",
        blockContextMenu,
        true
    );

    document.addEventListener(
        "pointerdown",
        function (event) {
            if (!viewOnlyActive) {
                return;
            }

            const chatTarget =
                event.target.closest(
                    ".chatItem, " +
                    ".chat-item, " +
                    ".history-item, " +
                    ".conversation-item, " +
                    "[data-chat-id], " +
                    "[data-conversation-id]"
                );

            if (chatTarget) {
                event.preventDefault();
                event.stopPropagation();
                event.stopImmediatePropagation();
            }
        },
        true
    );

    window.addEventListener(
        "popstate",
        refreshDetection
    );

    window.addEventListener(
        "hashchange",
        refreshDetection
    );

    window.addEventListener(
        "mi-shared-chat-loaded",
        refreshDetection
    );

    window.addEventListener(
        "mi-language-changed",
        createBanner
    );

    const observer =
        new MutationObserver(
            function () {
                refreshDetection();

                if (viewOnlyActive) {
                    createBanner();
                    markCopyButtons();
                    disableExistingControls();
                    wrapBlockedFunctions();
                    hideMoreMenus();
                }
            }
        );

    function start() {
        observer.observe(
            document.documentElement,
            {
                childList: true,
                subtree: true,
                attributes: true,
                attributeFilter: [
                    "data-permission",
                    "data-mode",
                    "data-access"
                ]
            }
        );

        refreshDetection();

        /*
            Shared-chat data may load after page load.
        */
        let attempts = 0;

        const timer =
            setInterval(
                function () {
                    attempts += 1;

                    refreshDetection();

                    if (
                        viewOnlyActive
                        || attempts >= 80
                    ) {
                        clearInterval(
                            timer
                        );
                    }
                },
                250
            );
    }

    window.MIViewOnly = {
        isActive:
            function () {
                return viewOnlyActive;
            },

        activate:
            activateViewOnly,

        detect:
            detectViewOnly,

        refresh:
            refreshDetection
    };

    if (
        document.readyState ===
        "loading"
    ) {
        document.addEventListener(
            "DOMContentLoaded",
            start,
            {
                once: true
            }
        );
    }
    else {
        start();
    }
})();

/* MI AI STRICT VIEW ONLY JS - END */
</script>

<script>
/* MI AI MOBILE COMFORT JS - START */

(function () {
    "use strict";

    let initialViewportHeight =
        window.visualViewport?.height
        || window.innerHeight;

    function setViewportVariables() {
        const viewport =
            window.visualViewport;

        const width =
            viewport?.width
            || window.innerWidth;

        const height =
            viewport?.height
            || window.innerHeight;

        document.documentElement.style
            .setProperty(
                "--mi-viewport-width",
                width + "px"
            );

        document.documentElement.style
            .setProperty(
                "--mi-viewport-height",
                height + "px"
            );

        const keyboardDifference =
            initialViewportHeight - height;

        const keyboardVisible =
            keyboardDifference > 140;

        document.body.classList.toggle(
            "mi-keyboard-visible",
            keyboardVisible
        );

        if (
            !keyboardVisible
            && height > initialViewportHeight
        ) {
            initialViewportHeight =
                height;
        }
    }

    function keepFocusedFieldVisible() {
        const active =
            document.activeElement;

        if (
            !active
            || !active.matches(
                "input, textarea, select, " +
                "[contenteditable='true']"
            )
        ) {
            return;
        }

        setTimeout(
            function () {
                active.scrollIntoView({
                    behavior:
                        "smooth",

                    block:
                        "center",

                    inline:
                        "nearest"
                });
            },
            180
        );
    }

    function autoGrowMessageInput() {
        const input =
            document.querySelector(
                "#msg, #messageInput, " +
                "#chatInput, " +
                "textarea[name='message'], " +
                ".chat-input, .message-input"
            );

        if (
            !input
            || !(input instanceof
                HTMLTextAreaElement)
        ) {
            return;
        }

        input.style.height =
            "auto";

        const viewportHeight =
            window.visualViewport?.height
            || window.innerHeight;

        const maximum =
            Math.min(
                viewportHeight * 0.38,
                190
            );

        input.style.height =
            Math.min(
                input.scrollHeight,
                maximum
            ) + "px";

        input.style.overflowY =
            input.scrollHeight > maximum
                ? "auto"
                : "hidden";
    }

    function scrollChatToBottom() {
        const chat =
            document.getElementById(
                "chat"
            );

        if (!chat) {
            return;
        }

        const nearBottom =
            chat.scrollHeight
            - chat.scrollTop
            - chat.clientHeight
            < 180;

        if (nearBottom) {
            requestAnimationFrame(
                function () {
                    chat.scrollTop =
                        chat.scrollHeight;
                }
            );
        }
    }

    function initialize() {
        setViewportVariables();
        autoGrowMessageInput();

        window.addEventListener(
            "resize",
            setViewportVariables,
            {
                passive: true
            }
        );

        window.addEventListener(
            "orientationchange",
            function () {
                setTimeout(
                    setViewportVariables,
                    180
                );
            },
            {
                passive: true
            }
        );

        if (window.visualViewport) {
            window.visualViewport
                .addEventListener(
                    "resize",
                    function () {
                        setViewportVariables();
                        keepFocusedFieldVisible();
                    },
                    {
                        passive: true
                    }
                );

            window.visualViewport
                .addEventListener(
                    "scroll",
                    setViewportVariables,
                    {
                        passive: true
                    }
                );
        }

        document.addEventListener(
            "focusin",
            function (event) {
                if (
                    event.target.matches(
                        "input, textarea, select, " +
                        "[contenteditable='true']"
                    )
                ) {
                    keepFocusedFieldVisible();
                }
            }
        );

        document.addEventListener(
            "input",
            function (event) {
                if (
                    event.target.matches(
                        "#msg, #messageInput, " +
                        "#chatInput, " +
                        "textarea[name='message'], " +
                        ".chat-input, .message-input"
                    )
                ) {
                    autoGrowMessageInput();
                }
            }
        );

        const chat =
            document.getElementById(
                "chat"
            );

        if (chat) {
            const observer =
                new MutationObserver(
                    scrollChatToBottom
                );

            observer.observe(
                chat,
                {
                    childList: true,
                    subtree: true,
                    characterData: true
                }
            );
        }
    }

    window.MIMobileComfort = {
        refresh:
            function () {
                setViewportVariables();
                autoGrowMessageInput();
            },

        growInput:
            autoGrowMessageInput
    };

    if (
        document.readyState ===
        "loading"
    ) {
        document.addEventListener(
            "DOMContentLoaded",
            initialize,
            {
                once: true
            }
        );
    }
    else {
        initialize();
    }
})();

/* MI AI MOBILE COMFORT JS - END */
</script>

<script>
/* MI AI SETTINGS ACCORDION COPY MOBILE JS - START */

(function () {
    "use strict";

    const settingsTranslations = {
        en: {
            language: "Language",
            theme: "Theme",
            fontSize: "Font Size",
            copy: "Copy",
            copied: "Copied!"
        },

        si: {
            language: "භාෂාව",
            theme: "තේමාව",
            fontSize: "අකුරු ප්‍රමාණය",
            copy: "පිටපත් කරන්න",
            copied: "පිටපත් කළා!"
        },

        ta: {
            language: "மொழி",
            theme: "தீம்",
            fontSize: "எழுத்தளவு",
            copy: "நகலெடு",
            copied: "நகலெடுக்கப்பட்டது!"
        }
    };

    function language() {
        return (
            window.MIAI18N?.getLanguage?.()
            || localStorage.getItem(
                "mi_ui_language"
            )
            || "en"
        );
    }

    function word(key) {
        const selected =
            language();

        return (
            settingsTranslations[selected]?.[key]
            || settingsTranslations.en[key]
            || key
        );
    }

    function findLanguageControl(panel) {
        return (
            panel.querySelector(
                "#languageSelect"
            )
            || panel.querySelector(
                'select[name*="language" i]'
            )
            || Array.from(
                panel.querySelectorAll(
                    "select"
                )
            ).find(function (select) {
                const content = [
                    select.id,
                    select.name,
                    select.getAttribute(
                        "aria-label"
                    ),
                    select.previousElementSibling
                        ?.textContent
                ]
                    .join(" ")
                    .toLowerCase();

                return (
                    content.includes("language")
                    || content.includes("භාෂා")
                    || content.includes("மொழி")
                );
            })
        );
    }

    function findThemeControl(panel) {
        return (
            panel.querySelector(
                "#themeColor"
            )
            || panel.querySelector(
                'input[type="color"]'
            )
            || panel.querySelector(
                '[name*="theme" i]'
            )
        );
    }

    function findFontSizeControl(panel) {
        return (
            panel.querySelector(
                "#fontSize"
            )
            || panel.querySelector(
                "#fontSizeSlider"
            )
            || panel.querySelector(
                "#fontSlider"
            )
            || panel.querySelector(
                'input[type="range"][name*="font" i]'
            )
            || Array.from(
                panel.querySelectorAll(
                    'input[type="range"]'
                )
            ).find(function (input) {
                const content = [
                    input.id,
                    input.name,
                    input.getAttribute(
                        "aria-label"
                    ),
                    input.previousElementSibling
                        ?.textContent
                ]
                    .join(" ")
                    .toLowerCase();

                return (
                    content.includes("font")
                    || content.includes("size")
                    || content.includes("අකුරු")
                    || content.includes("எழுத்த")
                );
            })
        );
    }

    function associatedLabel(
        panel,
        control
    ) {
        if (!control) {
            return null;
        }

        if (control.id) {
            const label =
                panel.querySelector(
                    'label[for="' +
                    CSS.escape(control.id) +
                    '"]'
                );

            if (label) {
                return label;
            }
        }

        const parentLabel =
            control.closest("label");

        if (parentLabel) {
            return parentLabel;
        }

        const previous =
            control.previousElementSibling;

        if (
            previous &&
            previous.tagName === "LABEL"
        ) {
            return previous;
        }

        return null;
    }

    function createSection(
        type,
        icon,
        title,
        control,
        panel
    ) {
        const section =
            document.createElement("section");

        section.className =
            "mi-settings-section";

        section.dataset.settingsType =
            type;

        const button =
            document.createElement("button");

        button.type = "button";

        button.className =
            "mi-settings-option-button";

        button.setAttribute(
            "aria-expanded",
            "false"
        );

        const left =
            document.createElement("span");

        left.className =
            "mi-settings-option-left";

        const iconElement =
            document.createElement("span");

        iconElement.className =
            "mi-settings-option-icon";

        iconElement.setAttribute(
            "aria-hidden",
            "true"
        );

        iconElement.textContent = icon;

        const titleElement =
            document.createElement("span");

        titleElement.className =
            "mi-settings-option-title";

        titleElement.textContent = title;

        left.append(
            iconElement,
            titleElement
        );

        const arrow =
            document.createElement("span");

        arrow.className =
            "mi-settings-arrow";

        arrow.setAttribute(
            "aria-hidden",
            "true"
        );

        arrow.textContent = "⌄";

        button.append(
            left,
            arrow
        );

        const content =
            document.createElement("div");

        content.className =
            "mi-settings-option-content";

        const inner =
            document.createElement("div");

        inner.className =
            "mi-settings-option-inner";

        const controlBox =
            document.createElement("div");

        controlBox.className =
            "mi-settings-control-box";

        const originalLabel =
            associatedLabel(
                panel,
                control
            );

        if (originalLabel) {
            const clonedLabel =
                originalLabel.cloneNode(true);

            clonedLabel.removeAttribute(
                "for"
            );

            controlBox.appendChild(
                clonedLabel
            );

            originalLabel.classList.add(
                "mi-settings-original-hidden"
            );
        }

        if (control) {
            const placeholder =
                document.createComment(
                    "MI AI original settings control"
                );

            control.parentNode?.insertBefore(
                placeholder,
                control
            );

            controlBox.appendChild(
                control
            );
        }
        else {
            const missing =
                document.createElement("div");

            missing.textContent =
                "Control unavailable";

            missing.style.opacity =
                "0.65";

            controlBox.appendChild(
                missing
            );
        }

        inner.appendChild(
            controlBox
        );

        content.appendChild(
            inner
        );

        section.append(
            button,
            content
        );

        button.addEventListener(
            "click",
            function () {
                const accordion =
                    section.parentElement;

                const willOpen =
                    !section.classList
                        .contains("mi-open");

                accordion
                    .querySelectorAll(
                        ".mi-settings-section"
                    )
                    .forEach(
                        function (item) {
                            item.classList.remove(
                                "mi-open"
                            );

                            item.querySelector(
                                ".mi-settings-option-button"
                            )?.setAttribute(
                                "aria-expanded",
                                "false"
                            );
                        }
                    );

                if (willOpen) {
                    section.classList.add(
                        "mi-open"
                    );

                    button.setAttribute(
                        "aria-expanded",
                        "true"
                    );
                }
            }
        );

        return section;
    }

    function setupSettingsAccordion() {
        const panel =
            document.getElementById(
                "settingsPanel"
            );

        if (!panel) {
            return false;
        }

        let accordion =
            panel.querySelector(
                ".mi-settings-accordion"
            );

        if (accordion) {
            updateSettingsTitles();
            return true;
        }

        const languageControl =
            findLanguageControl(panel);

        const themeControl =
            findThemeControl(panel);

        const fontControl =
            findFontSizeControl(panel);

        accordion =
            document.createElement("div");

        accordion.className =
            "mi-settings-accordion";

        accordion.append(
            createSection(
                "language",
                "🌐",
                word("language"),
                languageControl,
                panel
            ),

            createSection(
                "theme",
                "🎨",
                word("theme"),
                themeControl,
                panel
            ),

            createSection(
                "fontSize",
                "Aa",
                word("fontSize"),
                fontControl,
                panel
            )
        );

        const heading =
            panel.querySelector(
                "h1, h2, h3"
            );

        if (heading) {
            heading.insertAdjacentElement(
                "afterend",
                accordion
            );
        }
        else {
            panel.prepend(
                accordion
            );
        }

        /*
          Hide old labels/wrappers left empty after
          moving the controls.
        */
        Array.from(panel.children)
            .forEach(function (child) {
                if (
                    child === accordion
                    || child === heading
                    || child.id ===
                        "settingsCloseBtn"
                ) {
                    return;
                }

                if (
                    child.matches(
                        "label"
                    )
                    && !child.querySelector(
                        "input, select"
                    )
                ) {
                    child.classList.add(
                        "mi-settings-original-hidden"
                    );
                }
            });

        return true;
    }

    function updateSettingsTitles() {
        const panel =
            document.getElementById(
                "settingsPanel"
            );

        if (!panel) {
            return;
        }

        const titles = {
            language:
                word("language"),

            theme:
                word("theme"),

            fontSize:
                word("fontSize")
        };

        panel.querySelectorAll(
            ".mi-settings-section"
        ).forEach(function (section) {
            const type =
                section.dataset
                    .settingsType;

            const title =
                section.querySelector(
                    ".mi-settings-option-title"
                );

            if (
                title &&
                titles[type]
            ) {
                title.textContent =
                    titles[type];
            }
        });
    }

    function cleanReplyText(aiBubble) {
        const clone =
            aiBubble.cloneNode(true);

        clone.querySelectorAll(
            "button, " +
            ".aiCopyButton, " +
            ".copy-btn, " +
            ".copy-button, " +
            ".mi-ai-copy-below, " +
            ".mi-ai-functional-copy, " +
            "[data-action='copy']"
        ).forEach(function (element) {
            element.remove();
        });

        return String(
            clone.innerText
            || clone.textContent
            || ""
        ).trim();
    }

    async function copyText(value) {
        if (!value) {
            return false;
        }

        try {
            await navigator
                .clipboard
                .writeText(value);

            return true;
        }
        catch (error) {
            const textarea =
                document.createElement(
                    "textarea"
                );

            textarea.value =
                value;

            textarea.style.position =
                "fixed";

            textarea.style.left =
                "-9999px";

            textarea.style.opacity =
                "0";

            document.body.appendChild(
                textarea
            );

            textarea.focus();
            textarea.select();

            const success =
                document.execCommand(
                    "copy"
                );

            textarea.remove();

            return success;
        }
    }

    function showCopiedMessage() {
        const message =
            word("copied");

        if (
            typeof window.showToast ===
            "function"
        ) {
            window.showToast(
                message
            );

            return;
        }

        console.log(
            "[MI AI]",
            message
        );
    }

    function markCopyButtons(root) {
        const scope =
            root instanceof Element
                ? root
                : document;

        scope.querySelectorAll(
            "#chat > .ai"
        ).forEach(function (aiBubble) {
            let copyButton =
                Array.from(
                    aiBubble.querySelectorAll(
                        "button"
                    )
                ).find(function (button) {
                    const combined = [
                        button.className,
                        button.id,
                        button.dataset.action,
                        button.title,
                        button.getAttribute(
                            "aria-label"
                        ),
                        button.textContent
                    ]
                        .join(" ")
                        .toLowerCase();

                    return (
                        combined.includes("copy")
                        || combined.includes(
                            "පිටපත්"
                        )
                        || combined.includes(
                            "நகலெடு"
                        )
                        || combined.includes(
                            "⧉"
                        )
                        || combined.includes(
                            "📋"
                        )
                    );
                });

            if (!copyButton) {
                copyButton =
                    document.createElement(
                        "button"
                    );

                copyButton.type =
                    "button";

                copyButton.textContent =
                    "⧉";

                aiBubble.appendChild(
                    copyButton
                );
            }

            copyButton.classList.add(
                "mi-ai-functional-copy"
            );

            copyButton.dataset.action =
                "copy-ai-reply";

            copyButton.title =
                word("copy");

            copyButton.setAttribute(
                "aria-label",
                word("copy")
            );
        });
    }

    document.addEventListener(
        "click",
        function (event) {
            const copyButton =
                event.target.closest(
                    ".mi-ai-functional-copy, " +
                    "[data-action='copy-ai-reply']"
                );

            if (!copyButton) {
                return;
            }

            const aiBubble =
                copyButton.closest(
                    "#chat > .ai, " +
                    ".ai-message, " +
                    ".assistant-message"
                );

            if (!aiBubble) {
                return;
            }

            event.preventDefault();
            event.stopPropagation();
            event.stopImmediatePropagation();

            const replyText =
                cleanReplyText(
                    aiBubble
                );

            copyText(replyText)
                .then(function (success) {
                    if (success) {
                        showCopiedMessage();

                        const oldText =
                            copyButton.textContent;

                        copyButton.textContent =
                            "✓";

                        setTimeout(
                            function () {
                                copyButton.textContent =
                                    oldText || "⧉";
                            },
                            1000
                        );
                    }
                });
        },
        true
    );

    function refresh() {
        setupSettingsAccordion();
        updateSettingsTitles();
        markCopyButtons(document);
    }

    function start() {
        refresh();

        const observer =
            new MutationObserver(
                function (mutations) {
                    let shouldRefresh =
                        false;

                    for (
                        const mutation
                        of mutations
                    ) {
                        if (
                            mutation.addedNodes
                                .length
                        ) {
                            shouldRefresh =
                                true;

                            break;
                        }
                    }

                    if (shouldRefresh) {
                        requestAnimationFrame(
                            refresh
                        );
                    }
                }
            );

        observer.observe(
            document.body,
            {
                childList: true,
                subtree: true
            }
        );

        document.addEventListener(
            "change",
            function (event) {
                if (
                    event.target.id ===
                        "languageSelect"
                ) {
                    setTimeout(
                        updateSettingsTitles,
                        20
                    );
                }
            }
        );

        window.addEventListener(
            "mi-language-changed",
            updateSettingsTitles
        );
    }

    window.MISettingsAccordion = {
        refresh:

        open:
            function (type) {
                const section =
                    document.querySelector(
                        '.mi-settings-section' +
                        '[data-settings-type="' +
                        type +
                        '"]'
                    );

                section
                    ?.querySelector(
                        ".mi-settings-option-button"
                    )
                    ?.click();
            }
    };

    if (
        document.readyState ===
        "loading"
    ) {
        document.addEventListener(
            "DOMContentLoaded",
            start,
            {
                once: true
            }
        );
    }
    else {
        start();
    }
})();

/* MI AI SETTINGS ACCORDION COPY MOBILE JS - END */
</script>



<script>
/* MI AI IOS SELECT AND ICON SYSTEM JS - START */

(function () {
    "use strict";

    const enhancedSelects =
        new WeakSet();

    let activeSelect = null;
    let activeTrigger = null;
    let popup = null;

    const icons = {
        plus:
            '<svg class="mi-ios-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>',

        support:
            '<svg class="mi-ios-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M4 13v-2a8 8 0 0 1 16 0v2"/><path d="M4 13a2 2 0 0 0 2 2h1v-6H6a2 2 0 0 0-2 2"/><path d="M20 13a2 2 0 0 1-2 2h-1V9h1a2 2 0 0 1 2 2"/><path d="M17 18c-1 1-2.5 1.5-5 1.5"/></svg>',

        settings:
            '<svg class="mi-ios-icon" viewBox="0 0 24 24" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.7 1.7 0 0 0 .3 1.9l.1.1-2.8 2.8-.1-.1a1.7 1.7 0 0 0-1.9-.3 1.7 1.7 0 0 0-1 1.6V21h-4v-.1a1.7 1.7 0 0 0-1-1.6 1.7 1.7 0 0 0-1.9.3l-.1.1L4.2 17l.1-.1a1.7 1.7 0 0 0 .3-1.9A1.7 1.7 0 0 0 3 14H3v-4h.1a1.7 1.7 0 0 0 1.6-1 1.7 1.7 0 0 0-.3-1.9L4.2 7 7 4.2l.1.1a1.7 1.7 0 0 0 1.9.3A1.7 1.7 0 0 0 10 3V3h4v.1a1.7 1.7 0 0 0 1 1.6 1.7 1.7 0 0 0 1.9-.3l.1-.1L19.8 7l-.1.1a1.7 1.7 0 0 0-.3 1.9 1.7 1.7 0 0 0 1.6 1h.1v4H21a1.7 1.7 0 0 0-1.6 1Z"/></svg>',

        logout:
            '<svg class="mi-ios-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M10 5H5v14h5"/><path d="M14 8l4 4-4 4"/><path d="M18 12H9"/></svg>',

        close:
            '<svg class="mi-ios-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M6 6l12 12M18 6 6 18"/></svg>',

        send:
            '<svg class="mi-ios-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 19V5"/><path d="m6 11 6-6 6 6"/></svg>',

        copy:
            '<svg class="mi-ios-icon" viewBox="0 0 24 24" aria-hidden="true"><rect x="8" y="8" width="11" height="11" rx="2"/><path d="M16 8V6a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h2"/></svg>',

        share:
            '<svg class="mi-ios-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="M12 15V3"/><path d="m7 8 5-5 5 5"/><path d="M5 12v7h14v-7"/></svg>',

        chevron:
            '<svg class="mi-ios-select-chevron mi-ios-icon" viewBox="0 0 24 24" aria-hidden="true"><path d="m7 9 5 5 5-5"/></svg>'
    };

    function ensurePopup() {
        if (popup) {
            return popup;
        }

        popup =
            document.createElement("div");

        popup.id =
            "miIosSelectPopup";

        popup.setAttribute(
            "role",
            "listbox"
        );

        document.body.appendChild(
            popup
        );

        return popup;
    }

    function closePopup() {
        if (popup) {
            popup.classList.remove(
                "mi-open"
            );

            popup.replaceChildren();
        }

        if (activeTrigger) {
            activeTrigger.setAttribute(
                "aria-expanded",
                "false"
            );
        }

        activeSelect = null;
        activeTrigger = null;
    }

    function positionPopup(trigger) {
        const menu = ensurePopup();
        const rect =
            trigger.getBoundingClientRect();

        const margin = 8;

        const width =
            Math.min(
                Math.max(
                    rect.width,
                    200
                ),
                window.innerWidth
                    - margin * 2
            );

        menu.style.width =
            width + "px";

        menu.style.left =
            Math.max(
                margin,
                Math.min(
                    rect.left,
                    window.innerWidth
                        - width
                        - margin
                )
            ) + "px";

        menu.style.top =
            rect.bottom + 8 + "px";

        requestAnimationFrame(
            function () {
                const menuRect =
                    menu.getBoundingClientRect();

                if (
                    menuRect.bottom >
                    window.innerHeight - margin
                ) {
                    const above =
                        rect.top
                        - menuRect.height
                        - 8;

                    menu.style.top =
                        Math.max(
                            margin,
                            above
                        ) + "px";
                }
            }
        );
    }

    function rebuildPopup(
        select,
        trigger
    ) {
        const menu = ensurePopup();

        menu.replaceChildren();

        Array.from(
            select.options
        ).forEach(function (
            option,
            index
        ) {
            const button =
                document.createElement(
                    "button"
                );

            button.type =
                "button";

            button.className =
                "mi-ios-popup-option";

            button.setAttribute(
                "role",
                "option"
            );

            const isSelected =
                index ===
                select.selectedIndex;

            button.classList.toggle(
                "mi-selected",
                isSelected
            );

            button.setAttribute(
                "aria-selected",
                String(isSelected)
            );

            const label =
                document.createElement(
                    "span"
                );

            label.className =
                "mi-ios-option-label";

            label.textContent =
                option.textContent;

            const check =
                document.createElement(
                    "span"
                );

            check.className =
                "mi-ios-option-check";

            check.textContent = "✓";

            check.setAttribute(
                "aria-hidden",
                "true"
            );

            button.append(
                label,
                check
            );

            button.addEventListener(
                "click",
                function (event) {
                    event.preventDefault();
                    event.stopPropagation();

                    select.selectedIndex =
                        index;

                    select.dispatchEvent(
                        new Event(
                            "input",
                            {
                                bubbles: true
                            }
                        )
                    );

                    select.dispatchEvent(
                        new Event(
                            "change",
                            {
                                bubbles: true
                            }
                        )
                    );

                    updateTrigger(
                        select,
                        trigger
                    );

                    closePopup();

                    trigger.focus();
                }
            );

            menu.appendChild(
                button
            );
        });
    }

    function updateTrigger(
        select,
        trigger
    ) {
        const selected =
            select.options[
                select.selectedIndex
            ] || select.options[0];

        const text =
            trigger.querySelector(
                ".mi-ios-select-trigger-text"
            );

        if (text) {
            text.textContent =
                selected?.textContent
                || "";
        }

        trigger.disabled =
            select.disabled;
    }

    function openPopup(
        select,
        trigger
    ) {
        closePopup();

        activeSelect = select;
        activeTrigger = trigger;

        rebuildPopup(
            select,
            trigger
        );

        positionPopup(trigger);

        const menu = ensurePopup();

        menu.classList.add(
            "mi-open"
        );

        trigger.setAttribute(
            "aria-expanded",
            "true"
        );

        requestAnimationFrame(
            function () {
                menu.querySelector(
                    ".mi-selected"
                )?.focus();
            }
        );
    }

    function enhanceSelect(select) {
        if (
            !(select instanceof
                HTMLSelectElement)
            || enhancedSelects.has(select)
        ) {
            return;
        }

        enhancedSelects.add(select);

        select.dataset.miIosReady =
            "true";

        const shell =
            document.createElement(
                "div"
            );

        shell.className =
            "mi-ios-select-shell";

        select.parentNode.insertBefore(
            shell,
            select
        );

        shell.appendChild(select);

        const trigger =
            document.createElement(
                "button"
            );

        trigger.type = "button";

        trigger.className =
            "mi-ios-select-trigger";

        trigger.setAttribute(
            "aria-haspopup",
            "listbox"
        );

        trigger.setAttribute(
            "aria-expanded",
            "false"
        );

        const text =
            document.createElement(
                "span"
            );

        text.className =
            "mi-ios-select-trigger-text";

        const icon =
            document.createElement(
                "span"
            );

        icon.className =
            "mi-ios-icon-wrap";

        icon.innerHTML =
            icons.chevron;

        trigger.append(
            text,
            icon
        );

        shell.appendChild(trigger);

        updateTrigger(
            select,
            trigger
        );

        trigger.addEventListener(
            "click",
            function (event) {
                event.preventDefault();
                event.stopPropagation();

                if (
                    activeSelect === select
                ) {
                    closePopup();
                }
                else {
                    openPopup(
                        select,
                        trigger
                    );
                }
            }
        );

        select.addEventListener(
            "change",
            function () {
                updateTrigger(
                    select,
                    trigger
                );
            }
        );

        const observer =
            new MutationObserver(
                function () {
                    updateTrigger(
                        select,
                        trigger
                    );

                    if (
                        activeSelect ===
                        select
                    ) {
                        rebuildPopup(
                            select,
                            trigger
                        );

                        positionPopup(
                            trigger
                        );
                    }
                }
            );

        observer.observe(
            select,
            {
                childList: true,
                subtree: true,
                characterData: true,
                attributes: true
            }
        );
    }

    function scanSelects(root) {
        const scope =
            root instanceof Element
                ? root
                : document;

        if (
            scope instanceof
            HTMLSelectElement
        ) {
            enhanceSelect(scope);
        }

        scope.querySelectorAll(
            "select"
        ).forEach(
            enhanceSelect
        );
    }

    function replaceLeadingIcon(
        element,
        svg
    ) {
        if (
            !element
            || element.dataset
                .miIosIconApplied ===
                "true"
        ) {
            return;
        }

        const originalText =
            element.textContent
                .replace(
                    /^[^\p{L}\p{N}]+/u,
                    ""
                )
                .trim();

        element.replaceChildren();

        const label =
            document.createElement(
                "span"
            );

        label.className =
            "mi-ios-icon-label";

        const iconWrap =
            document.createElement(
                "span"
            );

        iconWrap.className =
            "mi-ios-icon-wrap";

        iconWrap.innerHTML = svg;

        const text =
            document.createElement(
                "span"
            );

        text.textContent =
            originalText;

        label.append(
            iconWrap,
            text
        );

        element.appendChild(label);

        element.dataset
            .miIosIconApplied =
            "true";
    }

    function applyIcons() {
        replaceLeadingIcon(
            document.querySelector(
                "#newChatBtn, " +
                "#sidebar button[onclick*='newChat']"
            ),
            icons.plus
        );

        replaceLeadingIcon(
            document.querySelector(
                "#supportBtn"
            ),
            icons.support
        );

        replaceLeadingIcon(
            document.querySelector(
                "#settingsBtn"
            ),
            icons.settings
        );

        replaceLeadingIcon(
            document.querySelector(
                "#logoutBtn, " +
                "button[onclick*='logout'], " +
                "button[onclick*='Logout']"
            ),
            icons.logout
        );

        document
            .querySelectorAll(
                "#settingsCloseBtn, " +
                ".close-btn, " +
                ".modal-close"
            )
            .forEach(function (button) {
                if (
                    button.dataset
                        .miIosIconApplied ===
                    "true"
                ) {
                    return;
                }

                button.innerHTML =
                    icons.close;

                button.dataset
                    .miIosIconApplied =
                    "true";
            });

        document
            .querySelectorAll(
                "#sendBtn, " +
                "#sendButton, " +
                ".send-btn"
            )
            .forEach(function (button) {
                if (
                    button.dataset
                        .miIosIconApplied ===
                    "true"
                ) {
                    return;
                }

                button.innerHTML =
                    icons.send;

                button.dataset
                    .miIosIconApplied =
                    "true";
            });

        document
            .querySelectorAll(
                ".mi-ai-functional-copy, " +
                ".mi-ai-copy-below, " +
                ".aiCopyButton, " +
                ".copy-btn, " +
                ".copy-button"
            )
            .forEach(function (button) {
                if (
                    button.dataset
                        .miIosIconApplied ===
                    "true"
                ) {
                    return;
                }

                button.innerHTML =
                    icons.copy;

                button.dataset
                    .miIosIconApplied =
                    "true";
            });
    }

    document.addEventListener(
        "click",
        function (event) {
            if (
                !event.target.closest(
                    ".mi-ios-select-trigger"
                )
                && !event.target.closest(
                    "#miIosSelectPopup"
                )
            ) {
                closePopup();
            }
        }
    );

    document.addEventListener(
        "keydown",
        function (event) {
            if (event.key === "Escape") {
                closePopup();
            }
        }
    );

    window.addEventListener(
        "resize",
        function () {
            if (
                activeTrigger
                && popup?.classList
                    .contains("mi-open")
            ) {
                positionPopup(
                    activeTrigger
                );
            }
        }
    );

    window.addEventListener(
        "scroll",
        function () {
            if (
                activeTrigger
                && popup?.classList
                    .contains("mi-open")
            ) {
                positionPopup(
                    activeTrigger
                );
            }
        },
        true
    );

    function refresh() {
        scanSelects(document);
        applyIcons();
    }

    function start() {
        ensurePopup();
        refresh();

        let observerRefreshPending =
            false;

        const observer =
            new MutationObserver(
                function (mutations) {
                    mutations.forEach(
                        function (mutation) {
                            mutation.addedNodes
                                .forEach(
                                    function (node) {
                                        if (
                                            node.nodeType ===
                                            Node.ELEMENT_NODE
                                        ) {
                                            scanSelects(
                                                node
                                            );
                                        }
                                    }
                                );
                        }
                    );

                    if (observerRefreshPending) {
                        return;
                    }

                    observerRefreshPending =
                        true;

                    requestAnimationFrame(
                        function () {
                            observerRefreshPending =
                                false;

                            applyIcons();
                        }
                    );
                }
            );

        observer.observe(
            document.body,
            {
                childList: true,
                subtree: true
            }
        );
    }

    window.MIIosControls = {
        refresh: refresh,
        closeDropdown: closePopup
    };

    if (
        document.readyState ===
        "loading"
    ) {
        document.addEventListener(
            "DOMContentLoaded",
            start,
            {
                once: true
            }
        );
    }
    else {
        start();
    }
})();

/* MI AI IOS SELECT AND ICON SYSTEM JS - END */
</script>

<script>
/* MI AI SHARE MODAL CANCEL ONLY CLOSE - START */

(function () {
    "use strict";

    const modalSelectors = [
        "#shareModal",
        "#shareDialog",
        "#sharePopup",
        ".share-modal",
        ".share-dialog",
        ".share-popup",
        "[data-share-modal]"
    ].join(",");

    const closeFunctionNames = [
        "closeShareModal",
        "hideShareModal",
        "closeShareDialog",
        "hideShareDialog",
        "closeSharePopup",
        "hideSharePopup"
    ];

    let cancelCloseAllowed = false;
    let shareModalWasOpen = false;
    let repairPending = false;

    function getShareModal() {
        return document.querySelector(
            modalSelectors
        );
    }

    function elementText(element) {
        return String(
            element?.textContent
            || element?.value
            || element?.getAttribute(
                "aria-label"
            )
            || element?.getAttribute(
                "title"
            )
            || ""
        )
            .replace(/\s+/g, " ")
            .trim()
            .toLowerCase();
    }

    function isCancelButton(element) {
        const button =
            element?.closest?.(
                "button, input[type='button'], " +
                "input[type='reset'], [role='button']"
            );

        if (!button) {
            return false;
        }

        const details = [
            elementText(button),
            button.id,
            button.className,
            button.dataset.action,
            button.getAttribute("onclick")
        ]
            .join(" ")
            .toLowerCase();

        return (
            details.includes("cancel")
            || details.includes("අවලංගු")
            || details.includes("ரத்து")
            || details.includes("close-share")
            || details.includes("cancel-share")
        );
    }

    function isGenerateButton(element) {
        const button =
            element?.closest?.(
                "button, input[type='button'], " +
                "input[type='submit'], [role='button']"
            );

        if (!button) {
            return false;
        }

        const details = [
            elementText(button),
            button.id,
            button.className,
            button.dataset.action,
            button.getAttribute("onclick")
        ]
            .join(" ")
            .toLowerCase();

        return (
            details.includes("generate link")
            || details.includes("create link")
            || details.includes("generate-share")
            || details.includes("create-share")
            || details.includes("link සාද")
            || details.includes("இணைப்பை உருவாக்க")
        );
    }

    function modalLooksOpen(modal) {
        if (!modal) {
            return false;
        }

        const style =
            window.getComputedStyle(modal);

        return (
            !modal.hidden
            && style.display !== "none"
            && style.visibility !== "hidden"
            && style.opacity !== "0"
        );
    }

    function forceModalOpen(modal) {
        if (
            !modal
            || cancelCloseAllowed
            || !shareModalWasOpen
        ) {
            return;
        }

        modal.hidden = false;

        modal.removeAttribute(
            "aria-hidden"
        );

        modal.setAttribute(
            "aria-modal",
            "true"
        );

        modal.classList.add(
            "open",
            "show",
            "active"
        );

        if (
            modal.style.display === "none"
        ) {
            modal.style.display = "";
        }

        if (
            window.getComputedStyle(modal)
                .display === "none"
        ) {
            modal.style.setProperty(
                "display",
                "flex",
                "important"
            );
        }

        modal.style.setProperty(
            "visibility",
            "visible",
            "important"
        );

        modal.style.setProperty(
            "opacity",
            "1",
            "important"
        );
    }

    function scheduleRepair() {
        if (
            repairPending
            || cancelCloseAllowed
            || !shareModalWasOpen
        ) {
            return;
        }

        repairPending = true;

        requestAnimationFrame(
            function () {
                repairPending = false;

                forceModalOpen(
                    getShareModal()
                );
            }
        );
    }

    function wrapCloseFunctions() {
        closeFunctionNames.forEach(
            function (name) {
                const original =
                    window[name];

                if (
                    typeof original !==
                    "function"
                    || original
                        .__miCancelOnlyWrapped
                ) {
                    return;
                }

                const wrapped =
                    function (...args) {
                        if (
                            !cancelCloseAllowed
                            && shareModalWasOpen
                        ) {
                            scheduleRepair();
                            return false;
                        }

                        const result =
                            original.apply(
                                this,
                                args
                            );

                        cancelCloseAllowed =
                            false;

                        shareModalWasOpen =
                            false;

                        return result;
                    };

                wrapped.__miCancelOnlyWrapped =
                    true;

                wrapped.__miOriginal =
                    original;

                window[name] = wrapped;
            }
        );
    }

    function closeFromCancel(button) {
        const modal =
            button.closest(
                modalSelectors
            )
            || getShareModal();

        cancelCloseAllowed = true;
        shareModalWasOpen = false;

        /*
          First allow the existing Cancel handler to run.
          If no existing handler closes it, close safely here.
        */
        setTimeout(
            function () {
                if (
                    modal
                    && modalLooksOpen(modal)
                ) {
                    modal.classList.remove(
                        "open",
                        "show",
                        "active"
                    );

                    modal.hidden = true;

                    modal.setAttribute(
                        "aria-hidden",
                        "true"
                    );

                    modal.style.setProperty(
                        "display",
                        "none",
                        "important"
                    );
                }

                cancelCloseAllowed =
                    false;
            },
            30
        );
    }

    document.addEventListener(
        "click",
        function (event) {
            const modal =
                getShareModal();

            if (!modal) {
                return;
            }

            if (modalLooksOpen(modal)) {
