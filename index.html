<!DOCTYPE html>
<html>
<head>
<title>MI AI ChatBOT Pro</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<style>

:root{
--main:#1e88e5;
--bg:#0b1220;
--panel:#111a2b;
--ai:#263238;
--text:#fff;
--input:#1c2b3a;
}

*{box-sizing:border-box;}

html,body{
margin:0;
height:100%;
overflow:hidden;
font-family:Arial;
background:var(--bg);
color:var(--text);
transition:.3s;
}

body{display:flex;}

/* SIDEBAR */
#sidebar{
width:260px;
background:var(--panel);
padding:10px;
display:flex;
flex-direction:column;
}

h3{text-align:center;}

button{
border:none;
padding:10px;
margin:5px 0;
border-radius:10px;
background:var(--main);
color:white;
cursor:pointer;
transition:.2s;
}

button:hover{
transform:scale(1.05);
}

/* CHAT LIST */
.chatItem{
padding:10px;
margin:5px 0;
background:#ffffff10;
border-radius:10px;
cursor:pointer;
transition:.2s;
}

.chatItem:hover{
background:var(--main);
}

/* MAIN */
#main{
flex:1;
display:flex;
flex-direction:column;
}

/* HEADER */
#header{
height:60px;
background:var(--panel);
display:flex;
align-items:center;
gap:10px;
padding:10px;
font-weight:bold;
}

#header img{
width:50px;
height:50px;
object-fit:cover;
border-radius:50%;
overflow:hidden;

border:3px solid gold;
background:#000;

padding:0;

box-shadow:
0 0 10px gold,
0 0 20px rgba(255,215,0,.6);

animation:logoPulse 2s infinite ease-in-out;
}

@keyframes logoPulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.08);
}

100%{
transform:scale(1);
}

}

/* CHAT */
#chat{
flex:1;
overflow-y:auto;
padding:15px;
scroll-behavior:smooth;
}

/* MESSAGES */
.me,.ai{
max-width:70%;
padding:12px;
margin:8px;
border-radius:15px;
white-space:pre-wrap;
line-height:1.5;
animation:pop .2s ease;
}

.me{
background:var(--main);
margin-left:auto;
}

.ai{
background:var(--ai);
}

/* ANIMATION */
@keyframes pop{
from{opacity:0;transform:scale(.8);}
to{opacity:1;transform:scale(1);}
}

/* THINKING */
.thinking{
background:var(--ai);
padding:10px;
border-radius:12px;
display:flex;
gap:6px;
align-items:center;
width:max-content;
animation:blink 1.2s infinite;
}

/* MI AI pulsing effect */
.thinking .label{
animation:pulseText 1.2s infinite;
font-weight:bold;
}

@keyframes pulseText{
0%{opacity:0.2;}
50%{opacity:1;}
100%{opacity:0.2;}
}

.dot{
width:6px;
height:6px;
background:white;
border-radius:50%;
animation:bounce 1s infinite;
}

.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}

@keyframes bounce{
50%{transform:translateY(-6px);}
}

/* INPUT */
#inputBox{
display:flex;
padding:10px;
background:var(--panel);
}

textarea{
flex:1;
resize:none;
border:none;
outline:none;
padding:10px;
border-radius:15px;
background:var(--input);
color:white;
min-height:45px;
max-height:120px;
}

/* SETTINGS */
#settingsPanel{
display:none;
position:absolute;
right:20px;
top:70px;
width:250px;
background:var(--panel);
padding:15px;
border-radius:12px;
}

input[type="color"],input[type="range"]{
width:100%;
}

/* CONTEXT MENU */
#menu{
position:absolute;
display:none;
background:#111a2b;
border:1px solid #333;
border-radius:10px;
overflow:hidden;
z-index:999;
min-width:120px;
}

#menu div{
padding:10px;
cursor:pointer;
}

#menu div:hover{
background:var(--main);
}

#introOverlay {
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 99999;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 20px;
  overflow: hidden;
}

#introOverlay::before {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at 50% 30%, rgba(212,175,55,0.12), transparent 38%),
              radial-gradient(circle at 50% 70%, rgba(255,255,255,0.04), transparent 35%);
  pointer-events: none;
}

#introContents{
position:relative;
z-index:1;

display:flex;
flex-direction:column;

align-items:center;
justify-content:center;

text-align:center;

color:#d4af37;

width:100%;
height:100%;
}

#introText {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 1rem;
  flex-wrap: wrap;
  margin-bottom: 1rem;
}

.introSpacer {
  width: 1.8rem;
}

.introLetter {
  display: inline-block;
font-size: clamp(2rem, 5vw, 4rem);
  font-weight: 900;
  letter-spacing: 0.15em;
  color: #d4af37;
  opacity: 0;
  transform: scale(0.24) translateY(36px);
  text-shadow: 0 0 18px rgba(212,175,55,.35), 0 0 42px rgba(212,175,55,.16);
}

.letter-show {
  animation: letterAppear 0.75s cubic-bezier(.22,.68,.28,1.02) forwards;
}

@keyframes letterAppear {
  0% { opacity: 0; transform: scale(0.24) translateY(36px); }
  60% { opacity: 1; transform: scale(1.08) translateY(-4px); }
  100% { opacity: 1; transform: scale(1) translateY(0); }
}

#introSubtitle {
  margin-top: 0.8rem;
  opacity: 0;
  transform: translateY(20px);
  font-size: clamp(0.88rem, 1.9vw, 1.1rem);
  letter-spacing: 0.32em;
  text-transform: uppercase;
  font-weight: 700;
  color: #f7d67b;
  filter: drop-shadow(0 0 14px rgba(212,175,55,.36));
}

.subtitle-show {
  animation: subtitleAppear 1s ease forwards;
}

@keyframes subtitleAppear {
  0% { opacity: 0; transform: translateY(20px); }
  100% { opacity: 1; transform: translateY(0); }
}

.text-fade-out {
  animation: textFadeOut 0.85s ease forwards;
}

@keyframes textFadeOut {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-24px) scale(0.96); }
}

#introLogo{

width:380px;
height:380px;

display:block;
margin:0 auto;
object-fit:cover;
border-radius:50%;
overflow:hidden;

border:5px solid gold;

opacity:0;
transform:scale(0.16);

box-shadow:
0 0 25px gold,
0 0 50px rgba(255,215,0,.6);

filter:
drop-shadow(0 0 25px gold);
}

.logo-show {
  animation: logoAppear 1s cubic-bezier(.2,.72,.32,1) forwards;
}

@keyframes logoAppear {
  0% { opacity: 0; transform: scale(0.16) rotate(-4deg); filter: drop-shadow(0 0 18px rgba(212,175,55,.12)); }
  60% { opacity: 1; transform: scale(1.04) rotate(0deg); }
  100% { opacity: 1; transform: scale(1) rotate(0deg); }
}

#introOverlay.slide-left {
  animation: overlaySlide 1s ease-in-out forwards;
}

@keyframes overlaySlide {
  0% { transform: translateX(0); opacity: 1; }
  100% { transform: translateX(-110%); opacity: 0; }
}

#sidebar,
#main {
  opacity: 0;
  transform: translateY(26px);
  transition: opacity 0.85s ease, transform 0.85s ease;
}

body.intro-complete #sidebar,
body.intro-complete #main {
  opacity: 1;
  transform: translateY(0);
}

</style>
</head>

<body>
<div id="introOverlay">
  <div id="introContents">
    <div id="introText">
      <span class="introLetter">M</span>
      <span class="introLetter">I</span>
      <span class="introSpacer">   </span>
      <span class="introLetter">A</span>
      <span class="introLetter">I</span>
      <span class="introLetter">  </span>
<span class="introLetter">C</span>
    <span class="introLetter">H</span>
      <span class="introLetter">A</span>
      <span class="introLetter">T</span>
      <span class="introLetter">B</span>
      <span class="introLetter">O</span>
      <span class="introLetter">T</span>

    </div>
  
    <div id="introSubtitle">ASSISTANT OF M.I. MUHAMMADH</div>
  <img id="introLogo" src="../images/logo.png" alt="MI AI Logo">
  </div>
</div>

<!-- SIDEBAR -->
<div id="sidebar">
<h3>MI AI ChatBOT</h3>

<button id="loginBtn" onclick="openLogin()">📧 Email Login</button>

<button id="logoutBtn" onclick="logout()" style="display:none;">
🚪 Logout
</button>

<button onclick="newChat()">➕ New Chat</button>

<button id="settingsBtn" onclick="toggleSettings()">⚙ Settings</button>
___________________________
<button id="supportBtn" onclick="customerSupport()">🎧 Customer Support</button>

<div id="chatList"></div>

</div>   <!-- CLOSE SIDEBAR -->

<!-- MAIN -->
<div id="main">
<div id="header">
<img id="headerLogo" src="../images/logo.png" alt="MI AI Logo">    <span>MI AI ChatBOT</span>
</div>

<div id="loginBox" style="
display:none;
position:absolute;
top:70px;
left:50%;
transform:translateX(-50%);
background:#032461;
padding:20px;
border-radius:15px;
z-index:999;
width:280px;
">

<h3>Email Login</h3>

<input id="email" 
placeholder="Email"
style="width:100%;padding:10px;margin:5px">


<input id="password"
type="password"
placeholder="Password"
style="width:100%;padding:10px;margin:5px">


<button onclick="loginEmail()">
Login / Create
</button>

</div>

<div id="chat"></div>

<!-- SETTINGS -->
<div id="settingsPanel">
<h3>Settings</h3>

<label>Theme</label>
<input type="color" id="themeColor">
<button onclick="applyTheme()">Apply</button>

<label>Font Size</label>
<input type="range" min="12" max="25" value="15" oninput="setFont(this.value)">
</div>

<!-- INPUT -->
<div id="inputBox">
<textarea id="msg" placeholder="Ask from MI AI..."></textarea>
<button onclick="send()">Send</button>
</div>

</div>

<!-- RIGHT CLICK MENU -->
<div id="menu">

<div onclick="renameChat()">
✏️ Rename
</div>

<div onclick="pinChat()" id="pinOption">
📌 Pin
</div>

<div onclick="shareChat()">
📤 Share
</div>

<div onclick="deleteChat()" style="color:red">
🗑 Delete
</div>

</div>

<script>

const firebaseConfig = {

apiKey:"AIzaSyDDsWFgmELXQBeupafAU6bGeQjvMmnSzGI",

authDomain:"mi-ai-b3a57.firebaseapp.com",

projectId:"mi-ai-b3a57"

};


firebase.initializeApp(firebaseConfig);


const auth = firebase.auth();


let user=null;

let chatBox=document.getElementById("chat");
let chatList=document.getElementById("chatList");
let input=document.getElementById("msg");
let menu=document.getElementById("menu");

let accountId = localStorage.getItem("mi_account");

// if no account exists → create automatically
if(!accountId){
    accountId = "acc_" + crypto.randomUUID();
    localStorage.setItem("mi_account", accountId);
}

let chats={};
let currentChat=null;
let selectedChat=null;

window.addEventListener("load", () => {
  const introOverlay = document.getElementById("introOverlay");
  const letters = document.querySelectorAll("#introText .introLetter");
  const subtitle = document.getElementById("introSubtitle");
  const introLogo = document.getElementById("introLogo");
  const body = document.body;

  letters.forEach((letter, index) => {
    setTimeout(() => letter.classList.add("letter-show"), index * 260 + 320);
  });

  const subtitleDelay = letters.length * 260 + 980;
  setTimeout(() => subtitle.classList.add("subtitle-show"), subtitleDelay);

  const fadeDelay = subtitleDelay + 1700;
  setTimeout(() => {
    letters.forEach(letter => letter.classList.add("text-fade-out"));
    subtitle.classList.add("text-fade-out");
  }, fadeDelay);

  const logoDelay = fadeDelay + 900;
  setTimeout(() => introLogo.classList.add("logo-show"), logoDelay);

  const slideDelay = logoDelay + 1300;
  setTimeout(() => introOverlay.classList.add("slide-left"), slideDelay);

  setTimeout(() => {
    body.classList.add("intro-complete");
    introOverlay.style.display = "none";
    initChat();
  }, slideDelay + 950);
});

function initChat(){

let saved=localStorage.getItem("mi_chats_" + accountId);

if(saved){
    chats=JSON.parse(saved);

    localStorage.setItem("mi_last_account", accountId);
}else{
    chats={};
}


let theme=localStorage.getItem("theme");

if(theme){
document.documentElement.style.setProperty("--main",theme);
}


// AUTO NEW CHAT OPEN

let id="chat_"+Date.now();

chats[id]=[];

currentChat=id;


save();

renderList();

openChat(id);


input.focus();

};

/* ENTER */
input.addEventListener("keydown",e=>{
if(e.key==="Enter"){
if(e.shiftKey) return;
e.preventDefault();
send();
}
});

/* NEW CHAT */
function newChat(){
let id="chat_"+Date.now();
chats[id]=[];
currentChat=id;
save();
renderList();
openChat(id);
}

/* OPEN */
function openChat(id){
currentChat=id;
chatBox.innerHTML="";
chats[id].forEach(m=>add(m.role,m.text));
localStorage.setItem("last_chat",id);
}

/* RENDER LIST */
function renderList(){
chatList.innerHTML="";

let ids = Object.keys(chats);


ids.sort((a,b)=>{

if(chats[a].pin && !chats[b].pin) return -1;

if(!chats[a].pin && chats[b].pin) return 1;

return 0;

});

ids.forEach(id=>{
let div=document.createElement("div");
div.className="chatItem";
div.dataset.id=id;
div.innerText=(chats[id].pin ? "📌 " : "")+"💬 "+id;

div.onclick=()=>openChat(id);

/* RIGHT CLICK */
div.oncontextmenu=(e)=>{

e.preventDefault();

selectedChat=id;


document.getElementById("pinOption").innerHTML =
chats[id].pin ? "📍 Unpin" : "📌 Pin";


menu.style.display="block";
menu.style.left=e.pageX+"px";
menu.style.top=e.pageY+"px";

};

chatList.appendChild(div);
});
}

/* CLOSE OVERLAYS */
function closeAllOverlays(target) {
  const settingsPanel = document.getElementById("settingsPanel");
  const loginBox = document.getElementById("loginBox");
  const supportOverlay = document.getElementById("supportOverlay");

  if (menu.style.display === "block" && !menu.contains(target)) {
    menu.style.display = "none";
  }

  if (settingsPanel && settingsPanel.style.display === "block" &&
      !settingsPanel.contains(target) && target.id !== "settingsBtn") {
    settingsPanel.style.display = "none";
  }

  if (loginBox && loginBox.style.display === "block" &&
      !loginBox.contains(target) && target.id !== "loginBtn") {
    loginBox.style.display = "none";
  }

  if (supportOverlay && !supportOverlay.contains(target) && target.id !== "supportBtn") {
    supportOverlay.remove();
  }
}

document.addEventListener("pointerdown", e => {
  const target = e.target;
  closeAllOverlays(target);
}, true);

/* RENAME */
function renameChat(){
if(!selectedChat) return;
let name=prompt("Rename chat:",selectedChat);
if(!name) return;

chats[name]=chats[selectedChat];
delete chats[selectedChat];

if(currentChat===selectedChat) currentChat=name;

save();
renderList();
menu.style.display="none";
}

/* DELETE */
function deleteChat(){
if(!selectedChat) return;
if(!confirm("Delete this chat?")) return;

delete chats[selectedChat];

if(currentChat===selectedChat){
currentChat=null;
chatBox.innerHTML="";
}

save();
renderList();
menu.style.display="none";
}

function pinChat(){

if(!selectedChat)return;

chats[selectedChat].pin =
!chats[selectedChat].pin;


save();
renderList();

menu.style.display="none";

}




function shareChat(){

if(!selectedChat)return;


let copyText="";


chats[selectedChat].forEach(m=>{


if(m.role==="me"){

copyText += "USER: "+m.text+"\n\n";

}
else{

copyText += "MI AI ChatBOT -: "+m.text+"\n\n";

}

});


navigator.clipboard.writeText(copyText)
.then(()=>{

alert("Login Success ✅");

// 👉 මෙන්න add කරන්න
document.getElementById("loginBox").style.display = "none";
document.getElementById("email").value = "";
document.getElementById("password").value = "";

})


menu.style.display="none";

}

/* SEND */
async function send(){

let msg=input.value.trim();
if(!msg || !currentChat) return;

input.value="";

add("me",msg);

/* THINKING */
let t=document.createElement("div");
t.className="thinking";
t.innerHTML=`
<span class="label">MI AI</span>
<span class="dot"></span>
<span class="dot"></span>
<span class="dot"></span>
`;

chatBox.appendChild(t);
scroll();

try{
let res=await fetch("http://127.0.0.1:5000/chat",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({message:msg})
});

let data=await res.json();

t.remove();
type(data.reply);

}catch(e){
t.remove();
add("ai","Server Error ❌");
}
}

/* TYPE */
function type(text){
let d=document.createElement("div");
d.className="ai";
chatBox.appendChild(d);

let i=0;
let timer=setInterval(()=>{
d.innerText+=text[i];
i++;
scroll();

if(i>=text.length){
clearInterval(timer);
chats[currentChat].push({role:"ai",text});
save();
}
},20);
}

/* ADD */
function add(role,text){
let d=document.createElement("div");
d.className=role;
d.innerText=text;
chatBox.appendChild(d);

if(role==="me"){
chats[currentChat].push({role,text});
save();
}

scroll();
}

/* SCROLL */
function scroll(){
chatBox.scrollTop=chatBox.scrollHeight;
}

/* SAVE */
function save(){
localStorage.setItem("mi_chats_" + accountId, JSON.stringify(chats));
localStorage.setItem("mi_last_account", accountId);
}

/* SETTINGS */
function toggleSettings(){
let s=document.getElementById("settingsPanel");
s.style.display=s.style.display==="block"?"none":"block";
}

/* THEME */
function applyTheme(){
let c=document.getElementById("themeColor").value;
document.documentElement.style.setProperty("--main",c);
localStorage.setItem("theme",c);
}

/* FONT */
function setFont(v){
chatBox.style.fontSize=v+"px";
}

/* CUSTOMER SUPPORT */

function customerSupport(){

let box=document.createElement("div");
box.id = "supportOverlay";

box.style.position="fixed";
box.style.left="50%";
box.style.top="50%";
box.style.transform="translate(-50%,-50%)";
box.style.background="rgba(17,26,43,0.95)";
box.style.backdropFilter="blur(15px)";
box.style.padding="25px";
box.style.borderRadius="20px";
box.style.zIndex="9999";
box.style.width="280px";
box.style.textAlign="center";
box.style.boxShadow="0 0 25px #ff7a18";


box.innerHTML=`

<h3>🎧 Customer Support</h3>

<p>📧 Email</p>

<button onclick="openEmail()">
miai.customerservice@gmail.com
</button>


<p>📱 WhatsApp</p>

<button onclick="openWhatsApp()">
0756390621
</button>


<button onclick="this.parentElement.remove()">
❌ Close
</button>

`;

document.body.appendChild(box);

}



/* EMAIL */

function openEmail(){

window.open(
"https://mail.google.com/mail/?view=cm&fs=1&to=miai.customerservice@gmail.com&su=MI%20AI%20Customer%20Support",
"_blank"
);

}



/* WHATSAPP */

function openWhatsApp(){

window.open(
"https://wa.me/94756390621",
"_blank"
);

}

function openLogin(){

let box=document.getElementById("loginBox");

box.style.display =
box.style.display=="block"
?"none"
:"block";

}


function loginEmail(){

let email=document.getElementById("email").value;

let password=document.getElementById("password").value;


auth.signInWithEmailAndPassword(email,password)

.then(()=>{

alert("Login Success ✅");

document.getElementById("loginBox").style.display = "none";
document.getElementById("email").value = "";
document.getElementById("password").value = "";

})


.catch(()=>{

auth.createUserWithEmailAndPassword(email,password)

.then(()=>{

alert("New Account Created ✅");

document.getElementById("loginBox").style.display = "none";
document.getElementById("email").value = "";
document.getElementById("password").value = "";

})
.catch(e=>alert(e.message));

});


}



function logout(){

auth.signOut();

alert("Logout");

location.reload();

}

auth.onAuthStateChanged(function(currentUser){

let loginBtn = document.getElementById("loginBtn");
let logoutBtn = document.getElementById("logoutBtn");


if(currentUser){

    user = currentUser;

    loginBtn.style.display="none";

    logoutBtn.style.display="block";

    console.log(
    "Logged Account : " + user.email
    );


}else{

    user=null;

    loginBtn.style.display="block";

    logoutBtn.style.display="none";

}

});

</script>

</body>
</html>
