                    type: "offline",
                    persistent: true
                }
            );
        }
    }

    function replyIsActive() {
        try {
            if (
                typeof replyInProgress !==
                    "undefined"
            ) {
                return Boolean(
                    replyInProgress
                );
            }
        }
        catch (error) {
            // Ignore inaccessible variable.
        }

        return Boolean(
            window.replyInProgress
        );
    }

    function monitorThinking() {
        setInterval(
            function () {
                const active =
                    replyIsActive();

                if (
                    active &&
                    !thinkingWasActive
                ) {
                    thinkingWasActive =
                        true;

                    showIsland(
                        words().thinking,
                        {
                            type:
                                "thinking",

                            persistent:
                                true
                        }
                    );
                }
                else if (
                    !active &&
                    thinkingWasActive
                ) {
                    thinkingWasActive =
                        false;

                    hideIsland();
                }
            },
            220
        );
    }

    function installEventNotifications() {
        window.addEventListener(
            "mi-chat-saved",
            function () {
                queueIsland(
                    words().saved,
                    {
                        type: "save",
                        duration: 1800
                    }
                );
            }
        );

        window.addEventListener(
            "mi-file-uploaded",
            function () {
                queueIsland(
                    words().uploaded,
                    {
                        type: "upload",
                        duration: 2100
                    }
                );

                showToast(
                    words().uploaded,
                    {
                        type: "upload",
                        duration: 2200
                    }
                );
            }
        );
    }

    function monitorNewFiles() {
        const preview =
            document.getElementById(
                "attachmentPreview"
            );

        if (!preview) {
            return;
        }

        let lastText =
            preview.textContent;

        const observer =
            new MutationObserver(
                function () {
                    if (observerRefreshPending) {
                        return;
                    }

                    observerRefreshPending =
                        true;

                    requestAnimationFrame(
                        function () {
                            observerRefreshPending =
                                false;

                            const current =
                                preview.textContent
                                    .trim();

                            if (
                                current &&
                                current !==
                                    lastText
                            ) {
                                lastText =
                                    current;

                                queueIsland(
                                    words().uploaded,
                                    {
                                        type:
                                            "upload",

                                        duration:
                                            2000
                                    }
                                );
                            }
                        }
                    );
                }
            );

        observer.observe(
            preview,
            {
                childList: true,
                subtree: true,
                characterData: true
            }
        );
    }

    function start() {
        const ui = ensureUi();

        ui.backdrop.addEventListener(
            "click",
            closeSheet
        );

        ui.sheet
            .querySelector(
                "#miIosSheetCancel"
            )
            .addEventListener(
                "click",
                closeSheet
            );

        document.addEventListener(
            "keydown",
            function (event) {
                if (
                    event.key ===
                        "Escape" &&
                    sheetOpen
                ) {
                    closeSheet();
                }
            }
        );

        addHapticFeedback();
        addContextMenu();
        addLongPress();
        monitorCopyActions();
        monitorOnlineStatus();
        monitorThinking();
        installEventNotifications();
        monitorNewFiles();

        window.dispatchEvent(
            new CustomEvent(
                "mi-ios-safe-bundle-ready"
            )
        );

        console.log(
            "[MI AI] iOS safe bundle ready."
        );
    }

    window.MIIOS = {
        island:
            showIsland,

        hideIsland:
            hideIsland,

        toast:
            showToast,

        sheet:
            showSheet,

        closeSheet:
            closeSheet,

        chatActions:
            showChatActions
    };

    if (
        document.readyState ===
        "loading"
    ) {
        document.addEventListener(
            "DOMContentLoaded",
            start,
            {
                once: true
            }
        );
    }
    else {
        start();
    }
})();

/* MI AI IOS SAFE BUNDLE JS - END */
</script>

    async function createNewChatOnce() {
        try {
            if (
                typeof removeLoginPrompt ===
                    "function"
            ) {
                removeLoginPrompt();
            }
        }
        catch (error) {
            // Optional UI function.
        }

        const params =
            new URLSearchParams(
                window.location.search
            );

        if (
            params.has("s") ||
            params.has("share") ||
            document.body.classList
                .contains(
                    "mi-shared-single-chat"
                )
        ) {
            window.location.assign(
                window.location.origin +
                window.location.pathname
            );

            return "";
        }

        const button =
            document.querySelector(
                [
                    "#newChatBtn",
                    ".new-chat-btn",
                    'button[onclick*="newChat"]'
                ].join(",")
            );

        const container =
            getChatBox();

        button?.classList.add(
            "mi-v9-new-chat-running"
        );

        container?.classList.add(
            "mi-v9-switching"
        );

        await new Promise(
            function (resolve) {
                requestAnimationFrame(
                    function () {
                        requestAnimationFrame(
                            resolve
                        );
                    }
                );
            }
        );

        try {
            const chatId =
                createBlankChatRecord();

            /*
              Save the blank chat before and after
              it is rendered. It must not be discarded.
            */
            saveEverything();
            renderListClean();
            openChatClean(
                chatId
            );
            saveEverything();

            window.dispatchEvent(
                new CustomEvent(
                    "mi-new-chat-created",
                    {
                        detail: {
                            chatId:
                                chatId,

                            empty:
                                true,

                            isolated:
                                true
                        }
                    }
                )
            );

            return chatId;
        }
        finally {
            setTimeout(
                function () {
                    button?.classList.remove(
                        "mi-v9-new-chat-running"
                    );

                    container?.classList.remove(
                        "mi-v9-switching"
                    );
                },
                70
            );
        }
    }

    function queueNewChat() {
        /*
          Every separate press is queued.
          No press is blocked or combined.
        */
        const task =
            newChatQueue.then(
                createNewChatOnce,
                createNewChatOnce
            );

        newChatQueue =
            task.catch(
                function (error) {
                    console.error(
                        "[MI AI V9] New Chat failed:",
                        error
                    );
                }
            );

        return task;
    }

    function addClean(
        role,
        text
    ) {
        const id =
            currentId();

        const chat =
            chatMap()[id];

        const container =
            getChatBox();

        if (
            !id ||
            !chat ||
            !container
        ) {
            return;
        }

        const normalizedRole =
            role === "user"
                ? "me"
                : role;

        const content =
            String(text || "");

        if (
            normalizedRole ===
                "ai"
        ) {
            if (
                typeof appendAiMessage ===
                    "function"
            ) {
                appendAiMessage(
                    container,
                    content
                );
            }

            return;
        }

        const hadFirstMessage =
            Boolean(
                firstUserMessage(
                    chat
                )
            );

        document
            .getElementById(
                "miWelcomeV9"
            )
            ?.remove();

        const bubble =
            document.createElement(
                "div"
            );

        bubble.className =
            normalizedRole;

        bubble.textContent =
            content;

        container.appendChild(
            bubble
        );

        chat.push({
            role:
                normalizedRole,

            text:
                content
        });

        chat.updatedAt =
            Date.now();

        chat.messageCount =
            chat.length;

        chat.lastPreview =
            content;

        chat.isEmpty =
            false;

        if (
            !hadFirstMessage &&
            (
                normalizedRole ===
                    "me" ||
                normalizedRole ===
                    "human"
            )
        ) {
            setChatTitle(
                chat,
                semanticTitle(
                    content
                )
            );
        }

        saveEverything();
        renderListClean();

        try {
            const token =
                localStorage.getItem(
                    "mi_supabase_token"
                );

            if (token) {
                const userId =
                    localStorage.getItem(
                        "mi_user_id"
                    ) || "";

                const email =
                    (
                        localStorage.getItem(
                            "mi_user_email"
                        ) || ""
                    )
                        .trim()
                        .toLowerCase();

                fetch(
                    "/api/messages",
                    {
                        method:
                            "POST",

                        headers: {
                            "Content-Type":
                                "application/json",

                            "Authorization":
                                "Bearer " +
                                token,

                            "X-Session-Id":
                                (
                                    typeof accountId !==
                                        "undefined"
                                        ? accountId
                                        : userId
                                ) ||
                                userId,

                            "X-User-Id":
                                userId,

                            "X-User-Email":
                                email
                        },

                        body:
                            JSON.stringify({
                                conversation_id:
                                    id,

                                session_id:
                                    (
                                        typeof accountId !==
                                            "undefined"
                                            ? accountId
                                            : userId
                                    ),

                                role:
                                    normalizedRole,

                                content:
                                    content
                            })
                    }
                ).catch(
                    function () {}
                );
            }
        }
        catch (error) {
            console.warn(
                "[MI AI V9] Message save failed.",
                error
            );
        }

        container.scrollTop =
            container.scrollHeight;
    }

    function refreshTitles() {
        const allChats =
            chatMap();

        let changed =
            false;

        Object.keys(allChats)
            .forEach(
                function (chatId) {
                    const chat =
                        allChats[chatId];

                    const wanted =
                        firstUserMessage(chat)
                            ? semanticTitle(
                                firstUserMessage(
                                    chat
                                )
                            )
                            : EMPTY_TITLE;

                    const current =
                        cleanText(
                            chat.title ||
                            chat.name ||
                            chat.chatName
                        );

                    if (
                        current !== wanted
                    ) {
                        setChatTitle(
                            chat,
                            wanted
                        );

                        changed =
                            true;
                    }
                }
            );

        if (changed) {
            saveEverything();
            renderListClean();
        }
    }

    function install() {
        if (installed) {
            return;
        }

        installed =
            true;

        const newChatFunction =
            function () {
                return queueNewChat();
            };

        const openChatFunction =
            function (chatId) {
                return openChatClean(
                    chatId
                );
            };

        const renderListFunction =
            function () {
                return renderListClean();
            };

        const addFunction =
            function (
                role,
                text
            ) {
                return addClean(
                    role,
                    text
                );
            };

        window.newChat =
            newChatFunction;

        window.openChat =
            openChatFunction;

        window.renderList =
            renderListFunction;

        window.add =
            addFunction;

        try {
            newChat =
                newChatFunction;
        }
        catch (error) {}

        try {
            openChat =
                openChatFunction;
        }
        catch (error) {}

        try {
            renderList =
                renderListFunction;
        }
        catch (error) {}

        try {
            add =
                addFunction;
        }
        catch (error) {}

        setTimeout(refreshTitles, 250);
        window.addEventListener("mi-chat-updated", function () {
            window.clearTimeout(window.__miRefreshTitlesTimer);
            window.__miRefreshTitlesTimer = window.setTimeout(refreshTitles, 120);
        });

        setTimeout(
            function () {
                refreshTitles();
                renderListClean();

                const id =
                    currentId();

                if (
                    id &&
                    chatMap()[id]
                ) {
                    openChatClean(
                        id
                    );
                }
            },
            500
        );

        window.MICleanChatEngineV9 = {
            newChat:
                queueNewChat,

            openChat:
                openChatClean,

            renderList:
                renderListClean,

            semanticTitle:
                semanticTitle,

            refreshTitles:
                refreshTitles
        };

        console.log(
            "[MI AI] Clean Chat Engine V9 installed."
        );
    }

    if (
        document.readyState ===
        "loading"
    ) {
        document.addEventListener(
            "DOMContentLoaded",
            install,
            {
                once:
                    true
            }
        );
    }
    else {
        install();
    }
})();

/* MI AI CLEAN CHAT ENGINE V9 JS - END */
</script>

<script>
(function () {
    "use strict";

    const nativeFetch = window.fetch.bind(window);
    let currentFirebaseUser = null;
    let authReadyResolve = null;
    let authReadyPromise = new Promise(function (resolve) {
        authReadyResolve = resolve;
    });

    function isProtectedMiApi(url) {
        const value = String(url || "");
        return (
            value.includes("/api/share") ||
            value.includes("/api/notifications") ||
            value.includes("/api/owner-notifications") ||
            value.includes("/api/shared-chat") ||
            value.includes("/api/conversations") ||
            value.includes("/api/messages") ||
            value.includes("/api/direct-messages")
        );
    }

    async function waitForFirebaseUser() {
        if (currentFirebaseUser) return currentFirebaseUser;

        await Promise.race([
            authReadyPromise,
            new Promise(function (resolve) { setTimeout(resolve, 1200); })
        ]);

        return (
            currentFirebaseUser ||
            window.miFirebaseUser ||
            (window.firebase && firebase.auth && firebase.auth().currentUser) ||
            null
        );
    }

    async function refreshFirebaseToken(forceRefresh) {
        const firebaseUser = await waitForFirebaseUser();

        if (!firebaseUser || typeof firebaseUser.getIdToken !== "function") {
            localStorage.removeItem("mi_supabase_token");
            return "";
        }

        const token = await firebaseUser.getIdToken(Boolean(forceRefresh));

        localStorage.setItem("mi_supabase_token", token);
        localStorage.setItem("mi_user_id", firebaseUser.uid || "");
        localStorage.setItem(
            "mi_user_email",
            String(firebaseUser.email || "").toLowerCase()
        );

        window.miFirebaseUser = firebaseUser;
        return token;
    }

    window.miGetFreshFirebaseToken = refreshFirebaseToken;

    function connectAuthListener() {
        if (!window.firebase || !firebase.auth || typeof firebase.auth !== "function") {
            setTimeout(connectAuthListener, 150);
            return;
        }

        firebase.auth().onAuthStateChanged(async function (firebaseUser) {
            currentFirebaseUser = firebaseUser || null;
            window.miFirebaseUser = firebaseUser || null;

            if (authReadyResolve) {
                authReadyResolve(firebaseUser || null);
                authReadyResolve = null;
            }

            if (!firebaseUser) {
                localStorage.removeItem("mi_supabase_token");
                return;
            }

            try {
                await refreshFirebaseToken(true);
            }
            catch (error) {
                console.error("[MI AI] Firebase token refresh failed:", error);
            }
        });
    }

    window.fetch = async function (input, init) {
        const requestUrl = typeof input === "string" ? input : (input && input.url) || "";

        if (!isProtectedMiApi(requestUrl)) {
            return nativeFetch(input, init);
        }

        const options = Object.assign({}, init || {});
        const headers = new Headers(
            options.headers ||
            (typeof input !== "string" && input ? input.headers : undefined) ||
            {}
        );

        let token = "";
        try { token = await refreshFirebaseToken(false); }
        catch (error) { console.warn("[MI AI] Normal token refresh failed:", error); }

        if (token) {
            headers.set("Authorization", "Bearer " + token);
            options.headers = headers;
        }

        let response = await nativeFetch(input, options);

        if (response.status === 401 && token) {
            try {
                token = await refreshFirebaseToken(true);
                headers.set("Authorization", "Bearer " + token);
                options.headers = headers;
                response = await nativeFetch(input, options);
            }
            catch (error) {
                console.error("[MI AI] Forced Firebase token refresh failed:", error);
            }
        }

        return response;
    };

    connectAuthListener();
})();
</script>

    function idle() {

        const island = ensureIsland();

        if (!navigator.onLine) {

        if (text) text.textContent = labels().idle;

        island.classList.remove(
            "mi-status-open",
            "mi-thinking",
            "mi-searching"
        );

        island.classList.add("mi-idle-gold");

    function show(message, options) {
        const settings = options || {};
        const type = settings.type || "info";
        const duration = Number(settings.duration ?? 1700);
        const persistent = Boolean(settings.persistent);

        const cleaned = String(message || "")
            .replace(/\s+/g, " ")
            .trim()
            .slice(0, 60);

        if (!cleaned) {
            idle();
            return;
        }

        const now = Date.now();

        if (
            cleaned === lastMessage &&
            now - lastShownAt < 400
        ) {
            return;
        }

        lastMessage = cleaned;
        lastShownAt = now;

        clearTimeout(restoreTimer);

        const island = ensureIsland();
        const text = island.querySelector("#miDynamicIslandText");
        const icon = island.querySelector("#miDynamicIslandIcon");

        island.classList.remove(
            "mi-idle-gold",
            "mi-thinking",
            "mi-searching"
        );

        island.classList.add("mi-status-open");

        if (type === "thinking") {
            island.classList.add("mi-thinking");
        }

        if (type === "searching") {
            island.classList.add("mi-searching");
        }

        if (text) text.textContent = cleaned;
        if (icon) icon.textContent = iconFor(type);

        if (!persistent) {
            restoreTimer = setTimeout(
                idle,
                Math.max(700, duration)
            );
        }
    }

        ];

        const requestTerms = [

            "Ã Â¶Â´Ã Â·â„¢Ã Â¶Â±Ã Â·Å Ã Â¶Â±", "Ã Â¶â€˜Ã Â·â‚¬Ã Â¶Â±Ã Â·Å Ã Â¶Â±", "Ã Â·â€žÃ Â·Å“Ã Â¶Âº", "Ã Â¶Â¯Ã Â·â„¢Ã Â¶Â±Ã Â·Å Ã Â¶Â±", "Ã Â¶â€¢Ã Â¶Â±",
            "pennanna", "yawanna", "hoyanna", "denna", "ona"
        ];

        return (

    function isChatRequest(input) {
        let rawUrl = "";

        if (typeof input === "string") {
            rawUrl = input;
        } else if (input && typeof input.url === "string") {
            rawUrl = input.url;

        try {
            const url = new URL(rawUrl, window.location.origin);

    window.fetch = async function(input, options) {

<script>
(function () {
    "use strict";

    const processedSelector = [
        "#chat .me",
        "#chat .ai",
        "#chat .aiMessageBody",
        "#chat .aiWritingCard",
        "#chat .message",
        "#chat .message-content"
    ].join(",");

    function escapeHtml(value) {
        return String(value == null ? "" : value)
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    function safeUrl(rawValue) {
        let value = String(rawValue || "").trim();

        if (/^www\./i.test(value)) {
            value = "https://" + value;
        }

        try {
            const parsed = new URL(value);

            if (
                parsed.protocol !== "http:" &&
                parsed.protocol !== "https:" &&
                parsed.protocol !== "ftp:"
            ) {
                return "";
            }

            return parsed.href;
        }
        catch (error) {
            return "";
        }
    }

    function normalPhone(rawValue) {
        let phone = String(rawValue || "")
            .replace(/[^\d+]/g, "");

        if (phone.startsWith("00")) {
            phone = "+" + phone.slice(2);
        }

        if (/^0\d{9}$/.test(phone)) {
            phone = "+94" + phone.slice(1);
        }

        return phone;
    }

    function createToken(store, htmlValue) {
        const token =
            "MI_CLICKABLE_TOKEN_" +
            store.length +
            "_" +
            Math.random().toString(36).slice(2) +
            "_END";

        store.push({
            token: token,
            html: htmlValue
        });

        return token;
    }

    function makeClickable(inputText) {
        let value = String(inputText == null ? "" : inputText);

        if (!value) {
            return "";
        }

        const stored = [];

        /*
          Markdown links:
          [Google](https://google.com)
        */
        value = value.replace(
            /\[([^\]\r\n]+)\]\(((?:https?|ftp):\/\/[^\s)]+)\)/gi,
            function (match, label, rawUrl) {
                const url = safeUrl(rawUrl);

                if (!url) {
                    return match;
                }

                return createToken(
                    stored,
                    '<a class="miClickableLink" href="' +
                    escapeHtml(url) +
                    '" target="_blank" rel="noopener noreferrer">' +
                    escapeHtml(label) +
                    "</a>"
                );
            }
        );

        /*
          Email addresses.
        */
        value = value.replace(
            /\b[A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,}\b/gi,
            function (email) {
                const cleanEmail = String(email)
                    .replace(/[\r\n]/g, "");

                return createToken(
                    stored,
                    '<a class="miClickableLink" href="mailto:' +
                    escapeHtml(cleanEmail) +
                    '">' +
                    escapeHtml(cleanEmail) +
                    "</a>"
                );
            }
        );

        /*
          Website URLs.
        */
        value = value.replace(
            /\b(?:(?:https?|ftp):\/\/|www\.)[^\s<>"']+/gi,
            function (rawMatch) {
                let visibleUrl = rawMatch;
                let ending = "";

                while (
                    visibleUrl.length &&
                    /[.,;:!?'"\)\]\}]$/.test(visibleUrl)
                ) {
                    ending = visibleUrl.slice(-1) + ending;
                    visibleUrl = visibleUrl.slice(0, -1);
                }

                const url = safeUrl(visibleUrl);

                if (!url) {
                    return rawMatch;
                }

                return (
                    createToken(
                        stored,
                        '<a class="miClickableLink" href="' +
                        escapeHtml(url) +
                        '" target="_blank" rel="noopener noreferrer">' +
                        escapeHtml(visibleUrl) +
                        "</a>"
                    ) +
                    ending
                );
            }
        );

        /*
          Phone numbers.
        */
        value = value.replace(
            /(^|[^\w@])((?:\+|00)?\d[\d\s().-]{7,}\d)(?![\w@])/g,
            function (match, prefix, rawNumber) {
                const digits = rawNumber.replace(/\D/g, "");

                if (
                    digits.length < 9 ||
                    digits.length > 15
                ) {
                    return match;
                }

                const phone = normalPhone(rawNumber);

                if (!/^\+?\d{9,15}$/.test(phone)) {
                    return match;
                }

                return (
                    prefix +
                    createToken(
                        stored,
                        '<a class="miClickableLink" href="tel:' +
                        escapeHtml(phone) +
                        '">' +
                        escapeHtml(rawNumber) +
                        "</a>"
                    )
                );
            }
        );

        value = escapeHtml(value)
            .replace(/\r\n|\r|\n/g, "<br>");

        stored.forEach(function (item) {
            value = value
                .split(escapeHtml(item.token))
                .join(item.html);
        });

        return value;
    }

    window.miMakeClickable = makeClickable;

    /*
      Override an existing linkifyText function if the project has one.
    */
    window.linkifyText = makeClickable;

    try {
        linkifyText = makeClickable;
    }
    catch (error) {
        console.warn("[MI AI] linkifyText override warning", error);
    }

    function containsClickableText(text) {
        return (
            /(?:https?:\/\/|ftp:\/\/|www\.)/i.test(text) ||
            /\b[A-Z0-9._%+-]+@[A-Z0-9.-]+\.[A-Z]{2,}\b/i.test(text) ||
            /(?:^|[^\w@])(?:\+|00)?\d[\d\s().-]{7,}\d(?![\w@])/i.test(text)
        );
    }

    function upgradeElement(element) {
        if (!element) {
            return;
        }

        if (
            element.matches(
                "a, button, input, textarea, select, option"
            )
        ) {
            return;
        }

        if (
            element.querySelector(
                "button, input, textarea, select, video, audio, iframe"
            )
        ) {
            return;
        }

        if (
            element.classList.contains("ai") &&
            element.querySelector(
                ".aiMessageBody, .aiWritingCard, .message-content"
            )
        ) {
            return;
        }

        const originalText = String(
            element.dataset.finalText ||
            element.textContent ||
            ""
        );

        if (!containsClickableText(originalText)) {
            return;
        }

        const output = makeClickable(originalText);

        if (output) {
            element.innerHTML = output;
            element.dataset.finalText = originalText;
            element.dataset.miClickableDone = "true";
        }
    }

    function upgradeChat(root) {
        const parent = root || document;

        parent
            .querySelectorAll(processedSelector)
            .forEach(upgradeElement);
    }

    function startClickableFeature() {
        upgradeChat(document);

        const chat = document.getElementById("chat");

        if (!chat) {
            setTimeout(startClickableFeature, 500);
            return;
        }

        let scheduled = false;

        const observer = new MutationObserver(function () {
            if (scheduled) {
                return;
            }

            scheduled = true;

            requestAnimationFrame(function () {
                scheduled = false;
                upgradeChat(chat);
            });
        });

        observer.observe(chat, {
            childList: true,
            subtree: true,
            characterData: true
        });

        setTimeout(function () {
            upgradeChat(document);
        }, 500);

        setTimeout(function () {
            upgradeChat(document);
        }, 1500);

        setTimeout(function () {
            upgradeChat(document);
        }, 3000);
    }

    document.addEventListener(
        "click",
        function (event) {
            const link = event.target.closest("a.miClickableLink");

            if (!link) {
                return;
            }

            const href = String(
                link.getAttribute("href") || ""
            );

            if (
                !/^(https?:|ftp:|mailto:|tel:)/i.test(href)
            ) {
                event.preventDefault();
                return;
            }

            event.stopPropagation();
        },
        false
    );

    if (document.readyState === "loading") {
        document.addEventListener(
            "DOMContentLoaded",
            startClickableFeature,
            { once: true }
        );
    }
    else {
        startClickableFeature();
    }

    console.log("[MI AI] Clickable links feature active.");
})();
</script>

                /ÃƒÂ°Ã…Â¸|Ã¢â€°Â¡Ã†â€™|ÃƒÆ’|ÃƒÂ¢Ã¢â€šÂ¬|ÃƒÂ¢Ã…â€œ|ÃƒÂ¯Ã‚Â»Ã‚Â¿/.test(text) &&

    function repairAllIcons() {

        iconRepairRunning = true;

            removeVisibleMojibakeFromKnownButtons();

    function scheduleIconRepair() {
        if (iconRepairQueued) return;

        iconRepairQueued = true;

        window.requestAnimationFrame(function () {
            repairAllIcons();
        });
    }

    function startIconSystem() {
        repairAllIcons();

        if (!document.body) return;

        const observer = new MutationObserver(function (mutations) {
            const shouldRepair = mutations.some(function (mutation) {
                return (
                    mutation.type === "childList" ||
                    mutation.type === "characterData" ||
                    (
                        mutation.type === "attributes" &&
                        [

            childList: true,

            "DOMContentLoaded",
            startIconSystem,
            { once: true }
        );
    } else {

function render(){const rows=document.getElementById('miAccountChatRows');if(!rows)return;if(!items.length){rows.innerHTML='<div class="mi-account-chat-empty">No received messages yet.</div>';return}rows.innerHTML=items.map(x=>'<article class="mi-account-chat-message '+(!x.is_read?'mi-unread':'')+'"><strong>Sender: '+esc(x.sender_email||'Unknown')+'</strong><p>'+esc(x.message||'')+'</p><time>'+esc(x.created_at?new Date(x.created_at).toLocaleString():'')+'</time></article>').join('')}
async function load(showError){if(loading||!user())return;loading=true;try{const r=await fetch(api,{headers:await headers(false),cache:'no-store'});const j=await r.json().catch(()=>({}));if(!r.ok||j.success===false)throw new Error(j.error||j.message||'Could not load messages.');items=Array.isArray(j.items)?j.items:[];unread=Number(j.unread||0);updateBadge();render();if(document.getElementById('miAccountChatBackdrop')?.classList.contains('mi-open')&&unread>0)await markRead()}catch(e){if(showError)notify(e.message,true)}finally{loading=false}}
async function markRead(){const ids=items.filter(x=>!x.is_read&&x.id).map(x=>x.id);if(!ids.length)return;try{const r=await fetch(api+'/read',{method:'POST',headers:await headers(true),body:JSON.stringify({ids})});if(r.ok){items.forEach(x=>{if(ids.includes(x.id))x.is_read=true});unread=0;updateBadge();render()}}catch(e){}}
async function send(e){e.preventDefault();const to=document.getElementById('miAccountChatTo');const msg=document.getElementById('miAccountChatMessage');const button=document.getElementById('miAccountChatSend');const recipient=String(to.value||'').trim().toLowerCase();const message=String(msg.value||'').trim();if(!recipient||!message){notify('Enter the recipient email and message.',true);return}button.disabled=true;notify('Sending...',false);try{const r=await fetch(api,{method:'POST',headers:await headers(true),body:JSON.stringify({to:recipient,message})});const j=await r.json().catch(()=>({}));if(!r.ok||j.success===false)throw new Error(j.error||j.message||'Message could not be sent.');msg.value='';notify('Message sent successfully.',false)}catch(err){notify(err.message,true)}finally{button.disabled=false}}
async function openPanel(){if(!user()){if(typeof window.openLogin==='function')window.openLogin();else alert('Please login first.');return}ensurePanel().classList.add('mi-open');await load(true);render();await markRead()}
function closePanel(){document.getElementById('miAccountChatBackdrop')?.classList.remove('mi-open')}
function start(){ensureButton();ensurePanel();clearInterval(pollTimer);pollTimer=setInterval(()=>{ensureButton();load(false)},15000);load(false)}
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',start,{once:true});else start();
window.addEventListener('mi-firebase-auth-changed',()=>setTimeout(()=>{ensureButton();load(false)},150));
window.miOpenAccountChat=openPanel;
})();
</script>

        const raw = String(value || "").trim().toLowerCase();
        if (raw === "sinhala" || raw === "sin" || raw.startsWith("si")) return "si";
        if (raw === "tamil" || raw.startsWith("ta")) return "ta";
        return "en";

        return normalizeLanguage(selected || stored || "en");

        Array.from(element.childNodes).forEach(function (node) {

            const clean = raw.replace(/\s+/g, " ").trim();

            document.querySelector("select[name='language']") ||
            document.querySelector("[data-language-select]");

        if (selector && normalizeLanguage(selector.value) !== lang) {
            const matching = Array.from(selector.options || []).find(function (option) {
                return normalizeLanguage(option.value || option.textContent) === lang;
            });
            if (matching) selector.value = matching.value;
        }

        window.dispatchEvent(new CustomEvent("mi-language-applied", {
            detail: { language: lang }
        }));
    }

    function installSelectorListener() {
        const selector = document.getElementById("languageSelect") ||
            document.querySelector("select[name='language']") ||
            document.querySelector("[data-language-select]");

        if (!selector || selector.__miLanguageListener) return;
        selector.__miLanguageListener = true;

        selector.addEventListener("change", function () {
            applyLanguage(normalizeLanguage(selector.value || selector.selectedOptions?.[0]?.textContent));
        });
    }

    let scheduled = false;
    const observer = new MutationObserver(function () {
        if (scheduled) return;
        scheduled = true;

        requestAnimationFrame(function () {
            scheduled = false;
            installSelectorListener();
            applyLanguage(currentLanguage());
        });
    });

    function start() {
        installSelectorListener();
        applyLanguage(currentLanguage());

        observer.observe(document.body, {
            childList: true,
            subtree: true
        });
    }

    window.miApplyLanguage = applyLanguage;

    if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", start, { once: true });
    } else {
        start();
    }
})();

<script>
/* MI AI STRICT ACCOUNT ISOLATION V1 START */
(function () {
    "use strict";

    const ACCOUNT_PREFIX = "mi_account_cache_v2:";
    const GUEST_KEY = "mi_guest_single_chat_v2";
    let restoreVersion = 0;
    let saveTimer = 0;

    function auth() {
        try { return window.firebase.auth(); } catch (error) { return null; }
    }

    function currentUser() {
        return auth()?.currentUser || null;
    }

    function uid() {
        return String(currentUser()?.uid || "");
    }

    function accountKey(user) {
        return ACCOUNT_PREFIX + String(user?.uid || "");
    }

    function db() {
        try { return window.firebase.firestore(); } catch (error) { return null; }
    }

    function captureSettings() {
        const root = getComputedStyle(document.documentElement);
        return {
            theme: localStorage.getItem("theme") || localStorage.getItem("mi_theme") || "",
            themeColor: localStorage.getItem("themeColor") || localStorage.getItem("mi_theme_color") || root.getPropertyValue("--main").trim() || "",
            fontSize: Number(localStorage.getItem("fontSize") || localStorage.getItem("mi_font_size") || 15),
            language: localStorage.getItem("mi_ui_language") || document.documentElement.lang || "en"
        };
    }

    function captureChats() {
        const source = window.chats || window.chatHistory || window.savedChats || {};
        if (!source || typeof source !== "object") return {};
        return JSON.parse(JSON.stringify(source));
    }

    function clearVisibleData() {
        try {
            if (window.chats && typeof window.chats === "object") {
                Object.keys(window.chats).forEach(function (key) { delete window.chats[key]; });
            }
            if (window.chatHistory && typeof window.chatHistory === "object") {
                Object.keys(window.chatHistory).forEach(function (key) { delete window.chatHistory[key]; });
            }
            const chat = document.getElementById("chat");
            const list = document.getElementById("chatList");
            if (chat) chat.innerHTML = "";
            if (list) list.innerHTML = "";
        } catch (error) {
            console.warn("[Account Isolation] UI clear skipped", error);
        }
    }

    async function deleteCollection(collectionRef) {
        const snapshot = await collectionRef.get();
        let batch = db().batch();
        let count = 0;
        for (const doc of snapshot.docs) {
            batch.delete(doc.ref);
            count += 1;
            if (count >= 400) {
                await batch.commit();
                batch = db().batch();
                count = 0;
            }
        }
        if (count > 0) await batch.commit();
    }

    async function saveExactSnapshot(reason) {
        const user = currentUser();
        const store = db();
        if (!user || !store) return false;

        const expectedUid = user.uid;
        const chats = captureChats();
        const settings = captureSettings();
        const userRef = store.collection("users").doc(expectedUid);
        const existing = await userRef.collection("chats").get();
        const validIds = new Set();

        Object.keys(chats).forEach(function (chatId) {
            const raw = chats[chatId];
            const messages = Array.isArray(raw) ? raw : (Array.isArray(raw?.messages) ? raw.messages : []);
            if (messages.length > 0) validIds.add(String(chatId));
        });

        for (const doc of existing.docs) {
            if (currentUser()?.uid !== expectedUid) throw new Error("Account changed during save");
            if (!validIds.has(doc.id)) {
                await deleteCollection(doc.ref.collection("messages"));
                await doc.ref.delete();
            }
        }

        for (const chatId of validIds) {
            if (currentUser()?.uid !== expectedUid) throw new Error("Account changed during save");
            const raw = chats[chatId];
            const messages = Array.isArray(raw) ? raw : raw.messages;
            const chatRef = userRef.collection("chats").doc(chatId);

            await chatRef.set({
                ownerUid: expectedUid,
                title: String(raw.title || raw.name || chatId),
                pin: Boolean(raw.pin || raw.pinned),
                messageCount: messages.length,
                updatedAt: window.firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });

            await deleteCollection(chatRef.collection("messages"));

            let batch = store.batch();
            let count = 0;
            messages.forEach(function (message, index) {
                const id = String(message.id || message.messageId || ("message-" + String(index).padStart(6, "0")));
                const text = String(message.text ?? message.content ?? message.message ?? "");
                const role = String(message.role || message.sender || (message.className === "ai" ? "ai" : "user"));
                batch.set(chatRef.collection("messages").doc(id), {
                    ownerUid: expectedUid,
                    role: role === "ai" || role === "assistant" ? "ai" : "user",
                    text: text,
                    content: text,
                    order: index,
                    updatedAt: window.firebase.firestore.FieldValue.serverTimestamp()
                });
                count += 1;
            });
            if (count > 0) await batch.commit();
        }

        await userRef.set({
            uid: expectedUid,
            email: String(user.email || "").toLowerCase(),
            updatedAt: window.firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });

        await userRef.collection("settings").doc("general").set({
            ownerUid: expectedUid,
            settings: settings,
            theme: settings.theme,
            themeColor: settings.themeColor,
            fontSize: settings.fontSize,
            language: settings.language,
            updatedAt: window.firebase.firestore.FieldValue.serverTimestamp()
        }, { merge: true });

        localStorage.setItem(accountKey(user), JSON.stringify({
            uid: expectedUid,
            email: String(user.email || "").toLowerCase(),
            chats: chats,
            settings: settings,
            savedAt: Date.now(),
            reason: reason || "auto"
        }));

        return true;
    }

    async function restoreExactSnapshot(user) {
        const version = ++restoreVersion;
        const store = db();
        if (!user || !store) return null;

        const expectedUid = user.uid;
        const userRef = store.collection("users").doc(expectedUid);
        const settingsDoc = await userRef.collection("settings").doc("general").get();
        const settingsData = settingsDoc.exists ? settingsDoc.data() : {};
        const settings = settingsData.settings || settingsData || {};
        const chatsSnapshot = await userRef.collection("chats").get();
        const chats = {};

        for (const chatDoc of chatsSnapshot.docs) {
            if (version !== restoreVersion || currentUser()?.uid !== expectedUid) {
                throw new Error("Account changed during restore");
            }
            const meta = chatDoc.data() || {};
            if (meta.ownerUid && meta.ownerUid !== expectedUid) continue;
            const messageSnapshot = await chatDoc.ref.collection("messages").orderBy("order", "asc").get().catch(function () {
                return chatDoc.ref.collection("messages").get();
            });
            const messages = messageSnapshot.docs.map(function (doc, index) {
                const data = doc.data() || {};
                if (data.ownerUid && data.ownerUid !== expectedUid) return null;
                return {
                    id: doc.id,
                    role: data.role === "ai" ? "ai" : "me",
                    sender: data.role === "ai" ? "ai" : "user",
                    text: String(data.text ?? data.content ?? ""),
                    content: String(data.content ?? data.text ?? ""),
                    order: Number.isFinite(Number(data.order)) ? Number(data.order) : index
                };
            }).filter(Boolean);
            if (messages.length === 0) continue;
            chats[chatDoc.id] = messages;
            chats[chatDoc.id].title = String(meta.title || chatDoc.id);
            chats[chatDoc.id].pin = Boolean(meta.pin || meta.pinned);
            chats[chatDoc.id].pinned = Boolean(meta.pin || meta.pinned);
            chats[chatDoc.id].messageCount = messages.length;
        }

        if (version !== restoreVersion || currentUser()?.uid !== expectedUid) {
            throw new Error("Account changed during restore");
        }

        localStorage.setItem(accountKey(user), JSON.stringify({
            uid: expectedUid,
            email: String(user.email || "").toLowerCase(),
            chats: chats,
            settings: settings,
            restoredAt: Date.now()
        }));

        window.dispatchEvent(new CustomEvent("mi-account-data-restored", {
            detail: { uid: expectedUid, email: user.email || "", chats: chats, settings: settings }
        }));

        console.log("[Account Isolation] Exact account restored", expectedUid, Object.keys(chats).length);
        return { uid: expectedUid, chats: chats, settings: settings };
    }

    function scheduleSave(reason) {
        clearTimeout(saveTimer);
        saveTimer = setTimeout(function () {
            saveExactSnapshot(reason).catch(function (error) {
                console.error("[Account Isolation] Save failed", error);
            });
        }, 700);
    }

    window.addEventListener("mi-chat-saved", function () { scheduleSave("chat-saved"); });
    window.addEventListener("mi-message-saved", function () { scheduleSave("message-saved"); });
    window.addEventListener("mi-settings-changed", function () { scheduleSave("settings-changed"); });
    window.addEventListener("pagehide", function () { saveExactSnapshot("pagehide").catch(function () {}); });

    document.addEventListener("click", function (event) {
        const target = event.target?.closest?.("button,[role='button']");
        const text = String(target?.textContent || target?.getAttribute?.("aria-label") || "").toLowerCase();
        if (/send|save|rename|pin|delete|theme|language|font/.test(text)) scheduleSave("ui-action");
    }, true);

    const authInstance = auth();
    if (authInstance) {
        authInstance.onAuthStateChanged(async function (user) {
            restoreVersion += 1;
            clearVisibleData();
            if (!user) {
                window.__miStrictAccountUid = "";
                window.__miStrictAccountEmail = "";
                if (!localStorage.getItem(GUEST_KEY)) {
                    localStorage.setItem(GUEST_KEY, JSON.stringify({ chats: {}, activeChatId: null }));
                }
                return;
            }
            window.__miStrictAccountUid = user.uid;
            window.__miStrictAccountEmail = String(user.email || "").toLowerCase();
            await restoreExactSnapshot(user).catch(function (error) {
                console.error("[Account Isolation] Restore failed", error);
            });
        });
    }

    window.MIAccountIsolation = {
        saveNow: saveExactSnapshot,
        restoreNow: function () { return restoreExactSnapshot(currentUser()); },
        currentUid: uid,
        accountKey: accountKey,
        guestKey: GUEST_KEY
    };
})();
/* MI AI STRICT ACCOUNT ISOLATION V1 END */
</script>



<script>
/* MI AI ACCOUNT ISOLATION V2 START */

(function () {
    "use strict";

    const PRIVATE_API_PATHS = [
        "/api/conversations",
        "/api/messages",
        "/api/account-settings",
        "/api/user-settings",
        "/api/direct-messages"
    ];

    const originalFetch =
        window.fetch.bind(window);

    function getCurrentFirebaseUser() {
        try {
            if (
                window.miFirebaseAuth &&
                window.miFirebaseAuth.currentUser
            ) {
                return window.miFirebaseAuth.currentUser;
            }
        } catch (error) {
            console.warn(
                "[MI Account] miFirebaseAuth unavailable.",
                error
            );
        }

        try {
            if (
                window.firebase &&
                typeof window.firebase.auth === "function"
            ) {
                return (
                    window.firebase.auth().currentUser
                    || null
                );
            }
        } catch (error) {
            console.warn(
                "[MI Account] Firebase auth unavailable.",
                error
            );
        }

        return window.miFirebaseUser || null;
    }

    function getRequestPath(input) {
        try {
            const requestUrl =
                typeof input === "string"
                    ? input
                    : input.url;

            return new URL(
                requestUrl,
                window.location.origin
            ).pathname.replace(/\/+$/, "");
        } catch (error) {
            return String(input || "")
                .split("?")[0]
                .replace(/\/+$/, "");
        }
    }

    function isPrivateAccountRequest(input) {
        const path = getRequestPath(input);

        return PRIVATE_API_PATHS.some(
            function (privatePath) {
                return (
                    path === privatePath ||
                    path.startsWith(
                        privatePath + "/"
                    )
                );
            }
        );
    }

    async function getFirebaseIdToken(
        forceRefresh
    ) {
        const user =
            getCurrentFirebaseUser();

        if (
            !user ||
            typeof user.getIdToken !== "function"
        ) {
            return "";
        }

        return await user.getIdToken(
            Boolean(forceRefresh)
        );
    }

    function createUnauthorizedResponse(
        message
    ) {
        return new Response(
            JSON.stringify({
                success: false,
                message:
                    message
                    || "Please sign in again."
            }),
            {
                status: 401,
                headers: {
                    "Content-Type":
                        "application/json"
                }
            }
        );
    }

    function forceVerifiedOwnership(
        body,
        user
    ) {
        if (
            !body ||
            typeof body !== "object"
        ) {
            return body;
        }

        body.user_id = String(user.uid);
        body.owner_id = String(user.uid);
        body.account_id = String(user.uid);
        body.session_id = String(user.uid);

        if (user.email) {
            body.email =
                String(user.email).toLowerCase();

            body.user_email =
                String(user.email).toLowerCase();
        }

        return body;
    }

    function clearPreviousAccountScreen() {
        try {
            window.selectedChat = null;
            window.currentChat = null;
            window.activeConversationId = null;
        } catch (error) {
            console.warn(
                "[MI Account] Could not reset chat selection.",
                error
            );
        }

        const selectors = [
            "#messages",
            "#chatMessages",
            "#chat",
            ".chat-messages",
            ".messages-container"
        ];

        selectors.forEach(
            function (selector) {
                try {
                    const element =
                        document.querySelector(
                            selector
                        );

                    if (element) {
                        element.innerHTML = "";
                    }
                } catch (error) {
                    console.warn(
                        "[MI Account] Screen clear failed.",
                        error
                    );
                }
            }
        );
    }

    window.miCurrentAccountUid =
        function () {
            const user =
                getCurrentFirebaseUser();

            return user && user.uid
                ? String(user.uid)
                : "";
        };

    window.miAccountStorageKey =
        function (key) {
            const uid =
                window.miCurrentAccountUid()
                || "guest";

            return (
                "mi_account_" +
                uid +
                "_" +
                String(key || "")
            );
        };

    window.fetch =
        async function (input, init) {
            if (
                !isPrivateAccountRequest(input)
            ) {
                return originalFetch(
                    input,
                    init
                );
            }

            const user =
                getCurrentFirebaseUser();

            if (!user || !user.uid) {
                return createUnauthorizedResponse(
                    "Please sign in to access your chats."
                );
            }

            const options =
                Object.assign(
                    {},
                    init || {}
                );

            const originalHeaders =
                options.headers ||
                (
                    typeof input !== "string" &&
                    input
                        ? input.headers
                        : undefined
                ) ||
                {};

            const headers =
                new Headers(
                    originalHeaders
                );

            let token = "";

            try {
                token =
                    await getFirebaseIdToken(
                        false
                    );
            } catch (error) {
                console.error(
                    "[MI Account] Token load failed.",
                    error
                );
            }

            if (!token) {
                return createUnauthorizedResponse(
                    "Authentication token is unavailable."
                );
            }

            headers.set(
                "Authorization",
                "Bearer " + token
            );

            headers.set(
                "X-User-Id",
                String(user.uid)
            );

            headers.set(
                "X-Session-Id",
                String(user.uid)
            );

            if (user.email) {
                headers.set(
                    "X-User-Email",
                    String(user.email).toLowerCase()
                );
            }

            const contentType =
                String(
                    headers.get(
                        "Content-Type"
                    )
                    || ""
                ).toLowerCase();

            if (
                typeof options.body === "string" &&
                contentType.includes(
                    "application/json"
                )
            ) {
                try {
                    const parsedBody =
                        JSON.parse(
                            options.body
                        );

                    options.body =
                        JSON.stringify(
                            forceVerifiedOwnership(
                                parsedBody,
                                user
                            )
                        );
                } catch (error) {
                    console.warn(
                        "[MI Account] JSON body could not be updated.",
                        error
                    );
                }
            }

            options.headers = headers;

            let response =
                await originalFetch(
                    input,
                    options
                );

            if (response.status === 401) {
                try {
                    const refreshedToken =
                        await getFirebaseIdToken(
                            true
                        );

                    if (refreshedToken) {
                        headers.set(
                            "Authorization",
                            "Bearer " +
                                refreshedToken
                        );

                        options.headers =
                            headers;

                        response =
                            await originalFetch(
                                input,
                                options
                            );
                    }
                } catch (error) {
                    console.error(
                        "[MI Account] Token refresh failed.",
                        error
                    );
                }
            }

            return response;
        };

    function connectAccountListener() {
        let auth = null;

        try {
            if (window.miFirebaseAuth) {
                auth =
                    window.miFirebaseAuth;
            } else if (
                window.firebase &&
                typeof window.firebase.auth ===
                    "function"
            ) {
                auth =
                    window.firebase.auth();
            }
        } catch (error) {
            auth = null;
        }

        if (
            !auth ||
            typeof auth.onAuthStateChanged !==
                "function"
        ) {
            setTimeout(
                connectAccountListener,
                500
            );

            return;
        }

        let previousUid =
            getCurrentFirebaseUser()?.uid
            || "";

        auth.onAuthStateChanged(
            function (user) {
                const nextUid =
                    user?.uid || "";

                if (
                    previousUid !== nextUid
                ) {
                    clearPreviousAccountScreen();
                }

                previousUid = nextUid;

                window.dispatchEvent(
                    new CustomEvent(
                        "mi-account-changed",
                        {
                            detail: {
                                uid: nextUid,
                                email:
                                    user?.email
                                    || ""
                            }
                        }
                    )
                );
            }
        );
    }

    connectAccountListener();
})();

/* MI AI ACCOUNT ISOLATION V2 END */
</script>

    const CHIEF_OWNER_EMAIL = "teamofchatbot.miai@gmail.com";

    function authObject() {
        try {
            if (window.miFirebaseAuth) return window.miFirebaseAuth;
            if (window.firebase && typeof firebase.auth === "function") {
                return firebase.auth();
            }
        } catch (_) {}
        return null;
    }

    function currentUser() {
        const auth = authObject();
        return (auth && auth.currentUser) ||
            window.miFirebaseUser ||
            window.currentFirebaseUser ||
            null;
    }

    function ownerButton() {
        return document.getElementById("miFinalOwnerBtn") ||
            document.getElementById("miChiefOwnerPermissionButton");
    }

    function putButtonInsideSettings() {
        const panel = document.getElementById("settingsPanel");
        const button = ownerButton();
        if (!panel || !button) return null;
        if (button.parentElement !== panel) panel.appendChild(button);
        button.textContent = "ÃƒÂ°Ã…Â¸Ã¢â‚¬ËœÃ¢â‚¬Ëœ Chief Owner Permissions";
        return button;
    }

    async function backendOwner(user) {
        if (!user || typeof user.getIdToken !== "function") return false;
        try {
            const response = await fetch("/api/admin/me", {
                headers: { Authorization: "Bearer " + await user.getIdToken(true) },
                cache: "no-store"
            });
            const data = await response.json().catch(function () { return {}; });

                data.isChiefOwner === true ||
                data.is_chief_owner === true ||
                data.role === "chief_owner" ||
                data.role === "Chief Owner"
            ));
        } catch (_) {
            return false;

<script>
/* MI AI SEND STOP CONTROL V1 START */
(function () {
    "use strict";

    var originalFetch = window.fetch.bind(window);
    var activeControllers = new Set();
    var activeChatRequests = 0;
    var isStopping = false;

    var SEND_TEXT = "Send";
    var STOP_TEXT = "Stop";

    var sendButtonSelectors = [
        "#sendBtn",
        "#send-btn",
        "#sendButton",
        "#send-button",
        "#messageSendButton",
        "#message-send-button",
        "#chatSendButton",
        "#chat-send-button",
        "button[data-send]",
        "button[data-action='send']",
        ".send-button",
        ".send-btn",
        ".chat-send-button",
        ".message-send-button",
        "form button[type='submit']"
    ];

    function findSendButtons() {
        var buttons = [];
        var seen = new Set();

        sendButtonSelectors.forEach(function (selector) {
            try {
                document
                    .querySelectorAll(selector)
                    .forEach(function (button) {
                        if (
                            button &&
                            button.tagName === "BUTTON" &&
                            !seen.has(button)
                        ) {
                            seen.add(button);
                            buttons.push(button);
                        }
                    });
            } catch (error) {}
        });

        return buttons;
    }

    function rememberOriginalButton(button) {
        if (!button.dataset.miSendStopOriginalHtml) {
            button.dataset.miSendStopOriginalHtml =
                button.innerHTML;
        }

        if (!button.dataset.miSendStopOriginalTitle) {
            button.dataset.miSendStopOriginalTitle =
                button.getAttribute("title") || "";
        }

        if (!button.dataset.miSendStopOriginalAria) {
            button.dataset.miSendStopOriginalAria =
                button.getAttribute("aria-label") || "";
        }
    }

    function createStopIcon() {
        return (
            '<span class="mi-stop-icon" ' +
            'aria-hidden="true" ' +
            'style="' +
            'display:inline-block;' +
            'width:12px;' +
            'height:12px;' +
            'border-radius:2px;' +
            'background:currentColor;' +
            'vertical-align:middle;' +
            '"></span>'
        );
    }

    function setButtonToStop(button) {
        rememberOriginalButton(button);

        button.dataset.miGenerating = "true";
        button.dataset.miStopButton = "true";
        button.classList.add("mi-stop-active");

        button.removeAttribute("disabled");
        button.setAttribute("type", "button");
        button.setAttribute("title", STOP_TEXT);
        button.setAttribute("aria-label", STOP_TEXT);

        button.innerHTML = createStopIcon();

        if (!button.dataset.miStopListenerAdded) {
            button.addEventListener(
                "click",
                function (event) {
                    if (
                        button.dataset.miGenerating !== "true"
                    ) {
                        return;
                    }

                    event.preventDefault();
                    event.stopPropagation();
                    event.stopImmediatePropagation();

                    stopActiveReply();
                },
                true
            );

            button.dataset.miStopListenerAdded = "true";
        }
    }

    function restoreSendButton(button) {
        rememberOriginalButton(button);

        button.dataset.miGenerating = "false";
        button.dataset.miStopButton = "false";
        button.classList.remove("mi-stop-active");

        var originalHtml =
            button.dataset.miSendStopOriginalHtml;

        if (originalHtml) {
            button.innerHTML = originalHtml;
        } else {
            button.textContent = SEND_TEXT;
        }

        var originalTitle =
            button.dataset.miSendStopOriginalTitle;

        var originalAria =
            button.dataset.miSendStopOriginalAria;

        if (originalTitle) {
            button.setAttribute(
                "title",
                originalTitle
            );
        } else {
            button.removeAttribute("title");
        }

        if (originalAria) {
            button.setAttribute(
                "aria-label",
                originalAria
            );
        } else {
            button.setAttribute(
                "aria-label",
                SEND_TEXT
            );
        }

        button.setAttribute("type", "submit");
        button.removeAttribute("disabled");
    }

    function updateSendButtons() {
        var generating = activeChatRequests > 0;

        findSendButtons().forEach(function (button) {
            if (generating) {
                setButtonToStop(button);
            } else {
                restoreSendButton(button);
            }
        });

        document.documentElement.classList.toggle(
            "mi-ai-generating",
            generating
        );

        if (document.body) {
            document.body.classList.toggle(
                "mi-ai-generating",
                generating
            );
        }

        window.miAIIsGenerating = generating;
    }

    function isChatRequest(input) {
        var url = "";

        try {
            if (typeof input === "string") {
                url = input;
            } else if (
                input &&
                typeof input.url === "string"
            ) {
                url = input.url;
            }
        } catch (error) {}

        url = String(url || "").toLowerCase();

        return (
            url.indexOf("/api/chat") !== -1 ||
            url.indexOf("/api/live-assist") !== -1 ||
            url.indexOf("/api/generate") !== -1 ||
            url.indexOf("/chat/completions") !== -1
        );
    }

    function mergeAbortSignals(controller, existingSignal) {
        if (!existingSignal) {
            return controller.signal;
        }

        if (existingSignal.aborted) {
            controller.abort();
            return controller.signal;
        }

        try {
            existingSignal.addEventListener(
                "abort",
                function () {
                    controller.abort();
                },
                { once: true }
            );
        } catch (error) {}

        return controller.signal;
    }

    function stopActiveReply() {
        if (isStopping) {
            return;
        }

        isStopping = true;

        activeControllers.forEach(function (controller) {
            try {
                controller.abort();
            } catch (error) {}
        });

        activeControllers.clear();
        activeChatRequests = 0;

        updateSendButtons();

        window.dispatchEvent(
            new CustomEvent("mi-ai-reply-stopped")
        );

        console.log(
            "[MI AI] Active reply generation stopped."
        );

        setTimeout(function () {
            isStopping = false;
        }, 250);
    }

    window.miStopActiveReply = stopActiveReply;

    window.fetch = function (input, init) {
        if (!isChatRequest(input)) {
            return originalFetch(input, init);
        }

        var controller = new AbortController();
        var requestInit = Object.assign({}, init || {});

        requestInit.signal = mergeAbortSignals(
            controller,
            requestInit.signal
        );

        activeControllers.add(controller);
        activeChatRequests += 1;
        updateSendButtons();

        window.dispatchEvent(
            new CustomEvent("mi-ai-reply-started")
        );

        return originalFetch(input, requestInit)
            .finally(function () {
                activeControllers.delete(controller);

                activeChatRequests = Math.max(
                    0,
                    activeChatRequests - 1
                );

                updateSendButtons();

                if (activeChatRequests === 0) {
                    window.dispatchEvent(
                        new CustomEvent(
                            "mi-ai-reply-finished"
                        )
                    );
                }
            });
    };

    window.addEventListener(
        "mi-ai-generation-start",
        function () {
            activeChatRequests += 1;
            updateSendButtons();
        }
    );

    window.addEventListener(
        "mi-ai-generation-end",
        function () {
            activeChatRequests = Math.max(
                0,
                activeChatRequests - 1
            );

            updateSendButtons();
        }
    );

    window.addEventListener(
        "mi-ai-generation-error",
        function () {
            activeChatRequests = 0;
            activeControllers.clear();
            updateSendButtons();
        }
    );

    function observeNewButtons() {
        if (!window.MutationObserver) {
            return;
        }

        var observer = new MutationObserver(function () {
            updateSendButtons();
        });

        observer.observe(
            document.documentElement,
            {
                childList: true,
                subtree: true
            }
        );
    }

    function initialize() {
        findSendButtons().forEach(function (button) {
            rememberOriginalButton(button);
        });

        updateSendButtons();
        observeNewButtons();

        console.log(
            "[MI AI] Send/Stop button control ready."
        );
    }

    if (document.readyState === "loading") {
        document.addEventListener(
            "DOMContentLoaded",
            initialize,
            { once: true }
        );
    } else {
        initialize();
    }
})();
/* MI AI SEND STOP CONTROL V1 END */
</script>

    function normalizeRole(role) {
        var raw = String(role || "")

    function extractNoticeData(payload) {

        var candidates = [
            payload.accountAction,
            payload.moderation,
            payload.accountModeration,
            payload.accountNotice,
            payload.accountStatusChange,
            payload.statusNotice,
            payload.data &&
                payload.data.accountAction,
            payload.data &&
                payload.data.moderation,
            payload.user &&
                payload.user.accountAction
        ];

        for (
            var index = 0;
            index < candidates.length;
            index += 1
        ) {
            if (
                candidates[index] &&
                typeof candidates[index] === "object"
            ) {
                return candidates[index];

        }

        var hasAction =
