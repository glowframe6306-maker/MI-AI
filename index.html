<!DOCTYPE html>
<html>
<head>
<title>MI AI ChatBOT Pro</title>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<style>

:root{
--main:#1e88e5;
--bg:#0b1220;
--panel:#111a2b;
--ai:#263238;
--text:#fff;
--input:#1c2b3a;
}

*{box-sizing:border-box;}

html,body{
margin:0;
height:100%;
overflow:hidden;
font-family:Arial;
background:var(--bg);
color:var(--text);
transition:.3s;
}

body{display:flex;}

/* SIDEBAR */
#sidebar{
width:260px;
background:var(--panel);
padding:10px;
display:flex;
flex-direction:column;
}

h3{text-align:center;}

button{
border:none;
padding:10px;
margin:5px 0;
border-radius:10px;
background:var(--main);
color:white;
cursor:pointer;
transition:.2s;
}

button:hover{
transform:scale(1.05);
}

/* CHAT LIST */
.chatItem{
padding:10px;
margin:5px 0;
background:#ffffff10;
border-radius:10px;
cursor:pointer;
transition:.2s;
}

.chatItem:hover{
background:var(--main);
}

/* MAIN */
#main{
flex:1;
display:flex;
flex-direction:column;
}

/* HEADER */
#header{
height:60px;
background:var(--panel);
display:flex;
align-items:center;
gap:10px;
padding:10px;
font-weight:bold;
}

#header #headerLogo{
width:52px;
height:52px;
flex-shrink:0;
border-radius:14px;
overflow:hidden;

border:2px solid rgba(255,255,255,0.24);
background:#000;

padding:4px;
margin-right:10px;

display:block;
object-fit:contain;

box-shadow:
0 8px 24px rgba(0,0,0,0.25);
transition:transform .2s ease, box-shadow .2s ease;
}

#header #headerLogo:hover {
  transform:translateY(-1px) scale(1.02);
  box-shadow:0 12px 28px rgba(0,0,0,0.32);
}

@keyframes logoPulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.08);
}

100%{
transform:scale(1);
}

}

/* CHAT */
#chat{
flex:1;
overflow-y:auto;
padding:15px;
scroll-behavior:smooth;
}

/* MESSAGES */
.me,.ai{
max-width:70%;
padding:12px;
margin:8px;
border-radius:15px;
white-space:pre-wrap;
line-height:1.5;
animation:pop .2s ease;
}

.me{
background:var(--main);
margin-left:auto;
}

.ai{
background:var(--ai);
}

/* ANIMATION */
@keyframes pop{
from{opacity:0;transform:scale(.8);}
to{opacity:1;transform:scale(1);}
}

/* THINKING */
.thinking{
background:var(--ai);
padding:10px;
border-radius:12px;
display:flex;
gap:6px;
align-items:center;
width:max-content;
animation:blink 1.2s infinite;
}

/* MI AI pulsing effect */
.thinking .label{
animation:pulseText 1.2s infinite;
font-weight:bold;
}

@keyframes pulseText{
0%{opacity:0.2;}
50%{opacity:1;}
100%{opacity:0.2;}
}

.dot{
width:6px;
height:6px;
background:white;
border-radius:50%;
animation:bounce 1s infinite;
}

.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}

@keyframes bounce{
50%{transform:translateY(-6px);}
}

/* INPUT */
#inputBox{
display:flex;
padding:10px;
background:var(--panel);
}

textarea{
flex:1;
resize:none;
border:none;
outline:none;
padding:10px;
border-radius:15px;
background:var(--input);
color:white;
min-height:45px;
max-height:120px;
}

/* SETTINGS */
#settingsPanel{
display:none;
position:absolute;
right:20px;
top:70px;
width:250px;
background:var(--panel);
padding:15px;
border-radius:12px;
}

input[type="color"],input[type="range"]{
width:100%;
}

/* CONTEXT MENU */
#menu{
position:absolute;
display:none;
background:#111a2b;
border:1px solid #333;
border-radius:10px;
overflow:hidden;
z-index:999;
min-width:120px;
}

#menu div{
padding:10px;
cursor:pointer;
}

#menu div:hover{
background:var(--main);
}

#sidebar,
#main {
  opacity: 1;
  transform: none;
}

#chatList {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-top: 8px;
    flex: 1;
    min-height: 0;
}

#chatList.scrollable {
    overflow-y: auto;
    padding-right: 4px;
}

#chatList.scrollable::-webkit-scrollbar {
    width: 6px;
}

#chatList.scrollable::-webkit-scrollbar-thumb {
    background: rgba(255,255,255,0.24);
    border-radius: 999px;
}

#watermark {
  text-align: center;
  font-size: 12px;
  color: rgba(255,255,255,0.58);
  padding: 6px 10px 10px;
  letter-spacing: 0.08em;
  font-weight: 600;
  user-select: none;
  pointer-events: none;
  background: var(--panel);
}

#authReminder {
    margin: 8px 0;
    padding: 10px;
    border-radius: 10px;
    background: rgba(30,136,229,0.16);
    border: 1px solid rgba(30,136,229,0.24);
    color: #dce8ff;
    font-size: 12px;
    line-height: 1.4;
}

#authReminder button {
    width: 100%;
    margin-top: 8px;
    font-size: 12px;
}

</style>
</head>

    id="headerLogo"

  <span>MI AI ChatBOT</span>

<div id="loginBox" style="

<script>

const firebaseConfig = {
  apiKey: "AIzaSyAxrIAKDz0b9GdHp4K_-jBKZWIcWZTww5g",
  authDomain: "mi-ai-99e6a.firebaseapp.com",
  projectId: "mi-ai-99e6a",
  storageBucket: "mi-ai-99e6a.firebasestorage.app",
  messagingSenderId: "845086558623",
  appId: "1:845086558623:web:8ff161f6a157cf87d395aa"
};


firebase.initializeApp(firebaseConfig);


const auth = firebase.auth();


let user=null;

let chatBox=document.getElementById("chat");
let chatList=document.getElementById("chatList");
let input=document.getElementById("msg");
let menu=document.getElementById("menu");
let authReminder=document.getElementById("authReminder");

let accountId = localStorage.getItem("mi_account");

if(!accountId){
    accountId = "acc_" + crypto.randomUUID();
    localStorage.setItem("mi_account", accountId);
}

let chats={};
let currentChat=null;
let selectedChat=null;
let isGuest=true;

function updateAuthReminder(){
    if(!authReminder) return;
    if(user){
        authReminder.style.display='none';
        authReminder.innerHTML='';
        return;
    }
    authReminder.innerHTML='<strong>Sign in to save your conversations and access them anytime from any device.</strong><br><button onclick="openLogin()">Login</button>';
    authReminder.style.display='block';
}

window.addEventListener("load", initChat);

async function initChat(){

let token = localStorage.getItem('mi_supabase_token');
let userId = localStorage.getItem('mi_user_id');

if (token && userId) {
    // authenticated — load conversations from server
    try {
        const res = await fetch('/api/conversations', { headers: { 'Authorization': 'Bearer ' + token } });
        const json = await res.json();
        if (res.ok && Array.isArray(json.conversations)) {
            chats = {};
            for (const c of json.conversations) {
                chats[c.id] = [];
                // fetch messages for each conversation (lightweight)
                try {
                    const mres = await fetch('/api/messages?conversation_id=' + encodeURIComponent(c.id), { headers: { 'Authorization': 'Bearer ' + token } });
                    const mjson = await mres.json();
                    if (mres.ok && Array.isArray(mjson.messages)) {
                        chats[c.id] = mjson.messages.map(m => ({ role: m.role === 'me' ? 'me' : 'ai', text: m.content }));
                    }
                } catch (e) {
                    // ignore per-conversation failures
                }
            }

            accountId = userId;
            localStorage.setItem('mi_account', accountId);
            currentChat = Object.keys(chats)[0] ?? null;
        }
    } catch (e) {
        // fallback to local storage
    }
}

let saved=localStorage.getItem("mi_chats_" + accountId);

if(saved){
    // merge local saved (guest/stale) only if no server conversations
    if (!chats || Object.keys(chats).length === 0) {
        chats=JSON.parse(saved);
    }

    localStorage.setItem("mi_last_account", accountId);
}else{
    chats = chats || {};
}


let theme=localStorage.getItem("theme");

if(theme){
document.documentElement.style.setProperty("--main",theme);
}


// AUTO NEW CHAT OPEN

if(Object.keys(chats).length===0){

    let id="chat_"+Date.now();

    chats[id]=[];

    currentChat=id;

}else{

    currentChat=Object.keys(chats)[0];

}

save();
renderList();
openChat(currentChat);
updateAuthReminder();


input.focus();

};

/* ENTER */
input.addEventListener("keydown",e=>{
if(e.key==="Enter"){
if(e.shiftKey) return;
e.preventDefault();
send();
}
});

/* NEW CHAT */
async function newChat(){
let token = localStorage.getItem('mi_supabase_token');
if (token) {
    // create conversation on server
    try {
        const res = await fetch('/api/conversations', { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token }, body: JSON.stringify({ title: 'New chat', session_id: accountId }) });
        const json = await res.json();
        if (res.ok && json.conversation && json.conversation.id) {
            const id = json.conversation.id;
            chats[id] = [];
            currentChat = id;
            save();
            renderList();
            openChat(id);
            return;
        }
    } catch (e) {
        // fallback to local new chat
    }
}

let id="chat_"+Date.now();
chats[id]=[];
currentChat=id;
save();
renderList();
openChat(id);
}

/* OPEN */
function openChat(id){
currentChat=id;
chatBox.innerHTML="";
chats[id].forEach(m=>add(m.role,m.text));
localStorage.setItem("last_chat",id);
}

/* RENDER LIST */
function renderList(){
chatList.innerHTML="";

let ids = Object.keys(chats);

if(ids.length > 9){
    chatList.classList.add('scrollable');
    chatList.style.maxHeight='calc(100vh - 260px)';
} else {
    chatList.classList.remove('scrollable');
    chatList.style.maxHeight='none';
}


ids.sort((a,b)=>{

if(chats[a].pin && !chats[b].pin) return -1;

if(!chats[a].pin && chats[b].pin) return 1;

return 0;

});

ids.forEach(id=>{
let div=document.createElement("div");
div.className="chatItem";
div.dataset.id=id;
div.innerText=(chats[id].pin ? "📌 " : "")+"💬 "+id;

div.onclick=()=>openChat(id);

/* RIGHT CLICK */
div.oncontextmenu=(e)=>{

e.preventDefault();

selectedChat=id;


document.getElementById("pinOption").innerHTML =
chats[id].pin ? "📍 Unpin" : "📌 Pin";


menu.style.display="block";
menu.style.left=e.pageX+"px";
menu.style.top=e.pageY+"px";

};

chatList.appendChild(div);
});
}

/* CLOSE OVERLAYS */
function closeAllOverlays(target) {
  const settingsPanel = document.getElementById("settingsPanel");
  const loginBox = document.getElementById("loginBox");
  const supportOverlay = document.getElementById("supportOverlay");

  if (menu.style.display === "block" && !menu.contains(target)) {
    menu.style.display = "none";
  }

  if (settingsPanel && settingsPanel.style.display === "block" &&
      !settingsPanel.contains(target) && target.id !== "settingsBtn") {
    settingsPanel.style.display = "none";
  }

  if (loginBox && loginBox.style.display === "block" &&
      !loginBox.contains(target) && target.id !== "loginBtn") {
    loginBox.style.display = "none";
  }

  if (supportOverlay && !supportOverlay.contains(target) && target.id !== "supportBtn") {
    supportOverlay.remove();
  }
}

document.addEventListener("pointerdown", e => {
  const target = e.target;
  closeAllOverlays(target);
}, true);

/* RENAME */
function renameChat(){
if(!selectedChat) return;
let name=prompt("Rename chat:",selectedChat);
if(!name) return;

chats[name]=chats[selectedChat];
delete chats[selectedChat];

if(currentChat===selectedChat) currentChat=name;

save();
renderList();
menu.style.display="none";
}

/* DELETE */
function deleteChat(){
if(!selectedChat) return;
if(!confirm("Delete this chat?")) return;

delete chats[selectedChat];

if(currentChat===selectedChat){
currentChat=null;
chatBox.innerHTML="";
}

save();
renderList();
menu.style.display="none";
}

function pinChat(){

if(!selectedChat)return;

chats[selectedChat].pin =
!chats[selectedChat].pin;


save();
renderList();

menu.style.display="none";

}




function shareChat(){

if(!selectedChat)return;


let copyText="";


chats[selectedChat].forEach(m=>{


if(m.role==="me"){

copyText += "USER: "+m.text+"\n\n";

}
else{

copyText += "MI AI ChatBOT -: "+m.text+"\n\n";

}

});


navigator.clipboard.writeText(copyText)
.then(()=>{

    if(user && user.emailVerified){

    alert("Chat copied successfully ✅");

} else {

    alert("Please verify your email first. Check your spam folder for the verification email. 📧");

    // Do not force sign-out here — allow the user to remain signed in on other devices.

}

// 👉 මෙන්න add කරන්න
document.getElementById("loginBox").style.display = "none";
document.getElementById("email").value = "";
document.getElementById("password").value = "";

})


menu.style.display="none";

}

/* SEND */
async function send(){

let msg=input.value.trim();
if(!msg || !currentChat) return;

input.value="";

add("me",msg);

/* THINKING */
let t=document.createElement("div");
t.className="thinking";
t.innerHTML=`
<span class="label">MI AI</span>
<span class="dot"></span>
<span class="dot"></span>
<span class="dot"></span>
`;

chatBox.appendChild(t);
scroll();

try{
let res=await fetch("http://127.0.0.1:5000/chat",{
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body:JSON.stringify({
                message: msg,
                conversation_id: currentChat,
                session_id: accountId,
                user_id: accountId,
                user_email: user ? user.email : null,
            }),
        });
let data=await res.json();

t.remove();
type(data.reply);

}catch(e){
t.remove();
add("ai","CHECK YOUR INTERNET CONNECTION OR SERVER IS DOWN ❌");
}
}

/* TYPE */
function type(text){
let d=document.createElement("div");
d.className="ai";
chatBox.appendChild(d);

let i=0;
let timer=setInterval(()=>{
d.innerText+=text[i];
i++;
scroll();

if(i>=text.length){
clearInterval(timer);
chats[currentChat].push({role:"ai",text});
save();
}
},20);
}

/* ADD */
function add(role,text){
let d=document.createElement("div");
d.className=role;
d.innerText=text;
chatBox.appendChild(d);

chats[currentChat].push({role,text});
save();

// If the user is authenticated, persist the message to the server as well
try {
    const token = localStorage.getItem('mi_supabase_token');
    if (token) {
        fetch('/api/messages', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
            body: JSON.stringify({ conversation_id: currentChat, session_id: accountId, role: role === 'me' ? 'me' : 'ai', content: text })
        }).catch(() => {});
    }
} catch (e) {}

scroll();
}

/* SCROLL */
function scroll(){
chatBox.scrollTop=chatBox.scrollHeight;
}

/* SAVE */
function save(){
localStorage.setItem("mi_chats_" + accountId, JSON.stringify(chats));
localStorage.setItem("mi_last_account", accountId);
}

/* SETTINGS */
function toggleSettings(){
let s=document.getElementById("settingsPanel");
s.style.display=s.style.display==="block"?"none":"block";
}

/* THEME */
function applyTheme(){
let c=document.getElementById("themeColor").value;
document.documentElement.style.setProperty("--main",c);
localStorage.setItem("theme",c);
}

/* FONT */
function setFont(v){
chatBox.style.fontSize=v+"px";
}

/* CUSTOMER SUPPORT */

function customerSupport(){

let box=document.createElement("div");
box.id = "supportOverlay";

box.style.position="fixed";
box.style.left="50%";
box.style.top="50%";
box.style.transform="translate(-50%,-50%)";
box.style.background="rgba(17,26,43,0.95)";
box.style.backdropFilter="blur(15px)";
box.style.padding="25px";
box.style.borderRadius="20px";
box.style.zIndex="9999";
box.style.width="280px";
box.style.textAlign="center";
box.style.boxShadow="0 0 25px #ff7a18";


box.innerHTML=`

<h3>🎧 Customer Support</h3>

<p>📧 Email</p>

<button onclick="openEmail()">
miai.customerservice@gmail.com
</button>


<p>📱 WhatsApp</p>

<button onclick="openWhatsApp()">
WHATSAPP
</button>


<button onclick="this.parentElement.remove()">
❌ Close
</button>

`;

document.body.appendChild(box);

}



/* EMAIL */

function openEmail(){

window.open(
"https://mail.google.com/mail/?view=cm&fs=1&to=miai.customerservice@gmail.com&su=MI%20AI%20Customer%20Support",
"_blank"
);

}



/* WHATSAPP */

function openWhatsApp(){

window.open(
"https://wa.me/94756390621",
"_blank"
);

}

function openLogin(){

let box=document.getElementById("loginBox");

box.style.display =
box.style.display=="block"
?"none"
:"block";

}


async function loginEmail() {

    let email = document.getElementById("email").value.trim();
    let password = document.getElementById("password").value;

    if (!email || !password) {
        alert("Enter email and password.");
        return;
    }

    try {

        let res = await fetch("http://127.0.0.1:5000/send-otp", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                email: email
            })
        });

        let data = await res.json();

        if (!data.success) {
            alert(data.message);
            return;
        }

        let otp = prompt("Enter the 8-digit verification code sent to your email:");

        if (!otp) return;

        verifyOTP(email, password, otp);

    } catch (e) {

        alert("Unable to send OTP.");

    }

}

    let email = document.getElementById("email").value.trim();
    let password = document.getElementById("password").value;

    auth.signInWithEmailAndPassword(email, password)

    .then((userCredential) => {

        if (userCredential.user.emailVerified) {

            alert("Login Success ✅ — You're signed in. You can use this account on multiple devices.");

            document.getElementById("loginBox").style.display = "none";
            document.getElementById("email").value = "";
            document.getElementById("password").value = "";

        } else {

            alert("Please verify your email first 📧");

            // Keep the session; do not force sign-out so users can stay logged in on other devices.

        }

    })

    .catch((error) => {

        if (error.code === "auth/user-not-found" ||
            error.code === "auth/invalid-credential") {

            auth.fetchSignInMethodsForEmail(email)

            .then((methods) => {

                if (methods.length > 0) {

                    alert("Already registered. Please sign in.");

                } else {

                    auth.createUserWithEmailAndPassword(email, password)

                    .then((userCredential) => {

                        userCredential.user.sendEmailVerification({
    url: "https://mi-ai-assistant-of-mi.vercel.app",
    handleCodeInApp: false
})

                        .then(() => {

                            alert("Verification Email Sent 📧\n\nPlease open your email and click the verification link.");

                        });

                    })

                    .catch(err => alert(err.message));

                }

            })

            .catch(err => alert(err.message));

        } else {

            alert(error.message);

        }

    });

}

function logout(){
    // Clear local session and UI state. Server session revocation should be handled elsewhere if required.
    try {
        localStorage.removeItem('mi_supabase_token');
        localStorage.removeItem('mi_user_id');
        localStorage.removeItem('mi_user_email');
    } catch (e) {}

    // Clear chats from the UI (do not delete server data)
    chats = {};
    currentChat = null;
    accountId = "acc_" + crypto.randomUUID();
    localStorage.setItem('mi_account', accountId);
    save();
    renderList();
    if (chatBox) chatBox.innerHTML = '';
    updateAuthReminder();

    alert('Logged out');
    location.reload();

}

auth.onAuthStateChanged(function(currentUser){

let loginBtn = document.getElementById("loginBtn");
let logoutBtn = document.getElementById("logoutBtn");


if(currentUser){

    user = currentUser;
    isGuest=false;

    loginBtn.style.display="none";

    logoutBtn.style.display="block";

    console.log(
    "Logged Account : " + user.email
    );


}else{

    user=null;
    isGuest=true;

    loginBtn.style.display="block";

    logoutBtn.style.display="none";

}

updateAuthReminder();

});

</script>
