<script>
/* MI AI MANDATORY SHARE PASSWORD JS V1 - START */

(function () {
    "use strict";

    let unlocked = false;
    let activePayload = null;

    function getShareParameters() {
        return new URLSearchParams(
            window.location.search
        );
    }

    function isSharedLink() {
        const params =
            getShareParameters();

        return Boolean(
            params.get("s") ||
            params.get("share") ||
            window.MI_SHARED_VIEWER_MODE
        );
    }

    function getSharedPayload() {
        const candidates = [
            window.MI_SHARED_VIEWER_PAYLOAD,
            window.sharedChatData,
            window.sharedPayload
        ];

        try {
            if (
                typeof sharedChatData !==
                    "undefined"
            ) {
                candidates.push(
                    sharedChatData
                );
            }
        }
        catch (error) {
            // Ignore unavailable global binding.
        }

        try {
            if (
                typeof sharedPayload !==
                    "undefined"
            ) {
                candidates.push(
                    sharedPayload
                );
            }
        }
        catch (error) {
            // Ignore unavailable global binding.
        }

        return (
            candidates.find(
                function (item) {
                    return (
                        item &&
                        typeof item ===
                            "object"
                    );
                }
            ) ||
            null
        );
    }

    function firstValue(
        object,
        keys
    ) {
        if (
            !object ||
            typeof object !==
                "object"
        ) {
            return "";
        }

        for (const key of keys) {
            const value =
                object[key];

            if (
                value !== undefined &&
                value !== null &&
                String(value).trim()
            ) {
                return String(value).trim();
            }
        }

        return "";
    }

    function passwordMetadata(payload) {
        const security =
            payload?.security &&
            typeof payload.security ===
                "object"
                ? payload.security
                : {};

        const password =
            payload?.password &&
            typeof payload.password ===
                "object"
                ? payload.password
                : {};

        const enabledValue =
            payload?.passwordRequired ??
            payload?.password_required ??
            payload?.passwordEnabled ??
            payload?.password_enabled ??
            payload?.requiresPassword ??
            security.passwordRequired ??
            security.passwordEnabled ??
            password.required ??
            password.enabled;

        const plainPassword =
            firstValue(
                payload,
                [
                    "sharePassword",
                    "passwordValue",
                    "plainPassword"
                ]
            ) ||
            firstValue(
                security,
                [
                    "password",
                    "passwordValue"
                ]
            );

        const passwordHash =
            firstValue(
                payload,
                [
                    "passwordHash",
                    "password_hash",
                    "sharePasswordHash",
                    "share_password_hash"
                ]
            ) ||
            firstValue(
                security,
                [
                    "passwordHash",
                    "password_hash"
                ]
            ) ||
            firstValue(
                password,
                [
                    "hash",
                    "passwordHash"
                ]
            );

        const passwordSalt =
            firstValue(
                payload,
                [
                    "passwordSalt",
                    "password_salt"
                ]
            ) ||
            firstValue(
                security,
                [
                    "passwordSalt",
                    "password_salt"
                ]
            ) ||
            firstValue(
                password,
                [
                    "salt"
                ]
            );

        const enabled =
            enabledValue === true ||
            enabledValue === 1 ||
            String(
                enabledValue || ""
            ).toLowerCase() === "true" ||
            Boolean(
                plainPassword ||
                passwordHash
            );

        return {
            enabled:
                enabled,

            plainPassword:
                plainPassword,

            passwordHash:
                passwordHash,

            passwordSalt:
                passwordSalt
        };
    }

    async function sha256(value) {
        const bytes =
            new TextEncoder()
                .encode(
                    String(value)
                );

        const digest =
            await crypto.subtle.digest(
                "SHA-256",
                bytes
            );

        return Array.from(
            new Uint8Array(digest)
        )
            .map(
                function (byte) {
                    return byte
                        .toString(16)
                        .padStart(2, "0");
                }
            )
            .join("");
    }

    function constantTimeEqual(
        first,
        second
    ) {
        const left =
            String(first || "")
                .toLowerCase();

        const right =
            String(second || "")
                .toLowerCase();

        if (
            !left ||
            !right ||
            left.length !== right.length
        ) {
            return false;
        }

        let difference = 0;

        for (
            let index = 0;
            index < left.length;
            index += 1
        ) {
            difference |=
                left.charCodeAt(index) ^
                right.charCodeAt(index);
        }

        return difference === 0;
    }

    async function checkPassword(
        enteredPassword,
        metadata
    ) {
        if (!metadata.enabled) {
            return true;
        }

        /*
          Support an existing application validator when available.
        */
        const validators = [
            window.verifySharedChatPassword,
            window.validateSharedChatPassword,
            window.checkSharedChatPassword
        ];

        for (const validator of validators) {
            if (
                typeof validator !==
                    "function"
            ) {
                continue;
            }

            try {
                const result =
                    await validator(
                        enteredPassword,
                        activePayload
                    );

                if (result === true) {
                    return true;
                }

                if (result === false) {
                    return false;
                }
            }
            catch (error) {
                console.warn(
                    "[MI AI Share] Existing password validator failed.",
                    error
                );
            }
        }

        /*
          Plain-password fallback for existing old share links.
          New links should use a password hash instead.
        */
        if (metadata.plainPassword) {
            return (
                enteredPassword ===
                metadata.plainPassword
            );
        }

        if (metadata.passwordHash) {
            const salted =
                metadata.passwordSalt
                    ? (
                        metadata.passwordSalt +
                        enteredPassword
                    )
                    : enteredPassword;

            const enteredHash =
                await sha256(salted);

            return constantTimeEqual(
                enteredHash,
                metadata.passwordHash
            );
        }

        /*
          Password protection is marked as enabled but no
          validation information exists. Keep the chat locked.
        */
        return false;
    }

    function removeGate() {
        document
            .getElementById(
                "miSharePasswordGate"
            )
            ?.remove();

        document.body.classList.remove(
            "mi-share-password-locked"
        );

        document
            .documentElement
            .classList
            .remove(
                "mi-share-password-locked"
            );
    }

    function unlockSharedChat() {
        unlocked = true;

        sessionStorage.setItem(
            "mi_shared_password_unlocked_" +
            (
                activePayload?.id ||
                activePayload?.chatId ||
                window.location.search
            ),
            "true"
        );

        removeGate();

        window.dispatchEvent(
            new CustomEvent(
                "mi-shared-password-unlocked",
                {
                    detail: {
                        payload:
                            activePayload
                    }
                }
            )
        );

        try {
            if (
                window
                    .MISharedChatIsolation &&
                typeof window
                    .MISharedChatIsolation
                    .apply === "function"
            ) {
                window
                    .MISharedChatIsolation
                    .apply();
            }
        }
        catch (error) {
            console.warn(
                "[MI AI Share] Shared chat render refresh failed.",
                error
            );
        }
    }

    function createGate(metadata) {
        if (
            document.getElementById(
                "miSharePasswordGate"
            )
        ) {
            return;
        }

        document.body.classList.add(
            "mi-share-password-locked"
        );

        document
            .documentElement
            .classList
            .add(
                "mi-share-password-locked"
            );

        const gate =
            document.createElement(
                "div"
            );

        gate.id =
            "miSharePasswordGate";

        gate.innerHTML = `
            <form
                id="miSharePasswordForm"
                autocomplete="off"
            >
                <div id="miSharePasswordCard">
                    <h2>Password required</h2>

                    <p>
                        Enter the password to view this
                        shared chat.
                    </p>

                    <input
                        id="miSharePasswordInput"
                        type="password"
                        autocomplete="current-password"
                        placeholder="Enter password"
                        required
                        autofocus
                    >

                    <button
                        id="miSharePasswordSubmit"
                        type="submit"
                    >
                        Open shared chat
                    </button>

                    <div
                        id="miSharePasswordError"
                        role="alert"
                        aria-live="polite"
                    ></div>
                </div>
            </form>
        `;

        /*
          Clicking outside does nothing.
          There is deliberately no close button.
        */
        gate.addEventListener(
            "click",
            function (event) {
                event.stopPropagation();
            },
            true
        );

        document.body.appendChild(
            gate
        );

        const form =
            document.getElementById(
                "miSharePasswordForm"
            );

        const input =
            document.getElementById(
                "miSharePasswordInput"
            );

        const button =
            document.getElementById(
                "miSharePasswordSubmit"
            );

        const errorBox =
            document.getElementById(
                "miSharePasswordError"
            );

        form.addEventListener(
            "submit",
            async function (event) {
                event.preventDefault();
                event.stopPropagation();

                const enteredPassword =
                    String(
                        input.value || ""
                    );

                if (!enteredPassword) {
                    errorBox.textContent =
                        "Password is required.";

                    input.focus();
                    return;
                }

                button.disabled = true;
                button.textContent =
                    "Checking...";

                errorBox.textContent = "";

                try {
                    const correct =
                        await checkPassword(
                            enteredPassword,
                            metadata
                        );

                    if (!correct) {
                        errorBox.textContent =
                            "Incorrect password.";

                        input.value = "";
                        input.focus();
                        return;
                    }

                    unlockSharedChat();
                }
                catch (error) {
                    console.error(
                        "[MI AI Share] Password check failed.",
                        error
                    );

                    errorBox.textContent =
                        "Password verification failed.";
                }
                finally {
                    button.disabled = false;
                    button.textContent =
                        "Open shared chat";
                }
            }
        );

        requestAnimationFrame(
            function () {
                input.focus();
            }
        );
    }

    function lockSharedChat() {
        if (
            unlocked ||
            !isSharedLink()
        ) {
            return false;
        }

        activePayload =
            getSharedPayload();

        if (!activePayload) {
            return false;
        }

        const metadata =
            passwordMetadata(
                activePayload
            );

        if (!metadata.enabled) {
            unlocked = true;
            return false;
        }

        const sessionKey =
            "mi_shared_password_unlocked_" +
            (
                activePayload.id ||
                activePayload.chatId ||
                window.location.search
            );

        if (
            sessionStorage.getItem(
                sessionKey
            ) === "true"
        ) {
            unlocked = true;
            removeGate();
            return false;
        }

        createGate(metadata);
        return true;
    }

    /*
      Escape cannot close the required-password dialog.
    */
    document.addEventListener(
        "keydown",
        function (event) {
            if (
                event.key !== "Escape" ||
                !document.getElementById(
                    "miSharePasswordGate"
                )
            ) {
                return;
            }

            event.preventDefault();
            event.stopPropagation();
            event.stopImmediatePropagation();
        },
        true
    );

    /*
      Prevent older overlay-close functions from removing
      the password gate.
    */
    document.addEventListener(
        "pointerdown",
        function (event) {
            const gate =
                document.getElementById(
                    "miSharePasswordGate"
                );

            if (
                !gate ||
                gate.contains(
                    event.target
                )
            ) {
                return;
            }

            event.preventDefault();
            event.stopPropagation();
            event.stopImmediatePropagation();
        },
        true
    );

    function start() {
        if (lockSharedChat()) {
            return;
        }

        let attempts = 0;

        const timer =
            setInterval(
                function () {
                    attempts += 1;

                    if (
                        lockSharedChat() ||
                        unlocked ||
                        attempts >= 80
                    ) {
                        clearInterval(timer);
                    }
                },
                100
            );
    }

    window.MIMandatorySharePassword = {
        lock:
            lockSharedChat,

        isUnlocked:
            function () {
                return unlocked;
            }
    };

    if (
        document.readyState ===
        "loading"
    ) {
        document.addEventListener(
            "DOMContentLoaded",
            start,
            {
                once: true
            }
        );
    }
    else {
        start();
    }
})();

/* MI AI MANDATORY SHARE PASSWORD JS V1 - END */
</script>

            function () {
                if (!sheetOpen) {
                    ui.backdrop.style.display =
                        "none";
                }
            },
            240
        );
    }

    function showSheet(
        title,
        actions
    ) {
        const ui = ensureUi();

        const titleElement =
            ui.sheet.querySelector(
                "#miIosSheetTitle"
            );

        const actionContainer =
            ui.sheet.querySelector(
                "#miIosSheetActions"
            );

        const cancelButton =
            ui.sheet.querySelector(
                "#miIosSheetCancel"
            );

        titleElement.textContent =
            title ||
            words().chatOptions;

        actionContainer.replaceChildren();

        (actions || []).forEach(
            function (action) {
                const button =
                    document.createElement(
                        "button"
                    );

                button.type =
                    "button";

                button.className =
                    "mi-ios-sheet-action";

                if (action.danger) {
                    button.classList.add(
                        "mi-sheet-danger"
                    );
                }

                const icon =
                    document.createElement(
                        "span"
                    );

                icon.className =
                    "mi-ios-sheet-action-icon";

                icon.textContent =
                    action.icon || "•";

                const label =
                    document.createElement(
                        "span"
                    );

                label.textContent =
                    action.label || "";

                button.append(
                    icon,
                    label
                );

                button.addEventListener(
                    "click",
                    function () {
                        closeSheet();

                        setTimeout(
                            function () {
                                try {
                                    action.run?.();
                                }
                                catch (error) {
                                    console.error(
                                        "[MI AI iOS Sheet]",
                                        error
                                    );
                                }
                            },
                            120
                        );
                    }
                );

                actionContainer.appendChild(
                    button
                );
            }
        );

        cancelButton.textContent =
            words().cancel;

        ui.backdrop.style.display =
            "block";

        requestAnimationFrame(
            function () {
                sheetOpen = true;

                ui.backdrop.classList.add(
                    "mi-sheet-visible"
                );

                ui.sheet.classList.add(
                    "mi-sheet-visible"
                );

                ui.sheet.setAttribute(
                    "aria-hidden",
                    "false"
                );
            }
        );
    }

    function isPinned(target) {
        return Boolean(
            target?.classList
                .contains("pinned") ||
            target?.dataset
                ?.pinned === "true" ||
            target?.getAttribute(
                "aria-pinned"
            ) === "true" ||
            target?.querySelector(
                ".pin-icon, " +
                ".pinned-icon, " +
                "[data-pinned='true']"
            )
        );
    }

    function identifyChatTarget(
        target
    ) {
        if (!(target instanceof Element)) {
            return null;
        }

        return target.closest(
            [
                ".chatItem",
                ".chat-item",
                ".history-item",
                ".conversation-item",
                "[data-chat-id]",
                "[data-conversation-id]",
                "#chatList > div"
            ].join(",")
        );
    }

    function setSelectedChatFromTarget(
        target
    ) {
        const id =
            target?.dataset
                ?.chatId ||
            target?.dataset
                ?.conversationId ||
            target?.getAttribute(
                "data-id"
            ) ||
            target?.id ||
            "";

        if (!id) {
            return;
        }

        try {
            if (
                typeof selectedChat !==
                    "undefined"
            ) {
                selectedChat = id;
            }
        }
        catch (error) {
            // Ignore inaccessible global.
        }

        window.selectedChat = id;
    }

    function callExistingFunction(
        name
    ) {
        const direct =
            window[name];

        if (
            typeof direct ===
                "function"
        ) {
            return direct();
        }

        try {
            if (
                typeof eval(name) ===
                    "function"
            ) {
                return eval(name + "()");
            }
        }
        catch (error) {
            console.warn(
                "[MI AI iOS Bundle] Function unavailable:",
                name
            );
        }

        return false;
    }

    function showChatActions(
        target
    ) {
        setSelectedChatFromTarget(
            target
        );

        const pinned =
            isPinned(target);

        const labels =
            words();

        showSheet(
            labels.chatOptions,
            [
                {
                    icon: "✎",
                    label:
                        labels.rename,
                    run:
                        function () {
                            callExistingFunction(
                                "renameChat"
                            );
                        }
                },
                {
                    icon:
                        pinned
                            ? "−"
                            : "⌖",
                    label:
                        pinned
                            ? labels.unpin
                            : labels.pin,
                    run:
                        function () {
                            callExistingFunction(
                                "pinChat"
                            );
                        }
                },
                {
                    icon: "↗",
                    label:
                        labels.share,
                    run:
                        function () {
                            callExistingFunction(
                                "shareChat"
                            );
                        }
                },
                {
                    icon: "⌫",
                    label:
                        labels.deleteText,
                    danger: true,
                    run:
                        function () {
                            callExistingFunction(
                                "deleteChat"
                            );
                        }
                }
            ]
        );
    }

    function addHapticFeedback() {
        document.addEventListener(
            "pointerdown",
            function (event) {
                const target =
                    event.target.closest(
                        [
                            "button",
                            "[role='button']",
                            ".btn",
                            ".button",
                            ".chat-item",
                            ".chatItem",
                            ".history-item",
                            ".conversation-item"
                        ].join(",")
                    );

                if (!target) {
                    return;
                }

                target.classList.remove(
                    "mi-haptic-release"
                );

                target.classList.add(
                    "mi-haptic-press"
                );
            },
            true
        );

        function release(event) {
            const target =
                event.target.closest?.(
                    [
                        "button",
                        "[role='button']",
                        ".btn",
                        ".button",
                        ".chat-item",
                        ".chatItem",
                        ".history-item",
                        ".conversation-item"
                    ].join(",")
                );

            if (!target) {
                return;
            }

            target.classList.remove(
                "mi-haptic-press"
            );

            target.classList.add(
                "mi-haptic-release"
            );

            setTimeout(
                function () {
                    target.classList.remove(
                        "mi-haptic-release"
                    );
                },
                360
            );
        }

        document.addEventListener(
            "pointerup",
            release,
            true
        );

        document.addEventListener(
            "pointercancel",
            release,
            true
        );
    }

    function addContextMenu() {
        document.addEventListener(
            "contextmenu",
            function (event) {
                const target =
                    identifyChatTarget(
                        event.target
                    );

                if (!target) {
                    return;
                }

                if (
                    document.body.classList
                        .contains(
                            "mi-view-only"
                        )
                ) {
                    return;
                }

                event.preventDefault();
                event.stopPropagation();

                showChatActions(
                    target
                );
            },
            true
        );
    }

    function addLongPress() {
        document.addEventListener(
            "pointerdown",
            function (event) {
                const target =
                    identifyChatTarget(
                        event.target
                    );

                if (
                    !target ||
                    event.pointerType ===
                        "mouse"
                ) {
                    return;
                }

                longPressTarget =
                    target;

                clearTimeout(
                    longPressTimer
                );

                longPressTimer =
                    setTimeout(
                        function () {
                            if (
                                longPressTarget
                            ) {
                                showChatActions(
                                    longPressTarget
                                );

                                if (
                                    navigator.vibrate
                                ) {
                                    navigator.vibrate(
                                        18
                                    );
                                }
                            }

                            longPressTarget =
                                null;
                        },
                        520
                    );
            },
            true
        );

        [
            "pointerup",
            "pointercancel",
            "pointermove"
        ].forEach(
            function (eventName) {
                document.addEventListener(
                    eventName,
                    function () {
                        clearTimeout(
                            longPressTimer
                        );

                        longPressTarget =
                            null;
                    },
                    true
                );
            }
        );
    }

    function monitorCopyActions() {
        document.addEventListener(
            "click",
            function (event) {
                const copyControl =
                    event.target.closest(
                        [
                            ".mi-ai-functional-copy",
                            ".mi-ai-copy-below",
                            ".aiCopyButton",
                            ".copy-btn",
                            ".copy-button",
                            "[data-action='copy']",
                            "[data-action='copy-ai-reply']"
                        ].join(",")
                    );

                if (!copyControl) {
                    return;
                }

                setTimeout(
                    function () {
                        queueIsland(
                            words().copied,
                            {
                                type: "copy",
                                duration: 1700
                            }
                        );

                        showToast(
                            words().copied,
                            {
                                type: "copy",
                                duration: 1900
                            }
                        );
                    },
                    60
                );
            },
            true
        );
    }

    function monitorOnlineStatus() {
        window.addEventListener(
            "online",
            function () {
                queueIsland(
                    words().online,
                    {
                        type: "online",
                        duration: 2100,
                        compact: true
                    }
                );
            }
        );

        window.addEventListener(
            "offline",
            function () {
                showIsland(
                    words().offline,
                    {
                        type: "offline",
                        persistent: true
                    }
                );

                showToast(
                    words().offline,
                    {
                        type: "offline",
                        duration: 3200
                    }
                );
            }
        );

        if (!navigator.onLine) {
            showIsland(
                words().offline,
                {
                    type: "offline",
                    persistent: true
                }
            );
        }
    }

    function replyIsActive() {
        try {
            if (
                typeof replyInProgress !==
                    "undefined"
            ) {
                return Boolean(
                    replyInProgress
                );
            }
        }
        catch (error) {
            // Ignore inaccessible variable.
        }

        return Boolean(
            window.replyInProgress
        );
    }

    function monitorThinking() {
        setInterval(
            function () {
                const active =
                    replyIsActive();

                if (
                    active &&
                    !thinkingWasActive
                ) {
                    thinkingWasActive =
                        true;

                    showIsland(
                        words().thinking,
                        {
                            type:
                                "thinking",

                            persistent:
                                true
                        }
                    );
                }
                else if (
                    !active &&
                    thinkingWasActive
                ) {
                    thinkingWasActive =
                        false;

                    hideIsland();
                }
            },
            220
        );
    }

    function installEventNotifications() {
        window.addEventListener(
            "mi-chat-saved",
            function () {
                queueIsland(
                    words().saved,
                    {
                        type: "save",
                        duration: 1800
                    }
                );
            }
        );

        window.addEventListener(
            "mi-file-uploaded",
            function () {
                queueIsland(
                    words().uploaded,
                    {
                        type: "upload",
                        duration: 2100
                    }
                );

                showToast(
                    words().uploaded,
                    {
                        type: "upload",
                        duration: 2200
                    }
                );
            }
        );
    }

    function monitorNewFiles() {
        const preview =
            document.getElementById(
                "attachmentPreview"
            );

        if (!preview) {
            return;
        }

        let lastText =
            preview.textContent;

        const observer =
            new MutationObserver(
                function () {
                    if (observerRefreshPending) {
                        return;
                    }

                    observerRefreshPending =
                        true;

                    requestAnimationFrame(
                        function () {
                            observerRefreshPending =
                                false;

                            const current =
                                preview.textContent
                                    .trim();

                            if (
                                current &&
                                current !==
                                    lastText
                            ) {
                                lastText =
                                    current;

                                queueIsland(
                                    words().uploaded,
                                    {
                                        type:
                                            "upload",

                                        duration:
                                            2000
                                    }
                                );
                            }
                        }
                    );
                }
            );

        observer.observe(
            preview,
            {
                childList: true,
                subtree: true,
                characterData: true
            }
        );
    }

    function start() {
        const ui = ensureUi();

        ui.backdrop.addEventListener(
            "click",
            closeSheet
        );

        ui.sheet
            .querySelector(
                "#miIosSheetCancel"
            )
            .addEventListener(
                "click",
                closeSheet
            );

        document.addEventListener(
            "keydown",
            function (event) {
                if (
                    event.key ===
                        "Escape" &&
                    sheetOpen
                ) {
                    closeSheet();
                }
            }
        );

        addHapticFeedback();
        addContextMenu();
        addLongPress();
        monitorCopyActions();
        monitorOnlineStatus();
        monitorThinking();
        installEventNotifications();
        monitorNewFiles();

        window.dispatchEvent(
            new CustomEvent(
                "mi-ios-safe-bundle-ready"
            )
        );

        console.log(
            "[MI AI] iOS safe bundle ready."
        );
    }

    window.MIIOS = {
        island:
            showIsland,

        hideIsland:
            hideIsland,

        toast:
            showToast,

        sheet:
            showSheet,

        closeSheet:
            closeSheet,

        chatActions:
            showChatActions
    };

    if (
        document.readyState ===
        "loading"
    ) {
        document.addEventListener(
            "DOMContentLoaded",
            start,
            {
                once: true
            }
        );
    }
    else {
        start();
    }
})();

/* MI AI IOS SAFE BUNDLE JS - END */
</script>



<script>
/* MI AI LOGIN SUCCESS POPUP JS - START */

(function () {
    "use strict";

    let closeTimer = null;
    let lastShownAt = 0;

    function languageCode() {
        return String(
            document.getElementById(
                "languageSelect"
            )?.value ||
            localStorage.getItem(
                "mi_ui_language"
            ) ||
            "en"
        )
            .trim()
            .toLowerCase();
    }

    function translations() {
        const values = {
            en: {
                title:
                    "Welcome back!",

                message:
                    "Thank you for signing in to MI AI. Your chats and settings are ready.",

                continueText:
                    "Continue"
            },

            si: {
                title:
                    "නැවත සාදරයෙන් පිළිගනිමු!",

                message:
                    "MI AI වෙත පිවිසීම ගැන ස්තුතියි. ඔබගේ chats සහ settings දැන් සූදානම්.",

                continueText:
                    "ඉදිරියට යන්න"
            },

            ta: {
                title:
                    "மீண்டும் வரவேற்கிறோம்!",

                message:
                    "MI AI-ல் உள்நுழைந்ததற்கு நன்றி. உங்கள் அரட்டைகளும் அமைப்புகளும் தயாராக உள்ளன.",

                continueText:
                    "தொடரவும்"
            }
        };

        return (
            values[languageCode()] ||
            values.en
        );
    }

    function getEmail(detail) {
        return String(
            detail?.email ||
            detail?.user?.email ||
            window.miFirebaseAuth
                ?.currentUser
                ?.email ||
            window.miFirebaseUser
                ?.email ||
            localStorage.getItem(
                "mi_user_email"
            ) ||
            ""
        )
            .trim();
    }

    function ensurePopup() {
        let backdrop =
            document.getElementById(
                "miLoginSuccessBackdrop"
            );

        if (backdrop) {
            return backdrop;
        }

        backdrop =
            document.createElement(
                "div"
            );

        backdrop.id =
            "miLoginSuccessBackdrop";

        backdrop.setAttribute(
            "role",
            "presentation"
        );

        backdrop.innerHTML = `
            <section
                id="miLoginSuccessPopup"
                role="dialog"
                aria-modal="true"
                aria-labelledby="miLoginSuccessTitle"
                aria-describedby="miLoginSuccessMessage"
            >
                <div id="miLoginSuccessIcon" aria-hidden="true">
                    <svg viewBox="0 0 24 24">
                        <path d="M5 12.5 9.2 17 19 7"></path>
                    </svg>
                </div>

                <h2 id="miLoginSuccessTitle"></h2>

                <p id="miLoginSuccessMessage"></p>

                <div id="miLoginSuccessEmail"></div>

                <button
                    id="miLoginSuccessContinue"
                    type="button"
                ></button>
            </section>
        `;

        document.body.appendChild(
            backdrop
        );

        backdrop
            .querySelector(
                "#miLoginSuccessContinue"
            )
            .addEventListener(
                "click",
                hide
            );

        backdrop.addEventListener(
            "click",
            function (event) {
                if (
                    event.target ===
                    backdrop
                ) {
                    hide();
                }
            }
        );

        return backdrop;
    }

    function hide() {
        clearTimeout(closeTimer);

        const backdrop =
            document.getElementById(
                "miLoginSuccessBackdrop"
            );

        if (!backdrop) {
            return;
        }

        backdrop.classList.remove(
            "mi-login-success-visible"
        );

        setTimeout(
            function () {
                if (
                    !backdrop.classList
                        .contains(
                            "mi-login-success-visible"
                        )
                ) {
                    backdrop.style.display =
                        "none";
                }
            },
            240
        );
    }

    function show(detail) {
        const now =
            Date.now();

        /*
          Prevent duplicate auth events from opening
          the popup more than once.
        */
        if (
            now - lastShownAt <
            1800
        ) {
            return;
        }

        lastShownAt =
            now;

        clearTimeout(closeTimer);

        const backdrop =
            ensurePopup();

        const text =
            translations();

        const title =
            backdrop.querySelector(
                "#miLoginSuccessTitle"
            );

        const message =
            backdrop.querySelector(
                "#miLoginSuccessMessage"
            );

        const email =
            backdrop.querySelector(
                "#miLoginSuccessEmail"
            );

        const continueButton =
            backdrop.querySelector(
                "#miLoginSuccessContinue"
            );

        title.textContent =
            text.title;

        message.textContent =
            text.message;

        continueButton.textContent =
            text.continueText;

        const emailValue =
            getEmail(detail);

        if (emailValue) {
            email.textContent =
                emailValue;

            email.style.display =
                "inline-flex";
        }
        else {
            email.textContent =
                "";

            email.style.display =
                "none";
        }

        backdrop.style.display =
            "flex";

        requestAnimationFrame(
            function () {
                requestAnimationFrame(
                    function () {
                        backdrop.classList.add(
                            "mi-login-success-visible"
                        );

                        continueButton.focus({
                            preventScroll:
                                true
                        });
                    }
                );
            }
        );

        /*
          Also use the existing Dynamic Island,
          when that system is available.
        */
        if (
            window.MIIOS &&
            typeof window.MIIOS
                .island ===
                "function"
        ) {
            window.MIIOS.island(
                text.title,
                {
                    type:
                        "success",

                    duration:
                        1800
                }
            );
        }

        closeTimer =
            setTimeout(
                hide,
                6500
            );
    }

    function start() {
        ensurePopup();

        window.addEventListener(
            "mi-login-success",
            function (event) {
                show(
                    event.detail ||
                    {}
                );
            }
        );

        document.addEventListener(
            "keydown",
            function (event) {
                if (
                    event.key ===
                    "Escape"
                ) {
                    hide();
                }
            }
        );
    }

    window.MILoginSuccessPopup = {
        show:
            show,

        hide:
            hide
    };

    if (
        document.readyState ===
        "loading"
    ) {
        document.addEventListener(
            "DOMContentLoaded",
            start,
            {
                once: true
            }
        );
    }
    else {
        start();
    }
})();

/* MI AI LOGIN SUCCESS POPUP JS - END */
</script>












<script>
/* MI AI CLEAN CHAT ENGINE V9 JS - START */

(function () {
    "use strict";

    const EMPTY_TITLE =
        "NEW CHAT";

    let newChatQueue =
        Promise.resolve();

    let installed =
        false;

    function cleanText(value) {
        return String(
            value || ""
        )
            .replace(
                /<[^>]*>/g,
                " "
            )
            .replace(
                /\s+/g,
                " "
            )
            .trim();
    }

    function chatMap() {
        try {
            if (
                typeof chats !==
                    "undefined" &&
                chats &&
                typeof chats ===
                    "object" &&
                !Array.isArray(chats)
            ) {
                return chats;
            }
        }
        catch (error) {
            // Continue with fallback.
        }

        if (
            window.chats &&
            typeof window.chats ===
                "object" &&
            !Array.isArray(
                window.chats
            )
        ) {
            return window.chats;
        }

        return {};
    }

    function replaceChatMap(value) {
        try {
            chats =
                value;
        }
        catch (error) {
            // window fallback below.
        }

        window.chats =
            value;
    }

    function currentId() {
        try {
            if (
                typeof currentChat !==
                    "undefined" &&
                currentChat
            ) {
                return String(
                    currentChat
                );
            }
        }
        catch (error) {
            // Continue with fallback.
        }

        return String(
            window.currentChat ||
            ""
        );
    }

    function setCurrentId(chatId) {
        const id =
            String(chatId);

        try {
            currentChat =
                id;
        }
        catch (error) {
            // window fallback below.
        }

        window.currentChat =
            id;

        try {
            localStorage.setItem(
                "last_chat",
                id
            );
        }
        catch (error) {
            console.warn(
                "[MI AI V9] Could not save last chat.",
                error
            );
        }
    }

    function messagesOf(chat) {
        if (Array.isArray(chat)) {
            return chat;
        }

        if (
            chat &&
            Array.isArray(
                chat.messages
            )
        ) {
            return chat.messages;
        }

        return [];
    }

    function messageText(message) {
        if (
            typeof message ===
                "string"
        ) {
            return cleanText(
                message
            );
        }

        if (
            !message ||
            typeof message !==
                "object"
        ) {
            return "";
        }

        const values = [
            message.text,
            message.content,
            message.message,
            message.body,
            message.prompt,
            message.value
        ];

        for (
            const value of values
        ) {
            const cleaned =
                cleanText(
                    value
                );

            if (cleaned) {
                return cleaned;
            }
        }

        return "";
    }

    function messageRole(message) {
        if (
            !message ||
            typeof message !==
                "object"
        ) {
            return "";
        }

        return String(
            message.role ||
            message.sender ||
            message.author ||
            message.type ||
            message.from ||
            ""
        )
            .trim()
            .toLowerCase();
    }

    function firstUserMessage(chat) {
        const messages =
            messagesOf(chat);

        for (
            const message of messages
        ) {
            const content =
                messageText(
                    message
                );

            if (!content) {
                continue;
            }

            const role =
                messageRole(
                    message
                );

            if (
                !role ||
                role === "me" ||
                role === "user" ||
                role === "human" ||
                role === "client" ||
                role.includes("user")
            ) {
                return content;
            }
        }

        return "";
    }

    function semanticTitle(value) {
        const original =
            cleanText(value);

        const lower =
            original.toLowerCase();

        if (!original) {
            return EMPTY_TITLE;
        }

        if (
            /^(hi|hii+|hello|hey|good morning|good afternoon|good evening|හායි|ආයුබෝවන්)\b/i
                .test(original)
        ) {
            return "User Greeting";
        }

        if (
            /\b(bye|goodbye|see you)\b/i
                .test(lower)
        ) {
            return "User Farewell";
        }

        if (
            /\b(thanks|thank you|thankyou)\b/i
                .test(lower)
        ) {
            return "User Appreciation";
        }

        if (
            /^\d+$/
                .test(original)
        ) {
            return "Number Question";
        }

        if (
            /\b(image|photo|picture)\b/i
                .test(lower) &&
            /\b(cow|cattle)\b/i
                .test(lower)
        ) {
            return "Cow Image Request";
        }

        if (
            /\b(image|photo|picture|logo|icon)\b/i
                .test(lower)
        ) {
            return "Image Request";
        }

        if (
            /\b(login|log in|sign in|authentication)\b/i
                .test(lower)
        ) {
            return "Login Support";
        }

        if (
            /\b(new chat|chat history|conversation)\b/i
                .test(lower)
        ) {
            return "Chat Management";
        }

        if (
            /\b(error|bug|fix|failed|not working|problem|issue)\b/i
                .test(lower) &&
            /\b(code|html|css|javascript|python|powershell|api|backend|frontend)\b/i
                .test(lower)
        ) {
            return "Code Fix Request";
        }

        if (
            /\b(code|html|css|javascript|python|powershell|api|backend|frontend|github|vercel)\b/i
                .test(lower)
        ) {
            return "Programming Request";
        }

        if (
            /\b(translate|translation)\b/i
                .test(lower)
        ) {
            return "Translation Request";
        }

        if (
            /\b(weather|forecast|temperature|rain)\b/i
                .test(lower)
        ) {
            return "Weather Question";
        }

        if (
            /\b(email|mail|letter)\b/i
                .test(lower)
        ) {
            return "Email Request";
        }

        if (
            /\b(summary|summarize)\b/i
                .test(lower)
        ) {
            return "Summary Request";
        }

        if (
            /\b(password|passcode|forgot password|reset password)\b/i
                .test(lower)
        ) {
            return "Password Support";
        }

        if (
            /\b(wifi|router|internet|network)\b/i
                .test(lower)
        ) {
            return "Network Support";
        }

        const ignored =
            new Set([
                "a",
                "an",
                "and",
                "are",
                "can",
                "could",
                "do",
                "for",
                "from",
                "give",
                "help",
                "how",
                "i",
                "in",
                "is",
                "make",
                "me",
                "my",
                "of",
                "on",
                "please",
                "tell",
                "the",
                "this",
                "to",
                "want",
                "what",
                "when",
                "where",
                "which",
                "who",
                "why",
                "with",
                "write",
                "you",
                "eka",
                "meka",
                "mata",
                "denna",
                "one"
            ]);

        const words =
            original
                .replace(
                    /[^\p{L}\p{N}\s+#.-]/gu,
                    " "
                )
                .split(/\s+/)
                .filter(Boolean)
                .filter(
                    function (word) {
                        return (
                            word.length > 1 &&
                            !ignored.has(
                                word.toLowerCase()
                            )
                        );
                    }
                )
                .slice(
                    0,
                    4
                );

        if (
            words.length ===
            0
        ) {
            return "General Conversation";
        }

        return words
            .map(
                function (word) {
                    if (
                        /[a-z]/i.test(
                            word
                        )
                    ) {
                        return (
                            word.charAt(0)
                                .toUpperCase() +
                            word.slice(1)
                        );
                    }

                    return word;
                }
            )
            .join(" ")
            .slice(
                0,
                42
            );
    }

    function titleForChat(chatId) {
        const chat =
            chatMap()[chatId];

        if (!chat) {
            return EMPTY_TITLE;
        }

        const first =
            firstUserMessage(
                chat
            );

        const title =
            first
                ? semanticTitle(
                    first

                : EMPTY_TITLE;

        setChatTitle(
            chat,

    function generateChatId() {
        if (
            window.crypto &&
            typeof window.crypto
                .randomUUID ===
                "function"
        ) {
            return (
                "chat_" +
                window.crypto
                    .randomUUID()
            );
        }

        return (
            "chat_" +
            Date.now() +
            "_" +
            Math.random()
                .toString(36)
                .slice(2, 10)
        );
    }

    function createBlankChatRecord() {
        let allChats =
            chatMap();

        if (
            !allChats ||
            typeof allChats !==
                "object" ||
            Array.isArray(allChats)
        ) {
            allChats = {};

            replaceChatMap(
                allChats
            );
        }

        const chatId =
            generateChatId();

        const blankChat =
            [];

        const now =
            Date.now();

        setChatTitle(
            blankChat,
            EMPTY_TITLE
        );

        blankChat.createdAt =
            now;

        blankChat.updatedAt =
            now;

        blankChat.messageCount =
            0;

        blankChat.lastPreview =
            "";

        blankChat.attachments =
            [];

        blankChat.isEmpty =
            true;

        allChats[chatId] =
            blankChat;

        setCurrentId(
            chatId
        );

        return chatId;

    function appendStoredMessage(
        container,
        message
    ) {
        const text =
            messageText(
                message
            );

        if (!text) {
            return;
        }

        const role =
            messageRole(
                message
            );

        if (
            (
                role === "ai" ||
                role === "assistant"
            ) &&

        ) {

    function openChatClean(chatId) {
        const id =
            String(chatId || "");

        const allChats =
            chatMap();

        const chat =
            allChats[id];

        const container =
            getChatBox();

        if (
            !id ||
            !chat ||
            !container
        ) {
            return false;
        }

        setCurrentId(
            id
        );

        container.classList.add(
            "mi-v9-switching"
        );

        /*
          Always remove every node from the old chat.
          This prevents the Welcome screen appearing
          on top of previous messages.
        */
        container.replaceChildren();

        const messages =
            messagesOf(chat);

        const attachments =
            Array.isArray(
                chat.attachments
            )
                ? chat.attachments
                : [];

        if (
            messages.length === 0 &&
            attachments.length === 0
        ) {
            container.appendChild(
                createWelcome()
            );

            container.scrollTop =
                0;
        }
        else {
            attachments.forEach(
                function (attachment) {
                    const card =
                        document.createElement(
                            "div"
                        );

                    card.style.cssText =
                        "padding:10px 12px;" +
                        "margin:8px;" +
                        "border-radius:12px;" +
                        "border:1px solid rgba(255,255,255,.12);" +
                        "background:rgba(255,255,255,.06);";

                    card.textContent =
                        "📎 " +
                        (
                            attachment.file_name ||
                            attachment.name ||
                            "Uploaded file"
                        );

                    container.appendChild(
                        card
                    );
                }
            );

            messages.forEach(
                function (message) {
                    appendStoredMessage(
                        container,
                        message
                    );
                }
            );

            container.scrollTop =
                container.scrollHeight;
        }

        requestAnimationFrame(
            function () {
                container.classList.remove(
                    "mi-v9-switching"
                );

                container.classList.remove(
                    "mi-v9-ready"
                );

                void container.offsetWidth;

                container.classList.add(
                    "mi-v9-ready"
                );
            }
        );

        const messageInput =
            getInput();

        if (messageInput) {
            messageInput.value =
                "";

            messageInput.dispatchEvent(
                new Event(
                    "input",
                    {
                        bubbles:
                            true
                    }
                )
            );

            try {
                messageInput.focus({
                    preventScroll:
                        true
                });
            }
            catch (error) {
                messageInput.focus();
            }
        }

        renderListClean();

        return true;
    }

    function renderListClean() {
        const list =
            getChatList();

        if (!list) {
            return;
        }

        list.replaceChildren();

        const allChats =
            chatMap();

        const ids =
            Object.keys(
                allChats
            );

        ids.sort(
            function (a, b) {
                const chatA =
                    allChats[a];

                const chatB =
                    allChats[b];

                if (
                    chatA?.pin &&
                    !chatB?.pin
                ) {
                    return -1;
                }

                if (
                    !chatA?.pin &&
                    chatB?.pin
                ) {
                    return 1;
                }

                return (
                    Number(
                        chatB?.updatedAt ||
                        chatB?.createdAt ||
                        0
                    ) -
                    Number(
                        chatA?.updatedAt ||
                        chatA?.createdAt ||
                        0
                    )
                );
            }
        );

        list.classList.toggle(
            "scrollable",
            ids.length > 9
        );

        ids.forEach(
            function (
                chatId,
                index
            ) {
                const chat =
                    allChats[chatId];

                const item =
                    document.createElement(
                        "div"
                    );

                item.className =
                    "chatItem";

                item.dataset.id =
                    chatId;

                item.dataset.chatId =
                    chatId;

                item.textContent =
                    (
                        chat?.pin
                            ? "📌 "
                            : ""
                    ) +
                    "💬 " +
                    titleForChat(
                        chatId
                    );

                if (
                    chatId ===
                    currentId()
                ) {
                    item.classList.add(
                        "mi-v9-active-chat"
                    );
                }

                if (index === 0) {
                    item.classList.add(
                        "mi-v9-new-item"
                    );
                }

                item.addEventListener(
                    "click",
                    function () {
                        openChatClean(
                            chatId
                        );
                    }
                );

                item.addEventListener(
                    "contextmenu",
                    function (event) {
                        event.preventDefault();

                        try {
                            selectedChat =
                                chatId;
                        }
                        catch (error) {
                            window.selectedChat =
                                chatId;
                        }

                        const pinOption =
                            document.getElementById(
                                "pinOption"
                            );

                        if (pinOption) {
                            pinOption.textContent =
                                chat?.pin
                                    ? "❌ Unpin"
                                    : "📌 Pin";
                        }

                        const contextMenu =
                            document.getElementById(
                                "menu"
                            );

                        if (contextMenu) {
                            contextMenu.style
                                .display =
                                "block";

                            contextMenu.style
                                .left =
                                event.pageX +
                                "px";

                            contextMenu.style
                                .top =
                                event.pageY +
                                "px";
                        }
                    }
                );

                list.appendChild(
                    item
                );
            }
        );
    }

    async function createNewChatOnce() {
        try {
            if (
                typeof removeLoginPrompt ===
                    "function"
            ) {
                removeLoginPrompt();
            }
        }
        catch (error) {
            // Optional UI function.
        }

        const params =
            new URLSearchParams(
                window.location.search
            );

        if (
            params.has("s") ||
            params.has("share") ||
            document.body.classList
                .contains(
                    "mi-shared-single-chat"
                )
        ) {
            window.location.assign(
                window.location.origin +
                window.location.pathname
            );

            return "";
        }

        const button =
            document.querySelector(
                [
                    "#newChatBtn",
                    ".new-chat-btn",
                    'button[onclick*="newChat"]'
                ].join(",")
            );

        const container =
            getChatBox();

        button?.classList.add(
            "mi-v9-new-chat-running"
        );

        container?.classList.add(
            "mi-v9-switching"
        );

        await new Promise(
            function (resolve) {
                requestAnimationFrame(
                    function () {
                        requestAnimationFrame(
                            resolve
                        );
                    }
                );
            }
        );

        try {
            const chatId =
                createBlankChatRecord();

            /*
              Save the blank chat before and after
              it is rendered. It must not be discarded.
            */
            saveEverything();
            renderListClean();
            openChatClean(
                chatId
            );
            saveEverything();

            window.dispatchEvent(
                new CustomEvent(
                    "mi-new-chat-created",
                    {
                        detail: {
                            chatId:
                                chatId,

                            empty:
                                true,

                            isolated:
                                true
                        }
                    }
                )
            );

            return chatId;
        }
        finally {
            setTimeout(
                function () {
                    button?.classList.remove(
                        "mi-v9-new-chat-running"
                    );

                    container?.classList.remove(
                        "mi-v9-switching"
                    );
                },
                70
            );
        }
    }

    function queueNewChat() {
        /*
          Every separate press is queued.
          No press is blocked or combined.
        */
        const task =
            newChatQueue.then(
                createNewChatOnce,
                createNewChatOnce
            );

        newChatQueue =
            task.catch(
                function (error) {
                    console.error(
                        "[MI AI V9] New Chat failed:",
                        error
                    );
                }
            );

        return task;
    }

    function addClean(
        role,
        text
    ) {
        const id =
            currentId();

        const chat =
            chatMap()[id];

        const container =
            getChatBox();

        if (
            !id ||
            !chat ||
            !container
        ) {
            return;
        }

        const normalizedRole =
            role === "user"
                ? "me"
                : role;

        const content =
            String(text || "");

        if (
            normalizedRole ===
                "ai"
        ) {
            if (
                typeof appendAiMessage ===
                    "function"
            ) {
                appendAiMessage(
                    container,
                    content
                );
            }

            return;
        }

        const hadFirstMessage =
            Boolean(
                firstUserMessage(
                    chat
                )
            );

        document
            .getElementById(
                "miWelcomeV9"
            )
            ?.remove();

        const bubble =
            document.createElement(
                "div"
            );

        bubble.className =
            normalizedRole;

        bubble.textContent =
            content;

        container.appendChild(
            bubble
        );

        chat.push({
            role:
                normalizedRole,

            text:
                content
        });

        chat.updatedAt =
            Date.now();

        chat.messageCount =
            chat.length;

        chat.lastPreview =
            content;

        chat.isEmpty =
            false;

        if (
            !hadFirstMessage &&
            (
                normalizedRole ===
                    "me" ||
                normalizedRole ===
                    "human"
            )
        ) {
            setChatTitle(
                chat,
                semanticTitle(
                    content
                )
            );
        }

        saveEverything();
        renderListClean();

        try {
            const token =
                localStorage.getItem(
                    "mi_supabase_token"
                );

            if (token) {
                const userId =
                    localStorage.getItem(
                        "mi_user_id"
                    ) || "";

                const email =
                    (
                        localStorage.getItem(
                            "mi_user_email"
                        ) || ""
                    )
                        .trim()
                        .toLowerCase();

                fetch(
                    "/api/messages",
                    {
                        method:
                            "POST",

                        headers: {
                            "Content-Type":
                                "application/json",

                            "Authorization":
                                "Bearer " +
                                token,

                            "X-Session-Id":
                                (
                                    typeof accountId !==
                                        "undefined"
                                        ? accountId
                                        : userId
                                ) ||
                                userId,

                            "X-User-Id":
                                userId,

                            "X-User-Email":
                                email
                        },

                        body:
                            JSON.stringify({
                                conversation_id:
                                    id,

                                session_id:
                                    (
                                        typeof accountId !==
                                            "undefined"
                                            ? accountId
                                            : userId
                                    ),

                                role:
                                    normalizedRole,

                                content:
                                    content
                            })
                    }
                ).catch(
                    function () {}
                );
            }
        }
        catch (error) {
            console.warn(
                "[MI AI V9] Message save failed.",
                error
            );
        }

        container.scrollTop =
            container.scrollHeight;
    }

    function refreshTitles() {
        const allChats =
            chatMap();

        let changed =
            false;

        Object.keys(allChats)
            .forEach(
                function (chatId) {
                    const chat =
                        allChats[chatId];

                    const wanted =
                        firstUserMessage(chat)
                            ? semanticTitle(
                                firstUserMessage(
                                    chat
                                )
                            )
                            : EMPTY_TITLE;

                    const current =
                        cleanText(
                            chat.title ||
                            chat.name ||
                            chat.chatName
                        );

                    if (
                        current !== wanted
                    ) {
                        setChatTitle(
                            chat,
                            wanted
                        );

                        changed =
                            true;
                    }
                }
            );

        if (changed) {
            saveEverything();
            renderListClean();
        }
    }

    function install() {
        if (installed) {
            return;
        }

        installed =
            true;

        const newChatFunction =
            function () {
                return queueNewChat();
            };

        const openChatFunction =
            function (chatId) {
                return openChatClean(
                    chatId
                );
            };

        const renderListFunction =
            function () {
                return renderListClean();
            };

        const addFunction =
            function (
                role,
                text
            ) {
                return addClean(
                    role,
                    text
                );
            };

        window.newChat =
            newChatFunction;

        window.openChat =
            openChatFunction;

        window.renderList =
            renderListFunction;

        window.add =
            addFunction;

        try {
            newChat =
                newChatFunction;
        }
        catch (error) {}

        try {
            openChat =
                openChatFunction;
        }
        catch (error) {}

        try {
            renderList =
                renderListFunction;
        }
        catch (error) {}

        try {
            add =
                addFunction;
        }
        catch (error) {}

        setInterval(
            refreshTitles,
            2000
        );

        setTimeout(
            function () {
                refreshTitles();
                renderListClean();

                const id =
                    currentId();

                if (
                    id &&
                    chatMap()[id]
                ) {
                    openChatClean(
                        id
                    );
                }
            },
            500
        );

        window.MICleanChatEngineV9 = {
            newChat:
                queueNewChat,

            openChat:
                openChatClean,

            renderList:
                renderListClean,

            semanticTitle:
                semanticTitle,

            refreshTitles:
                refreshTitles
        };

        console.log(
            "[MI AI] Clean Chat Engine V9 installed."
        );
    }

    if (
