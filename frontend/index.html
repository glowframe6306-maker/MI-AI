    function closePopup() {
        if (popup) {
            popup.classList.remove(
                "mi-open"
            );

            popup.replaceChildren();
        }

        if (activeTrigger) {
            activeTrigger.setAttribute(
                "aria-expanded",
                "false"
            );
        }

        activeSelect = null;
        activeTrigger = null;
    }

    function positionPopup(trigger) {
        const menu = ensurePopup();
        const rect =
            trigger.getBoundingClientRect();

        const margin = 8;

        const width =
            Math.min(
                Math.max(
                    rect.width,
                    200
                ),
                window.innerWidth
                    - margin * 2
            );

        menu.style.width =
            width + "px";

        menu.style.left =
            Math.max(
                margin,
                Math.min(
                    rect.left,
                    window.innerWidth
                        - width
                        - margin
                )
            ) + "px";

        menu.style.top =
            rect.bottom + 8 + "px";

        requestAnimationFrame(
            function () {
                const menuRect =
                    menu.getBoundingClientRect();

                if (
                    menuRect.bottom >
                    window.innerHeight - margin
                ) {
                    const above =
                        rect.top
                        - menuRect.height
                        - 8;

                    menu.style.top =
                        Math.max(
                            margin,
                            above
                        ) + "px";
                }
            }
        );
    }

    function rebuildPopup(
        select,
        trigger
    ) {
        const menu = ensurePopup();

        menu.replaceChildren();

        Array.from(
            select.options
        ).forEach(function (
            option,
            index
        ) {
            const button =
                document.createElement(
                    "button"
                );

            button.type =
                "button";

            button.className =
                "mi-ios-popup-option";

            button.setAttribute(
                "role",
                "option"
            );

            const isSelected =
                index ===
                select.selectedIndex;

            button.classList.toggle(
                "mi-selected",
                isSelected
            );

            button.setAttribute(
                "aria-selected",
                String(isSelected)
            );

            const label =
                document.createElement(
                    "span"
                );

            label.className =
                "mi-ios-option-label";

            label.textContent =
                option.textContent;

            const check =
                document.createElement(
                    "span"
                );

            check.className =
                "mi-ios-option-check";

            check.textContent = "✓";

            check.setAttribute(
                "aria-hidden",
                "true"
            );

            button.append(
                label,
                check
            );

            button.addEventListener(
                "click",
                function (event) {
                    event.preventDefault();
                    event.stopPropagation();

                    select.selectedIndex =
                        index;

                    select.dispatchEvent(
                        new Event(
                            "input",
                            {
                                bubbles: true
                            }
                        )
                    );

                    select.dispatchEvent(
                        new Event(
                            "change",
                            {
                                bubbles: true
                            }
                        )
                    );

                    updateTrigger(
                        select,
                        trigger
                    );

                    closePopup();

                    trigger.focus();
                }
            );

            menu.appendChild(
                button
            );
        });
    }

    function updateTrigger(
        select,
        trigger
    ) {
        const selected =
            select.options[
                select.selectedIndex
            ] || select.options[0];

        const text =
            trigger.querySelector(
                ".mi-ios-select-trigger-text"
            );

        if (text) {
            text.textContent =
                selected?.textContent
                || "";
        }

        trigger.disabled =
            select.disabled;
    }

    function openPopup(
        select,
        trigger
    ) {
        closePopup();

        activeSelect = select;
        activeTrigger = trigger;

        rebuildPopup(
            select,
            trigger
        );

        positionPopup(trigger);

        const menu = ensurePopup();

        menu.classList.add(
            "mi-open"
        );

        trigger.setAttribute(
            "aria-expanded",
            "true"
        );

        requestAnimationFrame(
            function () {
                menu.querySelector(
                    ".mi-selected"
                )?.focus();
            }
        );
    }

    function enhanceSelect(select) {
        if (
            !(select instanceof
                HTMLSelectElement)
            || enhancedSelects.has(select)
        ) {
            return;
        }

        enhancedSelects.add(select);

        select.dataset.miIosReady =
            "true";

        const shell =
            document.createElement(
                "div"
            );

        shell.className =
            "mi-ios-select-shell";

        select.parentNode.insertBefore(
            shell,
            select
        );

        shell.appendChild(select);

        const trigger =
            document.createElement(
                "button"
            );

        trigger.type = "button";

        trigger.className =
            "mi-ios-select-trigger";

        trigger.setAttribute(
            "aria-haspopup",
            "listbox"
        );

        trigger.setAttribute(
            "aria-expanded",
            "false"
        );

        const text =
            document.createElement(
                "span"
            );

        text.className =
            "mi-ios-select-trigger-text";

        const icon =
            document.createElement(
                "span"
            );

        icon.className =
            "mi-ios-icon-wrap";

        icon.innerHTML =
            icons.chevron;

        trigger.append(
            text,
            icon
        );

        shell.appendChild(trigger);

        updateTrigger(
            select,
            trigger
        );

        trigger.addEventListener(
            "click",
            function (event) {
                event.preventDefault();
                event.stopPropagation();

                if (
                    activeSelect === select
                ) {
                    closePopup();
                }
                else {
                    openPopup(
                        select,
                        trigger
                    );
                }
            }
        );

        select.addEventListener(
            "change",
            function () {
                updateTrigger(
                    select,
                    trigger
                );
            }
        );

        const observer =
            new MutationObserver(
                function () {
                    updateTrigger(
                        select,
                        trigger
                    );

                    if (
                        activeSelect ===
                        select
                    ) {
                        rebuildPopup(
                            select,
                            trigger
                        );

                        positionPopup(
                            trigger
                        );
                    }
                }
            );

        observer.observe(
            select,
            {
                childList: true,
                subtree: true,
                characterData: true,
                attributes: true
            }
        );
    }

    function scanSelects(root) {
        const scope =
            root instanceof Element
                ? root
                : document;

        if (
            scope instanceof
            HTMLSelectElement
        ) {
            enhanceSelect(scope);
        }

        scope.querySelectorAll(
            "select"
        ).forEach(
            enhanceSelect
        );
    }

    function replaceLeadingIcon(
        element,
        svg
    ) {
        if (
            !element
            || element.dataset
                .miIosIconApplied ===
                "true"
        ) {
            return;
        }

        const originalText =
            element.textContent
                .replace(
                    /^[^\p{L}\p{N}]+/u,
                    ""
                )
                .trim();

        element.replaceChildren();

        const label =
            document.createElement(
                "span"
            );

        label.className =
            "mi-ios-icon-label";

        const iconWrap =
            document.createElement(
                "span"
            );

        iconWrap.className =
            "mi-ios-icon-wrap";

        iconWrap.innerHTML = svg;

        const text =
            document.createElement(
                "span"
            );

        text.textContent =
            originalText;

        label.append(
            iconWrap,
            text
        );

        element.appendChild(label);

        element.dataset
            .miIosIconApplied =
            "true";
    }

    function applyIcons() {
        replaceLeadingIcon(
            document.querySelector(
                "#newChatBtn, " +
                "#sidebar button[onclick*='newChat']"
            ),
            icons.plus
        );

        replaceLeadingIcon(
            document.querySelector(
                "#supportBtn"
            ),
            icons.support
        );

        replaceLeadingIcon(
            document.querySelector(
                "#settingsBtn"
            ),
            icons.settings
        );

        replaceLeadingIcon(
            document.querySelector(
                "#logoutBtn, " +
                "button[onclick*='logout'], " +
                "button[onclick*='Logout']"
            ),
            icons.logout
        );

        document
            .querySelectorAll(
                "#settingsCloseBtn, " +
                ".close-btn, " +
                ".modal-close"
            )
            .forEach(function (button) {
                if (
                    button.dataset
                        .miIosIconApplied ===
                    "true"
                ) {
                    return;
                }

                button.innerHTML =
                    icons.close;

                button.dataset
                    .miIosIconApplied =
                    "true";
            });

        document
            .querySelectorAll(
                "#sendBtn, " +
                "#sendButton, " +
                ".send-btn"
            )
            .forEach(function (button) {
                if (
                    button.dataset
                        .miIosIconApplied ===
                    "true"
                ) {
                    return;
                }

                button.innerHTML =
                    icons.send;

                button.dataset
                    .miIosIconApplied =
                    "true";
            });

        document
            .querySelectorAll(
                ".mi-ai-functional-copy, " +
                ".mi-ai-copy-below, " +
                ".aiCopyButton, " +
                ".copy-btn, " +
                ".copy-button"
            )
            .forEach(function (button) {
                if (
                    button.dataset
                        .miIosIconApplied ===
                    "true"
                ) {
                    return;
                }

                button.innerHTML =
                    icons.copy;

                button.dataset
                    .miIosIconApplied =
                    "true";
            });
    }

    document.addEventListener(
        "click",
        function (event) {
            if (
                !event.target.closest(
                    ".mi-ios-select-trigger"
                )
                && !event.target.closest(
                    "#miIosSelectPopup"
                )
            ) {
                closePopup();
            }
        }
    );

    document.addEventListener(
        "keydown",
        function (event) {
            if (event.key === "Escape") {
                closePopup();
            }
        }
    );

    window.addEventListener(
        "resize",
        function () {
            if (
                activeTrigger
                && popup?.classList
                    .contains("mi-open")
            ) {
                positionPopup(
                    activeTrigger
                );
            }
        }
    );

    window.addEventListener(
        "scroll",
        function () {
            if (
                activeTrigger
                && popup?.classList
                    .contains("mi-open")
            ) {
                positionPopup(
                    activeTrigger
                );
            }
        },
        true
    );

    function refresh() {
        scanSelects(document);
        applyIcons();
    }

    function start() {
        ensurePopup();
        refresh();

        let observerRefreshPending =
            false;

        const observer =
            new MutationObserver(
                function (mutations) {
                    mutations.forEach(
                        function (mutation) {
                            mutation.addedNodes
                                .forEach(
                                    function (node) {
                                        if (
                                            node.nodeType ===
                                            Node.ELEMENT_NODE
                                        ) {
                                            scanSelects(
                                                node
                                            );
                                        }
                                    }
                                );
                        }
                    );

                    if (observerRefreshPending) {
                        return;
                    }

                    observerRefreshPending =
                        true;

                    requestAnimationFrame(
                        function () {
                            observerRefreshPending =
                                false;

                            applyIcons();
                        }
                    );
                }
            );

        observer.observe(
            document.body,
            {
                childList: true,
                subtree: true
            }
        );
    }

    window.MIIosControls = {
        refresh: refresh,
        closeDropdown: closePopup
    };

    if (
        document.readyState ===
        "loading"
    ) {
        document.addEventListener(
            "DOMContentLoaded",
            start,
            {
                once: true
            }
        );
    }
    else {
        start();
    }
})();

/* MI AI IOS SELECT AND ICON SYSTEM JS - END */
</script>







<script>
/* MI AI ACCOUNT SETTINGS PERSISTENCE - START */

(function () {
    "use strict";

    const SETTINGS_PREFIX = "mi_account_settings_v1_";
    const GLOBAL_BACKUP_KEY = "mi_guest_settings_v1";

    const SETTINGS_SELECTORS = [
        "#settingsPanel input",
        "#settingsPanel select",
        "#settingsPanel textarea"
    ].join(",");

    function normalizeIdentity(value) {
        return String(value || "")
            .trim()
            .toLowerCase();
    }

    function getLoggedInIdentity() {
        const email = normalizeIdentity(
            localStorage.getItem("mi_user_email")
        );

        const userId = normalizeIdentity(
            localStorage.getItem("mi_user_id")
        );

        return email || userId || "";
    }

    function isLoggedInForSettings() {
        return Boolean(
            getLoggedInIdentity() &&
            (
                localStorage.getItem("mi_supabase_token") ||
                localStorage.getItem("mi_user_id")
            )
        );
    }

    function getSettingsStorageKey(identity) {
        const normalized = normalizeIdentity(identity);

        return normalized
            ? SETTINGS_PREFIX + encodeURIComponent(normalized)
            : GLOBAL_BACKUP_KEY;
    }

    function getSettingControlKey(control, index) {
        return (
            control.id ||
            control.name ||
            control.getAttribute("data-setting-key") ||
            ("setting_" + index)
        );
    }

    function readSettingsControls() {
        const controls = Array.from(
            document.querySelectorAll(SETTINGS_SELECTORS)
        );

        const result = {};

        controls.forEach(function (control, index) {
            if (
                !control ||
                control.type === "button" ||
                control.type === "submit" ||
                control.type === "reset" ||
                control.type === "password" ||
                control.type === "email"
            ) {
                return;
            }

            const key = getSettingControlKey(control, index);

            if (
                control.type === "checkbox" ||
                control.type === "radio"
            ) {
                result[key] = {
                    type: control.type,
                    checked: Boolean(control.checked)
                };
            } else {
                result[key] = {
                    type: control.type || control.tagName.toLowerCase(),
                    value: control.value
                };
            }
        });

        result.__documentTheme = {
            main:
                getComputedStyle(document.documentElement)
                    .getPropertyValue("--main")
                    .trim(),
            bodyClasses: Array.from(document.body.classList)
                .filter(function (name) {
                    return (
                        name === "light" ||
                        name === "dark" ||
                        name.startsWith("theme-")
                    );
                })
        };

        result.__savedAt = Date.now();

        return result;
    }

    function saveAccountSettings() {
        if (!isLoggedInForSettings()) {
            return;
        }

        const identity = getLoggedInIdentity();

        if (!identity) {
            return;
        }

        try {
            localStorage.setItem(
                getSettingsStorageKey(identity),
                JSON.stringify(readSettingsControls())
            );
        } catch (error) {
            console.error(
                "Unable to save account settings:",
                error
            );
        }
    }

    function dispatchControlEvents(control) {
        try {
            control.dispatchEvent(
                new Event("input", {
                    bubbles: true
                })
            );

            control.dispatchEvent(
                new Event("change", {
                    bubbles: true
                })
            );
        } catch (error) {
            console.warn(
                "Unable to dispatch setting event:",
                error
            );
        }
    }

    function restoreAccountSettings() {
        if (!isLoggedInForSettings()) {
            return false;
        }

        const identity = getLoggedInIdentity();

        if (!identity) {
            return false;
        }

        let saved;

        try {
            const raw = localStorage.getItem(
                getSettingsStorageKey(identity)
            );

            if (!raw) {
                return false;
            }

            saved = JSON.parse(raw);
        } catch (error) {
            console.error(
                "Unable to read account settings:",
                error
            );

            return false;
        }

        const controls = Array.from(
            document.querySelectorAll(SETTINGS_SELECTORS)
        );

        controls.forEach(function (control, index) {
            if (
                !control ||
                control.type === "button" ||
                control.type === "submit" ||
                control.type === "reset" ||
                control.type === "password" ||
                control.type === "email"
            ) {
                return;
            }

            const key = getSettingControlKey(control, index);
            const item = saved[key];

            if (!item) {
                return;
            }

            if (
                control.type === "checkbox" ||
                control.type === "radio"
            ) {
                control.checked = Boolean(item.checked);
            } else if (
                Object.prototype.hasOwnProperty.call(
                    item,
                    "value"
                )
            ) {
                control.value = item.value;
            }

            dispatchControlEvents(control);
        });

        if (
            saved.__documentTheme &&
            saved.__documentTheme.main
        ) {
            document.documentElement.style.setProperty(
                "--main",
                saved.__documentTheme.main
            );

            localStorage.setItem(
                "theme",
                saved.__documentTheme.main
            );
        }

        const languageSelect =
            document.getElementById("languageSelect");

        if (
            languageSelect &&
            typeof window.applyLanguage === "function"
        ) {
            Promise.resolve(
                window.applyLanguage(
                    languageSelect.value,
                    false
                )
            ).catch(function () {});
        }

        return true;
    }

    function resetVisibleSettingsForGuest() {
        const controls = Array.from(
            document.querySelectorAll(SETTINGS_SELECTORS)
        );

        controls.forEach(function (control) {
            if (
                !control ||
                control.type === "button" ||
                control.type === "submit" ||
                control.type === "reset" ||
                control.type === "password" ||
                control.type === "email"
            ) {
                return;
            }

            if (
                control.type === "checkbox" ||
                control.type === "radio"
            ) {
                control.checked =
                    Boolean(control.defaultChecked);
            } else if (
                control.tagName === "SELECT"
            ) {
                control.selectedIndex = 0;
            } else if (
                control.defaultValue !== undefined
            ) {
                control.value = control.defaultValue;
            }

            dispatchControlEvents(control);
        });

        document.documentElement.style.removeProperty(
            "--main"
        );

        localStorage.removeItem("theme");

        document.body.classList.remove(
            "light",
            "dark"
        );
    }

    function handleUserChange() {
        window.setTimeout(function () {
            if (isLoggedInForSettings()) {
                restoreAccountSettings();
            } else {
                resetVisibleSettingsForGuest();
            }
        }, 150);
    }

    document.addEventListener(
        "input",
        function (event) {
            if (
                event.target &&
                event.target.closest("#settingsPanel")
            ) {
                saveAccountSettings();
            }
        },
        true
    );

    document.addEventListener(
        "change",
        function (event) {
            if (
                event.target &&
                event.target.closest("#settingsPanel")
            ) {
                saveAccountSettings();
            }
        },
        true
    );

    document.addEventListener(
        "click",
        function (event) {
            const button = event.target.closest(
                "#settingsPanel button"
            );

            if (!button) {
                return;
            }

            window.setTimeout(
                saveAccountSettings,
                100
            );
        },
        true
    );

    window.addEventListener(
        "mi-chat-user-changed",
        handleUserChange
    );

    window.addEventListener(
        "pagehide",
        saveAccountSettings
    );

    window.addEventListener(
        "beforeunload",
        saveAccountSettings
    );

    window.addEventListener(
        "pageshow",
        function () {
            window.setTimeout(
                handleUserChange,
                100
            );
        }
    );

    document.addEventListener(
        "visibilitychange",
        function () {
            if (document.visibilityState === "hidden") {
                saveAccountSettings();
            } else {
                handleUserChange();
            }
        }
    );

    document.addEventListener(
        "DOMContentLoaded",
        function () {
            window.setTimeout(
                handleUserChange,
                250
            );
        },
        {
            once: true
        }
    );

    window.MIAccountSettings = {
        save: saveAccountSettings,
        restore: restoreAccountSettings,
        resetGuestView: resetVisibleSettingsForGuest,
        getKey: function () {
            return getSettingsStorageKey(
                getLoggedInIdentity()
            );
        }
    };
})();

/* MI AI ACCOUNT SETTINGS PERSISTENCE - END */
</script>






















<script>
/* MI AI SAFE UI UNBLOCK - START */
(function () {
    "use strict";

    function clearBlockingState() {
        document.body?.classList.remove(
            "modal-open",
            "share-modal-open",
            "settings-modal-open"
        );

        document.documentElement.style.removeProperty(
            "pointer-events"
        );

        document.body?.style.removeProperty(
            "pointer-events"
        );

        [
            "#miSmartLoginNotice",
            "#miSettingsLoginNotice"
        ].forEach(function (selector) {
            document.querySelector(selector)?.remove();
        });

        document
            .querySelectorAll(
                [
                    "[data-mi-share-locked]",
                    "[data-login-required]",
                    "[data-auth-required]"
                ].join(",")
            )
            .forEach(function (element) {
                element.removeAttribute(
                    "data-mi-share-locked"
                );

                element.removeAttribute(
                    "data-login-required"
                );

                element.removeAttribute(
                    "data-auth-required"
                );
            });
    }

    function restoreMainInteraction() {
        [
            "#main",
            "#sidebar",
            "#header",
            "#chat",
            "#inputBox",
            "#sendBtn",
            "#sendButton",
            "#newChatBtn",
            "#settingsBtn",
            "#loginBtn",
            "#logoutBtn",
            "#shareBtn"
        ].forEach(function (selector) {
            const element =
                document.querySelector(selector);

            if (!element) {
                return;
            }

            element.style.removeProperty(
                "pointer-events"
            );

            element.style.removeProperty(
                "user-select"
            );

            element.removeAttribute(
                "inert"
            );

            if (
                element.getAttribute(
                    "aria-disabled"
                ) === "true" &&
                !element.disabled
            ) {
                element.removeAttribute(
                    "aria-disabled"
                );
            }
        });
    }

    function start() {
        clearBlockingState();
        restoreMainInteraction();

        window.addEventListener(
            "pageshow",
            function () {
                clearBlockingState();
                restoreMainInteraction();
            }
        );

        window.addEventListener(
            "mi-chat-user-changed",
            function () {
                clearBlockingState();
                restoreMainInteraction();
            }
        );
    }

    window.MISafeUiUnblock = {
        refresh:
            function () {
                clearBlockingState();
                restoreMainInteraction();
            }
    };

    if (
        document.readyState === "loading"
    ) {
        document.addEventListener(
            "DOMContentLoaded",
            start,
            {
                once: true
            }
        );
    }
    else {
        start();
    }
})();
/* MI AI SAFE UI UNBLOCK - END */
</script>



<script>
/* MI AI SAFE ACCOUNT CHAT RESTORE V4 - START */

(function () {
    "use strict";

    const ARCHIVE_PREFIX =
        "mi_safe_account_chat_v4_";

    const LAST_CHAT_PREFIX =
        "mi_safe_last_chat_v4_";

    let saveTimer = null;
    let restoreRunning = false;
    let authListenerInstalled = false;
    let lastIdentity = "";

    function normalize(value) {
        return String(value || "")
            .trim()
            .toLowerCase();
    }

    function firebaseUser() {
        try {
            return (
                window.miFirebaseAuth?.currentUser ||
                window.firebaseAuth?.currentUser ||
                (
                    window.firebase &&
                    typeof window.firebase.auth === "function"
                        ? window.firebase.auth().currentUser
                        : null
                ) ||
                null
            );
        }
        catch (error) {
            return null;
        }
    }

    function accountIdentity() {
        const firebaseAccount =
            firebaseUser();

        return normalize(
            firebaseAccount?.email ||
            localStorage.getItem(
                "mi_user_email"
            ) ||
            firebaseAccount?.uid ||
            localStorage.getItem(
                "mi_user_id"
            ) ||
            ""
        );
    }

    function authenticated() {
        return Boolean(
            accountIdentity() &&
            (
                firebaseUser() ||
                localStorage.getItem(
                    "mi_supabase_token"
                ) ||
                localStorage.getItem(
                    "mi_user_id"
                )
            )
        );
    }

    function archiveKey(identity) {
        return (
            ARCHIVE_PREFIX +
            encodeURIComponent(
                normalize(identity)
            )
        );
    }

    function lastChatKey(identity) {
        return (
            LAST_CHAT_PREFIX +
            encodeURIComponent(
                normalize(identity)
            )
        );
    }

    function safeParse(value, fallback) {
        try {
            const parsed =
                JSON.parse(value);

            return (
                parsed === null
                    ? fallback
                    : parsed
            );
        }
        catch (error) {
            return fallback;
        }
    }

    function clone(value, fallback) {
        try {
            return JSON.parse(
                JSON.stringify(value)
            );
        }
        catch (error) {
            return fallback;
        }
    }

    function currentChats() {
        try {
            if (
                typeof chats !== "undefined" &&
                chats &&
                typeof chats === "object" &&
                !Array.isArray(chats)
            ) {
                return clone(chats, {});
            }
        }
        catch (error) {
            // Ignore inaccessible binding.
        }

        if (
            window.chats &&
            typeof window.chats === "object" &&
            !Array.isArray(window.chats)
        ) {
            return clone(
                window.chats,
                {}
            );
        }

        return {};
    }

    function currentChatId() {
        try {
            if (
                typeof currentChat !==
                    "undefined" &&
                currentChat
            ) {
                return currentChat;
            }
        }
        catch (error) {
            // Ignore inaccessible binding.
        }

        return (
            window.currentChat ||
            localStorage.getItem(
                "last_chat"
            ) ||
            null
        );
    }

    function accountStorageKey() {
        try {
            if (
                typeof getUserChatStorageKey ===
                    "function"
            ) {
                return (
                    getUserChatStorageKey() ||
                    ""
                );
            }
        }
        catch (error) {
            // Fall back below.
        }

        const identity =
            accountIdentity();

        return identity
            ? "mi_chats_" + identity
            : "";
    }

    function validChats(value) {
        return Boolean(
            value &&
            typeof value === "object" &&
            !Array.isArray(value)
        );
    }

    function chatCount(value) {
        return validChats(value)
            ? Object.keys(value).length
            : 0;
    }

    function messageCount(chatMap) {
        if (!validChats(chatMap)) {
            return 0;
        }

        return Object.values(chatMap)
            .reduce(
                function (total, messages) {
                    return (
                        total +
                        (
                            Array.isArray(messages)
                                ? messages.length
                                : 0
                        )
                    );
                },
                0
            );
    }

    function mergeChats(
        first,
        second
    ) {
        const left =
            validChats(first)
                ? clone(first, {})
                : {};

        const right =
            validChats(second)
                ? clone(second, {})
                : {};

        const merged = {
            ...left
        };

        Object.entries(right)
            .forEach(
                function (entry) {
                    const chatId =
                        entry[0];

                    const incoming =
                        entry[1];

                    const existing =
                        merged[chatId];

                    if (
                        !Array.isArray(existing)
                    ) {
                        merged[chatId] =
                            incoming;

                        return;
                    }

                    if (
                        !Array.isArray(incoming)
                    ) {
                        return;
                    }

                    /*
                      Prefer the version containing more
                      messages to prevent data loss.
                    */
                    if (
                        incoming.length >
                        existing.length
                    ) {
                        merged[chatId] =
                            incoming;
                    }
                }
            );

        return merged;
    }

    function readArchive(identity) {
        const normalized =
            normalize(identity);

        if (!normalized) {
            return null;
        }

        const state =
            safeParse(
                localStorage.getItem(
                    archiveKey(normalized)
                ),
                null
            );

        if (
            !state ||
            state.version !== 4 ||
            !validChats(state.chats)
        ) {
            return null;
        }

        return state;
    }

    function readNativeCache() {
        const key =
            accountStorageKey();

        if (!key) {
            return {};
        }

        return safeParse(
            localStorage.getItem(key),
            {}
        );
    }

    function buildBestSnapshot() {
        const identity =
            accountIdentity();

        const memoryChats =
            currentChats();

        const nativeChats =
            readNativeCache();

        const archive =
            readArchive(identity);

        let best =
            mergeChats(
                nativeChats,
                archive?.chats || {}
            );

        best =
            mergeChats(
                best,
                memoryChats
            );

        return best;
    }

    function saveNow(reason) {
        if (!authenticated()) {
            return false;
        }

        const identity =
            accountIdentity();

        if (!identity) {
            return false;
        }

        const bestChats =
            buildBestSnapshot();

        /*
          Never replace a non-empty backup with an
          empty state during initial page loading.
        */
        const previous =
            readArchive(identity);

        if (
            chatCount(bestChats) === 0 &&
            chatCount(
                previous?.chats
            ) > 0
        ) {
            console.warn(
                "[MI AI Restore] Empty save ignored:",
                reason
            );

            return false;
        }

        const selectedChat =
            currentChatId() ||
            previous?.currentChat ||
            Object.keys(bestChats)[0] ||
            null;

        const state = {
            version: 4,
            identity: identity,
            savedAt: Date.now(),
            reason:
                reason || "update",
            currentChat:
                selectedChat,
            chats:
                bestChats
        };

        localStorage.setItem(
            archiveKey(identity),
            JSON.stringify(state)
        );

        if (selectedChat) {
            localStorage.setItem(
                lastChatKey(identity),
                selectedChat
            );

            localStorage.setItem(
                "last_chat",
                selectedChat
            );
        }

        const nativeKey =
            accountStorageKey();

        if (nativeKey) {
            localStorage.setItem(
                nativeKey,
                JSON.stringify(
                    bestChats
                )
            );
        }

        lastIdentity =
            identity;

        console.log(
            "[MI AI Restore] Saved:",
            reason,
            identity,
            chatCount(bestChats),
            messageCount(bestChats)
        );

        return true;
    }

    function scheduleSave(
        reason,
        delay
    ) {
        clearTimeout(saveTimer);

        saveTimer =
            setTimeout(
                function () {
                    saveNow(reason);
                },
                typeof delay ===
                    "number"
                    ? delay
                    : 180
            );
    }

    function applyChats(
        restoredChats,
        requestedChat
    ) {
        if (
            !validChats(restoredChats) ||
            chatCount(restoredChats) === 0
        ) {
            return false;
        }

        const safeChats =
            clone(
                restoredChats,
                {}
            );

        try {
            if (
                typeof chats !==
                    "undefined"
            ) {
                chats =
                    safeChats;
            }
        }
        catch (error) {
            // Ignore inaccessible binding.
        }

        window.chats =
            safeChats;

        const ids =
            Object.keys(safeChats);

        const selected =
            requestedChat &&
            safeChats[requestedChat]
                ? requestedChat
                : ids[0];

        try {
            if (
                typeof currentChat !==
                    "undefined"
            ) {
                currentChat =
                    selected;
            }
        }
        catch (error) {
            // Ignore inaccessible binding.
        }

        window.currentChat =
            selected;

        localStorage.setItem(
            "last_chat",
            selected
        );

        const nativeKey =
            accountStorageKey();

        if (nativeKey) {
            localStorage.setItem(
                nativeKey,
                JSON.stringify(
                    safeChats
                )
            );
        }

        try {
            if (
                typeof renderList ===
                    "function"
            ) {
                renderList();
            }
        }
        catch (error) {
            console.warn(
                "[MI AI Restore] List render failed:",
                error
            );
        }

        try {
            if (
                typeof openChat ===
                    "function"
            ) {
                openChat(selected);
            }
        }
        catch (error) {
            console.warn(
                "[MI AI Restore] Chat open failed:",
                error
            );
        }

        return true;
    }

    async function restoreNow(reason) {
        if (
            restoreRunning ||
            !authenticated()
        ) {
            return false;
        }

        const identity =
            accountIdentity();

        if (!identity) {
            return false;
        }

        restoreRunning = true;

        try {
            const archive =
                readArchive(identity);

            const nativeChats =
                readNativeCache();

            let restored =
                mergeChats(
                    archive?.chats || {},
                    nativeChats
                );

            const requestedChat =
                localStorage.getItem(
                    lastChatKey(identity)
                ) ||
                archive?.currentChat ||
                localStorage.getItem(
                    "last_chat"
                );

            /*
              Restore local data immediately before any
              network request. This protects hard refresh.
            */
            if (
                chatCount(restored) > 0
            ) {
                applyChats(
                    restored,
                    requestedChat
                );
            }

            /*
              Load server/Firebase data if the app has
              its normal loader. Never allow an empty
              server response to erase local data.
            */
            try {
                if (
                    typeof loadUserChats ===
                        "function"
                ) {
                    await loadUserChats();
                }
            }
            catch (error) {
                console.warn(
                    "[MI AI Restore] Server load failed; local chats retained.",
                    error
                );
            }

            const loadedChats =
                currentChats();

            restored =
                mergeChats(
                    restored,
                    loadedChats
                );

            if (
                chatCount(restored) > 0
            ) {
                applyChats(
                    restored,
                    requestedChat
                );
            }

            saveNow(
                "restore-" +
                (
                    reason ||
                    "session"
                )
            );

            console.log(
                "[MI AI Restore] Restored:",
                identity,
                chatCount(restored),
                messageCount(restored)
            );

            return true;
        }
        finally {
            restoreRunning = false;
        }
    }

    function installAuthListener() {
        if (authListenerInstalled) {
            return true;
        }

        let auth = null;

        try {
            auth =
                window.miFirebaseAuth ||
                window.firebaseAuth ||
                (
                    window.firebase &&
                    typeof window.firebase
                        .auth === "function"
                        ? window.firebase.auth()
                        : null
                );
        }
        catch (error) {
            auth = null;
        }

        if (
            !auth ||
            typeof auth
                .onAuthStateChanged !==
                "function"
        ) {
            return false;
        }

        authListenerInstalled =
            true;

        auth.onAuthStateChanged(
            async function (account) {
                if (account?.email) {
                    localStorage.setItem(
                        "mi_user_email",
                        account.email
                    );

                    localStorage.setItem(
                        "mi_user_id",
                        account.uid || ""
                    );

                    try {
                        const token =
                            await account
                                .getIdToken();

                        if (token) {
                            localStorage.setItem(
                                "mi_supabase_token",
                                token
                            );
                        }
                    }
                    catch (error) {
                        console.warn(
                            "[MI AI Restore] Token refresh failed.",
                            error
                        );
                    }

                    await restoreNow(
                        "auth"
                    );
                }
                else {
                    lastIdentity = "";
                }
            }
        );

        return true;
    }

    function installSaveHooks() {
        /*
          Capture normal actions without preventing
          or stopping their original click handlers.
        */
        document.addEventListener(
            "click",
            function (event) {
                if (!authenticated()) {
                    return;
                }

                const details =
                    [
                        event.target?.id,
                        event.target?.className,
                        event.target
                            ?.getAttribute?.(
                                "data-action"
                            ),
                        event.target
                            ?.textContent
                    ]
                        .filter(Boolean)
                        .join(" ")
                        .toLowerCase();

                if (
                    details.includes("send") ||
                    details.includes("new chat") ||
                    details.includes("rename") ||
                    details.includes("delete") ||
                    details.includes("pin")
                ) {
                    scheduleSave(
                        "action",
                        350
                    );
                }
            },
            false
        );

        document.addEventListener(
            "keydown",
            function (event) {
                if (
                    authenticated() &&
                    event.key === "Enter"
                ) {
                    scheduleSave(
                        "enter",
                        700
                    );
                }
            },
            false
        );

        window.addEventListener(
            "pagehide",
            function () {
                saveNow("pagehide");
            }
        );

        window.addEventListener(
            "beforeunload",
            function () {
                saveNow(
                    "beforeunload"
                );
            }
        );

        document.addEventListener(
            "visibilitychange",
            function () {
                if (
                    document.visibilityState ===
                        "hidden"
                ) {
                    saveNow(
                        "hidden"
                    );
                }
            }
        );

        window.addEventListener(
            "pageshow",
            function () {
                restoreNow(
                    "pageshow"
                );
            }
        );

        window.addEventListener(
            "popstate",
            function () {
                restoreNow(
                    "history"
                );
            }
        );

        window.addEventListener(
            "mi-chat-user-changed",
            function () {
                restoreNow(
                    "user-change"
                );
            }
        );
    }

    function start() {
        installSaveHooks();

        /*
          Restore immediately from existing auth storage.
        */
        if (authenticated()) {
            restoreNow(
                "startup"
            );
        }

        if (!installAuthListener()) {
            let attempts = 0;

            const timer =
                setInterval(
                    function () {
                        attempts += 1;

                        if (
                            installAuthListener() ||
                            attempts >= 40
                        ) {
                            clearInterval(
                                timer
                            );
                        }
                    },
                    250
                );
        }

        /*
          Low-frequency safety backup only.
          It does not touch click events or block UI.
        */
        setInterval(
            function () {
                if (authenticated()) {
                    saveNow(
                        "safety"
                    );
                }
            },
            15000
        );
    }

    window.MISafeAccountChatRestore = {
        save:
            function () {
                return saveNow(
                    "manual"
                );
            },

        restore:
            function () {
                return restoreNow(
                    "manual"
                );
            },

        getState:
            function () {
                return readArchive(
                    accountIdentity()
                );
            }
    };

    if (
        document.readyState ===
        "loading"
    ) {
        document.addEventListener(
            "DOMContentLoaded",
            start,
            {
                once: true
            }
        );
    }
    else {
        start();
    }
})();

/* MI AI SAFE ACCOUNT CHAT RESTORE V4 - END */
</script>

<script>
/* MI AI LIVE SEARCH AND DEVICE TIME V1 - START */

(function () {
    "use strict";

    let originalFetchChatReply = null;
    let installed = false;

    const LIVE_SEARCH_PATTERN =
        /\b(latest|live|current|today|now|score|scores|result|results|match|game|news|weather|price|stock|election|president|prime minister|ceo|release|update|updated|breaking)\b/i;

    const TIME_PATTERN =
        /\b(what(?:'s| is)? the time|time now|current time|local time|දැන් වෙලාව|වෙලාව කීයද|நேரம் என்ன|தற்போதைய நேரம்)\b/i;

    function extractQuestion(payload) {
        if (!payload || typeof payload !== "object") {
            return "";
        }

        if (typeof payload.message === "string") {
            return payload.message.trim();
        }

        if (typeof payload.prompt === "string") {
            return payload.prompt.trim();
        }

        if (typeof payload.text === "string") {
            return payload.text.trim();
        }

        if (Array.isArray(payload.messages)) {
            const lastUser =
                [...payload.messages]
                    .reverse()
                    .find(function (item) {
                        return (
                            item &&
                            (
                                item.role === "user" ||
                                item.role === "me"
                            )
                        );
                    });

            return String(
                lastUser?.content ||
                lastUser?.text ||
                ""
            ).trim();
        }

        return "";
    }

    function setThinkingLabel(text) {
        const labels =
            document.querySelectorAll(
                ".thinking .label, .thinking-label"
            );

        labels.forEach(function (label) {
            if (
                label.dataset.miOriginalLabel ===
                    undefined
            ) {
                label.dataset.miOriginalLabel =
                    label.textContent || "MI AI";
            }

            label.textContent = text;
        });
    }

    function restoreThinkingLabel() {
        document
            .querySelectorAll(
                ".thinking .label, .thinking-label"
            )
            .forEach(function (label) {
                if (
                    label.dataset
                        .miOriginalLabel !==
                    undefined
                ) {
                    label.textContent =
                        label.dataset
                            .miOriginalLabel;
                }
            });
    }

    function replyObject(text, extra) {
        return {
            reply: text,
            response: text,
            message: text,
            text: text,
            content: text,
            ...(extra || {})
        };
    }

    function getBrowserPosition() {
        return new Promise(function (resolve) {
            if (!navigator.geolocation) {
                resolve(null);
                return;
            }

            navigator.geolocation.getCurrentPosition(
                function (position) {
                    resolve({
                        latitude:
                            position.coords.latitude,

                        longitude:
                            position.coords.longitude,

                        accuracy:
                            position.coords.accuracy
                    });
                },

                function () {
                    resolve(null);
                },

                {
                    enableHighAccuracy: false,
                    timeout: 7000,
                    maximumAge: 60000
                }
            );
        });
    }

    async function buildCurrentTimeReply() {
        setThinkingLabel(
            "Getting your local time..."
        );

        const position =
            await getBrowserPosition();

        const now =
            new Date();

        const timezone =
            Intl.DateTimeFormat()
                .resolvedOptions()
                .timeZone ||
            "Device local timezone";

        const locale =
            document.documentElement.lang ||
            navigator.language ||
            "en-US";

        const dateText =
            new Intl.DateTimeFormat(
                locale,
                {
                    year: "numeric",
                    month: "long",
                    day: "numeric",
                    weekday: "long",
                    timeZone: timezone
                }
            ).format(now);

        const timeText =
            new Intl.DateTimeFormat(
                locale,
                {
                    hour: "2-digit",
                    minute: "2-digit",
                    second: "2-digit",
                    hour12: true,
                    timeZone: timezone
                }
            ).format(now);

        const locationText =
            position
                ? (
                    " Location coordinates: " +
                    position.latitude.toFixed(4) +
                    ", " +
                    position.longitude.toFixed(4) +
                    "."
                )
                : (
                    " Location permission was not available, so the device timezone was used."
                );

        return replyObject(
            "Your current local time is " +
            timeText +
            " on " +
            dateText +
            ". Timezone: " +
            timezone +
            "." +
            locationText,
            {
                realtime: true,
                timezone: timezone,
                latitude:
                    position?.latitude ??
                    null,
                longitude:
                    position?.longitude ??
                    null,
                generated_at:
                    now.toISOString()
            }
        );
    }

    async function requestLiveSearch(
        payload,
        signal
    ) {
        setThinkingLabel(
            "Searching the live web..."
        );

        const position =
            await getBrowserPosition();

        const timezone =
            Intl.DateTimeFormat()
                .resolvedOptions()
                .timeZone ||
            "";

        const response =
            await fetch(
                "/api/live-assist",
                {
                    method: "POST",

                    headers: {
                        "Content-Type":
                            "application/json"
                    },

                    body: JSON.stringify({
                            query: String(
                                extractQuestion(payload) || ""
                            ).trim().slice(0, 4000),

                            client_context: {
                                timezone: timezone,

                                local_time:
                                    new Date().toISOString(),

                                latitude:
                                    position?.latitude ?? null,

                                longitude:
                                    position?.longitude ?? null
                            }
                        }),

                    signal:
                        signal
                }
            );

        const data =
            await response.json()
                .catch(function () {
                    return {};
                });

        if (!response.ok) {
            throw new Error(
                data.error ||
                "Live web search failed."
            );
        }

        const reply =
            data.reply ||
            data.response ||
            data.message ||
            data.text ||
            "";

        if (!reply) {
            throw new Error(
                "Live search returned no answer."
            );
        }

        return replyObject(
            reply,
            {
                live_search: true,
                sources:
                    data.sources || []
            }
        );
    }

    function shouldUseLiveSearch(question) {
        if (!question) {
            return false;
        }

        return LIVE_SEARCH_PATTERN.test(
            question
        );
    }

    function shouldUseDeviceTime(question) {
        if (!question) {
            return false;
        }

        return TIME_PATTERN.test(
            question
        );
    }

    function install() {
        if (installed) {
            return true;
        }

        const candidate =
            window.fetchChatReply ||
            (
                typeof fetchChatReply ===
                    "function"
                    ? fetchChatReply
                    : null
            );

        if (
            typeof candidate !==
                "function"
        ) {
            return false;
        }

        originalFetchChatReply =
            candidate;

        const wrapped =
            async function (
                payload,
                signal,
                useStreaming
            ) {
                const question =
                    extractQuestion(
                        payload
                    );

                try {
                    if (
                        shouldUseDeviceTime(
                            question
                        )
                    ) {
                        return await buildCurrentTimeReply();
                    }

                    if (
                        shouldUseLiveSearch(
                            question
                        )
                    ) {
                        try {
                            return await requestLiveSearch(
                                payload,
                                signal
                            );
                        }
                        catch (liveSearchError) {
                            console.warn(
                                "[MI AI] Live search failed. Using normal AI instead.",
                                liveSearchError
                            );

                            /*
                              Live search must never end the chat with
                              the generic unavailable message.

                              When Groq live search fails, retry the same
                              question through the already-working /api/chat.
                            */
                            return await originalFetchChatReply(
                                payload,
                                signal,
                                false
                            );
                        }
                    }

                    return await originalFetchChatReply(
                        payload,
                        signal,
                        useStreaming
                    );
                }
                finally {
                    restoreThinkingLabel();
                }
            };

        window.fetchChatReply =
            wrapped;

        try {
            fetchChatReply = wrapped;
        }
        catch (error) {
            // Global binding may already point to window.
        }

        installed = true;

        console.log(
            "[MI AI] Live search and device time enabled."
        );

        return true;
    }

    function start() {
        if (install()) {
            return;
        }

        let attempts = 0;

        const timer =
            setInterval(
                function () {
                    attempts += 1;

                    if (
                        install() ||
                        attempts >= 80
                    ) {
                        clearInterval(
                            timer
                        );
                    }
                },
                250
            );
    }

    window.MILiveSearchTime = {
        install: install,
        isLiveQuestion:
            shouldUseLiveSearch,
        isTimeQuestion:
            shouldUseDeviceTime
    };

    if (
        document.readyState ===
        "loading"
    ) {
        document.addEventListener(
            "DOMContentLoaded",
            start,
            {
                once: true
            }
        );
    }
    else {
        start();
    }
})();

/* MI AI LIVE SEARCH AND DEVICE TIME V1 - END */
</script>



<script>
/* MI AI SHARE DROPDOWN FIX V7 - START */

(function () {
    "use strict";

    function getShareOverlay() {
        return document.getElementById(
            "shareOverlay"
        );
    }

    function protectShareControls() {
        const overlay =
            getShareOverlay();

        if (
            !overlay ||
            overlay.dataset
                .miDropdownProtection ===
                "true"
        ) {
            return;
        }

        overlay.dataset
            .miDropdownProtection =
            "true";

        /*

            [
                "select",
                "input",
                "textarea",
                "label",
                "#moreSecurityPanel",

                    },

                );

          be interpreted as an outside click.

        [

<script>
/* MI AI RESPONSE FORMAT ADAPTER V1 - START */

(function () {
    "use strict";

    let installed = false;
    let installAttempts = 0;

    function questionFromPayload(payload) {
        if (!payload || typeof payload !== "object") {
            return "";
        }

        if (typeof payload.message === "string") {
            return payload.message.trim();
        }

        if (typeof payload.prompt === "string") {
            return payload.prompt.trim();
        }

        if (typeof payload.text === "string") {
            return payload.text.trim();
        }

        if (Array.isArray(payload.messages)) {
            const lastUserMessage =
                [...payload.messages]
                    .reverse()
                    .find(function (item) {
                        return (
                            item &&
                            (
                                item.role === "user" ||
                                item.role === "me"
                            )
                        );
                    });

            return String(
                lastUserMessage?.content ||
                lastUserMessage?.text ||
                ""
            ).trim();
        }

        return "";
    }

    function objectToResponse(result) {
        if (result instanceof Response) {
            return result;
        }

        if (
            typeof result === "string" &&
            result.trim()
        ) {
            result = {
                reply: result.trim(),
                response: result.trim()
            };
        }

        if (
            result &&
            typeof result === "object"
        ) {
            const answer =
                String(
                    result.reply ||
                    result.response ||
                    result.answer ||
                    result.message ||
                    result.text ||
                    result.content ||
                    ""
                ).trim();

            if (answer) {
                return new Response(
                    JSON.stringify({
                        ...result,
                        reply: answer,
                        response: answer,
                        message: answer,
                        text: answer
                    }),
                    {
                        status: 200,
                        headers: {
                            "Content-Type":
                                "application/json; charset=utf-8"
                        }
                    }
                );
            }
        }

        return null;
    }

    async function normalChatFallback(
        payload,
        signal
    ) {
        const question =
            questionFromPayload(payload);

        const fallbackPayload = {
            ...(payload || {})
        };

        if (
            !fallbackPayload.message &&
            question
        ) {
            fallbackPayload.message =
                question;
        }

        if (
            !fallbackPayload.prompt &&
            question
        ) {
            fallbackPayload.prompt =
                question;
        }

        const candidates = [];

        const configuredBase =
            String(
                window.__MI_BACKEND_URL__ ||
                ""
            )
                .trim()
                .replace(/\/$/, "");

        if (configuredBase) {
            candidates.push(
                configuredBase + "/api/chat"
            );
        }

        candidates.push("/api/chat");

        const uniqueCandidates =
            [...new Set(candidates)];

        let lastError = null;

        for (
            const endpoint
            of uniqueCandidates
        ) {
            try {
                const response =
                    await fetch(
                        endpoint,
                        {
                            method: "POST",

                            headers: {
                                "Content-Type":
                                    "application/json"
                            },

                            body:
                                JSON.stringify(
                                    fallbackPayload
                                ),

                            signal: signal
                        }
                    );

                if (response.ok) {
                    return response;
                }

                const body =
                    await response
                        .text()
                        .catch(function () {
                            return "";
                        });

                lastError =
                    new Error(
                        body ||
                        (
                            "Server returned " +
                            response.status
                        )
                    );
            }
            catch (error) {
                lastError = error;
            }
        }

        throw (
            lastError ||
            new Error(
                "Unable to contact the AI server."
            )
        );
    }

    function installAdapter() {
        if (installed) {
            return true;
        }

        let currentFetchChatReply = null;

        try {
            currentFetchChatReply =
                window.fetchChatReply ||
                (
                    typeof fetchChatReply ===
                        "function"
                        ? fetchChatReply
                        : null
                );
        }
        catch (error) {
            currentFetchChatReply =
                window.fetchChatReply ||
                null;
        }

        if (
            typeof currentFetchChatReply !==
                "function"
        ) {
            return false;
        }

        if (
            currentFetchChatReply
                .__miResponseAdapterV1 ===
                true
        ) {
            installed = true;
            return true;
        }

        const previousFetchChatReply =
            currentFetchChatReply;

        const adaptedFetchChatReply =
            async function (
                payload,
                signal,
                useStreaming
            ) {
                try {
                    const result =
                        await previousFetchChatReply(
                            payload,
                            signal,
                            useStreaming
                        );

                    const converted =
                        objectToResponse(result);

                    if (converted) {
                        return converted;
                    }

                    console.warn(
                        "[MI AI] Reply function returned no usable Response. Falling back to /api/chat.",
                        result
                    );

                    return await normalChatFallback(
                        payload,
                        signal
                    );
                }
                catch (error) {
                    console.warn(
                        "[MI AI] Live/time reply failed. Falling back to /api/chat.",
                        error
                    );

                    return await normalChatFallback(
                        payload,
                        signal
                    );
                }
            };

        adaptedFetchChatReply
            .__miResponseAdapterV1 =
            true;

        window.fetchChatReply =
            adaptedFetchChatReply;

        try {
            fetchChatReply =
                adaptedFetchChatReply;
        }
        catch (error) {
            /*
              A global lexical binding may not be writable.
              window.fetchChatReply remains available.
            */
        }

        installed = true;

        console.log(
            "[MI AI] Response format adapter installed."
        );

        return true;
    }

    function start() {
        if (installAdapter()) {
            return;
        }

        const timer =
            setInterval(
                function () {
                    installAttempts += 1;

                    if (
                        installAdapter() ||
                        installAttempts >= 100
                    ) {
                        clearInterval(timer);
                    }
                },
                100
            );
    }

    window.MIResponseFormatAdapter = {
        install:
            installAdapter,

        convert:
            objectToResponse,

        fallback:
            normalChatFallback
    };

    if (
        document.readyState ===
        "loading"
    ) {
        document.addEventListener(
            "DOMContentLoaded",
            start,
            {
                once: true
            }
        );
    }
    else {
        start();
    }
})();

/* MI AI RESPONSE FORMAT ADAPTER V1 - END */
</script>
