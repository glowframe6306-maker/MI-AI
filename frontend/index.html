            verify: "சரிபார்",
            submit: "சமர்ப்பி",
            continueText: "தொடரவும்",
            back: "பின்செல்",
            next: "அடுத்து",
            save: "சேமி",
            edit: "திருத்து",
            close: "மூடு",
            copied: "நகலெடுக்கப்பட்டது!",
            copy: "நகலெடு",
            loginRequired: "உள்நுழைவு தேவை",
            loginRequiredMessage:
                "இந்த வசதியைப் பயன்படுத்த உள்நுழையவும்."
        }
    };

    const languageCodes = {
        en: "en",
        si: "si-LK",
        ta: "ta-LK"
    };

    const aliasMap = new Map();
    let translationScheduled = false;

    function normalize(value) {
        return String(value || "")
            .replace(/\s+/g, " ")
            .trim()
            .toLocaleLowerCase();
    }

    Object.keys(translations).forEach(function (language) {
        Object.entries(translations[language]).forEach(
            function ([key, value]) {
                aliasMap.set(normalize(value), key);
            }
        );
    });

    function removeLeadingIcon(value) {
        return String(value || "")
            .replace(/^[^\p{L}\p{N}]+/u, "")
            .trim();
    }

    function findTranslationKey(value) {
        const normal = normalize(value);

        if (!normal) {
            return null;
        }

        if (aliasMap.has(normal)) {
            return aliasMap.get(normal);
        }

        const withoutIcon = normalize(
            removeLeadingIcon(value)
        );

        return aliasMap.get(withoutIcon) || null;
    }

    function preserveIconPrefix(original, translated) {
        const text = String(original || "").trim();

        const match = text.match(
            /^([^\p{L}\p{N}]*)(.*)$/u
        );

        const prefix = match ? match[1] : "";

        return prefix + translated;
    }

    function isExcluded(node) {
        const element =
            node.nodeType === Node.ELEMENT_NODE
                ? node
                : node.parentElement;

        if (!element) {
            return true;
        }

        /*
          Do not translate:
          - Chat messages
          - Header
          - Scripts/styles/code
          - Language options
        */
        return Boolean(
            element.closest(
                "#chat, #header, script, style, code, pre, " +
                "textarea, [data-mi-i18n-ignore='true']"
            )
        );
    }

    function translateTextNode(node, language) {
        if (
            !node ||
            node.nodeType !== Node.TEXT_NODE ||
            isExcluded(node)
        ) {
            return;
        }

        const original = node.nodeValue || "";

        if (!original.trim()) {
            return;
        }

        const key = findTranslationKey(original);

        if (
            !key ||
            !translations[language] ||
            !translations[language][key]
        ) {
            return;
        }

        const leading =
            original.match(/^\s*/)?.[0] || "";

        const trailing =
            original.match(/\s*$/)?.[0] || "";

        const translated = preserveIconPrefix(
            original,
            translations[language][key]
        );

        const finalValue =
            leading +
            translated.trim() +
            trailing;

        if (node.nodeValue !== finalValue) {
            node.nodeValue = finalValue;
        }
    }

    function translateAttribute(
        element,
        attribute,
        language
    ) {
        const value = element.getAttribute(attribute);

        if (!value) {
            return;
        }

        const key = findTranslationKey(value);

        if (
            key &&
            translations[language] &&
            translations[language][key]
        ) {
            element.setAttribute(
                attribute,
                translations[language][key]
            );
        }
    }

    function translateElement(element, language) {
        if (
            !element ||
            element.nodeType !== Node.ELEMENT_NODE ||
            isExcluded(element)
        ) {
            return;
        }

        [
            "placeholder",
            "title",
            "aria-label"
        ].forEach(function (attribute) {
            translateAttribute(
                element,
                attribute,
                language
            );
        });

        if (
            element instanceof HTMLInputElement &&
            ["button", "submit", "reset"].includes(
                element.type
            )
        ) {
            const key = findTranslationKey(
                element.value
            );

            if (
                key &&
                translations[language][key]
            ) {
                element.value =
                    translations[language][key];
            }
        }
    }

    function translateTree(root, language) {
        if (!root) {
            return;
        }

        if (root.nodeType === Node.TEXT_NODE) {
            translateTextNode(root, language);
            return;
        }

        if (root.nodeType !== Node.ELEMENT_NODE) {
            return;
        }

        translateElement(root, language);

        const elementWalker =
            document.createTreeWalker(
                root,
                NodeFilter.SHOW_ELEMENT
            );

        while (elementWalker.nextNode()) {
            translateElement(
                elementWalker.currentNode,
                language
            );
        }

        const textWalker =
            document.createTreeWalker(
                root,
                NodeFilter.SHOW_TEXT
            );

        while (textWalker.nextNode()) {
            translateTextNode(
                textWalker.currentNode,
                language
            );
        }
    }

    function setStaticButton(
        selector,
        key,
        icon,
        language
    ) {
        const element =
            document.querySelector(selector);

        if (!element || element.closest("#header")) {
            return;
        }

        const value =
            (icon ? icon + " " : "") +
            translations[language][key];

        if (element.textContent.trim() !== value) {
            element.textContent = value;
        }
    }

    function applyStaticTranslations(language) {
        setStaticButton(
            "#sidebar button[onclick*='newChat']",
            "newChat",
            "➕",
            language
        );

        setStaticButton(
            "#settingsBtn",
            "settings",
            "⚙",
            language
        );

        setStaticButton(
            "#supportBtn",
            "customerSupport",
            "🎧",
            language
        );

        const settingsHeading =
            document.querySelector(
                "#settingsPanel h3"
            );

        if (
            settingsHeading &&
            settingsHeading.textContent !==
                translations[language].settings
        ) {
            settingsHeading.textContent =
                translations[language].settings;
        }

        const languageLabel =
            document.querySelector(
                "[data-mi-i18n='language']"
            );

        if (languageLabel) {
            languageLabel.textContent =
                translations[language].language;
        }

        const messageInput =
            document.getElementById("msg");

        if (messageInput) {
            messageInput.placeholder =
                translations[language]
                    .askPlaceholder;
        }

        document
            .querySelectorAll("#watermark")
            .forEach(function (watermark) {
                const key = findTranslationKey(
                    watermark.textContent
                );

                if (
                    key &&
                    translations[language][key]
                ) {
                    watermark.textContent =
                        translations[language][key];
                }
            });
    }

    function getLanguage() {
        const saved =
            localStorage.getItem(
                "mi_ui_language"
            );

        if (
            saved &&
            Object.prototype.hasOwnProperty.call(
                translations,
                saved
            )
        ) {
            return saved;
        }

        return "en";
    }

    function applyLanguage(
        language,
        savePreference
    ) {
        if (!translations[language]) {
            language = "en";
        }

        if (savePreference !== false) {
            localStorage.setItem(
                "mi_ui_language",
                language
            );
        }

        document.documentElement.lang =
            languageCodes[language] || "en";

        const selector =
            document.getElementById(
                "languageSelect"
            );

        if (
            selector &&
            selector.value !== language
        ) {
            selector.value = language;
        }

        applyStaticTranslations(language);
        translateTree(
            document.body,
            language
        );

        document.body.dataset.uiLanguage =
            language;
    }

    function scheduleTranslation() {
        if (translationScheduled) {
            return;
        }

        translationScheduled = true;

        setTimeout(function () {
            translationScheduled = false;

            applyLanguage(
                getLanguage(),
                false
            );
        }, 0);
    }

    function hexToRgb(hex) {
        const normalized =
            String(hex || "")
                .trim()
                .replace("#", "");

        if (
            !/^[0-9a-fA-F]{6}$/.test(
                normalized
            )
        ) {
            return null;
        }

        return {
            r: parseInt(
                normalized.slice(0, 2),
                16
            ),
            g: parseInt(
                normalized.slice(2, 4),
                16
            ),
            b: parseInt(
                normalized.slice(4, 6),
                16
            )
        };
    }

    function applyThemeColour(colour) {
        const rgb = hexToRgb(colour);

        if (!rgb) {
            return false;
        }

        const safeColour =
            colour.startsWith("#")
                ? colour
                : "#" + colour;

        document.documentElement.style
            .setProperty(
                "--mi-theme-color",
                safeColour
            );

        document.documentElement.style
            .setProperty(
                "--mi-theme-rgb",
                rgb.r +
                    ", " +
                    rgb.g +
                    ", " +
                    rgb.b
            );

        localStorage.setItem(
            "mi_button_theme_colour",
            safeColour
        );

        const input =
            document.getElementById(
                "themeColor"
            );

        if (
            input &&
            input.value.toLowerCase() !==
                safeColour.toLowerCase()
        ) {
            input.value = safeColour;
        }

        return true;
    }

    /*
      Replace the old applyTheme behaviour.
      It changes only the button/message tint,
      not the whole page background.
    */
    window.applyTheme = function () {
        const input =
            document.getElementById(
                "themeColor"
            );

        const colour =
            input?.value ||
            localStorage.getItem(
                "mi_button_theme_colour"
            ) ||
            "#f59e0b";

        applyThemeColour(colour);
    };

    function initialize() {
        const languageSelector =
            document.getElementById(
                "languageSelect"
            );

        if (languageSelector) {
            languageSelector.addEventListener(
                "change",
                function () {
                    applyLanguage(
                        languageSelector.value,
                        true
                    );
                }
            );
        }

        const themeInput =
            document.getElementById(
                "themeColor"
            );

        if (themeInput) {
            themeInput.addEventListener(
                "input",
                function () {
                    applyThemeColour(
                        themeInput.value
                    );
                }
            );
        }

        const savedColour =
            localStorage.getItem(
                "mi_button_theme_colour"
            ) ||
            themeInput?.value ||
            "#f59e0b";

        applyThemeColour(savedColour);

        applyLanguage(
            getLanguage(),
            false
        );

        const observer =
            new MutationObserver(
                scheduleTranslation
            );

        observer.observe(
            document.body,
            {
                childList: true,
                subtree: true
            }
        );
    }

    window.MIAI18N = {
        version: "1.0",
        translations: translations,
        getLanguage: getLanguage,
        setLanguage: function (language) {
            applyLanguage(
                language,
                true
            );
        },
        translatePage: function () {
            applyLanguage(
                getLanguage(),
                false
            );
        },
        applyThemeColour:
            applyThemeColour
    };

    if (
        document.readyState === "loading"
    ) {
        document.addEventListener(
            "DOMContentLoaded",
            initialize,
            { once: true }
        );
    }
    else {
        initialize();
    }
})();

/* MI AI UI TRANSLATION SYSTEM - END */
</script>

        document.body.appendChild(menu);

    function findTarget(node) {
        if (!(node instanceof Element)) {
            return null;
        }

        const message =
            node.closest(messageSelector);

        if (message) {
            return {
                element: message,
                type: "message"
            };
        }

        const chatItem =
            node.closest(chatItemSelector);

        if (
            chatItem &&
            !chatItem.closest("#chat")

            return {
                element: chatItem,
                type: "chat"

        return null;

        return (
            element.classList.contains("pinned")
            || element.dataset.pinned === "true"
            || element.getAttribute(
                "aria-pinned"
            ) === "true"
            || Boolean(
                element.querySelector(

        );

        icon,
        label,
        danger
    ) {

        if (danger) {
            button.classList.add(
                "mi-menu-danger"
            );

            "<span aria-hidden='true'>" +
            icon +
            "</span>" +
            "<span>" +
            label +
            "</span>";

        return button;

    function buildMenu(type, target) {
        menu.replaceChildren();

        if (type === "message") {
            menu.appendChild(
                menuButton(
                    "copy",
                    "⧉",
                    text("copy"),
                    false
                )
            );

            return;
        }

        const pinned = isPinned(target);

        menu.append(
            menuButton(
                "rename",
                "✎",
                text("rename"),
                false
            ),

            menuButton(
                "pin",
                pinned ? "⌫" : "⌖",
                pinned
                    ? text("unpin")

                false
            ),

            menuButton(
                "share",
                "↗",
                text("share"),
                false
            ),

            menuButton(
                "delete",
                "🗑",
                text("deleteText"),
                true
            )
        );

    function showMenu(
        x,
        y,
        targetInfo
    ) {
        createMenu();

        selectedTarget =
            targetInfo.element;

        selectedType =
            targetInfo.type;

        buildMenu(
            selectedType,
            selectedTarget
        );

        menu.classList.add(
            "mi-visible"
        );

        menu.style.left = "0px";
        menu.style.top = "0px";

        const menuWidth =
            menu.offsetWidth;

        const menuHeight =
            menu.offsetHeight;

        const safeX = Math.max(
            8,
            Math.min(
                x,
                window.innerWidth
                    - menuWidth

            )
        );

        const safeY = Math.max(
            8,
            Math.min(
                y,
                window.innerHeight
                    - menuHeight
                    - 8
            )
        );

        menu.style.left =
            safeX + "px";

        menu.style.top =
            safeY + "px";

        if (menu) {
            menu.classList.remove(

        selectedTarget = null;
        selectedType = null;

    function getMessageText(element) {
        const clone =
            element.cloneNode(true);

        clone.querySelectorAll(
            "button, .mi-ai-copy-below, " +
            ".aiCopyButton, .copy-btn, " +
            ".copy-button"
        ).forEach(function (item) {
            item.remove();
        });

        return (
            clone.innerText
            || clone.textContent
            || ""
        ).trim();
    }

    async function copySelectedText() {
        if (!selectedTarget) {
            return;
        }

        const value =
            getMessageText(selectedTarget);

        if (!value) {
            return;
        }

        try {
            await navigator.clipboard.writeText(
                value
            );
        }
        catch (error) {
            const textarea =
                document.createElement(
                    "textarea"
                );

            textarea.value = value;
            textarea.style.position =
                "fixed";

            textarea.style.opacity =
                "0";

            document.body.appendChild(
                textarea
            );

            textarea.select();
            document.execCommand("copy");
            textarea.remove();
        }

        if (
            typeof window.showToast ===
            "function"
        ) {
            window.showToast(
                text("copied")
            );
        }
    }

                "share",

            delete:
                "delete, remove, trash"
        };

        const words =
            patterns[action]
                ?.split(",")
                .map(function (item) {
                    return item.trim();
                })
                || [];

        const buttons =
            target.querySelectorAll(
                "button, [role='button'], " +
                "[onclick], [data-action]"
            );

        return Array.from(buttons).find(
            function (button) {
                const content = [
                    button.className,
                    button.id,
                    button.dataset.action,
                    button.getAttribute(
                        "title"
                    ),
                    button.getAttribute(
                        "aria-label"
                    ),
                    button.getAttribute(
                        "onclick"
                    ),
                    button.textContent
                ]
                    .join(" ")
                    .toLowerCase();

                return words.some(
                    function (word) {
                        return content.includes(
                            word
                        );
                    }
                );
            }
        );
    }

    function targetChatId(target) {
        return (
            target.dataset.chatId
            || target.dataset.conversationId
            || target.dataset.id
            || target.getAttribute(
                "data-chat"
            )
            || target.id
            || null
        );
    }

    function callFirstFunction(
        names,
        args
    ) {
        for (const name of names) {
            if (
                typeof window[name] ===
                "function"
            ) {
                window[name](...args);
                return true;
            }
        }

        return false;
    }

    function runChatAction(action) {
        if (!selectedTarget) {
            return;
        }

        const existingButton =
            findExistingActionButton(
                selectedTarget,
                action
            );

        if (existingButton) {
            existingButton.click();
            return;
        }

        const chatId =
            targetChatId(selectedTarget);

        const functionMap = {
            rename: [
                "renameChat",
                "renameConversation",
                "editChatName"
            ],

            pin: [
                "togglePinChat",
                "pinChat",
                "toggleChatPin"
            ],

            share: [
                "shareChat",
                "shareConversation"
            ],

            delete: [
                "deleteChat",
                "deleteConversation",
                "removeChat"
            ]
        };

        callFirstFunction(
            functionMap[action] || [],
            chatId
                ? [chatId]
                : [selectedTarget]
        );
    }

    function runAction(action) {
        const target =
            selectedTarget;

        const type =
            selectedType;

        hideMenu();

        if (!target) {
            return;
        }

        selectedTarget = target;
        selectedType = type;

        if (action === "copy") {
            copySelectedText()
                .finally(hideMenu);

            return;
        }

        runChatAction(action);
        hideMenu();
    }

    document.addEventListener(
        "contextmenu",
        function (event) {
            const targetInfo =
                findTarget(event.target);

            if (!targetInfo) {
                hideMenu();
                return;
            }

            event.preventDefault();

            showMenu(
                event.clientX,
                event.clientY,
                targetInfo
            );
        }
    );

    document.addEventListener(
        "pointerdown",
        function (event) {
            if (
                event.pointerType ===
                    "mouse" &&
                event.button !== 0
            ) {
                return;
            }

            const targetInfo =
                findTarget(event.target);

            if (!targetInfo) {
                return;
            }

            pointerStartX =
                event.clientX;

            pointerStartY =
                event.clientY;

            longPressTarget =
                targetInfo;

            targetInfo.element.classList.add(
                "mi-long-press-active"
            );

            clearTimeout(longPressTimer);

            longPressTimer = setTimeout(
                function () {
                    if (!longPressTarget) {
                        return;
                    }

                    if (
                        navigator.vibrate
                    ) {
                        navigator.vibrate(30);
                    }

                    showMenu(
                        pointerStartX,
                        pointerStartY,
                        longPressTarget
                    );

                    longPressTarget.element
                        .classList.remove(
                            "mi-long-press-active"
                        );

                    longPressTarget = null;
                },
                LONG_PRESS_TIME
            );
        },
        {
            passive: true
        }
    );

    document.addEventListener(
        "pointermove",
        function (event) {
            if (!longPressTarget) {
                return;
            }

            const movedX = Math.abs(
                event.clientX
                    - pointerStartX
            );

            const movedY = Math.abs(
                event.clientY
                    - pointerStartY
            );

            if (
                movedX > MOVE_LIMIT ||
                movedY > MOVE_LIMIT
            ) {
                cancelLongPress();
            }
        },
        {
            passive: true
        }
    );

    function cancelLongPress() {
        clearTimeout(longPressTimer);

        if (longPressTarget) {
            longPressTarget.element
                .classList.remove(
                    "mi-long-press-active"
                );
        }

        longPressTarget = null;
    }

    document.addEventListener(
        "pointerup",
        cancelLongPress,
        {
            passive: true
        }
    );

    document.addEventListener(
        "pointercancel",
        cancelLongPress,
        {
            passive: true
        }
    );

    document.addEventListener(
        "click",
        function (event) {
            if (
                menu &&
                !menu.contains(event.target)
            ) {
                hideMenu();
            }
        }
    );

    document.addEventListener(
        "scroll",
        hideMenu,
        true
    );

    window.addEventListener(
        "resize",
        hideMenu
    );

    document.addEventListener(
        "keydown",
        function (event) {
            if (event.key === "Escape") {
                hideMenu();
            }
        }
    );

    window.MIChatMoreMenu = {
        openFor:
            function (
                element,
                x,
                y
            ) {
                const targetInfo =
                    findTarget(element);

                if (targetInfo) {
                    showMenu(
                        x || 20,
                        y || 20,
                        targetInfo
                    );
                }
            },

        close:
            hideMenu
    };
})();

/* MI AI CHAT MORE MENU JS - END */
</script>
