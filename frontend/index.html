</script>



<script>
/* MI AI MOBILE COMFORT JS - START */

(function () {
    "use strict";

    let initialViewportHeight =
        window.visualViewport?.height
        || window.innerHeight;

    function setViewportVariables() {
        const viewport =
            window.visualViewport;

        const width =
            viewport?.width
            || window.innerWidth;

        const height =
            viewport?.height
            || window.innerHeight;

        document.documentElement.style
            .setProperty(
                "--mi-viewport-width",
                width + "px"
            );

        document.documentElement.style
            .setProperty(
                "--mi-viewport-height",
                height + "px"
            );

        const keyboardDifference =
            initialViewportHeight - height;

        const keyboardVisible =
            keyboardDifference > 140;

        document.body.classList.toggle(
            "mi-keyboard-visible",
            keyboardVisible
        );

        if (
            !keyboardVisible
            && height > initialViewportHeight
        ) {
            initialViewportHeight =
                height;
        }
    }

    function keepFocusedFieldVisible() {
        const active =
            document.activeElement;

        if (
            !active
            || !active.matches(
                "input, textarea, select, " +
                "[contenteditable='true']"
            )
        ) {
            return;
        }

        setTimeout(
            function () {
                active.scrollIntoView({
                    behavior:
                        "smooth",

                    block:
                        "center",

                    inline:
                        "nearest"
                });
            },
            180
        );
    }

    function autoGrowMessageInput() {
        const input =
            document.querySelector(
                "#msg, #messageInput, " +
                "#chatInput, " +
                "textarea[name='message'], " +
                ".chat-input, .message-input"
            );

        if (
            !input
            || !(input instanceof
                HTMLTextAreaElement)
        ) {
            return;
        }

        input.style.height =
            "auto";

        const viewportHeight =
            window.visualViewport?.height
            || window.innerHeight;

        const maximum =
            Math.min(
                viewportHeight * 0.38,
                190
            );

        input.style.height =
            Math.min(
                input.scrollHeight,
                maximum
            ) + "px";

        input.style.overflowY =
            input.scrollHeight > maximum
                ? "auto"
                : "hidden";
    }

    function scrollChatToBottom() {
        const chat =
            document.getElementById(
                "chat"
            );

        if (!chat) {
            return;
        }

        const nearBottom =
            chat.scrollHeight
            - chat.scrollTop
            - chat.clientHeight
            < 180;

        if (nearBottom) {
            requestAnimationFrame(
                function () {
                    chat.scrollTop =
                        chat.scrollHeight;
                }
            );
        }
    }

    function initialize() {
        setViewportVariables();
        autoGrowMessageInput();

        window.addEventListener(
            "resize",
            setViewportVariables,
            {
                passive: true
            }
        );

        window.addEventListener(
            "orientationchange",
            function () {
                setTimeout(
                    setViewportVariables,
                    180
                );
            },
            {
                passive: true
            }
        );

        if (window.visualViewport) {
            window.visualViewport
                .addEventListener(
                    "resize",
                    function () {
                        setViewportVariables();
                        keepFocusedFieldVisible();
                    },
                    {
                        passive: true
                    }
                );

            window.visualViewport
                .addEventListener(
                    "scroll",
                    setViewportVariables,
                    {
                        passive: true
                    }
                );
        }

        document.addEventListener(
            "focusin",
            function (event) {
                if (
                    event.target.matches(
                        "input, textarea, select, " +
                        "[contenteditable='true']"
                    )
                ) {
                    keepFocusedFieldVisible();
                }
            }
        );

        document.addEventListener(
            "input",
            function (event) {
                if (
                    event.target.matches(
                        "#msg, #messageInput, " +
                        "#chatInput, " +
                        "textarea[name='message'], " +
                        ".chat-input, .message-input"
                    )
                ) {
                    autoGrowMessageInput();
                }
            }
        );

        const chat =
            document.getElementById(
                "chat"
            );

        if (chat) {
            const observer =
                new MutationObserver(
                    scrollChatToBottom
                );

            observer.observe(
                chat,
                {
                    childList: true,
                    subtree: true,
                    characterData: true
                }
            );
        }
    }

    window.MIMobileComfort = {
        refresh:
            function () {
                setViewportVariables();
                autoGrowMessageInput();
            },

        growInput:
            autoGrowMessageInput
    };

    if (
        document.readyState ===
        "loading"
    ) {
        document.addEventListener(
            "DOMContentLoaded",
            initialize,
            {
                once: true
            }
        );
    }
    else {
        initialize();
    }
})();

/* MI AI MOBILE COMFORT JS - END */
</script>

<script>
/* MI AI SETTINGS ACCORDION COPY MOBILE JS - START */

(function () {
    "use strict";

    const settingsTranslations = {
        en: {
            language: "Language",
            theme: "Theme",
            fontSize: "Font Size",
            copy: "Copy",
            copied: "Copied!"
        },

        si: {
            language: "භාෂාව",
            theme: "තේමාව",
            fontSize: "අකුරු ප්‍රමාණය",
            copy: "පිටපත් කරන්න",
            copied: "පිටපත් කළා!"
        },

        ta: {
            language: "மொழி",
            theme: "தீம்",
            fontSize: "எழுத்தளவு",
            copy: "நகலெடு",
            copied: "நகலெடுக்கப்பட்டது!"
        }
    };

    function language() {
        return (
            window.MIAI18N?.getLanguage?.()
            || localStorage.getItem(
                "mi_ui_language"
            )
            || "en"
        );
    }

    function word(key) {
        const selected =
            language();

        return (
            settingsTranslations[selected]?.[key]
            || settingsTranslations.en[key]
            || key
        );
    }

    function findLanguageControl(panel) {
        return (
            panel.querySelector(
                "#languageSelect"
            )
            || panel.querySelector(
                'select[name*="language" i]'
            )
            || Array.from(
                panel.querySelectorAll(
                    "select"
                )
            ).find(function (select) {
                const content = [
                    select.id,
                    select.name,
                    select.getAttribute(
                        "aria-label"
                    ),
                    select.previousElementSibling
                        ?.textContent
                ]
                    .join(" ")
                    .toLowerCase();

                return (
                    content.includes("language")
                    || content.includes("භාෂා")
                    || content.includes("மொழி")
                );
            })
        );
    }

    function findThemeControl(panel) {
        return (
            panel.querySelector(
                "#themeColor"
            )
            || panel.querySelector(
                'input[type="color"]'
            )
            || panel.querySelector(
                '[name*="theme" i]'
            )
        );
    }

    function findFontSizeControl(panel) {
        return (
            panel.querySelector(
                "#fontSize"
            )
            || panel.querySelector(
                "#fontSizeSlider"
            )
            || panel.querySelector(
                "#fontSlider"
            )
            || panel.querySelector(
                'input[type="range"][name*="font" i]'
            )
            || Array.from(
                panel.querySelectorAll(
                    'input[type="range"]'
                )
            ).find(function (input) {
                const content = [
                    input.id,
                    input.name,
                    input.getAttribute(
                        "aria-label"
                    ),
                    input.previousElementSibling
                        ?.textContent
                ]
                    .join(" ")
                    .toLowerCase();

                return (
                    content.includes("font")
                    || content.includes("size")
                    || content.includes("අකුරු")
                    || content.includes("எழுத்த")
                );
            })
        );
    }

    function associatedLabel(
        panel,
        control
    ) {
        if (!control) {
            return null;
        }

        if (control.id) {
            const label =
                panel.querySelector(
                    'label[for="' +
                    CSS.escape(control.id) +
                    '"]'
                );

            if (label) {
                return label;
            }
        }

        const parentLabel =
            control.closest("label");

        if (parentLabel) {
            return parentLabel;
        }

        const previous =
            control.previousElementSibling;

        if (
            previous &&
            previous.tagName === "LABEL"
        ) {
            return previous;
        }

        return null;
    }

    function createSection(
        type,
        icon,
        title,
        control,
        panel
    ) {
        const section =
            document.createElement("section");

        section.className =
            "mi-settings-section";

        section.dataset.settingsType =
            type;

        const button =
            document.createElement("button");

        button.type = "button";

        button.className =
            "mi-settings-option-button";

        button.setAttribute(
            "aria-expanded",
            "false"
        );

        const left =
            document.createElement("span");

        left.className =
            "mi-settings-option-left";

        const iconElement =
            document.createElement("span");

        iconElement.className =
            "mi-settings-option-icon";

        iconElement.setAttribute(
            "aria-hidden",
            "true"
        );

        iconElement.textContent = icon;

        const titleElement =
            document.createElement("span");

        titleElement.className =
            "mi-settings-option-title";

        titleElement.textContent = title;

        left.append(
            iconElement,
            titleElement
        );

        const arrow =
            document.createElement("span");

        arrow.className =
            "mi-settings-arrow";

        arrow.setAttribute(
            "aria-hidden",
            "true"
        );

        arrow.textContent = "⌄";

        button.append(
            left,
            arrow
        );

        const content =
            document.createElement("div");

        content.className =
            "mi-settings-option-content";

        const inner =
            document.createElement("div");

        inner.className =
            "mi-settings-option-inner";

        const controlBox =
            document.createElement("div");

        controlBox.className =
            "mi-settings-control-box";

        const originalLabel =
            associatedLabel(
                panel,
                control
            );

        if (originalLabel) {
            const clonedLabel =
                originalLabel.cloneNode(true);

            clonedLabel.removeAttribute(
                "for"
            );

            controlBox.appendChild(
                clonedLabel
            );

            originalLabel.classList.add(
                "mi-settings-original-hidden"
            );
        }

        if (control) {
            const placeholder =
                document.createComment(
                    "MI AI original settings control"
                );

            control.parentNode?.insertBefore(
                placeholder,
                control
            );

            controlBox.appendChild(
                control
            );
        }
        else {
            const missing =
                document.createElement("div");

            missing.textContent =
                "Control unavailable";

            missing.style.opacity =
                "0.65";

            controlBox.appendChild(
                missing
            );
        }

        inner.appendChild(
            controlBox
        );

        content.appendChild(
            inner
        );

        section.append(
            button,
            content
        );

        button.addEventListener(
            "click",
            function () {
                const accordion =
                    section.parentElement;

                const willOpen =
                    !section.classList
                        .contains("mi-open");

                accordion
                    .querySelectorAll(
                        ".mi-settings-section"
                    )
                    .forEach(
                        function (item) {
                            item.classList.remove(
                                "mi-open"
                            );

                            item.querySelector(
                                ".mi-settings-option-button"
                            )?.setAttribute(
                                "aria-expanded",
                                "false"
                            );
                        }
                    );

                if (willOpen) {
                    section.classList.add(
                        "mi-open"
                    );

                    button.setAttribute(
                        "aria-expanded",
                        "true"
                    );
                }
            }
        );

        return section;
    }

    function setupSettingsAccordion() {
        const panel =
            document.getElementById(
                "settingsPanel"
            );

        if (!panel) {
            return false;
        }

        let accordion =
            panel.querySelector(
                ".mi-settings-accordion"
            );

        if (accordion) {
            updateSettingsTitles();
            return true;
        }

        const languageControl =
            findLanguageControl(panel);

        const themeControl =
            findThemeControl(panel);

        const fontControl =
            findFontSizeControl(panel);

        accordion =
            document.createElement("div");

        accordion.className =
            "mi-settings-accordion";

        accordion.append(
            createSection(
                "language",
                "🌐",
                word("language"),
                languageControl,
                panel
            ),

            createSection(
                "theme",
                "🎨",
                word("theme"),
                themeControl,
                panel
            ),

            createSection(
                "fontSize",
                "Aa",
                word("fontSize"),
                fontControl,
                panel
            )
        );

        const heading =
            panel.querySelector(
                "h1, h2, h3"
            );

        if (heading) {
            heading.insertAdjacentElement(
                "afterend",
                accordion
            );
        }
        else {
            panel.prepend(
                accordion
            );
        }

        /*
          Hide old labels/wrappers left empty after
          moving the controls.
        */
        Array.from(panel.children)
            .forEach(function (child) {
                if (
                    child === accordion
                    || child === heading
                    || child.id ===
                        "settingsCloseBtn"
                ) {
                    return;
                }

                if (
                    child.matches(
                        "label"
                    )
                    && !child.querySelector(
                        "input, select"
                    )
                ) {
                    child.classList.add(
                        "mi-settings-original-hidden"
                    );
                }
            });

        return true;
    }

    function updateSettingsTitles() {
        const panel =
            document.getElementById(
                "settingsPanel"
            );

        if (!panel) {
            return;
        }

        const titles = {
            language:
                word("language"),

            theme:
                word("theme"),

            fontSize:
                word("fontSize")
        };

        panel.querySelectorAll(
            ".mi-settings-section"
        ).forEach(function (section) {
            const type =
                section.dataset
                    .settingsType;

            const title =
                section.querySelector(
                    ".mi-settings-option-title"
                );

            if (
                title &&
                titles[type]
            ) {
                title.textContent =
                    titles[type];
            }
        });
    }

    function cleanReplyText(aiBubble) {
        const clone =
            aiBubble.cloneNode(true);

        clone.querySelectorAll(
            "button, " +
            ".aiCopyButton, " +
            ".copy-btn, " +
            ".copy-button, " +
            ".mi-ai-copy-below, " +
            ".mi-ai-functional-copy, " +
            "[data-action='copy']"
        ).forEach(function (element) {
            element.remove();
        });

        return String(
            clone.innerText
            || clone.textContent
            || ""
        ).trim();
    }

    async function copyText(value) {
        if (!value) {
            return false;
        }

        try {
            await navigator
                .clipboard
                .writeText(value);

            return true;
        }
        catch (error) {
            const textarea =
                document.createElement(
                    "textarea"
                );

            textarea.value =
                value;

            textarea.style.position =
                "fixed";

            textarea.style.left =
                "-9999px";

            textarea.style.opacity =
                "0";

            document.body.appendChild(
                textarea
            );

            textarea.focus();
            textarea.select();

            const success =
                document.execCommand(
                    "copy"
                );

            textarea.remove();

            return success;
        }
    }

    function showCopiedMessage() {
        const message =
            word("copied");

        if (
            typeof window.showToast ===
            "function"
        ) {
            window.showToast(
                message
            );

            return;
        }

        console.log(
            "[MI AI]",
            message
        );
    }

    function markCopyButtons(root) {
        const scope =
            root instanceof Element
                ? root
                : document;

        scope.querySelectorAll(
            "#chat > .ai"
        ).forEach(function (aiBubble) {
            let copyButton =
                Array.from(
                    aiBubble.querySelectorAll(
                        "button"
                    )
                ).find(function (button) {
                    const combined = [
                        button.className,
                        button.id,
                        button.dataset.action,
                        button.title,
                        button.getAttribute(
                            "aria-label"
                        ),
                        button.textContent
                    ]
                        .join(" ")
                        .toLowerCase();

                    return (
                        combined.includes("copy")
                        || combined.includes(
                            "පිටපත්"
                        )
                        || combined.includes(
                            "நகலெடு"
                        )
                        || combined.includes(
                            "⧉"
                        )
                        || combined.includes(
                            "📋"
                        )
                    );
                });

            if (!copyButton) {
                copyButton =
                    document.createElement(
                        "button"
                    );

                copyButton.type =
                    "button";

                copyButton.textContent =
                    "⧉";

                aiBubble.appendChild(
                    copyButton
                );
            }

            copyButton.classList.add(
                "mi-ai-functional-copy"
            );

            copyButton.dataset.action =
                "copy-ai-reply";

            copyButton.title =
                word("copy");

            copyButton.setAttribute(
                "aria-label",
                word("copy")
            );
        });
    }

    document.addEventListener(
        "click",
        function (event) {
            const copyButton =
                event.target.closest(
                    ".mi-ai-functional-copy, " +
                    "[data-action='copy-ai-reply']"
                );

            if (!copyButton) {
                return;
            }

            const aiBubble =
                copyButton.closest(
                    "#chat > .ai, " +
                    ".ai-message, " +
                    ".assistant-message"
                );

            if (!aiBubble) {
                return;
            }

            event.preventDefault();
            event.stopPropagation();
            event.stopImmediatePropagation();

            const replyText =
                cleanReplyText(
                    aiBubble
                );

            copyText(replyText)
                .then(function (success) {
                    if (success) {
                        showCopiedMessage();

                        const oldText =
                            copyButton.textContent;

                        copyButton.textContent =
                            "✓";

                        setTimeout(
                            function () {
                                copyButton.textContent =
                                    oldText || "⧉";
                            },
                            1000
                        );
                    }
                });
        },
        true
    );

    function refresh() {
        setupSettingsAccordion();
        updateSettingsTitles();
        markCopyButtons(document);
    }

    function start() {
        refresh();

        const observer =
            new MutationObserver(
                function (mutations) {
                    let shouldRefresh =
                        false;

                    for (
                        const mutation
                        of mutations
                    ) {
                        if (
                            mutation.addedNodes
                                .length
                        ) {
                            shouldRefresh =
                                true;

                            break;
                        }
                    }

                    if (shouldRefresh) {
                        requestAnimationFrame(
                            refresh
                        );
                    }
                }
            );

        observer.observe(
            document.body,
            {
                childList: true,
                subtree: true
            }
        );

        document.addEventListener(
            "change",
            function (event) {
                if (
                    event.target.id ===
                        "languageSelect"
                ) {
                    setTimeout(
                        updateSettingsTitles,
                        20
                    );
                }
            }
        );

        window.addEventListener(
            "mi-language-changed",
            updateSettingsTitles
        );
    }

    window.MISettingsAccordion = {
        refresh:
            refresh,

        open:
            function (type) {
                const section =
                    document.querySelector(
                        '.mi-settings-section' +
                        '[data-settings-type="' +
                        type +
                        '"]'
                    );

                section
                    ?.querySelector(
                        ".mi-settings-option-button"
                    )
                    ?.click();
            }
    };

    if (
        document.readyState ===
        "loading"
    ) {
        document.addEventListener(
            "DOMContentLoaded",
            start,
            {
                once: true
            }
        );
    }
    else {
        start();
    }
})();

/* MI AI SETTINGS ACCORDION COPY MOBILE JS - END */
</script>
