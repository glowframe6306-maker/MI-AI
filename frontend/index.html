<script>
/* MI AI WELCOME ANIMATION V10 JS - START */

(function () {
    "use strict";

    const WELCOME_ID =
        "miWelcomeV9";

    const EXIT_CLASS =
        "mi-welcome-v10-leaving";

    const HIDDEN_CLASS =
        "mi-welcome-v10-hidden";

    const CHAT_START_CLASS =
        "mi-welcome-v10-message-start";

    const EXIT_TIME_MS =
        390;

    let exitInProgress =
        false;

    let observer =
        null;

    function chatContainer() {
        try {
            if (
                typeof chatBox !==
                    "undefined" &&
                chatBox
            ) {
                return chatBox;
            }
        }
        catch (error) {
            // Continue with DOM lookup.
        }

        return (
            document.getElementById(
                "chat"
            ) ||
            document.querySelector(
                [
                    "#messages",
                    "#chatMessages",
                    ".chat-messages",
                    ".messages"
                ].join(",")
            )
        );
    }

    function messageInput() {
        try {
            if (
                typeof input !==
                    "undefined" &&
                input
            ) {
                return input;
            }
        }
        catch (error) {
            // Continue with DOM lookup.
        }

        return document.querySelector(
            [
                "#msg",
                "#messageInput",
                "#chatInput",
                "#prompt",
                "textarea[name='message']",
                ".message-input",
                ".chat-input",
                "textarea"
            ].join(",")
        );
    }

    function welcomeElement() {
        return document.getElementById(
            WELCOME_ID
        );
    }

    function hasTypedMessage() {
        const field =
            messageInput();

        return Boolean(
            String(
                field?.value ||
                ""
            ).trim()
        );
    }

    function looksLikeUserMessage(
        element
    ) {
        if (
            !element ||
            element.nodeType !==
                Node.ELEMENT_NODE
        ) {
            return false;
        }

        if (
            element.matches?.(
                [
                    ".me",
                    ".user",
                    ".user-message",
                    ".message.user",
                    ".message[data-role='user']",
                    ".chat-message.user",
                    "[data-role='user']"
                ].join(",")
            )
        ) {
            return true;
        }

        return Boolean(
            element.querySelector?.(
                [
                    ".me",
                    ".user",
                    ".user-message",
                    ".message.user",
                    ".message[data-role='user']",
                    ".chat-message.user",
                    "[data-role='user']"
                ].join(",")
            )
        );
    }

    function removeWelcomeImmediately() {
        const welcome =
            welcomeElement();

        if (welcome) {
            welcome.remove();
        }

        exitInProgress =
            false;
    }

    function fadeOutWelcome() {
        const welcome =
            welcomeElement();

        if (
            !welcome ||
            exitInProgress
        ) {
            return Promise.resolve(
                false
            );
        }

        exitInProgress =
            true;

        const container =
            chatContainer();

        container?.classList.add(
            CHAT_START_CLASS
        );

        welcome.classList.remove(
            HIDDEN_CLASS
        );

        /*
          Force the browser to register the current state
          before adding the exit state.
        */
        void welcome.offsetWidth;

        welcome.classList.add(
            EXIT_CLASS
        );

        return new Promise(
            function (resolve) {
                setTimeout(
                    function () {
                        const latest =
                            welcomeElement();

                        if (latest) {
                            latest.classList.add(
                                HIDDEN_CLASS
                            );

                            latest.remove();
                        }

                        exitInProgress =
                            false;

                        setTimeout(
                            function () {
                                container
                                    ?.classList
                                    .remove(
                                        CHAT_START_CLASS
                                    );
                            },
                            430
                        );

                        resolve(
                            true
                        );
                    },
                    EXIT_TIME_MS
                );
            }
        );
    }

    function prepareBeforeSend() {
        if (!hasTypedMessage()) {
            return;
        }

        fadeOutWelcome();
    }

    function installSendDetection() {
        document.addEventListener(
            "submit",
            function (event) {
                const form =
                    event.target;

                if (
                    form?.querySelector?.(
                        [
                            "#msg",
                            "#messageInput",
                            "#chatInput",
                            "#prompt",
                            "textarea"
                        ].join(",")
                    )
                ) {
                    prepareBeforeSend();
                }
            },
            true
        );

        document.addEventListener(
            "click",
            function (event) {
                const sendButton =
                    event.target
                        ?.closest?.(
                            [
                                "#sendBtn",
                                "#sendButton",
                                ".send-btn",
                                ".send-button",
                                '[data-action="send"]',
                                'button[onclick*="send" i]',
                                'button[aria-label*="send" i]',
                                'button[title*="send" i]'
                            ].join(",")
                        );

                if (!sendButton) {
                    return;
                }

                prepareBeforeSend();
            },
            true
        );

        document.addEventListener(
            "keydown",
            function (event) {
                if (
                    event.key !==
                        "Enter" ||
                    event.shiftKey ||
                    event.isComposing
                ) {
                    return;
                }

                const target =
                    event.target;

                if (
                    target?.matches?.(
                        [
                            "#msg",
                            "#messageInput",
                            "#chatInput",
                            "#prompt",
                            "textarea",
                            ".message-input",
                            ".chat-input"
                        ].join(",")
                    )
                ) {
                    prepareBeforeSend();
                }
            },
            true
        );
    }

    function installMessageObserver() {
        const container =
            chatContainer();

        if (!container) {
            return false;
        }

        observer?.disconnect?.();

        observer =
            new MutationObserver(
                function (mutations) {
                    for (
                        const mutation of
                        mutations
                    ) {
                        for (
                            const node of
                            mutation.addedNodes
                        ) {
                            if (
                                looksLikeUserMessage(
                                    node
                                )
                            ) {
                                const welcome =
                                    welcomeElement();

                                if (welcome) {
                                    /*
                                      A message was already inserted.
                                      Remove the overlay immediately so
                                      it cannot stay above the message.
                                    */
                                    welcome.classList.add(
                                        EXIT_CLASS
                                    );

                                    setTimeout(
                                        removeWelcomeImmediately,
                                        180
                                    );
                                }

                                return;
                            }
                        }
                    }
                }
            );

        observer.observe(
            container,
            {
                childList:
                    true,

                subtree:
                    true
            }
        );

        return true;
    }

    function restartWelcomeAnimation() {
        const welcome =
            welcomeElement();

        if (!welcome) {
            return;
        }

        exitInProgress =
            false;

        welcome.classList.remove(
            EXIT_CLASS,
            HIDDEN_CLASS
        );

        /*
          Recreate the entrance animation whenever
          another empty New Chat opens.
        */
        welcome.style.animation =
            "none";

        void welcome.offsetWidth;

        welcome.style.animation =
            "";

        const card =
            welcome.querySelector(
                "#miWelcomeV9Card"
            );

        if (card) {
            card.style.animation =
                "none";

            void card.offsetWidth;

            card.style.animation =
                "";
        }
    }

    function installWelcomeWatch() {
        const bodyObserver =
            new MutationObserver(
                function (mutations) {
                    let welcomeAdded =
                        false;

                    for (
                        const mutation of
                        mutations
                    ) {
                        for (
                            const node of
                            mutation.addedNodes
                        ) {
                            if (
                                node.nodeType !==
                                    Node.ELEMENT_NODE
                            ) {
                                continue;
                            }

                            if (
                                node.id ===
                                    WELCOME_ID ||
                                node.querySelector?.(
                                    "#" +
                                    WELCOME_ID
                                )
                            ) {
                                welcomeAdded =
                                    true;

                                break;
                            }
                        }

                        if (welcomeAdded) {
                            break;
                        }
                    }

                    if (welcomeAdded) {
                        requestAnimationFrame(
                            function () {
                                restartWelcomeAnimation();
                                installMessageObserver();
                            }
                        );
                    }
                }
            );

        bodyObserver.observe(
            document.body,
            {
                childList:
                    true,

                subtree:
                    true
            }
        );
    }

    function patchCleanEngineAdd() {
        /*
          Wrap the current add function only once.
          This makes the fade happen before the first
          user message is rendered.
        */
        let attempts =
            0;

        const installer =
            setInterval(
                function () {
                    attempts +=
                        1;

                    const currentAdd =
                        window.add;

                    if (
                        typeof currentAdd ===
                            "function" &&
                        !currentAdd
                            .__miWelcomeFadeV10
                    ) {
                        const wrapped =
                            function (
                                role,
                                text
                            ) {
                                const normalizedRole =
                                    String(
                                        role || ""
                                    )
                                        .trim()
                                        .toLowerCase();

                                if (
                                    normalizedRole ===
                                        "me" ||
                                    normalizedRole ===
                                        "user" ||
                                    normalizedRole ===
                                        "human"
                                ) {
                                    fadeOutWelcome();
                                }

                                return currentAdd
                                    .apply(
                                        this,
                                        arguments
                                    );
                            };

                        wrapped
                            .__miWelcomeFadeV10 =
                            true;

                        wrapped
                            .__miOriginal =
                            currentAdd;

                        window.add =
                            wrapped;

                        try {
                            add =
                                wrapped;
                        }
                        catch (error) {
                            // window.add remains active.
                        }

                        clearInterval(
                            installer
                        );

                        return;
                    }

                    if (
                        attempts >=
                        100
                    ) {
                        clearInterval(
                            installer
                        );
                    }
                },
                100
            );
    }

    function start() {
        installSendDetection();
        installMessageObserver();
        installWelcomeWatch();
        patchCleanEngineAdd();

        restartWelcomeAnimation();

        window.MIWelcomeAnimationV10 = {
            fadeOut:
                fadeOutWelcome,

            restart:
                restartWelcomeAnimation,

            remove:
                removeWelcomeImmediately,

            isVisible:
                function () {
                    return Boolean(
                        welcomeElement()
                    );
                }
        };

        console.log(
            "[MI AI] Welcome Animation V10 installed."
        );
    }

    if (
        document.readyState ===
        "loading"
    ) {
        document.addEventListener(
            "DOMContentLoaded",
            start,
            {
                once:
                    true
            }
        );
    }
    else {
        start();
    }
})();

/* MI AI WELCOME ANIMATION V10 JS - END */
</script>

<script>
/* MI AI SHARE NOTIFICATIONS V1 JS - START */

(function () {
    "use strict";

    const SHARE_COLLECTION =
        "miPublicShareLinks";

    const READ_IDS_PREFIX =
        "mi_share_notification_read_ids_";

    const VIEWER_ID_KEY =
        "mi_share_viewer_id";

    const REPORTED_PREFIX =
        "mi_share_open_reported_";

    let notifications =
        [];

    let ownerUnsubscribers =
        [];

    let installed =
        false;

    let ownerUid =
        "";

    function cleanText(
        value,
        maximumLength
    ) {
        return String(
            value || ""
        )
            .replace(
                /<[^>]*>/g,
                " "
            )
            .replace(
                /\s+/g,
                " "
            )
            .trim()
            .slice(
                0,
                maximumLength || 180
            );
    }

    function firebaseReady() {
        return Boolean(
            window.firebase &&
            typeof window.firebase
                .firestore ===
                "function" &&
            typeof window.firebase
                .auth ===
                "function"
        );
    }

    function database() {
        if (!firebaseReady()) {
            return null;
        }

        try {
            return window.firebase
                .firestore();
        }
        catch (error) {
            console.warn(
                "[MI AI Notifications] Firestore is unavailable.",
                error
            );

            return null;
        }
    }

    function currentFirebaseUser() {
        if (!firebaseReady()) {
            return null;
        }

        try {
            return window.firebase
                .auth()
                .currentUser;
        }
        catch (error) {
            return null;
        }
    }

    function chatMessages(chatId) {
        try {
            const chat =
                window.chats?.[chatId] ||
                (
                    typeof chats !==
                        "undefined"
                        ? chats?.[chatId]
                        : null
                );

            if (Array.isArray(chat)) {
                return chat;
            }

            if (
                chat &&
                Array.isArray(
                    chat.messages
                )
            ) {
                return chat.messages;
            }
        }
        catch (error) {
            // Return empty array below.
        }

        return [];
    }

    function chatTitle(chatId) {
        try {
            const chat =
                window.chats?.[chatId] ||
                (
                    typeof chats !==
                        "undefined"
                        ? chats?.[chatId]
                        : null
                );

            const stored =
                cleanText(
                    chat?.title ||
                    chat?.name ||
                    chat?.chatName,
                    100
                );

            if (
                stored &&
                !/^chat[_-]/i.test(
                    stored
                )
            ) {
                return stored;
            }

            const first =
                chatMessages(chatId)
                    .find(
                        function (message) {
                            const role =
                                String(
                                    message?.role ||
                                    message?.sender ||
                                    ""
                                )
                                    .toLowerCase();

                            return (
                                role === "me" ||
                                role === "user" ||
                                role === "human"
                            );
                        }
                    );

            const firstText =
                cleanText(
                    first?.text ||
                    first?.content,
                    80
                );

            if (firstText) {
                return firstText;
            }
        }
        catch (error) {
            // Use fallback below.
        }

        return "Shared Chat";
    }

    function makeShareId() {
        if (
            window.crypto &&
            typeof window.crypto
                .randomUUID ===
                "function"
        ) {
            return window.crypto
                .randomUUID()
                .replace(
                    /-/g,
                    ""
                )
                .slice(
                    0,
                    24
                );
        }

        return (
            Date.now()
                .toString(36) +
            Math.random()
                .toString(36)
                .slice(2, 16)
        );
    }

    function randomString(length) {
        const bytes =
            new Uint8Array(
                length
            );

        if (
            window.crypto &&
            typeof window.crypto
                .getRandomValues ===
                "function"
        ) {
            window.crypto
                .getRandomValues(
                    bytes
                );
        }
        else {
            for (
                let index = 0;
                index < bytes.length;
                index += 1
            ) {
                bytes[index] =
                    Math.floor(
                        Math.random() *
                        256
                    );
            }
        }

        return Array.from(bytes)
            .map(
                function (value) {
                    return value
                        .toString(16)
                        .padStart(2, "0");
                }
            )
            .join("");
    }

    async function sha256(value) {
        const data =
            new TextEncoder()
                .encode(
                    String(value)
                );

        const digest =
            await window.crypto
                .subtle
                .digest(
                    "SHA-256",
                    data
                );

        return Array.from(
            new Uint8Array(digest)
        )
            .map(
                function (byte) {
                    return byte
                        .toString(16)
                        .padStart(2, "0");
                }
            )
            .join("");
    }

    async function secureSharePayload(
        payload
    ) {
        const copy =
            JSON.parse(
                JSON.stringify(payload)
            );

        const security =
            copy.security ||
            {};

        const password =
            String(
                security.password ||
                ""
            );

        if (password) {
            const salt =
                randomString(16);

            security.passwordHash =
                await sha256(
                    salt +
                    password
                );

            security.passwordSalt =
                salt;

            security.passwordEnabled =
                true;

            delete security.password;
        }
        else {
            security.passwordEnabled =
                false;

            delete security.password;
            delete security.passwordHash;
            delete security.passwordSalt;
        }

        copy.security =
            security;

        return copy;
    }

    function viewerId() {
        let id =
            localStorage.getItem(
                VIEWER_ID_KEY
            );

        if (!id) {
            id =
                "viewer_" +
                makeShareId();

            localStorage.setItem(
                VIEWER_ID_KEY,
                id
            );
        }

        return id;
    }

    function readIdsKey(uid) {
        return (
            READ_IDS_PREFIX +
            uid
        );
    }

    function getReadIds(uid) {
        try {
            const raw =
                localStorage.getItem(
                    readIdsKey(uid)
                );

            const parsed =
                raw
                    ? JSON.parse(raw)
                    : [];

            return new Set(
                Array.isArray(parsed)
                    ? parsed
                    : []
            );
        }
        catch (error) {
            return new Set();
        }
    }

    function saveReadIds(
        uid,
        ids
    ) {
        try {
            localStorage.setItem(
                readIdsKey(uid),
                JSON.stringify(
                    Array.from(ids)
                        .slice(-1000)
                )
            );
        }
        catch (error) {
            console.warn(
                "[MI AI Notifications] Could not save read state.",
                error
            );
        }
    }

    function timestampMilliseconds(value) {
        if (!value) {
            return 0;
        }

        if (
            typeof value.toMillis ===
                "function"
        ) {
            return value.toMillis();
        }

        if (
            typeof value.seconds ===
                "number"
        ) {
            return (
                value.seconds *
                1000
            );
        }

        const number =
            Number(value);

        return Number.isFinite(number)
            ? number
            : 0;
    }

    function formatExactTime(value) {
        const milliseconds =
            timestampMilliseconds(
                value
            );

        if (!milliseconds) {
            return "Opening time pending";
        }

        const date =
            new Date(milliseconds);

        return new Intl.DateTimeFormat(
            undefined,
            {
                year:
                    "numeric",

                month:
                    "short",

                day:
                    "2-digit",

                hour:
                    "2-digit",

                minute:
                    "2-digit",

                second:
                    "2-digit"
            }
        ).format(date);
    }

    function notificationId(
        shareId,
        openId
    ) {
        return (
            shareId +
            "_" +
            openId
        );
    }

    function createBellButton() {
        let button =
            document.getElementById(
                "miNotificationButton"
            );

        if (button) {
            return button;
        }

        const logoutButton =
            document.getElementById(
                "logoutBtn"
            );

        const actions =
            logoutButton?.parentElement ||
            document.querySelector(
                "#header .headerActions"
            );

        if (!actions) {
            return null;
        }

        button =
            document.createElement(
                "button"
            );

        button.id =
            "miNotificationButton";

        button.type =
            "button";

        button.setAttribute(
            "aria-label",
            "Open notifications"
        );

        button.setAttribute(
            "aria-haspopup",
            "dialog"
        );

        button.innerHTML = `
            <svg
                id="miNotificationBellIcon"
                viewBox="0 0 24 24"
                aria-hidden="true"
            >
                <path d="M18 8a6 6 0 0 0-12 0c0 7-3 7-3 9h18c0-2-3-2-3-9"></path>
                <path d="M10 21h4"></path>
            </svg>

            <span
                id="miNotificationDot"
                aria-hidden="true"
            ></span>

            <span
                id="miNotificationCount"
                aria-hidden="true"
            ></span>
        `;

        button.addEventListener(
            "click",
            function () {
                openPanel();
            }
        );

        if (logoutButton) {
            actions.insertBefore(
                button,
                logoutButton
            );
        }
        else {
            actions.appendChild(
                button
            );
        }

        return button;
    }

    function createPanel() {
        let backdrop =
            document.getElementById(
                "miNotificationBackdrop"
            );

        if (backdrop) {
            return backdrop;
        }

        backdrop =
            document.createElement(
                "div"
            );

        backdrop.id =
            "miNotificationBackdrop";

        backdrop.innerHTML = `
            <section
                id="miNotificationPanel"
                role="dialog"
                aria-modal="true"
                aria-labelledby="miNotificationPanelTitle"
            >
                <header class="mi-notification-header">
                    <div class="mi-notification-header-text">
                        <h2
                            id="miNotificationPanelTitle"
                            class="mi-notification-title"
                        >
                            Shared Chat Notifications
                        </h2>

                        <div
                            id="miNotificationPanelSubtitle"
                            class="mi-notification-subtitle"
                        >
                            Viewer opening history
                        </div>
                    </div>

                    <button
                        id="miNotificationClose"
                        type="button"
                        aria-label="Close notifications"
                    >
                        ×
                    </button>
                </header>

                <div id="miNotificationRows"></div>
            </section>
        `;

        backdrop.addEventListener(
            "click",
            function (event) {
                if (
                    event.target ===
                    backdrop
                ) {
                    closePanel();
                }
            }
        );

        backdrop
            .querySelector(
                "#miNotificationClose"
            )
            ?.addEventListener(
                "click",
                closePanel
            );

        document.body.appendChild(
            backdrop
        );

        return backdrop;
    }

    function renderNotifications() {
        const rows =
            document.getElementById(
                "miNotificationRows"
            );

        if (!rows) {
            return;
        }

        rows.replaceChildren();

        if (
            notifications.length ===
            0
        ) {
            const empty =
                document.createElement(
                    "div"
                );

            empty.className =
                "mi-notification-empty";

            empty.innerHTML = `
                <div class="mi-notification-empty-icon">🔔</div>
                <div>No shared-chat opening notifications yet.</div>
            `;

            rows.appendChild(
                empty
            );

            return;
        }

        const readIds =
            getReadIds(ownerUid);

        notifications
            .slice()
            .sort(
                function (first, second) {
                    return (
                        timestampMilliseconds(
                            second.openedAt
                        ) -
                        timestampMilliseconds(
                            first.openedAt
                        )
                    );
                }
            )
            .forEach(
                function (item) {
                    const id =
                        notificationId(
                            item.shareId,
                            item.openId
                        );

                    const row =
                        document.createElement(
                            "article"
                        );

                    row.className =
                        "mi-notification-row";

                    if (!readIds.has(id)) {
                        row.classList.add(
                            "mi-notification-unread"
                        );
                    }

                    const icon =
                        document.createElement(
                            "div"
                        );

                    icon.className =
                        "mi-notification-row-icon";

                    icon.textContent =
                        "↗";

                    const content =
                        document.createElement(
                            "div"
                        );

                    content.className =
                        "mi-notification-row-content";

                    const title =
                        document.createElement(
                            "div"
                        );

                    title.className =
                        "mi-notification-row-title";

                    title.textContent =
                        cleanText(
                            item.chatTitle,
                            100
                        ) ||
                        "Shared Chat";

                    const message =
                        document.createElement(
                            "div"
                        );

                    message.className =
                        "mi-notification-row-message";

                    message.textContent =
                        "A viewer opened this shared chat.";

                    const time =
                        document.createElement(
                            "div"
                        );

                    time.className =
                        "mi-notification-row-time";

                    time.textContent =
                        formatExactTime(
                            item.openedAt
                        );

                    content.appendChild(
                        title
                    );

                    content.appendChild(
                        message
                    );

                    content.appendChild(
                        time
                    );

                    row.appendChild(
                        icon
                    );

                    row.appendChild(
                        content
                    );

                    rows.appendChild(
                        row
                    );
                }
            );
    }

    function unreadCount() {
        if (!ownerUid) {
            return 0;
        }

        const readIds =
            getReadIds(ownerUid);

        return notifications
            .filter(
                function (item) {
                    return !readIds.has(
                        notificationId(
                            item.shareId,
                            item.openId
                        )
                    );
                }
            )
            .length;
    }

    function updateBell() {
        const button =
            createBellButton();

        if (!button) {
            return;
        }

        const count =
            unreadCount();

        button.classList.toggle(
            "mi-has-unread",
            count === 1
        );

        button.classList.toggle(
            "mi-has-many",
            count > 1
        );

        const countElement =
            document.getElementById(
                "miNotificationCount"
            );

        if (countElement) {
            countElement.textContent =
                count > 99
                    ? "99+"
                    : String(count);
        }

        button.setAttribute(
            "aria-label",
            count > 0
                ? (
                    "Open notifications, " +
                    count +
                    " unread"
                )
                : "Open notifications"
        );
    }

    function markAllRead() {
        if (!ownerUid) {
            return;
        }

        const ids =
            getReadIds(ownerUid);

        notifications.forEach(
            function (item) {
                ids.add(
                    notificationId(
                        item.shareId,
                        item.openId
                    )
                );
            }
        );

        saveReadIds(
            ownerUid,
            ids
        );

        updateBell();
        renderNotifications();
    }

    function openPanel() {
        const backdrop =
            createPanel();

        renderNotifications();

        requestAnimationFrame(
            function () {
                backdrop.classList.add(
                    "mi-notifications-open"
                );
            }
        );

        setTimeout(
            markAllRead,
            250
        );
    }

    function closePanel() {
        document
            .getElementById(
                "miNotificationBackdrop"
            )
            ?.classList.remove(
                "mi-notifications-open"
            );
    }

    function clearOwnerListeners() {
        ownerUnsubscribers.forEach(
            function (unsubscribe) {
                try {
                    unsubscribe();
                }
                catch (error) {
                    // Ignore an already-closed listener.
                }
            }
        );

        ownerUnsubscribers =
            [];

        notifications =
            [];

        updateBell();
        renderNotifications();
    }

    function replaceShareNotifications(
        shareId,
        title,
        snapshot
    ) {
        notifications =
            notifications.filter(
                function (item) {
                    return (
                        item.shareId !==
                        shareId
                    );
                }
            );

        snapshot.docs.forEach(
            function (documentSnapshot) {
                const data =
                    documentSnapshot.data() ||
                    {};

                notifications.push({
                    shareId:
                        shareId,

                    openId:
                        documentSnapshot.id,

                    chatTitle:
                        cleanText(
                            data.chatTitle ||
                            title,
                            100
                        ),

                    openedAt:
                        data.openedAt
                });
            }
        );

        updateBell();
        renderNotifications();
    }

    async function startOwnerListeners(
        user
    ) {
        clearOwnerListeners();

        if (!user?.uid) {
            ownerUid =
                "";

            return;
        }

        ownerUid =
            user.uid;

        createBellButton();
        createPanel();

        const db =
            database();

        if (!db) {
            return;
        }

        try {
            const shareSnapshot =
                await db
                    .collection(
                        SHARE_COLLECTION
                    )
                    .where(
                        "ownerUid",
                        "==",
                        user.uid
                    )
                    .get();

            shareSnapshot.docs
                .forEach(
                    function (
                        shareDocument
                    ) {
                        const shareData =
                            shareDocument.data() ||
                            {};

                        const shareId =
                            shareDocument.id;

                        const title =
                            cleanText(
                                shareData.chatTitle,
                                100
                            ) ||
                            "Shared Chat";

                        const unsubscribe =
                            shareDocument.ref
                                .collection(
                                    "opens"
                                )
                                .orderBy(
                                    "openedAt",
                                    "desc"
                                )
                                .limit(100)
                                .onSnapshot(
                                    function (
                                        snapshot
                                    ) {
                                        replaceShareNotifications(
                                            shareId,
                                            title,
                                            snapshot
                                        );
                                    },
                                    function (
                                        error
                                    ) {
                                        console.warn(
                                            "[MI AI Notifications] Open-event listener failed.",
                                            error
                                        );
                                    }
                                );

                        ownerUnsubscribers.push(
                            unsubscribe
                        );
                    }
                );
        }
        catch (error) {
            console.error(
                "[MI AI Notifications] Could not load owner share links.",
                error
            );
        }
    }

    async function saveShareToFirestore(
        payload
    ) {
        const user =
            currentFirebaseUser();

        const db =
            database();

        if (
            !user ||
            !db
        ) {
            throw new Error(
                "Firebase login is required before generating a notification-enabled share link."
            );
        }

        const securedPayload =
            await secureSharePayload(
                payload
            );

        securedPayload.ownerUid =
            user.uid;

        securedPayload.ownerEmail =
            cleanText(
                user.email ||
                localStorage.getItem(
                    "mi_user_email"
                ),
                180
            )
                .toLowerCase();

        securedPayload.chatTitle =
            cleanText(
                payload.chatTitle,
                100
            ) ||
            "Shared Chat";

        await db
            .collection(
                SHARE_COLLECTION
            )
            .doc(
                securedPayload.id
            )
            .set(
                {
                    ownerUid:
                        securedPayload
                            .ownerUid,

                    ownerEmail:
                        securedPayload
                            .ownerEmail,

                    shareId:
                        securedPayload.id,

                    chatId:
                        String(
                            securedPayload
                                .chatId ||
                            ""
                        ),

                    chatTitle:
                        securedPayload
                            .chatTitle,

                    permission:
                        securedPayload
                            .permission,

                    notificationEnabled:
                        securedPayload
                            .security
                            ?.notification ===
                            "on",

                    createdAt:
                        window.firebase
                            .firestore
                            .FieldValue
                            .serverTimestamp()
                },
                {
                    merge:
                        true
                }
            );

        return securedPayload;
    }

    async function generateSharedChatLinkV1(
        chatId
    ) {
        const permissionSelect =
            document.getElementById(
                "sharePermissionSelect"
            );

        const permission =
            permissionSelect &&
            permissionSelect.value ===
                "view"
                ? "view"
                : "edit";

        const openLimitSelect =
            document.getElementById(
                "shareOpenLimitSelect"
            );

        const openLimitCustom =
            document.getElementById(
                "shareOpenLimitCustom"
            );

        const timeLimitValue =
            document.getElementById(
                "shareTimeLimitValue"
            );

        const timeLimitUnit =
            document.getElementById(
                "shareTimeLimitUnit"
            );

        const passwordEnabled =
            document.getElementById(
                "sharePasswordEnabled"
            );

        const passwordField =
            document.getElementById(
                "sharePassword"
            );

        const passwordConfirmField =
            document.getElementById(
                "sharePasswordConfirm"
            );

        const notificationSelect =
            document.getElementById(
                "shareNotificationSelect"
            );

        const openLimitMode =
            openLimitSelect
                ? openLimitSelect.value
                : "no-expiry";

        const customOpenCount =
            openLimitCustom &&
            openLimitCustom.value
                ? Number(
                    openLimitCustom.value
                )
                : "";

        const timeLimitUnitValue =
            timeLimitUnit
                ? timeLimitUnit.value
                : "no-expiry";

        const timeLimitValueNumber =
            timeLimitValue &&
            timeLimitValue.value
                ? Number(
                    timeLimitValue.value
                )
                : "";

        const passwordEnabledValue =
            Boolean(
                passwordEnabled &&
                passwordEnabled.checked
            );

        const password =
            passwordEnabledValue
                ? String(
                    passwordField?.value ||
                    ""
                )
                : "";

        const passwordConfirm =
            passwordEnabledValue
                ? String(
                    passwordConfirmField
                        ?.value ||
                    ""
                )
                : "";

        if (
            passwordEnabledValue &&
            password !==
                passwordConfirm
        ) {
            window.showShareFeedback?.(
                "Passwords do not match."
            );

            return;
        }

        if (
            openLimitMode ===
                "custom" &&
            (
                !customOpenCount ||
                !Number.isInteger(
                    customOpenCount
                ) ||
                customOpenCount < 1
            )
        ) {
            window.showShareFeedback?.(
                "Enter a valid open count."
            );

            return;
        }

        if (
            timeLimitUnitValue !==
                "no-expiry" &&
            (
                !timeLimitValueNumber ||
                !Number.isInteger(
                    timeLimitValueNumber
                ) ||
                timeLimitValueNumber < 1
            )
        ) {
            window.showShareFeedback?.(
                "Enter a valid time value."
            );

            return;
        }

        const messages =
            chatMessages(chatId)
                .map(
                    function (message) {
                        return {
                            role:
                                message.role,

                            text:
                                message.text ||
                                message.content ||
                                ""
                        };
                    }
                );

        const payload = {
            id:
                makeShareId(),

            chatId:
                String(chatId),

            chatTitle:
                chatTitle(chatId),

            messages:
                messages,

            permission:
                permission,

            ownerEmail:
                cleanText(
                    localStorage.getItem(
                        "mi_user_email"
                    ),
                    180
                )
                    .toLowerCase(),

            createdAt:
                Date.now(),

            security: {
                openLimitMode:
                    openLimitMode,

                openLimitCustom:
                    openLimitMode ===
                        "custom"
                        ? customOpenCount
                        : "",

                timeLimitUnit:
                    timeLimitUnitValue,

                timeLimitValue:
                    timeLimitUnitValue ===
                        "no-expiry"
                        ? ""
                        : timeLimitValueNumber,

                password:
                    passwordEnabledValue
                        ? password
                        : "",

                notification:
                    notificationSelect
                        ? notificationSelect
                            .value
                        : "off"
            }
        };

        let publicPayload;

        try {
            publicPayload =
                await saveShareToFirestore(
                    payload
                );
        }
        catch (error) {
            console.error(
                "[MI AI Notifications] Share save failed.",
                error
            );

            window.showShareFeedback?.(
                error.message ||
                "Could not create the shared link."
            );

            return;
        }

        /*
          Include the secured payload in the URL.
          This allows another browser/device to open it,
          while Firestore stores only its metadata and events.
        */
        const encodedPayload =
            encodeURIComponent(
                JSON.stringify(
                    publicPayload
                )
            );

        const shareLink =
            window.location.origin +
            window.location.pathname +
            "?share=" +
            encodedPayload;

        try {
            if (
                typeof window
                    .copyTextToClipboard ===
                    "function"
            ) {
                await window
                    .copyTextToClipboard(
                        shareLink
                    );
            }
            else {
                await navigator
                    .clipboard
                    .writeText(
                        shareLink
                    );
            }

            window.showShareFeedback?.(
                publicPayload.security
                    ?.notification ===
                    "on"
                    ? "Link copied. Viewer notifications are ON."
                    : "Link copied. Viewer notifications are OFF."
            );

            window
                .closeShareOverlayAfterGenerate
                ?.();

            startOwnerListeners(
                currentFirebaseUser()
            );
        }
        catch (error) {
            console.error(
                "[MI AI Notifications] Clipboard copy failed.",
                error
            );

            window.showShareFeedback?.(
                "The link was created, but could not be copied."
            );
        }
    }

    function sharedPayload() {
        if (
            window.sharedChatData &&
            Array.isArray(
                window.sharedChatData
                    .messages
            )
        ) {
            return window
                .sharedChatData;
        }

        try {
            if (
                typeof window
                    .getSharedChatPayloadFromUrl ===
                    "function"
            ) {
                return window
                    .getSharedChatPayloadFromUrl();
            }

            if (
                typeof getSharedChatPayloadFromUrl ===
                    "function"
            ) {
                return getSharedChatPayloadFromUrl();
            }
        }
        catch (error) {
            console.warn(
                "[MI AI Notifications] Shared payload could not be read.",
                error
            );
        }

        return null;
    }

    async function reportViewerOpen() {
        const payload =
            sharedPayload();

        if (
            !payload ||
            !payload.id ||
            payload.security
                ?.notification !==
                "on"
        ) {
            return false;
        }

        const reportKey =
            REPORTED_PREFIX +
            payload.id;

        if (
            sessionStorage.getItem(
                reportKey
            ) === "1"
        ) {
            return false;
        }

        const db =
            database();

        if (!db) {
            return false;
        }

        sessionStorage.setItem(
            reportKey,
            "1"
        );

        try {
            await db
                .collection(
                    SHARE_COLLECTION
                )
                .doc(
                    String(payload.id)
                )
                .collection(
                    "opens"
                )
                .add({
                    shareId:
                        String(payload.id),

                    chatTitle:
                        cleanText(
                            payload.chatTitle ||
                            "Shared Chat",
                            100
                        ),

                    viewerId:
                        viewerId(),

                    openedAt:
                        window.firebase
                            .firestore
                            .FieldValue
                            .serverTimestamp()
                });

            console.log(
                "[MI AI Notifications] Viewer open reported."
            );

            return true;
        }
        catch (error) {
            sessionStorage.removeItem(
                reportKey
            );

            console.error(
                "[MI AI Notifications] Viewer open report failed.",
                error
            );

            return false;
        }
    }

    function installShareGenerator() {
        const wrapped =
            function (chatId) {
                return generateSharedChatLinkV1(
                    chatId
                );
            };

        wrapped
            .__miShareNotificationsV1 =
            true;

        window.generateSharedChatLink =
            wrapped;

        try {
            generateSharedChatLink =
                wrapped;
        }
        catch (error) {
            // window function remains available.
        }
    }

    function installAuthenticationListener() {
        if (!firebaseReady()) {
            return false;
        }

        window.firebase
            .auth()
            .onAuthStateChanged(
                function (user) {
                    if (user) {
                        createBellButton();
                        createPanel();

                        startOwnerListeners(
                            user
                        );
                    }
                    else {
                        ownerUid =
                            "";

                        clearOwnerListeners();

                        document
                            .getElementById(
                                "miNotificationButton"
                            )
                            ?.remove();
                    }
                }
            );

        return true;
    }

    function start() {
        if (installed) {
            return;
        }

        installed =
            true;

        createBellButton();
        createPanel();
        installShareGenerator();

        if (
            !installAuthenticationListener()
        ) {
            let attempts =
                0;

            const timer =
                setInterval(
                    function () {
                        attempts += 1;

                        installShareGenerator();

                        if (
                            installAuthenticationListener() ||
                            attempts >= 100
                        ) {
                            clearInterval(
                                timer
                            );
                        }
                    },
                    100
                );
        }

        window.addEventListener(
            "mi-firebase-ready",
            function () {
                installAuthenticationListener();
            }
        );

        window.addEventListener(
            "mi-shared-single-chat-enabled",
            function () {
                setTimeout(
                    reportViewerOpen,
                    250
                );
            }
        );

        /*
          Fallback for shared-chat scripts that activate
          before this controller is installed.
        */
        [600, 1500, 3000].forEach(
            function (delay) {
                setTimeout(
                    reportViewerOpen,
                    delay
                );
            }
        );

        document.addEventListener(
            "keydown",
            function (event) {
                if (
                    event.key ===
                        "Escape"
                ) {
                    closePanel();
                }
            }
        );

        window.MIShareNotificationsV1 = {
            openPanel:
                openPanel,

            closePanel:
                closePanel,

            reportOpen:
                reportViewerOpen,

            generateLink:
                generateSharedChatLinkV1,

            refresh:
                function () {
                    return startOwnerListeners(
                        currentFirebaseUser()
                    );
                }
        };

        console.log(
            "[MI AI] Share Notifications V1 installed."
        );
    }

    if (
        document.readyState ===
        "loading"
    ) {
        document.addEventListener(
            "DOMContentLoaded",
            start,
            {
                once:
                    true
            }
        );
    }
    else {
        start();
    }
})();

/* MI AI SHARE NOTIFICATIONS V1 JS - END */
</script>
